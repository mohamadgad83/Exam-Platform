<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>بنك الأسئلة - منصة الاختبارات</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Cairo', sans-serif; background: linear-gradient(135deg, #f0f2f5 0%, #e4e8f0 100%); min-height: 100vh; padding: 20px; }
        .container { max-width: 1400px; margin: 0 auto; }
        .top-bar {
            background: white;
            border-radius: 24px;
            padding: 12px 24px;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            border: 1px solid #e2e8f0;
        }
        .logo { font-size: 22px; font-weight: 800; background: linear-gradient(135deg, #6366f1, #8b5cf6); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .card {
            background: white;
            border-radius: 28px;
            padding: 25px;
            margin-bottom: 25px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            border: 1px solid #e2e8f0;
        }
        .header h1 {
            background: linear-gradient(135deg, #6366f1, #8b5cf6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-size: 28px;
        }
        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 14px;
            cursor: pointer;
            font-weight: 600;
            transition: 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            font-family: inherit;
        }
        .btn-primary { background: linear-gradient(135deg, #6366f1, #4f46e5); color: white; box-shadow: 0 4px 10px rgba(99,102,241,0.3); }
        .btn-success { background: #10b981; color: white; }
        .btn-danger { background: #ef4444; color: white; }
        .btn-warning { background: #f59e0b; color: white; }
        .btn-info { background: #3b82f6; color: white; }
        .btn-outline { background: transparent; border: 2px solid #6366f1; color: #6366f1; }
        .btn-sm { padding: 6px 14px; font-size: 12px; }
        .filter-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
            margin-bottom: 20px;
        }
        .search-input {
            padding: 10px 18px;
            border: 1px solid #e2e8f0;
            border-radius: 50px;
            flex: 1;
            min-width: 200px;
            font-family: inherit;
        }
        .filter-select {
            padding: 10px 18px;
            border: 1px solid #e2e8f0;
            border-radius: 50px;
            min-width: 150px;
            font-family: inherit;
        }
        .row-2 { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; }
        .exam-card {
            background: #f8fafc;
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 15px;
            border: 1px solid #e2e8f0;
            transition: all 0.2s;
        }
        .exam-card:hover { transform: translateX(-5px); border-right: 4px solid #6366f1; background: white; }
        .exam-title { font-size: 18px; font-weight: 700; color: #1e293b; margin-bottom: 8px; }
        .exam-info { display: flex; gap: 15px; flex-wrap: wrap; margin: 12px 0; color: #64748b; font-size: 13px; }
        .badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 4px 12px;
            border-radius: 40px;
            font-size: 12px;
            font-weight: 600;
        }
        .badge-success { background: #d1fae5; color: #065f46; }
        .badge-warning { background: #fef3c7; color: #d97706; }
        .badge-danger { background: #fee2e2; color: #991b1b; }
        .badge-info { background: #dbeafe; color: #1e40af; }
        .badge-primary { background: linear-gradient(135deg, #6366f1, #8b5cf6); color: white; }
        .action-buttons { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 0; }
        .empty-state { text-align: center; padding: 60px; color: #64748b; }
        .empty-state-icon { font-size: 64px; margin-bottom: 16px; opacity: 0.5; }
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(5px);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
        .modal-content {
            background: white;
            border-radius: 32px;
            padding: 32px;
            width: 700px;
            max-width: 90%;
            max-height: 85vh;
            overflow-y: auto;
        }
        .modal-content input, .modal-content select, .modal-content textarea {
            width: 100%;
            padding: 12px 16px;
            margin: 10px 0;
            border: 1px solid #e2e8f0;
            border-radius: 16px;
            font-family: inherit;
        }
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; margin-bottom: 5px; font-weight: 600; color: #334155; }
        .info-note {
            background: #fef3c7;
            padding: 10px;
            border-radius: 12px;
            margin-top: 10px;
            font-size: 13px;
            color: #92400e;
        }
        .toast-notification {
            position: fixed;
            bottom: 30px;
            left: 30px;
            background: white;
            border-radius: 16px;
            padding: 16px 20px;
            display: flex;
            align-items: center;
            gap: 12px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            transform: translateX(-500px);
            transition: transform 0.3s ease;
            z-index: 10000;
            direction: rtl;
            border-right: 4px solid;
        }
        .toast-notification.show { transform: translateX(0); }
        .toast-success { border-right-color: #10b981; }
        .toast-error { border-right-color: #ef4444; }
        .toast-message { flex: 1; font-size: 14px; color: #333; }
        .toast-progress {
            position: absolute;
            bottom: 0;
            left: 0;
            height: 3px;
            width: 100%;
            animation: progress 3s linear forwards;
        }
        @keyframes progress { from { width: 100%; } to { width: 0%; } }
        .confirm-modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(5px);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 10001;
        }
        .confirm-content {
            background: white;
            border-radius: 28px;
            padding: 32px;
            text-align: center;
            width: 320px;
        }
        .confirm-buttons { display: flex; gap: 12px; margin-top: 20px; }
        .confirm-yes { background: #10b981; color: white; padding: 10px; border: none; border-radius: 12px; cursor: pointer; flex: 1; }
        .confirm-no { background: #e2e8f0; color: #333; padding: 10px; border: none; border-radius: 12px; cursor: pointer; flex: 1; }
        @media (max-width: 768px) {
            .filter-bar { flex-direction: column; align-items: stretch; }
            .search-input, .filter-select { width: 100%; }
            .row-2 { grid-template-columns: 1fr; }
            .action-buttons { flex-direction: column; }
            .btn { width: 100%; justify-content: center; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="top-bar">
            <div class="logo">📚 منصة الاختبارات</div>
            <div>
                <span style="margin-left: 15px;">👋 مرحباً <span id="teacherName"></span></span>
                <button class="btn btn-outline btn-sm" onclick="window.location.href='teacher-dashboard.html'">🏠 الرئيسية</button>
                <button class="btn btn-outline btn-sm" onclick="logout()">🚪 خروج</button>
            </div>
        </div>

        <div class="card header">
            <h1>📚 بنك الأسئلة</h1>
            <p>إضافة وتعديل وحذف الأسئلة الخاصة بك (تنتظر اعتماد الأدمن)</p>
        </div>

        <!-- فلتر الصف والمواد -->
        <div class="card">
            <div class="row-2">
                <div class="form-group">
                    <label>🎓 فلتر حسب الصف</label>
                    <select id="filterClass" onchange="filterByClassAndSubject()">
                        <option value="all">كل الصفوف</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>📖 فلتر حسب المادة</label>
                    <select id="filterSubject" onchange="filterByClassAndSubject()">
                        <option value="all">كل المواد</option>
                    </select>
                </div>
            </div>
        </div>

        <div class="card">
            <div class="filter-bar">
                <input type="text" id="searchInput" class="search-input" placeholder="🔍 بحث في الأسئلة...">
                <select id="typeFilter" class="filter-select">
                    <option value="all">كل الأنواع</option>
                    <option value="mcq">✅ اختيار من متعدد</option>
                    <option value="multi_select">✅✅ اختيار متعدد</option>
                    <option value="true_false">صح/خطأ</option>
                    <option value="essay">📝 مقالي</option>
                </select>
                <select id="statusFilter" class="filter-select">
                    <option value="all">كل الحالات</option>
                    <option value="pending">⏳ قيد المراجعة</option>
                    <option value="approved">✅ معتمد</option>
                    <option value="rejected">❌ مرفوض</option>
                </select>
                <button class="btn btn-primary" onclick="openAddQuestionModal()">➕ إضافة سؤال</button>
            </div>
            <div id="questionsList"></div>
        </div>
    </div>

    <!-- مودال إضافة/تعديل سؤال -->
    <div id="questionModal" class="modal">
        <div class="modal-content">
            <h3 id="modalTitle">➕ إضافة سؤال جديد</h3>
            
            <div class="form-group">
                <label>📝 نوع السؤال</label>
                <select id="questionType" onchange="toggleQuestionFields()">
                    <option value="mcq">✅ اختيار من متعدد (إجابة واحدة - 4 خيارات)</option>
                    <option value="multi_select">✅✅ اختيار متعدد (إجابتان صحيحتان - 5 خيارات)</option>
                    <option value="true_false">صح/خطأ</option>
                    <option value="essay">📝 مقالي</option>
                </select>
            </div>
            
            <div class="form-group">
                <label>❓ نص السؤال</label>
                <textarea id="questionText" rows="3" placeholder="أدخل نص السؤال هنا..."></textarea>
            </div>
            
            <!-- قسم الاختيارات -->
            <div id="choicesSection">
                <div class="form-group">
                    <label>🔘 الاختيارات</label>
                    <div id="choicesList"></div>
                    <button type="button" class="btn btn-outline btn-sm" onclick="addChoice()" style="margin-top: 10px;">+ إضافة اختيار</button>
                </div>
                <div id="multiSelectNote" class="info-note" style="display: none;">
                    💡 <strong>سؤال اختيار متعدد:</strong> يجب اختيار <strong>إجابتين صحيحتين</strong> بالضبط من 5 خيارات.
                </div>
                <div id="mcqNote" class="info-note" style="display: none;">
                    💡 <strong>سؤال اختيار من متعدد:</strong> اختر <strong>إجابة واحدة صحيحة</strong> فقط من 4 خيارات.
                </div>
            </div>
            
            <!-- قسم صح/خطأ -->
            <div id="trueFalseSection" style="display: none;">
                <div class="form-group">
                    <label>✅ الإجابة الصحيحة</label>
                    <select id="trueFalseAnswer">
                        <option value="true">صحيح</option>
                        <option value="false">خطأ</option>
                    </select>
                </div>
            </div>
            
            <!-- قسم مقالي -->
            <div id="essaySection" style="display: none;">
                <div class="form-group">
                    <label>📝 نموذج الإجابة (اختياري)</label>
                    <textarea id="modelAnswer" rows="3" placeholder="نموذج الإجابة المتوقع..."></textarea>
                </div>
            </div>
            
            <div class="row-2">
                <div class="form-group">
                    <label>⭐ الدرجة</label>
                    <input type="number" id="points" value="5" min="0.5" step="0.5">
                </div>
                <div class="form-group">
                    <label>📊 مستوى الصعوبة</label>
                    <select id="difficulty">
                        <option value="easy">🟢 سهل</option>
                        <option value="medium" selected>🟡 متوسط</option>
                        <option value="hard">🔴 صعب</option>
                    </select>
                </div>
            </div>
            
            <div class="row-2">
                <div class="form-group">
                    <label>🎓 الصف *</label>
                    <select id="classId" onchange="onClassChange()" required>
                        <option value="">-- اختر الصف --</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>📖 المادة *</label>
                    <select id="subjectId" required>
                        <option value="">-- اختر الصف أولاً --</option>
                    </select>
                </div>
            </div>
            
            <div style="display: flex; gap: 12px; margin-top: 20px;">
                <button class="btn btn-primary" onclick="saveQuestion()">💾 حفظ</button>
                <button class="btn btn-outline" onclick="closeQuestionModal()">إلغاء</button>
            </div>
        </div>
    </div>

    <script src="js/supabase-config.js"></script>
    <script>
        // ==================== التحقق من صلاحية الدخول ====================
        const currentUser = getUser();
        if (!currentUser || (currentUser.role !== 'teacher' && currentUser.role !== 'admin')) {
            window.location.href = 'index.html';
        }
        
        document.getElementById('teacherName').innerHTML = currentUser.name || currentUser.username || 'معلم';
        
        let currentEditId = null;
        let allQuestions = [];
        let choices = [];
        let teacherAssignments = []; // تخزين تعيينات المعلم
        let teacherClasses = []; // الصفوف المسندة للمعلم
        let teacherSubjects = []; // المواد المسندة للمعلم
        
        // ==================== دوال مساعدة ====================
        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/[&<>]/g, function(m) {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                return m;
            });
        }
        
        function getTypeText(type) {
            const types = {
                'mcq': '✅ اختيار من متعدد',
                'multi_select': '✅✅ اختيار متعدد',
                'true_false': 'صح/خطأ',
                'essay': '📝 مقالي'
            };
            return types[type] || type;
        }
        
        function getTypeClass(type) {
            const classes = {
                'mcq': 'badge-primary',
                'multi_select': 'badge-info',
                'true_false': 'badge-warning',
                'essay': 'badge-success'
            };
            return classes[type] || 'badge-info';
        }
        
        // ==================== تحميل تعيينات المعلم ====================
        async function loadTeacherAssignments() {
            // جلب تعيينات المعلم (الصفوف والمواد المسندة له)
            const { data: assignments, error } = await sb
                .from('teacher_assignments')
                .select(`
                    *,
                    classes:class_id(id, name),
                    subjects:subject_id(id, name)
                `)
                .eq('teacher_id', currentUser.id);
            
            if (error) {
                console.error('Error loading assignments:', error);
                teacherAssignments = [];
                teacherClasses = [];
                teacherSubjects = [];
                return;
            }
            
            teacherAssignments = assignments || [];
            
            // استخراج الصفوف الفريدة
            const classMap = new Map();
            teacherAssignments.forEach(a => {
                if (a.classes && !classMap.has(a.class_id)) {
                    classMap.set(a.class_id, { id: a.class_id, name: a.classes.name });
                }
            });
            teacherClasses = Array.from(classMap.values());
            
            // استخراج المواد الفريدة
            const subjectMap = new Map();
            teacherAssignments.forEach(a => {
                if (a.subjects && !subjectMap.has(a.subject_id)) {
                    subjectMap.set(a.subject_id, { id: a.subject_id, name: a.subjects.name });
                }
            });
            teacherSubjects = Array.from(subjectMap.values());
            
            // تعبئة فلتر الصفوف
            const filterClass = document.getElementById('filterClass');
            filterClass.innerHTML = '<option value="all">كل الصفوف</option>';
            teacherClasses.forEach(c => {
                filterClass.innerHTML += `<option value="${c.id}">${escapeHtml(c.name)}</option>`;
            });
            
            // تعبئة فلتر المواد
            const filterSubject = document.getElementById('filterSubject');
            filterSubject.innerHTML = '<option value="all">كل المواد</option>';
            teacherSubjects.forEach(s => {
                filterSubject.innerHTML += `<option value="${s.id}">${escapeHtml(s.name)}</option>`;
            });
            
            // تعبئة حقول الصف والمواد في المودال
            const classSelect = document.getElementById('classId');
            classSelect.innerHTML = '<option value="">-- اختر الصف --</option>';
            teacherClasses.forEach(c => {
                classSelect.innerHTML += `<option value="${c.id}">${escapeHtml(c.name)}</option>`;
            });
        }
        
        // ==================== عند تغيير الصف في المودال ====================
        function onClassChange() {
            const classId = document.getElementById('classId').value;
            const subjectSelect = document.getElementById('subjectId');
            
            if (!classId) {
                subjectSelect.innerHTML = '<option value="">-- اختر الصف أولاً --</option>';
                subjectSelect.disabled = true;
                return;
            }
            
            // جلب المواد المسندة للمعلم في هذا الصف فقط
            const availableSubjects = teacherAssignments
                .filter(a => a.class_id == classId)
                .map(a => ({ id: a.subject_id, name: a.subjects?.name }));
            
            subjectSelect.disabled = false;
            subjectSelect.innerHTML = '<option value="">-- اختر المادة --</option>';
            availableSubjects.forEach(s => {
                if (s.name) {
                    subjectSelect.innerHTML += `<option value="${s.id}">${escapeHtml(s.name)}</option>`;
                }
            });
            
            if (availableSubjects.length === 0) {
                subjectSelect.innerHTML = '<option value="">لا توجد مواد مسندة</option>';
            }
        }
        
        // ==================== الفلتر حسب الصف والمادة ====================
        async function filterByClassAndSubject() {
            const classId = document.getElementById('filterClass').value;
            const subjectId = document.getElementById('filterSubject').value;
            
            let query = sb.from('questions').select('*').eq('teacher_id', currentUser.id);
            
            if (classId !== 'all') {
                query = query.eq('class_id', parseInt(classId));
            }
            if (subjectId !== 'all') {
                query = query.eq('subject_id', parseInt(subjectId));
            }
            
            const { data: questions, error } = await query.order('created_at', { ascending: false });
            
            if (error) {
                console.error('Error loading filtered questions:', error);
                return;
            }
            
            allQuestions = questions || [];
            applySearchAndFilters();
        }
        
        // ==================== تطبيق البحث والفلترة ====================
        function applySearchAndFilters() {
            const search = document.getElementById('searchInput').value;
            const type = document.getElementById('typeFilter').value;
            const status = document.getElementById('statusFilter').value;
            
            let filtered = [...allQuestions];
            
            if (search) {
                filtered = filtered.filter(q => q.question_text?.toLowerCase().includes(search.toLowerCase()));
            }
            if (type !== 'all') {
                filtered = filtered.filter(q => q.type === type);
            }
            if (status !== 'all') {
                filtered = filtered.filter(q => q.status === status);
            }
            
            renderQuestionsList(filtered);
        }
        
        // ==================== عرض قائمة الأسئلة ====================
        function renderQuestionsList(questions) {
            const container = document.getElementById('questionsList');
            
            if (!questions || questions.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-state-icon">📭</div>
                        <p>لا توجد أسئلة</p>
                        <button class="btn btn-primary" onclick="openAddQuestionModal()" style="margin-top: 15px;">➕ أضف سؤالاً جديداً</button>
                    </div>
                `;
                return;
            }
            
            const statusMap = {
                'pending': { text: '⏳ قيد المراجعة', class: 'badge-warning' },
                'approved': { text: '✅ معتمد', class: 'badge-success' },
                'rejected': { text: '❌ مرفوض', class: 'badge-danger' }
            };
            
            // جلب أسماء الصفوف والمواد
            container.innerHTML = '';
            for (const q of questions) {
                // جلب اسم الصف
                let className = '';
                let subjectName = '';
                
                const classInfo = teacherClasses.find(c => c.id === q.class_id);
                className = classInfo ? classInfo.name : '';
                
                const subjectInfo = teacherSubjects.find(s => s.id === q.subject_id);
                subjectName = subjectInfo ? subjectInfo.name : '';
                
                let optionsHtml = '';
                if (q.options) {
                    try {
                        const opts = JSON.parse(q.options);
                        optionsHtml = `<div style="margin-top: 8px; font-size: 13px; color: #64748b;">الخيارات: ${opts.slice(0, 3).join(' | ')}${opts.length > 3 ? ' ...' : ''}</div>`;
                    } catch(e) {}
                }
                
                const questionDiv = document.createElement('div');
                questionDiv.className = 'exam-card';
                questionDiv.innerHTML = `
                    <div style="display: flex; justify-content: space-between; flex-wrap: wrap; gap: 15px;">
                        <div style="flex: 1;">
                            <div class="exam-title">${escapeHtml(q.question_text || 'بدون نص')}</div>
                            <div class="exam-info">
                                <span class="badge ${getTypeClass(q.type)}">${getTypeText(q.type)}</span>
                                <span>⭐ ${q.points || 0} درجة</span>
                                <span>${q.difficulty === 'easy' ? '🟢 سهل' : q.difficulty === 'medium' ? '🟡 متوسط' : '🔴 صعب'}</span>
                                <span class="badge ${statusMap[q.status]?.class || 'badge-warning'}">${statusMap[q.status]?.text || q.status}</span>
                            </div>
                            <div class="exam-info" style="margin-top: 5px;">
                                <span>🎓 ${className || 'بدون صف'}</span>
                                <span>📖 ${subjectName || 'بدون مادة'}</span>
                            </div>
                            ${optionsHtml}
                            ${q.status === 'rejected' && q.feedback ? `<div class="badge badge-danger" style="margin-top: 8px;">سبب الرفض: ${escapeHtml(q.feedback)}</div>` : ''}
                        </div>
                        <div class="action-buttons">
                            <button class="btn btn-info btn-sm" onclick="viewQuestionDetails(${q.id})">👁️ عرض</button>
                            ${q.status !== 'approved' ? `<button class="btn btn-warning btn-sm" onclick="editQuestion(${q.id})">✏️ تعديل</button>` : ''}
                            <button class="btn btn-danger btn-sm" onclick="deleteQuestionConfirm(${q.id})">🗑️ حذف</button>
                        </div>
                    </div>
                `;
                container.appendChild(questionDiv);
            }
        }
        
        // ==================== تحميل الأسئلة ====================
        async function loadQuestions() {
            const { data: questions, error } = await sb
                .from('questions')
                .select('*')
                .eq('teacher_id', currentUser.id)
                .order('created_at', { ascending: false });
            
            if (error) {
                console.error('Error loading questions:', error);
                document.getElementById('questionsList').innerHTML = '<div class="empty-state">حدث خطأ في تحميل الأسئلة</div>';
                return;
            }
            
            allQuestions = questions || [];
            applySearchAndFilters();
        }
        
        // ==================== عرض تفاصيل السؤال ====================
        async function viewQuestionDetails(questionId) {
            const q = allQuestions.find(q => q.id === questionId);
            if (!q) return;
            
            let className = '';
            let subjectName = '';
            const classInfo = teacherClasses.find(c => c.id === q.class_id);
            className = classInfo ? classInfo.name : '';
            const subjectInfo = teacherSubjects.find(s => s.id === q.subject_id);
            subjectName = subjectInfo ? subjectInfo.name : '';
            
            let details = `📋 تفاصيل السؤال:\n\n`;
            details += `نص السؤال: ${q.question_text}\n`;
            details += `النوع: ${getTypeText(q.type)}\n`;
            details += `الدرجة: ${q.points}\n`;
            details += `مستوى الصعوبة: ${q.difficulty === 'easy' ? 'سهل' : q.difficulty === 'medium' ? 'متوسط' : 'صعب'}\n`;
            details += `الصف: ${className || 'بدون صف'}\n`;
            details += `المادة: ${subjectName || 'بدون مادة'}\n`;
            details += `الحالة: ${q.status === 'pending' ? 'قيد المراجعة' : q.status === 'approved' ? 'معتمد' : 'مرفوض'}\n`;
            
            if (q.type === 'mcq' || q.type === 'multi_select') {
                if (q.options) {
                    const opts = JSON.parse(q.options);
                    details += `\nالخيارات:\n`;
                    opts.forEach((opt, i) => {
                        details += `  ${String.fromCharCode(65 + i)}. ${opt}\n`;
                    });
                }
                if (q.correct_answer) {
                    details += `\nالإجابة الصحيحة: ${q.correct_answer}\n`;
                }
            }
            
            if (q.type === 'true_false') {
                details += `\nالإجابة الصحيحة: ${q.correct_answer === 'صحيح' ? '✓ صحيح' : '✗ خطأ'}\n`;
            }
            
            if (q.type === 'essay' && q.model_answer) {
                details += `\nنموذج الإجابة: ${q.model_answer}\n`;
            }
            
            alert(details);
        }
        
        // ==================== تهيئة الاختيارات ====================
        function initChoicesForType() {
            const type = document.getElementById('questionType').value;
            let defaultCount = 4;
            let defaultCorrect = [0];
            
            if (type === 'multi_select') {
                defaultCount = 5;
                defaultCorrect = [0, 1];
            }
            
            choices = [];
            for (let i = 0; i < defaultCount; i++) {
                choices.push({ text: '', isCorrect: defaultCorrect.includes(i) });
            }
            renderChoices();
        }
        
        function renderChoices() {
            const container = document.getElementById('choicesList');
            const type = document.getElementById('questionType').value;
            const isMultiSelect = (type === 'multi_select');
            
            if (!container) return;
            
            container.innerHTML = '';
            for (let i = 0; i < choices.length; i++) {
                const choice = choices[i];
                const div = document.createElement('div');
                div.style.cssText = 'display: flex; align-items: center; gap: 10px; margin-bottom: 10px; background: #f8fafc; padding: 10px; border-radius: 12px;';
                div.innerHTML = `
                    <span style="font-weight: bold; min-width: 35px;">${String.fromCharCode(65 + i)}.</span>
                    <input type="text" id="choice_${i}" placeholder="نص الاختيار ${i + 1}" value="${escapeHtml(choice.text)}" style="flex: 1; padding: 8px; border-radius: 10px; border: 1px solid #e2e8f0;" oninput="updateChoiceText(${i}, this.value)">
                    <div style="display: flex; align-items: center; gap: 5px;">
                        <input type="${isMultiSelect ? 'checkbox' : 'radio'}" name="correctChoice" ${choice.isCorrect ? 'checked' : ''} onchange="toggleCorrect(${i})">
                        <label style="font-size: 12px;">صحيح</label>
                    </div>
                    <button class="btn btn-danger btn-sm" onclick="removeChoice(${i})" ${choices.length <= (isMultiSelect ? 5 : 4) ? 'disabled' : ''}>🗑️</button>
                `;
                container.appendChild(div);
            }
        }
        
        function addChoice() {
            if (choices.length < 15) {
                choices.push({ text: '', isCorrect: false });
                renderChoices();
            } else {
                showToast('لا يمكن إضافة أكثر من 15 اختياراً', 'error');
            }
        }
        
        function removeChoice(index) {
            const type = document.getElementById('questionType').value;
            const minChoices = (type === 'multi_select') ? 5 : 4;
            
            if (choices.length > minChoices) {
                choices.splice(index, 1);
                renderChoices();
            } else {
                showToast(`يجب أن يكون هناك ${minChoices} اختيارات على الأقل`, 'error');
            }
        }
        
        function updateChoiceText(index, value) {
            choices[index].text = value;
        }
        
        function toggleCorrect(index) {
            const type = document.getElementById('questionType').value;
            
            if (type === 'mcq') {
                for (let i = 0; i < choices.length; i++) {
                    choices[i].isCorrect = (i === index);
                }
            } else if (type === 'multi_select') {
                const currentCorrect = choices.filter(c => c.isCorrect).length;
                const willBeCorrect = !choices[index].isCorrect;
                
                if (willBeCorrect && currentCorrect >= 2) {
                    showToast('يمكنك اختيار إجابتين صحيحتين فقط كحد أقصى', 'warning');
                    return;
                }
                choices[index].isCorrect = willBeCorrect;
            }
            renderChoices();
        }
        
        // ==================== تبديل حقول نوع السؤال ====================
        function toggleQuestionFields() {
            const type = document.getElementById('questionType').value;
            const choicesSection = document.getElementById('choicesSection');
            const trueFalseSection = document.getElementById('trueFalseSection');
            const essaySection = document.getElementById('essaySection');
            const multiSelectNote = document.getElementById('multiSelectNote');
            const mcqNote = document.getElementById('mcqNote');
            
            const showChoices = (type === 'mcq' || type === 'multi_select');
            choicesSection.style.display = showChoices ? 'block' : 'none';
            trueFalseSection.style.display = (type === 'true_false') ? 'block' : 'none';
            essaySection.style.display = (type === 'essay') ? 'block' : 'none';
            multiSelectNote.style.display = (type === 'multi_select') ? 'block' : 'none';
            mcqNote.style.display = (type === 'mcq') ? 'block' : 'none';
            
            initChoicesForType();
        }
        
        // ==================== فتح مودال إضافة سؤال ====================
        function openAddQuestionModal() {
            currentEditId = null;
            document.getElementById('modalTitle').innerHTML = '➕ إضافة سؤال جديد';
            document.getElementById('questionText').value = '';
            document.getElementById('questionType').value = 'mcq';
            document.getElementById('points').value = '5';
            document.getElementById('difficulty').value = 'medium';
            document.getElementById('classId').value = '';
            document.getElementById('subjectId').innerHTML = '<option value="">-- اختر الصف أولاً --</option>';
            document.getElementById('subjectId').disabled = true;
            document.getElementById('modelAnswer').value = '';
            document.getElementById('trueFalseAnswer').value = 'true';
            
            initChoicesForType();
            toggleQuestionFields();
            document.getElementById('questionModal').style.display = 'flex';
        }
        
        // ==================== تعديل سؤال ====================
        async function editQuestion(questionId) {
            const q = allQuestions.find(q => q.id === questionId);
            if (!q) return;
            
            currentEditId = questionId;
            document.getElementById('modalTitle').innerHTML = '✏️ تعديل سؤال';
            document.getElementById('questionText').value = q.question_text || '';
            document.getElementById('questionType').value = q.type || 'mcq';
            document.getElementById('points').value = q.points || 5;
            document.getElementById('difficulty').value = q.difficulty || 'medium';
            document.getElementById('classId').value = q.class_id || '';
            
            // تحميل المواد بناءً على الصف المختار
            await onClassChange();
            document.getElementById('subjectId').value = q.subject_id || '';
            
            if (q.type === 'mcq' || q.type === 'multi_select') {
                if (q.options) {
                    try {
                        const opts = JSON.parse(q.options);
                        const correct = q.correct_answer ? JSON.parse(q.correct_answer) : [];
                        choices = opts.map((text, idx) => ({
                            text: text,
                            isCorrect: Array.isArray(correct) ? correct.includes(text) : false
                        }));
                        renderChoices();
                    } catch(e) {
                        initChoicesForType();
                    }
                } else {
                    initChoicesForType();
                }
            }
            
            if (q.type === 'true_false') {
                document.getElementById('trueFalseAnswer').value = q.correct_answer === 'صحيح' ? 'true' : 'false';
            }
            
            if (q.type === 'essay' && q.model_answer) {
                document.getElementById('modelAnswer').value = q.model_answer;
            }
            
            toggleQuestionFields();
            document.getElementById('questionModal').style.display = 'flex';
        }
        
        // ==================== حفظ السؤال ====================
        async function saveQuestion() {
            const type = document.getElementById('questionType').value;
            const text = document.getElementById('questionText').value;
            const points = parseFloat(document.getElementById('points').value);
            const difficulty = document.getElementById('difficulty').value;
            const classId = document.getElementById('classId').value;
            const subjectId = document.getElementById('subjectId').value;
            
            if (!text) {
                showToast('نص السؤال مطلوب', 'error');
                return;
            }
            
            if (!classId) {
                showToast('اختر الصف', 'error');
                return;
            }
            
            if (!subjectId) {
                showToast('اختر المادة', 'error');
                return;
            }
            
            const questionData = {
                teacher_id: currentUser.id,
                question_text: text,
                type: type,
                points: points,
                difficulty: difficulty,
                class_id: parseInt(classId),
                subject_id: parseInt(subjectId),
                status: 'pending'
            };
            
            // معالجة حسب نوع السؤال
            if (type === 'mcq') {
                const validChoices = choices.slice(0, 4);
                const emptyChoices = validChoices.filter(c => !c.text.trim());
                if (emptyChoices.length > 0) {
                    showToast('الاختيارات الأربعة الأولى مطلوبة', 'error');
                    return;
                }
                
                const correctChoices = validChoices.filter(c => c.isCorrect);
                if (correctChoices.length !== 1) {
                    showToast('يجب اختيار إجابة واحدة صحيحة بالضبط', 'error');
                    return;
                }
                
                questionData.options = JSON.stringify(validChoices.map(c => c.text));
                questionData.correct_answer = JSON.stringify(correctChoices.map(c => c.text));
                
            } else if (type === 'multi_select') {
                const validChoices = choices.slice(0, 5);
                const emptyChoices = validChoices.filter(c => !c.text.trim());
                if (emptyChoices.length > 0) {
                    showToast('الاختيارات الخمسة الأولى مطلوبة', 'error');
                    return;
                }
                
                const correctChoices = validChoices.filter(c => c.isCorrect);
                if (correctChoices.length !== 2) {
                    showToast('يجب اختيار إجابتين صحيحتين بالضبط', 'error');
                    return;
                }
                
                questionData.options = JSON.stringify(validChoices.map(c => c.text));
                questionData.correct_answer = JSON.stringify(correctChoices.map(c => c.text));
                
            } else if (type === 'true_false') {
                const answer = document.getElementById('trueFalseAnswer').value;
                questionData.correct_answer = answer === 'true' ? 'صحيح' : 'خطأ';
                
            } else if (type === 'essay') {
                const modelAnswer = document.getElementById('modelAnswer').value;
                if (modelAnswer) {
                    questionData.model_answer = modelAnswer;
                }
            }
            
            let result;
            if (currentEditId) {
                const { error } = await sb
                    .from('questions')
                    .update(questionData)
                    .eq('id', currentEditId);
                
                if (error) {
                    showToast('حدث خطأ: ' + error.message, 'error');
                    return;
                }
                result = true;
            } else {
                const { error } = await sb
                    .from('questions')
                    .insert(questionData);
                
                if (error) {
                    showToast('حدث خطأ: ' + error.message, 'error');
                    return;
                }
                result = true;
            }
            
            if (result) {
                showToast('تم ' + (currentEditId ? 'تعديل' : 'إضافة') + ' السؤال، في انتظار مراجعة الأدمن', 'success');
                closeQuestionModal();
                loadQuestions();
            }
        }
        
        // ==================== حذف سؤال ====================
        function deleteQuestionConfirm(questionId) {
            showConfirm('هل أنت متأكد من حذف هذا السؤال؟', async () => {
                const { error } = await sb
                    .from('questions')
                    .delete()
                    .eq('id', questionId);
                
                if (error) {
                    showToast('حدث خطأ', 'error');
                    return;
                }
                showToast('تم حذف السؤال', 'success');
                loadQuestions();
            });
        }
        
        // ==================== إغلاق المودال ====================
        function closeQuestionModal() {
            document.getElementById('questionModal').style.display = 'none';
        }
        
        // ==================== أحداث البحث والفلتر ====================
        document.getElementById('searchInput').addEventListener('input', () => applySearchAndFilters());
        document.getElementById('typeFilter').addEventListener('change', () => applySearchAndFilters());
        document.getElementById('statusFilter').addEventListener('change', () => applySearchAndFilters());
        
        // ==================== تحميل أولي ====================
        async function init() {
            await loadTeacherAssignments();
            await loadQuestions();
        }
        
        init();
    </script>
</body>
</html>
