<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>استعادة كلمة المرور - منصة الاختبارات</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Cairo', 'Tahoma', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .reset-container {
            max-width: 500px;
            width: 100%;
        }

        .card {
            background: white;
            border-radius: 32px;
            padding: 40px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.25);
            text-align: center;
        }

        .logo {
            font-size: 56px;
            margin-bottom: 16px;
        }

        h1 {
            color: #1e293b;
            font-size: 28px;
            margin-bottom: 8px;
        }

        .subtitle {
            color: #64748b;
            margin-bottom: 30px;
            font-size: 14px;
        }

        .form-group {
            margin-bottom: 20px;
            text-align: right;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #334155;
        }

        .form-group input, .form-group select {
            width: 100%;
            padding: 14px 16px;
            border: 2px solid #e2e8f0;
            border-radius: 16px;
            font-size: 16px;
            font-family: inherit;
            transition: all 0.3s;
        }

        .form-group input:focus, .form-group select:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102,126,234,0.1);
        }

        .btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #6366f1, #4f46e5);
            color: white;
            border: none;
            border-radius: 16px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
            margin-top: 10px;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(99,102,241,0.4);
        }

        .btn:disabled {
            opacity: 0.7;
            cursor: not-allowed;
            transform: none;
        }

        .btn-outline {
            background: transparent;
            border: 2px solid #6366f1;
            color: #6366f1;
            margin-top: 10px;
        }

        .btn-outline:hover {
            background: #6366f1;
            color: white;
        }

        .back-link {
            margin-top: 20px;
            text-align: center;
        }

        .back-link a {
            color: #667eea;
            text-decoration: none;
            font-weight: 600;
        }

        .back-link a:hover {
            text-decoration: underline;
        }

        .message {
            padding: 12px;
            border-radius: 12px;
            margin-top: 15px;
            font-size: 14px;
            display: none;
        }

        .message-success {
            background: #d1fae5;
            color: #065f46;
            border-right: 4px solid #10b981;
        }

        .message-error {
            background: #fee2e2;
            color: #dc2626;
            border-right: 4px solid #ef4444;
        }

        .message-info {
            background: #dbeafe;
            color: #1e40af;
            border-right: 4px solid #3b82f6;
        }

        .step-indicator {
            display: flex;
            justify-content: space-between;
            margin-bottom: 30px;
            position: relative;
        }

        .step-indicator::before {
            content: '';
            position: absolute;
            top: 20px;
            left: 10%;
            right: 10%;
            height: 2px;
            background: #e2e8f0;
            z-index: 1;
        }

        .step {
            text-align: center;
            flex: 1;
            position: relative;
            z-index: 2;
        }

        .step-number {
            width: 40px;
            height: 40px;
            background: #e2e8f0;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 8px;
            font-weight: bold;
            color: #64748b;
        }

        .step.active .step-number {
            background: #6366f1;
            color: white;
        }

        .step.completed .step-number {
            background: #10b981;
            color: white;
        }

        .step-label {
            font-size: 12px;
            color: #64748b;
        }

        .step.active .step-label {
            color: #6366f1;
            font-weight: 600;
        }

        .form-step {
            display: none;
            animation: fadeIn 0.3s ease;
        }

        .form-step.active-step {
            display: block;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .security-question {
            background: #f0fdf4;
            border-right: 4px solid #10b981;
            padding: 15px;
            border-radius: 16px;
            margin-bottom: 20px;
        }

        .security-question p {
            font-weight: 600;
            color: #065f46;
            margin-bottom: 10px;
        }

        @media (max-width: 480px) {
            .card {
                padding: 30px 20px;
            }
            h1 {
                font-size: 22px;
            }
        }
    </style>
</head>
<body>
    <div class="reset-container">
        <div class="card">
            <div class="logo">🔐</div>
            <h1>استعادة كلمة المرور</h1>
            <p class="subtitle">قم بالإجابة على سؤال الأمان لإعادة تعيين كلمة المرور</p>

            <!-- مؤشر الخطوات -->
            <div class="step-indicator">
                <div class="step" id="step1">
                    <div class="step-number">1</div>
                    <div class="step-label">رقم الهاتف</div>
                </div>
                <div class="step" id="step2">
                    <div class="step-number">2</div>
                    <div class="step-label">سؤال الأمان</div>
                </div>
                <div class="step" id="step3">
                    <div class="step-number">3</div>
                    <div class="step-label">كلمة جديدة</div>
                </div>
            </div>

            <!-- الخطوة 1: إدخال رقم الهاتف -->
            <div class="form-step active-step" id="step1Form">
                <div class="form-group">
                    <label>📞 رقم الهاتف</label>
                    <input type="tel" id="phoneNumber" placeholder="مثال: 01012345678" dir="ltr">
                </div>
                <div class="info-note" style="background: #e0e7ff; padding: 12px; border-radius: 16px; margin-top: 10px; font-size: 13px;">
                    💡 أدخل رقم الهاتف المرتبط بحسابك للتحقق من هويتك
                </div>
                <button class="btn" id="checkUserBtn" onclick="checkUserAndGetQuestion()">
                    🔍 البحث عن الحساب
                </button>
                <div class="back-link">
                    <a href="index.html">← العودة إلى تسجيل الدخول</a>
                </div>
            </div>

            <!-- الخطوة 2: الإجابة على سؤال الأمان -->
            <div class="form-step" id="step2Form">
                <div class="security-question" id="securityQuestionDisplay">
                    <p>❓ سؤال الأمان:</p>
                    <strong id="questionText">جار التحميل...</strong>
                </div>
                <div class="form-group">
                    <label>✏️ إجابتك</label>
                    <input type="text" id="securityAnswer" placeholder="أدخل إجابة سؤال الأمان">
                </div>
                <button class="btn" id="verifyAnswerBtn" onclick="verifySecurityAnswer()">
                    ✅ التحقق من الإجابة
                </button>
                <div class="back-link">
                    <a href="#" onclick="goToStep(1)">← العودة</a>
                </div>
            </div>

            <!-- الخطوة 3: إدخال كلمة المرور الجديدة -->
            <div class="form-step" id="step3Form">
                <div class="form-group">
                    <label>🔒 كلمة المرور الجديدة</label>
                    <input type="password" id="newPassword" placeholder="6 أحرف على الأقل">
                </div>
                <div class="form-group">
                    <label>✓ تأكيد كلمة المرور</label>
                    <input type="password" id="confirmPassword" placeholder="أعد كتابة كلمة المرور">
                </div>
                <button class="btn" id="resetBtn" onclick="resetPassword()">
                    ✅ تغيير كلمة المرور
                </button>
                <div class="back-link">
                    <a href="#" onclick="goToStep(2)">← العودة</a>
                </div>
            </div>

            <div id="message" class="message"></div>
        </div>
    </div>

    <script src="js/supabase-config.js"></script>
    <script>
        // ==================== المتغيرات ====================
        let verifiedUserId = null;
        let verifiedUserPhone = null;
        let securityQuestion = null;

        // ==================== عرض الرسائل ====================
        function showMessage(msg, type = 'info') {
            const messageDiv = document.getElementById('message');
            messageDiv.innerHTML = msg;
            messageDiv.className = `message message-${type}`;
            messageDiv.style.display = 'block';
            
            setTimeout(() => {
                messageDiv.style.display = 'none';
            }, 5000);
        }

        // ==================== الانتقال بين الخطوات ====================
        function goToStep(step) {
            // إخفاء جميع الخطوات
            document.getElementById('step1Form').classList.remove('active-step');
            document.getElementById('step2Form').classList.remove('active-step');
            document.getElementById('step3Form').classList.remove('active-step');
            
            // إظهار الخطوة المطلوبة
            document.getElementById(`step${step}Form`).classList.add('active-step');
            
            // تحديث مؤشر الخطوات
            for (let i = 1; i <= 3; i++) {
                const stepDiv = document.getElementById(`step${i}`);
                if (i < step) {
                    stepDiv.classList.add('completed');
                    stepDiv.classList.remove('active');
                } else if (i === step) {
                    stepDiv.classList.add('active');
                    stepDiv.classList.remove('completed');
                } else {
                    stepDiv.classList.remove('active', 'completed');
                }
            }
        }

        // ==================== البحث عن المستخدم وجلب سؤال الأمان ====================
        async function checkUserAndGetQuestion() {
            const phone = document.getElementById('phoneNumber').value.trim();
            
            if (!phone) {
                showMessage('الرجاء إدخال رقم الهاتف', 'error');
                return;
            }
            
            // التحقق من صحة رقم الهاتف
            const phoneRegex = /^(010|011|012|015)[0-9]{8}$/;
            if (!phoneRegex.test(phone)) {
                showMessage('رقم الهاتف غير صحيح. يجب أن يبدأ بـ 010 أو 011 أو 012 أو 015', 'error');
                return;
            }
            
            try {
                // البحث عن المستخدم بالهاتف
                const { data: user, error } = await sb
                    .from('users')
                    .select('id, name, phone, security_question, security_answer')
                    .eq('phone', phone)
                    .single();
                
                if (error || !user) {
                    showMessage('لا يوجد حساب مسجل بهذا الرقم', 'error');
                    return;
                }
                
                // التحقق من وجود سؤال أمان
                if (!user.security_question || !user.security_answer) {
                    showMessage('⚠️ هذا الحساب ليس لديه سؤال أمان محدد. يرجى التواصل مع المدير لإعادة تعيين كلمة المرور.', 'warning');
                    return;
                }
                
                verifiedUserId = user.id;
                verifiedUserPhone = phone;
                securityQuestion = user.security_question;
                
                // عرض سؤال الأمان
                document.getElementById('questionText').innerHTML = securityQuestion;
                
                // مسح حقل الإجابة السابق
                document.getElementById('securityAnswer').value = '';
                
                // الانتقال إلى الخطوة 2
                goToStep(2);
                
                showMessage('✅ تم العثور على الحساب. الرجاء الإجابة على سؤال الأمان', 'success');
                
            } catch (error) {
                console.error('Error:', error);
                showMessage('حدث خطأ. الرجاء المحاولة مرة أخرى', 'error');
            }
        }

        // ==================== التحقق من إجابة سؤال الأمان ====================
        async function verifySecurityAnswer() {
            const answer = document.getElementById('securityAnswer').value.trim();
            
            if (!answer) {
                showMessage('الرجاء إدخال إجابة سؤال الأمان', 'error');
                return;
            }
            
            try {
                // جلب المستخدم للتحقق من الإجابة
                const { data: user, error } = await sb
                    .from('users')
                    .select('security_answer')
                    .eq('id', verifiedUserId)
                    .single();
                
                if (error || !user) {
                    showMessage('حدث خطأ. الرجاء المحاولة مرة أخرى', 'error');
                    return;
                }
                
                // مقارنة الإجابة (تجاهل حالة الأحرف والمسافات الزائدة)
                const storedAnswer = user.security_answer?.trim().toLowerCase() || '';
                const userAnswer = answer.trim().toLowerCase();
                
                if (storedAnswer !== userAnswer) {
                    showMessage('❌ الإجابة غير صحيحة. الرجاء المحاولة مرة أخرى', 'error');
                    return;
                }
                
                showMessage('✅ تم التحقق من الإجابة بنجاح', 'success');
                
                // مسح حقول كلمة المرور
                document.getElementById('newPassword').value = '';
                document.getElementById('confirmPassword').value = '';
                
                // الانتقال إلى الخطوة 3
                goToStep(3);
                
            } catch (error) {
                console.error('Error:', error);
                showMessage('حدث خطأ. الرجاء المحاولة مرة أخرى', 'error');
            }
        }

        // ==================== تغيير كلمة المرور ====================
        async function resetPassword() {
            const newPassword = document.getElementById('newPassword').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            
            if (!newPassword) {
                showMessage('الرجاء إدخال كلمة المرور الجديدة', 'error');
                return;
            }
            
            if (newPassword.length < 6) {
                showMessage('كلمة المرور يجب أن تكون 6 أحرف على الأقل', 'error');
                return;
            }
            
            if (newPassword !== confirmPassword) {
                showMessage('كلمة المرور غير متطابقة', 'error');
                return;
            }
            
            try {
                // تشفير كلمة المرور الجديدة
                const hashedPassword = await hashPassword(newPassword);
                
                // تحديث كلمة المرور في قاعدة البيانات
                const { error: updateError } = await sb
                    .from('users')
                    .update({ password_hash: hashedPassword })
                    .eq('id', verifiedUserId);
                
                if (updateError) {
                    showMessage('حدث خطأ في تغيير كلمة المرور', 'error');
                    return;
                }
                
                showMessage('✅ تم تغيير كلمة المرور بنجاح! جاري تحويلك إلى صفحة تسجيل الدخول...', 'success');
                
                // العودة إلى صفحة تسجيل الدخول بعد 2 ثانية
                setTimeout(() => {
                    window.location.href = 'index.html';
                }, 2000);
                
            } catch (error) {
                console.error('Error resetting password:', error);
                showMessage('حدث خطأ. الرجاء المحاولة مرة أخرى', 'error');
            }
        }

        // ==================== دالة hashPassword ====================
        async function hashPassword(password) {
            const encoder = new TextEncoder();
            const data = encoder.encode(password);
            const hash = await crypto.subtle.digest('SHA-256', data);
            return Array.from(new Uint8Array(hash)).map(b => b.toString(16).padStart(2, '0')).join('');
        }
    </script>
</body>
</html>
