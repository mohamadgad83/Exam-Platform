<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مراجعة الأسئلة - منصة الاختبارات</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Cairo', sans-serif; background: #f0f2f5; padding: 20px; }
        .container { max-width: 1400px; margin: 0 auto; }
        .admin-bar {
            background: linear-gradient(135deg, #1e293b, #0f172a);
            color: white;
            padding: 12px 24px;
            border-radius: 20px;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
        }
        .card {
            background: white;
            border-radius: 28px;
            padding: 25px;
            margin-bottom: 20px;
            box-shadow: 0 10px 25px -5px rgba(0,0,0,0.05);
            border: 1px solid #e2e8f0;
        }
        .header h1 {
            background: linear-gradient(135deg, #6366f1, #8b5cf6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-size: 28px;
        }
        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 14px;
            cursor: pointer;
            font-weight: 600;
            transition: 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            font-family: inherit;
        }
        .btn-primary { background: linear-gradient(135deg, #6366f1, #4f46e5); color: white; }
        .btn-success { background: #10b981; color: white; }
        .btn-danger { background: #ef4444; color: white; }
        .btn-warning { background: #f59e0b; color: white; }
        .btn-outline { background: transparent; border: 2px solid #6366f1; color: #6366f1; }
        .btn-sm { padding: 6px 14px; font-size: 12px; }
        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            border-bottom: 2px solid #e2e8f0;
            padding-bottom: 5px;
        }
        .tab-btn {
            background: transparent;
            border: none;
            padding: 10px 28px;
            border-radius: 30px;
            cursor: pointer;
            font-weight: 600;
            color: #64748b;
            transition: all 0.2s;
        }
        .tab-btn.active {
            background: linear-gradient(135deg, #6366f1, #8b5cf6);
            color: white;
        }
        .exam-info {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            margin: 12px 0;
            color: #64748b;
            font-size: 13px;
        }
        .badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 4px 12px;
            border-radius: 40px;
            font-size: 12px;
            font-weight: 600;
        }
        .badge-primary { background: linear-gradient(135deg, #6366f1, #8b5cf6); color: white; }
        .badge-info { background: #dbeafe; color: #1e40af; }
        .badge-warning { background: #fef3c7; color: #d97706; }
        .badge-danger { background: #fee2e2; color: #991b1b; }
        .badge-success { background: #d1fae5; color: #065f46; }
        .action-buttons { display: flex; gap: 8px; flex-wrap: wrap; }
        .empty-state { text-align: center; padding: 40px; color: #64748b; }
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(5px);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
        .modal-content {
            background: white;
            border-radius: 32px;
            padding: 32px;
            width: 550px;
            max-width: 90%;
            max-height: 85vh;
            overflow-y: auto;
        }
        .toast-notification {
            position: fixed;
            bottom: 30px;
            left: 30px;
            background: white;
            border-radius: 16px;
            padding: 16px 20px;
            display: flex;
            align-items: center;
            gap: 12px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            transform: translateX(-500px);
            transition: transform 0.3s ease;
            z-index: 10000;
            direction: rtl;
            border-right: 4px solid;
        }
        .toast-notification.show { transform: translateX(0); }
        .toast-success { border-right-color: #10b981; }
        .toast-error { border-right-color: #ef4444; }
        .toast-message { flex: 1; font-size: 14px; color: #333; }
        .toast-progress {
            position: absolute;
            bottom: 0;
            left: 0;
            height: 3px;
            width: 100%;
            animation: progress 3s linear forwards;
        }
        @keyframes progress { from { width: 100%; } to { width: 0%; } }
        .confirm-modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(5px);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 10001;
        }
        .confirm-content {
            background: white;
            border-radius: 28px;
            padding: 32px;
            text-align: center;
            width: 320px;
        }
        .confirm-buttons { display: flex; gap: 12px; margin-top: 20px; }
        .confirm-yes { background: #10b981; color: white; padding: 10px; border: none; border-radius: 12px; cursor: pointer; flex: 1; }
        .confirm-no { background: #e2e8f0; color: #333; padding: 10px; border: none; border-radius: 12px; cursor: pointer; flex: 1; }
        @media (max-width: 768px) {
            .tabs { justify-content: center; }
            .tab-btn { padding: 6px 16px; font-size: 12px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="admin-bar">
            <div><span style="font-size:20px;">👑</span> مراجعة الأسئلة - <span id="adminName"></span></div>
            <div>
                <button class="btn btn-outline btn-sm" onclick="window.location.href='admin-dashboard.html'">🏠 الرئيسية</button>
                <button class="btn btn-danger btn-sm" onclick="logout()">🚪 خروج</button>
            </div>
        </div>

        <div class="card header">
            <h1>❓ مراجعة الأسئلة</h1>
            <p>اعتماد أو رفض أسئلة المعلمين</p>
        </div>

        <div class="tabs">
            <button class="tab-btn active" onclick="loadQuestions('pending')">⏳ قيد المراجعة</button>
            <button class="tab-btn" onclick="loadQuestions('approved')">✅ معتمدة</button>
            <button class="tab-btn" onclick="loadQuestions('rejected')">❌ مرفوضة</button>
        </div>

        <div id="questionsList"></div>
    </div>

    <!-- مودال عرض تفاصيل السؤال -->
    <div id="questionModal" class="modal">
        <div class="modal-content">
            <h3>❓ تفاصيل السؤال</h3>
            <div id="questionDetails"></div>
            <div style="display: flex; gap: 12px; margin-top: 20px;">
                <button class="btn btn-outline" onclick="closeModal()">إغلاق</button>
            </div>
        </div>
    </div>

    <script src="js/supabase-config.js"></script>
    <script>
        // ==================== التحقق من صلاحية الدخول ====================
        const currentUser = getUser();
        if (!currentUser || currentUser.role !== 'admin') {
            window.location.href = 'index.html';
        }
        
        document.getElementById('adminName').innerHTML = currentUser.name;
        
        // ==================== تحميل الأسئلة ====================
        async function loadQuestions(status) {
            try {
                // تحديث التبويبات
                document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
                if (event && event.target) {
                    event.target.classList.add('active');
                }
                
                let query = sb.from('questions').select('*, users!questions_teacher_id_fkey(id, name, username)');
                
                if (status === 'pending') {
                    query = query.eq('status', 'pending');
                } else if (status === 'approved') {
                    query = query.eq('status', 'approved');
                } else if (status === 'rejected') {
                    query = query.eq('status', 'rejected');
                }
                
                const { data: questions, error } = await query.order('created_at', { ascending: false });
                
                if (error) {
                    console.error('Error loading questions:', error);
                    document.getElementById('questionsList').innerHTML = '<div class="empty-state">حدث خطأ في تحميل الأسئلة</div>';
                    return;
                }
                
                const container = document.getElementById('questionsList');
                
                if (!questions || questions.length === 0) {
                    container.innerHTML = '<div class="empty-state">📭 لا توجد أسئلة</div>';
                    return;
                }
                
                container.innerHTML = '';
                for (const q of questions) {
                    let optionsHtml = '';
                    if (q.options && q.options.length > 0) {
                        optionsHtml = `<div style="margin-top: 10px;"><strong>الخيارات:</strong> ${q.options.join(' | ')}</div>`;
                    }
                    
                    const card = document.createElement('div');
                    card.className = 'card';
                    card.innerHTML = `
                        <div style="display: flex; justify-content: space-between; flex-wrap: wrap; gap: 15px;">
                            <div style="flex: 1;">
                                <p><strong>${escapeHtml(q.text)}</strong></p>
                                <div class="exam-info">
                                    <span class="badge ${getTypeClass(q.type)}">${getTypeText(q.type)}</span>
                                    <span>⭐ ${q.points} درجة</span>
                                    <span>👨‍🏫 ${q.users?.name || '-'}</span>
                                    <span>📅 ${formatDate(q.created_at)}</span>
                                </div>
                                ${optionsHtml}
                                ${q.correct_answer ? `<div><strong>الإجابة الصحيحة:</strong> ${escapeHtml(q.correct_answer)}</div>` : ''}
                                ${q.status === 'rejected' && q.feedback ? `<div class="badge badge-danger" style="margin-top: 10px;">سبب الرفض: ${escapeHtml(q.feedback)}</div>` : ''}
                            </div>
                            ${q.status === 'pending' ? `
                                <div class="action-buttons">
                                    <button class="btn btn-success" onclick="approveQuestion(${q.id})">✅ اعتماد</button>
                                    <button class="btn btn-danger" onclick="rejectQuestion(${q.id})">❌ رفض</button>
                                    <button class="btn btn-info" onclick="viewQuestionDetails(${q.id})">📋 تفاصيل</button>
                                </div>
                            ` : `
                                <div>
                                    <button class="btn btn-info btn-sm" onclick="viewQuestionDetails(${q.id})">📋 تفاصيل</button>
                                </div>
                            `}
                        </div>
                    `;
                    container.appendChild(card);
                }
                
            } catch (error) {
                console.error('Error in loadQuestions:', error);
                document.getElementById('questionsList').innerHTML = '<div class="empty-state">حدث خطأ في تحميل الأسئلة</div>';
            }
        }
        
        function getTypeText(type) {
            const types = {
                'mcq': 'اختيار من متعدد',
                'multi_select': 'اختيار متعدد',
                'true_false': 'صح/خطأ',
                'essay': 'مقالي'
            };
            return types[type] || type;
        }
        
        function getTypeClass(type) {
            const classes = {
                'mcq': 'badge-primary',
                'multi_select': 'badge-info',
                'true_false': 'badge-warning',
                'essay': 'badge-success'
            };
            return classes[type] || 'badge-info';
        }
        
        // ==================== عرض تفاصيل السؤال ====================
        async function viewQuestionDetails(id) {
            try {
                const { data: q, error } = await sb
                    .from('questions')
                    .select('*, users!questions_teacher_id_fkey(id, name, username)')
                    .eq('id', id)
                    .single();
                
                if (error || !q) {
                    showToast('حدث خطأ', 'error');
                    return;
                }
                
                let optionsHtml = '';
                if (q.options && q.options.length > 0) {
                    optionsHtml = `<div><strong>الخيارات:</strong> ${q.options.join(' | ')}</div>`;
                }
                
                const container = document.getElementById('questionDetails');
                container.innerHTML = `
                    <div style="margin-bottom: 15px;"><strong>نص السؤال:</strong><br>${escapeHtml(q.text)}</div>
                    <div><strong>النوع:</strong> ${getTypeText(q.type)}</div>
                    <div><strong>الدرجة:</strong> ${q.points}</div>
                    <div><strong>الصعوبة:</strong> ${q.difficulty === 'easy' ? 'سهل' : q.difficulty === 'medium' ? 'متوسط' : 'صعب'}</div>
                    ${optionsHtml}
                    ${q.correct_answer ? `<div><strong>الإجابة الصحيحة:</strong> ${escapeHtml(q.correct_answer)}</div>` : ''}
                    ${q.status === 'rejected' && q.feedback ? `<div><strong>سبب الرفض:</strong> ${escapeHtml(q.feedback)}</div>` : ''}
                    <div><strong>المعلم:</strong> ${q.users?.name || '-'}</div>
                    <div><strong>تاريخ الإضافة:</strong> ${formatDateTime(q.created_at)}</div>
                `;
                document.getElementById('questionModal').style.display = 'flex';
                
            } catch (error) {
                console.error('Error viewing question details:', error);
                showToast('حدث خطأ', 'error');
            }
        }
        
        // ==================== اعتماد السؤال ====================
        async function approveQuestion(id) {
            try {
                const { error } = await sb
                    .from('questions')
                    .update({ status: 'approved' })
                    .eq('id', id);
                
                if (error) throw error;
                
                showToast('تم اعتماد السؤال', 'success');
                loadQuestions('pending');
                
            } catch (error) {
                console.error('Error approving question:', error);
                showToast('حدث خطأ', 'error');
            }
        }
        
        // ==================== رفض السؤال ====================
        async function rejectQuestion(id) {
            const feedback = prompt('سبب الرفض:');
            if (!feedback) return;
            
            try {
                const { error } = await sb
                    .from('questions')
                    .update({ status: 'rejected', feedback: feedback })
                    .eq('id', id);
                
                if (error) throw error;
                
                showToast('تم رفض السؤال', 'success');
                loadQuestions('pending');
                
            } catch (error) {
                console.error('Error rejecting question:', error);
                showToast('حدث خطأ', 'error');
            }
        }
        
        // ==================== إغلاق المودال ====================
        function closeModal() {
            document.getElementById('questionModal').style.display = 'none';
        }
        
        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/[&<>]/g, function(m) {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                return m;
            });
        }
        
        // تحميل أولي
        loadQuestions('pending');
    </script>
</body>
</html>
