<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مجموعاتي - منصة الاختبارات</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Cairo', sans-serif; background: linear-gradient(135deg, #f0f2f5 0%, #e4e8f0 100%); min-height: 100vh; padding: 20px; }
        .container { max-width: 1400px; margin: 0 auto; }
        .top-bar {
            background: linear-gradient(135deg, #1e293b, #0f172a);
            color: white;
            padding: 12px 24px;
            border-radius: 20px;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
        }
        .logo { font-size: 22px; font-weight: 800; }
        .user-info { display: flex; align-items: center; gap: 20px; flex-wrap: wrap; }
        .user-name { font-weight: 600; background: rgba(255,255,255,0.2); padding: 8px 16px; border-radius: 40px; }
        
        .card {
            background: white;
            border-radius: 28px;
            padding: 25px;
            margin-bottom: 20px;
            box-shadow: 0 10px 25px -5px rgba(0,0,0,0.05);
            border: 1px solid #e2e8f0;
        }
        .header h1 {
            background: linear-gradient(135deg, #6366f1, #8b5cf6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-size: 28px;
        }
        
        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 14px;
            cursor: pointer;
            font-weight: 600;
            transition: 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            font-family: inherit;
        }
        .btn-primary { background: linear-gradient(135deg, #6366f1, #4f46e5); color: white; }
        .btn-success { background: #10b981; color: white; }
        .btn-danger { background: #ef4444; color: white; }
        .btn-warning { background: #f59e0b; color: white; }
        .btn-info { background: #3b82f6; color: white; }
        .btn-outline { background: transparent; border: 2px solid #6366f1; color: #6366f1; }
        .btn-sm { padding: 6px 14px; font-size: 12px; }
        
        .filter-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
            margin-bottom: 20px;
        }
        .search-input {
            padding: 10px 18px;
            border: 1px solid #e2e8f0;
            border-radius: 50px;
            width: 260px;
            font-family: inherit;
        }
        
        .exam-info {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
            margin: 12px 0;
            color: #64748b;
            font-size: 13px;
        }
        .badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 4px 12px;
            border-radius: 40px;
            font-size: 12px;
            font-weight: 600;
        }
        .badge-success { background: #d1fae5; color: #065f46; }
        .badge-warning { background: #fef3c7; color: #d97706; }
        .badge-danger { background: #fee2e2; color: #991b1b; }
        .badge-info { background: #dbeafe; color: #1e40af; }
        
        .action-buttons { display: flex; gap: 8px; flex-wrap: wrap; }
        .empty-state { text-align: center; padding: 40px; color: #64748b; }
        
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(5px);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
        .modal-content {
            background: white;
            border-radius: 32px;
            padding: 32px;
            width: 550px;
            max-width: 90%;
            max-height: 85vh;
            overflow-y: auto;
        }
        .modal-content input, .modal-content select, .modal-content textarea {
            width: 100%;
            padding: 12px 16px;
            margin: 10px 0;
            border: 1px solid #e2e8f0;
            border-radius: 16px;
            font-family: inherit;
        }
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; margin-bottom: 5px; font-weight: 600; color: #334155; }
        
        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
            border-bottom: 2px solid #e2e8f0;
            padding-bottom: 5px;
        }
        .tab-btn {
            background: transparent;
            border: none;
            padding: 8px 20px;
            border-radius: 30px;
            cursor: pointer;
            font-weight: 600;
            color: #64748b;
            transition: all 0.2s;
        }
        .tab-btn.active {
            background: linear-gradient(135deg, #6366f1, #8b5cf6);
            color: white;
        }
        
        .toast-notification {
            position: fixed;
            bottom: 30px;
            left: 30px;
            background: white;
            border-radius: 16px;
            padding: 16px 20px;
            display: flex;
            align-items: center;
            gap: 12px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            transform: translateX(-500px);
            transition: transform 0.3s ease;
            z-index: 10000;
            direction: rtl;
            border-right: 4px solid;
        }
        .toast-notification.show { transform: translateX(0); }
        .toast-success { border-right-color: #10b981; }
        .toast-error { border-right-color: #ef4444; }
        .toast-message { flex: 1; font-size: 14px; color: #333; }
        
        .confirm-modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(5px);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 10001;
        }
        .confirm-content {
            background: white;
            border-radius: 28px;
            padding: 32px;
            text-align: center;
            width: 320px;
        }
        .confirm-buttons { display: flex; gap: 12px; margin-top: 20px; }
        .confirm-yes { background: #10b981; color: white; padding: 10px; border: none; border-radius: 12px; cursor: pointer; flex: 1; }
        .confirm-no { background: #e2e8f0; color: #333; padding: 10px; border: none; border-radius: 12px; cursor: pointer; flex: 1; }
        
        @media (max-width: 768px) {
            .filter-bar { flex-direction: column; align-items: stretch; }
            .search-input { width: 100%; }
            .action-buttons { flex-direction: column; }
            .btn { width: 100%; justify-content: center; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="top-bar">
            <div class="logo">📚 منصة الاختبارات</div>
            <div class="user-info">
                <span class="user-name">👋 مرحباً <span id="teacherName"></span></span>
                <button class="btn btn-outline btn-sm" onclick="window.location.href='teacher-dashboard.html'">🏠 الرئيسية</button>
                <button class="btn btn-outline btn-sm" onclick="window.location.href='questions-bank.html'">📚 بنك الأسئلة</button>
                <button class="btn btn-danger btn-sm" onclick="logout()">🚪 خروج</button>
            </div>
        </div>

        <div class="card header">
            <h1>👥 مجموعاتي</h1>
            <p>إدارة المجموعات الدراسية الخاصة بك</p>
        </div>

        <div class="card">
            <div class="filter-bar">
                <input type="text" id="searchInput" class="search-input" placeholder="🔍 بحث باسم المجموعة...">
                <button class="btn btn-primary" onclick="openCreateGroupModal()">➕ إنشاء مجموعة</button>
                <button class="btn btn-outline" onclick="loadGroups()">🔄 تحديث</button>
            </div>
            <div id="groupsList"></div>
        </div>
    </div>

    <!-- مودال إنشاء/تعديل مجموعة -->
    <div id="groupModal" class="modal">
        <div class="modal-content">
            <h3 id="modalTitle">➕ إنشاء مجموعة جديدة</h3>
            <input type="text" id="groupName" placeholder="اسم المجموعة">
            <textarea id="groupDesc" rows="3" placeholder="وصف المجموعة"></textarea>
            <select id="groupClassId">
                <option value="">-- اختر الصف --</option>
            </select>
            <select id="groupSubjectId">
                <option value="">-- اختر المادة --</option>
            </select>
            <input type="number" id="groupMaxCapacity" placeholder="الحد الأقصى للطلاب">
            <label style="display: flex; align-items: center; gap: 10px; margin-top: 10px;">
                <input type="checkbox" id="groupIsOpen" checked> مفتوح للانضمام
            </label>
            <div style="display: flex; gap: 12px; margin-top: 20px;">
                <button class="btn btn-primary" onclick="saveGroup()">💾 حفظ</button>
                <button class="btn btn-outline" onclick="closeGroupModal()">إلغاء</button>
            </div>
        </div>
    </div>

    <!-- مودال إدارة الأعضاء -->
    <div id="membersModal" class="modal">
        <div class="modal-content">
            <h3 id="membersModalTitle">👥 إدارة الأعضاء</h3>
            <div class="tabs" id="membersTabs">
                <button class="tab-btn active" onclick="showMembersTab('approved')">✅ الأعضاء</button>
                <button class="tab-btn" onclick="showMembersTab('pending')">⏳ طلبات الانتظار</button>
            </div>
            <div id="membersList"></div>
            <div style="display: flex; gap: 12px; margin-top: 20px;">
                <button class="btn btn-outline" onclick="closeMembersModal()">إغلاق</button>
            </div>
        </div>
    </div>

    <script src="js/supabase-config.js"></script>
    <script>
        // ==================== التحقق من صلاحية الدخول ====================
        const currentUser = getUser();
        if (!currentUser || (currentUser.role !== 'teacher' && currentUser.role !== 'admin')) {
            window.location.href = 'index.html';
        }
        
        document.getElementById('teacherName').innerHTML = currentUser.name || currentUser.username || 'معلم';
        
        let currentGroupId = null;
        let currentMembers = [];
        let currentGroupMembers = [];
        
        // ==================== تحميل المجموعات ====================
        async function loadGroups() {
            try {
                const search = document.getElementById('searchInput').value;
                let groups = await fetchGroups({});
                
                // فلترة حسب المعلم الحالي
                groups = groups.filter(g => g.teacher_id === currentUser.id);
                
                if (search) {
                    groups = groups.filter(g => g.name.toLowerCase().includes(search.toLowerCase()));
                }
                
                const container = document.getElementById('groupsList');
                if (!groups || groups.length === 0) {
                    container.innerHTML = '<div class="empty-state">📭 لا توجد مجموعات<br><button class="btn btn-primary mt-3" onclick="openCreateGroupModal()">➕ إنشاء أول مجموعة</button></div>';
                    return;
                }
                
                container.innerHTML = '';
                for (let i = 0; i < groups.length; i++) {
                    const g = groups[i];
                    
                    // جلب عدد الأعضاء
                    const members = await fetchGroupMembers(g.id);
                    const approvedCount = members.filter(m => m.status === 'approved').length;
                    
                    const card = document.createElement('div');
                    card.className = 'card';
                    card.innerHTML = `
                        <div style="display: flex; justify-content: space-between; align-items: flex-start; flex-wrap: wrap; gap: 15px;">
                            <div style="flex: 1;">
                                <h3>📌 ${escapeHtml(g.name)}</h3>
                                <p style="color: #64748b; margin: 8px 0;">${escapeHtml(g.description || 'لا يوجد وصف')}</p>
                                <div class="exam-info">
                                    <span>🎓 ${g.classes?.name || '-'}</span>
                                    <span>📖 ${g.subjects?.name || '-'}</span>
                                    <span>👥 ${approvedCount}${g.max_capacity ? `/${g.max_capacity}` : ''} طالب</span>
                                    <span class="badge ${g.is_open ? 'badge-success' : 'badge-danger'}">${g.is_open ? 'مفتوح' : 'مغلق'}</span>
                                </div>
                            </div>
                            <div class="action-buttons">
                                <button class="btn btn-info btn-sm" onclick="manageMembers(${g.id}, '${escapeHtml(g.name).replace(/'/g, "\\'")}')">👥 إدارة الأعضاء</button>
                                <button class="btn btn-warning btn-sm" onclick="editGroup(${g.id})">✏️ تعديل</button>
                                <button class="btn btn-danger btn-sm" onclick="deleteGroupConfirm(${g.id})">🗑️ حذف</button>
                            </div>
                        </div>
                    `;
                    container.appendChild(card);
                }
                
            } catch (error) {
                console.error('Error loading groups:', error);
                document.getElementById('groupsList').innerHTML = '<div class="empty-state">حدث خطأ في تحميل المجموعات</div>';
            }
        }
        
        // ==================== إدارة الأعضاء ====================
        async function manageMembers(groupId, groupName) {
            currentGroupId = groupId;
            currentMembers = await fetchGroupMembers(groupId);
            document.getElementById('membersModalTitle').innerHTML = `👥 إدارة مجموعة "${groupName}"`;
            showMembersTab('approved');
            document.getElementById('membersModal').style.display = 'flex';
        }
        
        function showMembersTab(tab) {
            const tabs = document.querySelectorAll('#membersTabs .tab-btn');
            tabs.forEach(t => t.classList.remove('active'));
            
            let filtered = [];
            if (tab === 'approved') {
                tabs[0].classList.add('active');
                filtered = currentMembers.filter(m => m.status === 'approved');
            } else {
                tabs[1].classList.add('active');
                filtered = currentMembers.filter(m => m.status === 'pending');
            }
            
            const container = document.getElementById('membersList');
            
            if (filtered.length === 0) {
                container.innerHTML = '<div class="empty-state">لا يوجد أعضاء</div>';
                return;
            }
            
            container.innerHTML = filtered.map(m => `
                <div class="card" style="margin-bottom: 10px; padding: 15px;">
                    <div style="display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 10px;">
                        <div>
                            <strong>${escapeHtml(m.users?.name || '-')}</strong>
                            <div class="exam-info" style="margin-top: 5px;">
                                <span>📞 ${m.users?.phone || '-'}</span>
                                <span>📅 ${formatDate(m.joined_at)}</span>
                            </div>
                        </div>
                        <div class="action-buttons">
                            ${m.status === 'pending' ? `
                                <button class="btn btn-success btn-sm" onclick="approveMember(${currentGroupId}, ${m.student_id})">✅ قبول</button>
                                <button class="btn btn-danger btn-sm" onclick="rejectMember(${currentGroupId}, ${m.student_id})">❌ رفض</button>
                            ` : `
                                <button class="btn btn-danger btn-sm" onclick="removeMember(${currentGroupId}, ${m.student_id})">🗑️ إزالة</button>
                            `}
                        </div>
                    </div>
                </div>
            `).join('');
        }
        
        async function approveMember(groupId, studentId) {
            const success = await updateGroupMemberStatus(groupId, studentId, 'approved');
            if (success) {
                currentMembers = await fetchGroupMembers(groupId);
                showMembersTab('pending');
                showToast('تم قبول الطالب', 'success');
            }
        }
        
        async function rejectMember(groupId, studentId) {
            const success = await updateGroupMemberStatus(groupId, studentId, 'rejected');
            if (success) {
                currentMembers = await fetchGroupMembers(groupId);
                showMembersTab('pending');
                showToast('تم رفض الطلب', 'success');
            }
        }
        
        async function removeMember(groupId, studentId) {
            showConfirm('هل أنت متأكد من إزالة هذا الطالب من المجموعة؟', async () => {
                const success = await updateGroupMemberStatus(groupId, studentId, 'rejected');
                if (success) {
                    currentMembers = await fetchGroupMembers(groupId);
                    showMembersTab('approved');
                    showToast('تم إزالة الطالب', 'success');
                }
            });
        }
        
        // ==================== تحميل الخيارات للقوائم ====================
        async function loadSelects() {
            try {
                // جلب الصفوف والمواد المسندة للمعلم
                const { data: assignments } = await sb
                    .from('teacher_assignments')
                    .select('*, classes:class_id(id, name), subjects:subject_id(id, name)')
                    .eq('teacher_id', currentUser.id);
                
                const classMap = new Map();
                const subjectMap = new Map();
                
                (assignments || []).forEach(a => {
                    if (a.classes && !classMap.has(a.class_id)) {
                        classMap.set(a.class_id, { id: a.class_id, name: a.classes.name });
                    }
                    if (a.subjects && !subjectMap.has(a.subject_id)) {
                        subjectMap.set(a.subject_id, { id: a.subject_id, name: a.subjects.name });
                    }
                });
                
                const teacherClasses = Array.from(classMap.values());
                const teacherSubjects = Array.from(subjectMap.values());
                
                const classSelect = document.getElementById('groupClassId');
                classSelect.innerHTML = '<option value="">-- اختر الصف --</option>';
                teacherClasses.forEach(c => {
                    classSelect.innerHTML += `<option value="${c.id}">${escapeHtml(c.name)}</option>`;
                });
                
                const subjectSelect = document.getElementById('groupSubjectId');
                subjectSelect.innerHTML = '<option value="">-- اختر المادة --</option>';
                teacherSubjects.forEach(s => {
                    subjectSelect.innerHTML += `<option value="${s.id}">${escapeHtml(s.name)}</option>`;
                });
                
            } catch (error) {
                console.error('Error loading selects:', error);
            }
        }
        
        // ==================== فتح مودال إنشاء مجموعة ====================
        async function openCreateGroupModal() {
            currentGroupId = null;
            document.getElementById('modalTitle').innerHTML = '➕ إنشاء مجموعة جديدة';
            document.getElementById('groupName').value = '';
            document.getElementById('groupDesc').value = '';
            document.getElementById('groupMaxCapacity').value = '';
            document.getElementById('groupIsOpen').checked = true;
            await loadSelects();
            document.getElementById('groupModal').style.display = 'flex';
        }
        
        // ==================== تعديل مجموعة ====================
        async function editGroup(id) {
            const groups = await fetchGroups({});
            const group = groups.find(g => g.id === id);
            if (!group) return;
            
            currentGroupId = id;
            document.getElementById('modalTitle').innerHTML = '✏️ تعديل مجموعة';
            document.getElementById('groupName').value = group.name;
            document.getElementById('groupDesc').value = group.description || '';
            document.getElementById('groupMaxCapacity').value = group.max_capacity || '';
            document.getElementById('groupIsOpen').checked = group.is_open;
            await loadSelects();
            document.getElementById('groupClassId').value = group.class_id || '';
            document.getElementById('groupSubjectId').value = group.subject_id || '';
            document.getElementById('groupModal').style.display = 'flex';
        }
        
        // ==================== حفظ مجموعة ====================
        async function saveGroup() {
            const name = document.getElementById('groupName').value;
            const description = document.getElementById('groupDesc').value;
            const classId = document.getElementById('groupClassId').value;
            const subjectId = document.getElementById('groupSubjectId').value;
            const maxCapacity = document.getElementById('groupMaxCapacity').value;
            const isOpen = document.getElementById('groupIsOpen').checked;
            
            if (!name) {
                showToast('اسم المجموعة مطلوب', 'error');
                return;
            }
            
            const groupData = {
                name: name,
                description: description || null,
                class_id: classId || null,
                subject_id: subjectId || null,
                teacher_id: currentUser.id,
                max_capacity: maxCapacity || null,
                is_open: isOpen
            };
            
            let result;
            if (currentGroupId) {
                result = await updateGroup(currentGroupId, groupData);
            } else {
                result = await createGroup(groupData);
            }
            
            if (result) {
                closeGroupModal();
                loadGroups();
                showToast('تم ' + (currentGroupId ? 'تعديل' : 'إنشاء') + ' المجموعة', 'success');
            } else {
                showToast('حدث خطأ', 'error');
            }
        }
        
        // ==================== حذف مجموعة ====================
        function deleteGroupConfirm(id) {
            showConfirm('هل أنت متأكد من حذف هذه المجموعة؟', async () => {
                const success = await deleteGroup(id);
                if (success) {
                    loadGroups();
                    showToast('تم حذف المجموعة', 'success');
                }
            });
        }
        
        // ==================== إغلاق المودالات ====================
        function closeGroupModal() {
            document.getElementById('groupModal').style.display = 'none';
        }
        
        function closeMembersModal() {
            document.getElementById('membersModal').style.display = 'none';
        }
        
        // ==================== دوال مساعدة ====================
        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/[&<>]/g, function(m) {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                return m;
            });
        }
        
        // ==================== أحداث البحث ====================
        document.getElementById('searchInput').addEventListener('input', function() {
            loadGroups();
        });
        
        // ==================== تحميل أولي ====================
        loadGroups();
    </script>
</body>
</html>
