<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>المجموعات المتاحة - منصة الاختبارات</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="container">
        <div class="top-bar">
            <div class="logo">📚 منصة الاختبارات</div>
            <div>
                <span style="margin-left: 15px;">👋 مرحباً <span id="studentName"></span></span>
                <button class="btn btn-outline btn-sm" onclick="window.location.href='student-dashboard.html'">🏠 الرئيسية</button>
                <button class="btn btn-outline btn-sm" onclick="logout()">🚪 خروج</button>
            </div>
        </div>

        <div class="card header">
            <h1>👥 المجموعات المتاحة</h1>
            <p>استعرض المجموعات وانضم إليها</p>
        </div>

        <div class="card">
            <div class="filter-bar">
                <input type="text" id="searchInput" class="search-input" placeholder="🔍 بحث باسم المجموعة...">
                <button class="btn btn-outline" onclick="loadGroups()">🔄 تحديث</button>
            </div>
            <div id="groupsList"></div>
        </div>

        <!-- تبويب طلباتي -->
        <div class="card">
            <h3>📋 طلبات الانضمام الخاصة بي</h3>
            <div class="tabs">
                <button class="tab-btn active" onclick="loadMyRequests('pending')">⏳ قيد المراجعة</button>
                <button class="tab-btn" onclick="loadMyRequests('approved')">✅ مقبولة</button>
                <button class="tab-btn" onclick="loadMyRequests('rejected')">❌ مرفوضة</button>
            </div>
            <div id="myRequestsList"></div>
        </div>
    </div>

    <script src="js/supabase-config.js"></script>
    <script>
        if (!checkAuth(['student'])) return;
        
        const user = getUser();
        let allGroups = [];
        let myMemberships = [];
        
        document.getElementById('studentName').innerHTML = user.name;
        
        async function loadGroups() {
            const search = document.getElementById('searchInput').value;
            const groups = await fetchGroups({}, 'student');
            
            // جلب عضوية الطالب الحالية
            myMemberships = await fetchGroupMemberships(user.id);
            const myGroupIds = new Set(myMemberships.map(g => g.group_id));
            
            // عرض فقط المجموعات التي ليس الطالب عضواً فيها
            allGroups = groups.filter(g => !myGroupIds.has(g.id));
            
            if (search) {
                allGroups = allGroups.filter(g => g.name.toLowerCase().includes(search.toLowerCase()));
            }
            
            const container = document.getElementById('groupsList');
            if (allGroups.length === 0) {
                container.innerHTML = '<div class="empty-state">👥 لا توجد مجموعات متاحة<br><button class="btn btn-primary mt-3" onclick="loadGroups()">🔄 تحديث</button></div>';
                return;
            }
            
            container.innerHTML = allGroups.map(g => `
                <div class="exam-card">
                    <div style="display: flex; justify-content: space-between; flex-wrap: wrap; gap: 15px;">
                        <div style="flex: 1;">
                            <div class="exam-title">${g.name}</div>
                            <p style="color: var(--gray); margin: 8px 0;">${g.description || 'لا يوجد وصف'}</p>
                            <div class="exam-info">
                                <span>👨‍🏫 ${g.users?.name || '-'}</span>
                                <span>🎓 ${g.classes?.name || '-'}</span>
                                <span>📖 ${g.subjects?.name || '-'}</span>
                                <span>👥 ${g.member_count || 0}${g.max_capacity ? `/${g.max_capacity}` : ''} طالب</span>
                                <span class="badge ${g.is_open ? 'badge-success' : 'badge-danger'}">${g.is_open ? 'مفتوح' : 'مغلق'}</span>
                            </div>
                        </div>
                        <div>
                            ${g.is_open ? `<button class="btn btn-primary" onclick="joinGroup(${g.id})">➕ انضمام</button>` : '<span class="badge badge-danger">مغلق</span>'}
                        </div>
                    </div>
                </div>
            `).join('');
        }
        
        async function fetchGroupMemberships(studentId) {
            const { data } = await sb
                .from('group_members')
                .select('group_id, status, groups(name)')
                .eq('student_id', studentId);
            return data || [];
        }
        
        async function loadMyRequests(status) {
            // تحديث التبويبات
            document.querySelectorAll('#myRequestsList .tab-btn').forEach(btn => btn.classList.remove('active'));
            if (event && event.target) event.target.classList.add('active');
            
            const memberships = myMemberships.filter(m => m.status === status);
            const container = document.getElementById('myRequestsList');
            
            if (memberships.length === 0) {
                container.innerHTML = '<div class="empty-state">📭 لا توجد طلبات</div>';
                return;
            }
            
            const statusMap = {
                'pending': { text: '⏳ قيد المراجعة', class: 'badge-warning' },
                'approved': { text: '✅ مقبول', class: 'badge-success' },
                'rejected': { text: '❌ مرفوض', class: 'badge-danger' }
            };
            
            container.innerHTML = memberships.map(m => `
                <div class="exam-card">
                    <div style="display: flex; justify-content: space-between; flex-wrap: wrap; gap: 15px;">
                        <div>
                            <div class="exam-title">${m.groups?.name || '-'}</div>
                            <div class="exam-info">
                                <span>📅 ${formatDate(m.created_at)}</span>
                                <span class="badge ${statusMap[m.status]?.class || 'badge-warning'}">${statusMap[m.status]?.text || m.status}</span>
                            </div>
                        </div>
                    </div>
                </div>
            `).join('');
        }
        
        window.joinGroup = async (groupId) => {
            const result = await joinGroup(groupId, user.id);
            if (result.success) {
                showToast('تم إرسال طلب الانضمام، في انتظار موافقة المعلم', 'success');
                loadGroups();
                loadMyRequests('pending');
            } else {
                showToast(result.error, 'error');
            }
        };
        
        document.getElementById('searchInput').addEventListener('input', () => loadGroups());
        
        loadGroups();
        loadMyRequests('pending');
    </script>
</body>
</html>
