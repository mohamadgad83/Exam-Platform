<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إنشاء امتحان جديد - منصة الاختبارات</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Cairo', sans-serif; background: linear-gradient(135deg, #f0f2f5 0%, #e4e8f0 100%); min-height: 100vh; padding: 20px; }
        .container { max-width: 1400px; margin: 0 auto; }
        .top-bar {
            background: white;
            border-radius: 24px;
            padding: 12px 24px;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            border: 1px solid #e2e8f0;
        }
        .logo { font-size: 22px; font-weight: 800; background: linear-gradient(135deg, #6366f1, #8b5cf6); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .card {
            background: white;
            border-radius: 28px;
            padding: 25px;
            margin-bottom: 25px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            border: 1px solid #e2e8f0;
        }
        .header h1 {
            background: linear-gradient(135deg, #6366f1, #8b5cf6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-size: 28px;
        }
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; margin-bottom: 8px; font-weight: 600; color: #334155; }
        .form-group input, .form-group select, .form-group textarea {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid #e2e8f0;
            border-radius: 16px;
            font-size: 14px;
            font-family: inherit;
        }
        .form-group input:focus, .form-group select:focus, .form-group textarea:focus {
            outline: none;
            border-color: #6366f1;
        }
        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 14px;
            cursor: pointer;
            font-weight: 600;
            transition: 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            font-family: inherit;
        }
        .btn-primary { background: linear-gradient(135deg, #6366f1, #4f46e5); color: white; }
        .btn-success { background: #10b981; color: white; }
        .btn-danger { background: #ef4444; color: white; }
        .btn-outline { background: transparent; border: 2px solid #6366f1; color: #6366f1; }
        .btn-sm { padding: 6px 14px; font-size: 12px; }
        .filter-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
            margin-bottom: 20px;
        }
        .search-input {
            padding: 10px 18px;
            border: 1px solid #e2e8f0;
            border-radius: 50px;
            width: 260px;
            font-family: inherit;
        }
        .filter-select {
            padding: 10px 18px;
            border: 1px solid #e2e8f0;
            border-radius: 50px;
            min-width: 150px;
            font-family: inherit;
        }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; }
        .exam-card {
            background: #f8fafc;
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 15px;
            border: 1px solid #e2e8f0;
            transition: all 0.2s;
        }
        .exam-card:hover { transform: translateX(-5px); border-right: 4px solid #6366f1; background: white; }
        .exam-title { font-size: 18px; font-weight: 700; color: #1e293b; margin-bottom: 8px; }
        .exam-info { display: flex; gap: 20px; flex-wrap: wrap; margin: 12px 0; color: #64748b; font-size: 13px; }
        .badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 4px 12px;
            border-radius: 40px;
            font-size: 12px;
            font-weight: 600;
        }
        .badge-success { background: #d1fae5; color: #065f46; }
        .badge-warning { background: #fef3c7; color: #d97706; }
        .badge-info { background: #dbeafe; color: #1e40af; }
        .badge-primary { background: linear-gradient(135deg, #6366f1, #8b5cf6); color: white; }
        .selected-summary {
            position: sticky;
            bottom: 20px;
            background: white;
            border-radius: 20px;
            padding: 15px;
            margin-top: 20px;
            border: 1px solid #e2e8f0;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        .empty-state { text-align: center; padding: 60px; color: #64748b; }
        .toast-notification {
            position: fixed;
            bottom: 30px;
            left: 30px;
            background: white;
            border-radius: 16px;
            padding: 16px 20px;
            display: flex;
            align-items: center;
            gap: 12px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            transform: translateX(-500px);
            transition: transform 0.3s ease;
            z-index: 10000;
            direction: rtl;
            border-right: 4px solid;
        }
        .toast-notification.show { transform: translateX(0); }
        .toast-success { border-right-color: #10b981; }
        .toast-error { border-right-color: #ef4444; }
        .toast-message { flex: 1; font-size: 14px; }
        @keyframes progress { from { width: 100%; } to { width: 0%; } }
        @media (max-width: 768px) {
            .filter-bar { flex-direction: column; align-items: stretch; }
            .search-input, .filter-select { width: 100%; }
            .grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="top-bar">
            <div class="logo">📚 منصة الاختبارات</div>
            <div>
                <span style="margin-left: 15px;">👋 مرحباً <span id="teacherName"></span></span>
                <button class="btn btn-outline btn-sm" onclick="window.location.href='teacher-dashboard.html'">🏠 الرئيسية</button>
                <button class="btn btn-outline btn-sm" onclick="logout()">🚪 خروج</button>
            </div>
        </div>

        <div class="card header">
            <h1>📝 إنشاء امتحان جديد</h1>
            <p>املأ بيانات الامتحان وأضف الأسئلة (اختيار من متعدد، اختيار متعدد، صح/خطأ، مقالي)</p>
        </div>

        <!-- معلومات الامتحان -->
        <div class="card">
            <h3 style="margin-bottom: 20px;">📋 معلومات الامتحان</h3>
            <form id="createExamForm">
                <div class="form-group">
                    <label>📝 عنوان الامتحان *</label>
                    <input type="text" id="examTitle" placeholder="مثال: اختبار الرياضيات - الفصل الأول">
                </div>
                <div class="form-group">
                    <label>📖 وصف الامتحان</label>
                    <textarea id="examDesc" rows="3" placeholder="وصف الامتحان (اختياري)"></textarea>
                </div>
                <div class="grid">
                    <div class="form-group">
                        <label>🎓 الصف *</label>
                        <select id="examClass" required>
                            <option value="">-- اختر الصف --</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>📚 المادة *</label>
                        <select id="examSubject" required>
                            <option value="">-- اختر المادة --</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>⏱️ المدة (دقائق) *</label>
                        <input type="number" id="examDuration" value="60" min="1" max="180">
                    </div>
                    <div class="form-group">
                        <label>⭐ درجة النجاح (%)</label>
                        <input type="number" id="examPassingScore" value="50" min="0" max="100">
                    </div>
                </div>
            </form>
        </div>

        <!-- بنك الأسئلة -->
        <div class="card">
            <h3 style="margin-bottom: 20px;">📚 بنك الأسئلة (اختر الأسئلة للامتحان)</h3>
            <div class="filter-bar">
                <input type="text" id="questionSearch" class="search-input" placeholder="🔍 بحث في الأسئلة...">
                <select id="typeFilter" class="filter-select">
                    <option value="all">كل الأنواع</option>
                    <option value="mcq">✅ اختيار من متعدد (إجابة واحدة)</option>
                    <option value="multi_select">✅✅ اختيار متعدد (إجابات متعددة)</option>
                    <option value="true_false">صح/خطأ</option>
                    <option value="essay">📝 مقالي</option>
                </select>
                <button class="btn btn-primary btn-sm" onclick="window.location.href='teacher-questions.html'">➕ إضافة سؤال جديد</button>
            </div>
            <div id="questionsList"></div>
            
            <!-- ملخص الأسئلة المختارة -->
            <div id="selectedSummary" class="selected-summary" style="display: none;">
                <div style="display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 15px;">
                    <div>✅ تم اختيار <span id="selectedCount">0</span> سؤال</div>
                    <div>📊 إجمالي الدرجات: <span id="totalPoints">0</span></div>
                    <button class="btn btn-primary" onclick="createNewExam()">💾 حفظ الامتحان ونشره</button>
                </div>
            </div>
        </div>
    </div>

    <script src="js/supabase-config.js"></script>
    <script>
        // التحقق من صلاحية الدخول
        if (!checkAuth(['teacher'])) return;
        
        const user = getUser();
        document.getElementById('teacherName').innerHTML = user.name || user.username || 'معلم';
        
        let allQuestions = [];
        let selectedQuestions = []; // { id, points, type }
        
        // تحميل الصفوف والمواد الخاصة بالمعلم
        async function loadClassesAndSubjects() {
            try {
                const classes = await fetchTeacherAvailableClasses(user.id);
                const subjects = await fetchTeacherAvailableSubjects(user.id);
                
                const classSelect = document.getElementById('examClass');
                classSelect.innerHTML = '<option value="">-- اختر الصف --</option>';
                classes.forEach(c => {
                    classSelect.innerHTML += `<option value="${c.id}">${escapeHtml(c.name)}</option>`;
                });
                
                const subjectSelect = document.getElementById('examSubject');
                subjectSelect.innerHTML = '<option value="">-- اختر المادة --</option>';
                subjects.forEach(s => {
                    subjectSelect.innerHTML += `<option value="${s.id}">${escapeHtml(s.name)}</option>`;
                });
                
                if (classes.length === 0) {
                    showToast('لم يتم تعيين أي صفوف لك. راجع الأدمن.', 'warning');
                }
            } catch (error) {
                console.error('Error loading classes/subjects:', error);
            }
        }
        
        // تحميل الأسئلة
        async function loadQuestions() {
            const search = document.getElementById('questionSearch').value;
            const type = document.getElementById('typeFilter').value;
            
            let filters = { status: 'approved' };
            if (type !== 'all') filters.type = type;
            
            let questions = await fetchTeacherQuestions(user.id, filters);
            
            if (search) {
                questions = questions.filter(q => q.text.toLowerCase().includes(search.toLowerCase()));
            }
            
            allQuestions = questions;
            renderQuestionsList();
        }
        
        // عرض قائمة الأسئلة
        function renderQuestionsList() {
            const container = document.getElementById('questionsList');
            
            if (allQuestions.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <div style="font-size: 48px; margin-bottom: 16px;">📭</div>
                        <p>لا توجد أسئلة معتمدة</p>
                        <button class="btn btn-primary" onclick="window.location.href='teacher-questions.html'" style="margin-top: 15px;">➕ أضف سؤالاً جديداً</button>
                    </div>
                `;
                return;
            }
            
            container.innerHTML = allQuestions.map(q => {
                const isSelected = selectedQuestions.find(s => s.id === q.id);
                const typeText = getTypeText(q.type);
                const typeClass = getTypeClass(q.type);
                
                return `
                    <div class="exam-card" style="background: ${isSelected ? '#e8f5e9' : 'white'}; border-color: ${isSelected ? '#10b981' : '#e2e8f0'};">
                        <div style="display: flex; justify-content: space-between; flex-wrap: wrap; gap: 15px;">
                            <div style="flex: 1;">
                                <div class="exam-title">${escapeHtml(q.text)}</div>
                                <div class="exam-info">
                                    <span class="badge ${typeClass}">${typeText}</span>
                                    <span>⭐ الدرجة الأصلية: ${q.points}</span>
                                    <span>📊 ${q.difficulty === 'easy' ? '🟢 سهل' : q.difficulty === 'medium' ? '🟡 متوسط' : '🔴 صعب'}</span>
                                </div>
                                ${q.type === 'mcq' && q.options ? `<div style="font-size: 12px; color: #64748b;">الخيارات: ${q.options.slice(0, 3).join(' | ')}${q.options.length > 3 ? ' ...' : ''}</div>` : ''}
                                ${q.type === 'multi_select' && q.options ? `<div style="font-size: 12px; color: #64748b;">الخيارات (اختر الإجابات الصحيحة): ${q.options.slice(0, 3).join(' | ')}${q.options.length > 3 ? ' ...' : ''}</div>` : ''}
                            </div>
                            <div style="display: flex; align-items: center; gap: 10px;">
                                <input type="number" id="points-${q.id}" value="${q.points}" style="width: 80px; padding: 8px; border-radius: 12px; border: 1px solid #e2e8f0;" min="0.5" step="0.5" ${isSelected ? '' : 'disabled'}>
                                <button class="btn ${isSelected ? 'btn-danger' : 'btn-success'} btn-sm" onclick="toggleSelectQuestion(${q.id})">
                                    ${isSelected ? '✖ إزالة' : '➕ إضافة'}
                                </button>
                            </div>
                        </div>
                    </div>
                `;
            }).join('');
        }
        
        function getTypeText(type) {
            const types = {
                'mcq': '✅ اختيار من متعدد (إجابة واحدة)',
                'multi_select': '✅✅ اختيار متعدد (إجابات متعددة)',
                'true_false': 'صح/خطأ',
                'essay': '📝 مقالي'
            };
            return types[type] || type;
        }
        
        function getTypeClass(type) {
            const classes = {
                'mcq': 'badge-primary',
                'multi_select': 'badge-info',
                'true_false': 'badge-warning',
                'essay': 'badge-success'
            };
            return classes[type] || 'badge-info';
        }
        
        // إضافة/إزالة سؤال من القائمة المختارة
        function toggleSelectQuestion(questionId) {
            const existingIndex = selectedQuestions.findIndex(s => s.id === questionId);
            const question = allQuestions.find(q => q.id === questionId);
            
            if (!question) return;
            
            if (existingIndex !== -1) {
                selectedQuestions.splice(existingIndex, 1);
                // تعطيل حقل الدرجة
                const pointsInput = document.getElementById(`points-${questionId}`);
                if (pointsInput) pointsInput.disabled = true;
            } else {
                const pointsInput = document.getElementById(`points-${questionId}`);
                let points = question.points;
                if (pointsInput && pointsInput.value) {
                    points = parseFloat(pointsInput.value);
                }
                selectedQuestions.push({
                    id: questionId,
                    points: points,
                    type: question.type
                });
                if (pointsInput) pointsInput.disabled = false;
            }
            
            updateSelectedSummary();
            renderQuestionsList();
        }
        
        // تحديث الملخص
        function updateSelectedSummary() {
            const count = selectedQuestions.length;
            const total = selectedQuestions.reduce((sum, s) => sum + (s.points || 0), 0);
            document.getElementById('selectedCount').innerHTML = count;
            document.getElementById('totalPoints').innerHTML = total;
            document.getElementById('selectedSummary').style.display = count > 0 ? 'block' : 'none';
        }
        
        // إنشاء امتحان جديد
        async function createNewExam() {
            const title = document.getElementById('examTitle').value;
            const description = document.getElementById('examDesc').value;
            const classId = document.getElementById('examClass').value;
            const subjectId = document.getElementById('examSubject').value;
            const duration = document.getElementById('examDuration').value;
            const passingScore = document.getElementById('examPassingScore').value;
            
            if (!title) {
                showToast('عنوان الامتحان مطلوب', 'error');
                return;
            }
            if (!classId) {
                showToast('اختر الصف', 'error');
                return;
            }
            if (!subjectId) {
                showToast('اختر المادة', 'error');
                return;
            }
            if (selectedQuestions.length === 0) {
                showToast('اختر سؤالاً واحداً على الأقل', 'error');
                return;
            }
            
            // تحديث الدرجات من الحقول
            for (const sq of selectedQuestions) {
                const pointsInput = document.getElementById(`points-${sq.id}`);
                if (pointsInput) {
                    sq.points = parseFloat(pointsInput.value) || sq.points;
                }
            }
            
            const examData = {
                title: title,
                description: description || null,
                class_id: parseInt(classId),
                subject_id: parseInt(subjectId),
                teacher_id: user.id,
                duration_minutes: parseInt(duration),
                passing_score: parseInt(passingScore),
                status: 'published'  // نشر مباشرة
            };
            
            showToast('جاري إنشاء الامتحان...', 'info');
            
            const exam = await createExam(examData);
            if (!exam) {
                showToast('حدث خطأ في إنشاء الامتحان', 'error');
                return;
            }
            
            // إضافة الأسئلة إلى الامتحان
            let allAdded = true;
            for (let i = 0; i < selectedQuestions.length; i++) {
                const sq = selectedQuestions[i];
                const success = await addQuestionToExam(exam.id, sq.id, sq.points, i + 1);
                if (!success) {
                    allAdded = false;
                    console.error(`Failed to add question ${sq.id}`);
                }
            }
            
            if (allAdded) {
                showToast('تم إنشاء الامتحان ونشره بنجاح!', 'success');
                setTimeout(() => {
                    window.location.href = 'teacher-exams.html';
                }, 1500);
            } else {
                showToast('تم إنشاء الامتحان ولكن حدث خطأ في إضافة بعض الأسئلة', 'warning');
            }
        }
        
        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/[&<>]/g, function(m) {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                return m;
            });
        }
        
        // أحداث البحث والفلتر
        document.getElementById('questionSearch').addEventListener('input', () => loadQuestions());
        document.getElementById('typeFilter').addEventListener('change', () => loadQuestions());
        
        // تحميل أولي
        loadClassesAndSubjects();
        loadQuestions();
    </script>
</body>
</html>
