<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إنشاء امتحان جديد - منصة الاختبارات</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="container">
        <div class="top-bar">
            <div class="logo">📚 منصة الاختبارات</div>
            <div>
                <span style="margin-left: 15px;">👋 مرحباً <span id="teacherName"></span></span>
                <button class="btn btn-outline btn-sm" onclick="window.location.href='teacher-dashboard.html'">🏠 الرئيسية</button>
                <button class="btn btn-outline btn-sm" onclick="logout()">🚪 خروج</button>
            </div>
        </div>

        <div class="card header">
            <h1>📝 إنشاء امتحان جديد</h1>
            <p>املأ بيانات الامتحان وأضف الأسئلة</p>
        </div>

        <div class="card">
            <form id="createExamForm">
                <div class="form-group">
                    <label>📝 عنوان الامتحان *</label>
                    <input type="text" id="examTitle" class="search-input" style="width: 100%;" required>
                </div>
                <div class="form-group">
                    <label>📖 وصف الامتحان</label>
                    <textarea id="examDesc" rows="3" class="search-input" style="width: 100%;"></textarea>
                </div>
                <div class="grid" style="display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px;">
                    <div class="form-group">
                        <label>🎓 الصف *</label>
                        <select id="examClass" class="filter-select" style="width: 100%;" required>
                            <option value="">-- اختر الصف --</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>📚 المادة *</label>
                        <select id="examSubject" class="filter-select" style="width: 100%;" required>
                            <option value="">-- اختر المادة --</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>⏱️ المدة (دقائق) *</label>
                        <input type="number" id="examDuration" class="search-input" style="width: 100%;" value="60" required>
                    </div>
                    <div class="form-group">
                        <label>⭐ درجة النجاح (%)</label>
                        <input type="number" id="examPassingScore" class="search-input" style="width: 100%;" value="50">
                    </div>
                </div>
            </form>
        </div>

        <div class="card">
            <h3>📚 اختيار الأسئلة</h3>
            <div class="filter-bar">
                <input type="text" id="questionSearch" class="search-input" placeholder="🔍 بحث في الأسئلة...">
                <select id="typeFilter" class="filter-select">
                    <option value="all">كل الأنواع</option>
                    <option value="mcq">اختيار من متعدد</option>
                    <option value="true_false">صح/خطأ</option>
                    <option value="essay">مقالي</option>
                </select>
            </div>
            <div id="questionsList"></div>
            <div class="selected-summary" id="selectedSummary" style="display: none; position: sticky; bottom: 20px; background: var(--card-bg); border-radius: 20px; padding: 15px; margin-top: 20px; border: 1px solid var(--border);">
                <div style="display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 15px;">
                    <div>✅ تم اختيار <span id="selectedCount">0</span> سؤال</div>
                    <div>📊 إجمالي الدرجات: <span id="totalPoints">0</span></div>
                    <button class="btn btn-primary" onclick="createExam()">💾 حفظ الامتحان</button>
                </div>
            </div>
        </div>
    </div>

    <script src="js/supabase-config.js"></script>
    <script>
        if (!checkAuth(['teacher'])) return;
        
        const user = getUser();
        document.getElementById('teacherName').innerHTML = user.name;
        
        let allQuestions = [];
        let selectedQuestions = [];
        
        async function loadClassesAndSubjects() {
            const [classes, subjects] = await Promise.all([
                fetchClasses('teacher', user.id),
                fetchSubjects('teacher', user.id)
            ]);
            
            const classSelect = document.getElementById('examClass');
            classSelect.innerHTML = '<option value="">-- اختر الصف --</option>';
            classes.forEach(c => classSelect.innerHTML += `<option value="${c.id}">${c.name}</option>`);
            
            const subjectSelect = document.getElementById('examSubject');
            subjectSelect.innerHTML = '<option value="">-- اختر المادة --</option>';
            subjects.forEach(s => subjectSelect.innerHTML += `<option value="${s.id}">${s.name}</option>`);
        }
        
        async function loadQuestions() {
            const search = document.getElementById('questionSearch').value;
            const type = document.getElementById('typeFilter').value;
            
            let filters = { status: 'approved' };
            if (type !== 'all') filters.type = type;
            
            let questions = await fetchQuestions(filters, 'teacher', user.id);
            if (search) {
                questions = questions.filter(q => q.text.toLowerCase().includes(search.toLowerCase()));
            }
            
            allQuestions = questions;
            renderQuestionsList();
        }
        
        function renderQuestionsList() {
            const container = document.getElementById('questionsList');
            
            if (allQuestions.length === 0) {
                container.innerHTML = '<div class="empty-state">📭 لا توجد أسئلة معتمدة<br><button class="btn btn-primary mt-3" onclick="window.location.href=\'teacher-questions.html\'">➕ أضف سؤالاً جديداً</button></div>';
                return;
            }
            
            container.innerHTML = allQuestions.map(q => {
                const isSelected = selectedQuestions.find(s => s.id === q.id);
                return `
                    <div class="exam-card" style="background: ${isSelected ? 'var(--success)' : 'var(--light)'}; border-color: ${isSelected ? 'var(--success)' : 'var(--border)'};">
                        <div style="display: flex; justify-content: space-between; flex-wrap: wrap; gap: 10px;">
                            <div style="flex: 1;">
                                <p><strong>${q.text}</strong></p>
                                <div class="exam-info">
                                    <span class="badge ${q.type === 'mcq' ? 'badge-primary' : q.type === 'true_false' ? 'badge-info' : 'badge-warning'}">
                                        ${q.type === 'mcq' ? 'اختيار من متعدد' : q.type === 'true_false' ? 'صح/خطأ' : 'مقالي'}
                                    </span>
                                    <span>⭐ ${q.points} درجة</span>
                                    <span>${q.difficulty === 'easy' ? '🟢 سهل' : q.difficulty === 'medium' ? '🟡 متوسط' : '🔴 صعب'}</span>
                                </div>
                            </div>
                            <div>
                                <input type="number" id="points-${q.id}" value="${q.points}" style="width: 70px; padding: 5px; border-radius: 8px; border: 1px solid var(--border);" placeholder="درجة">
                                <button class="btn ${isSelected ? 'btn-danger' : 'btn-success'} btn-sm" onclick="toggleSelectQuestion(${q.id})">
                                    ${isSelected ? 'إزالة' : 'إضافة'}
                                </button>
                            </div>
                        </div>
                    </div>
                `;
            }).join('');
        }
        
        function toggleSelectQuestion(questionId) {
            const existing = selectedQuestions.find(s => s.id === questionId);
            const question = allQuestions.find(q => q.id === questionId);
            
            if (existing) {
                selectedQuestions = selectedQuestions.filter(s => s.id !== questionId);
            } else {
                const pointsInput = document.getElementById(`points-${questionId}`);
                const points = parseInt(pointsInput?.value) || question.points;
                selectedQuestions.push({ id: questionId, points: points });
            }
            
            updateSelectedSummary();
            renderQuestionsList();
        }
        
        function updateSelectedSummary() {
            const count = selectedQuestions.length;
            const total = selectedQuestions.reduce((sum, s) => sum + s.points, 0);
            document.getElementById('selectedCount').innerHTML = count;
            document.getElementById('totalPoints').innerHTML = total;
            document.getElementById('selectedSummary').style.display = count > 0 ? 'block' : 'none';
        }
        
        async function createExam() {
            const title = document.getElementById('examTitle').value;
            const description = document.getElementById('examDesc').value;
            const classId = document.getElementById('examClass').value;
            const subjectId = document.getElementById('examSubject').value;
            const duration = document.getElementById('examDuration').value;
            const passingScore = document.getElementById('examPassingScore').value;
            
            if (!title || !classId || !subjectId || !duration) {
                showToast('الرجاء ملء جميع الحقول المطلوبة', 'error');
                return;
            }
            
            if (selectedQuestions.length === 0) {
                showToast('الرجاء اختيار سؤال واحد على الأقل', 'error');
                return;
            }
            
            const examData = {
                title, description: description || null,
                class_id: parseInt(classId), subject_id: parseInt(subjectId),
                teacher_id: user.id,
                duration_minutes: parseInt(duration),
                passing_score: parseInt(passingScore),
                status: 'draft'
            };
            
            const exam = await createExam(examData);
            if (!exam) {
                showToast('حدث خطأ في إنشاء الامتحان', 'error');
                return;
            }
            
            // إضافة الأسئلة إلى الامتحان
            for (let i = 0; i < selectedQuestions.length; i++) {
                await addQuestionToExam(exam.id, selectedQuestions[i].id, selectedQuestions[i].points, i + 1);
            }
            
            showToast('تم إنشاء الامتحان بنجاح', 'success');
            setTimeout(() => {
                window.location.href = 'teacher-exams.html';
            }, 1500);
        }
        
        document.getElementById('questionSearch').addEventListener('input', () => loadQuestions());
        document.getElementById('typeFilter').addEventListener('change', () => loadQuestions());
        
        loadClassesAndSubjects();
        loadQuestions();
    </script>
</body>
</html>
