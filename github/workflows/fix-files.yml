name: Fix HTML Files

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  fix-files:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3
      
    - name: Setup Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '18'
        
    - name: Create fix script
      run: |
        cat > fix-files.js << 'EOF'
        // نفس الكود الموجود في الطريقة 1
        // (انسخ الكود الكامل من الأعلى)
        EOF
        
    - name: Run fix script
      run: node fix-files.js
      
    - name: Commit changes
      run: |
        git config user.name "GitHub Actions"
        git config user.email "actions@github.com"
        git add .
        git diff --staged --quiet || git commit -m "🔧 Auto-fix: Add utils.js and remove duplicate functions"
        git push