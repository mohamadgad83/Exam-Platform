<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة تحكم الطالب - منصة الاختبارات</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Cairo', sans-serif; background: linear-gradient(135deg, #f0f2f5 0%, #e4e8f0 100%); min-height: 100vh; padding: 20px; }
        .container { max-width: 1400px; margin: 0 auto; }
        
        /* شريط العودة للأدمن */
        .impersonate-banner {
            background: linear-gradient(135deg, #fef3c7, #fffbeb);
            border: 1px solid #f59e0b;
            border-radius: 20px;
            padding: 15px 25px;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
            box-shadow: 0 4px 12px rgba(245, 158, 11, 0.1);
        }
        .impersonate-banner-left {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .impersonate-banner-left span:first-child {
            font-size: 28px;
        }
        .impersonate-banner-left strong {
            color: #d97706;
            font-size: 16px;
        }
        .impersonate-banner-left .badge {
            background: #f59e0b;
            color: white;
            padding: 4px 12px;
            border-radius: 30px;
            font-size: 12px;
        }
        
        /* الشريط العلوي الرئيسي */
        .main-header {
            background: white;
            border-radius: 24px;
            padding: 15px 25px;
            margin-bottom: 25px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            border: 1px solid #e2e8f0;
        }
        .logo-area {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .logo-icon {
            font-size: 32px;
        }
        .logo-text {
            font-size: 22px;
            font-weight: 800;
            background: linear-gradient(135deg, #6366f1, #8b5cf6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .user-area {
            display: flex;
            align-items: center;
            gap: 15px;
            flex-wrap: wrap;
        }
        .user-name {
            font-weight: 600;
            color: #1e293b;
            background: #f1f5f9;
            padding: 8px 16px;
            border-radius: 40px;
        }
        
        /* البطاقات */
        .card {
            background: white;
            border-radius: 28px;
            padding: 25px;
            margin-bottom: 25px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            border: 1px solid #e2e8f0;
            transition: all 0.3s ease;
        }
        .card:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(0,0,0,0.1);
        }
        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 2px solid #e2e8f0;
        }
        .card-header h2 {
            font-size: 22px;
            font-weight: 700;
            background: linear-gradient(135deg, #6366f1, #8b5cf6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .card-header h3 {
            font-size: 18px;
            font-weight: 600;
            color: #1e293b;
        }
        
        /* إحصائيات */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 20px;
            margin-bottom: 25px;
        }
        .stat-card {
            background: linear-gradient(135deg, #6366f1, #8b5cf6);
            border-radius: 24px;
            padding: 25px;
            color: white;
            text-align: center;
            transition: all 0.3s;
            cursor: pointer;
        }
        .stat-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 30px rgba(99,102,241,0.3);
        }
        .stat-number {
            font-size: 42px;
            font-weight: 800;
        }
        .stat-label {
            font-size: 14px;
            opacity: 0.9;
            margin-top: 8px;
        }
        
        /* الأزرار */
        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 14px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            font-family: inherit;
            font-size: 14px;
        }
        .btn-primary { background: linear-gradient(135deg, #6366f1, #4f46e5); color: white; box-shadow: 0 4px 10px rgba(99,102,241,0.3); }
        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 6px 15px rgba(99,102,241,0.4); }
        .btn-danger { background: #ef4444; color: white; }
        .btn-danger:hover { background: #dc2626; transform: translateY(-2px); }
        .btn-outline { background: transparent; border: 2px solid #6366f1; color: #6366f1; }
        .btn-outline:hover { background: #6366f1; color: white; }
        .btn-warning { background: #f59e0b; color: white; }
        .btn-warning:hover { background: #d97706; transform: translateY(-2px); }
        .btn-sm { padding: 6px 14px; font-size: 12px; }
        .btn-lg { padding: 14px 28px; font-size: 16px; }
        
        .action-buttons {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            margin-top: 15px;
        }
        
        /* بطاقات الامتحانات */
        .exam-card {
            background: #f8fafc;
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 15px;
            border: 1px solid #e2e8f0;
            transition: all 0.2s;
        }
        .exam-card:hover {
            transform: translateX(-5px);
            border-right: 4px solid #6366f1;
            background: white;
        }
        .exam-title {
            font-size: 18px;
            font-weight: 700;
            color: #1e293b;
            margin-bottom: 8px;
        }
        .exam-info {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
            margin: 12px 0;
            color: #64748b;
            font-size: 13px;
        }
        .exam-info span {
            display: flex;
            align-items: center;
            gap: 6px;
        }
        
        .badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 4px 12px;
            border-radius: 40px;
            font-size: 12px;
            font-weight: 600;
        }
        .badge-success { background: #d1fae5; color: #065f46; }
        .badge-warning { background: #fef3c7; color: #d97706; }
        .badge-info { background: #dbeafe; color: #1e40af; }
        
        .empty-state {
            text-align: center;
            padding: 60px;
            color: #64748b;
        }
        .empty-state-icon {
            font-size: 64px;
            margin-bottom: 16px;
            opacity: 0.5;
        }
        
        /* أزرار التنقل السريع */
        .nav-buttons {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
        }
        
        @media (max-width: 768px) {
            body { padding: 12px; }
            .stats-grid { grid-template-columns: repeat(2, 1fr); gap: 12px; }
            .stat-number { font-size: 28px; }
            .main-header { flex-direction: column; text-align: center; }
            .action-buttons { justify-content: center; }
            .card-header { flex-direction: column; gap: 10px; align-items: flex-start; }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- شريط العودة للأدمن (يظهر فقط عند الدخول كأدمن) -->
        <div id="impersonateBanner" class="impersonate-banner" style="display: none;">
            <div class="impersonate-banner-left">
                <span>👑</span>
                <span>أنت تتصفح كـ <strong><span id="impersonateUserName"></span></strong></span>
                <span class="badge">وضع المشاهدة</span>
            </div>
            <button class="btn btn-warning btn-sm" onclick="returnToAdmin()">🔙 العودة للوحة الأدمن</button>
        </div>

        <!-- الشريط العلوي الرئيسي -->
        <div class="main-header">
            <div class="logo-area">
                <div class="logo-icon">📚</div>
                <div class="logo-text">منصة الاختبارات</div>
            </div>
            <div class="user-area">
                <span class="user-name">👋 مرحباً <span id="studentName"></span></span>
                <div class="nav-buttons">
                    <button class="btn btn-outline btn-sm" onclick="window.location.href='student-exams.html'">📝 الامتحانات</button>
                    <button class="btn btn-outline btn-sm" onclick="window.location.href='student-results.html'">📊 نتائجي</button>
                    <button class="btn btn-outline btn-sm" onclick="window.location.href='student-groups.html'">👥 المجموعات</button>
                    <button class="btn btn-danger btn-sm" onclick="logout()">🚪 خروج</button>
                </div>
            </div>
        </div>

        <!-- عنوان الصفحة -->
        <div class="card">
            <div class="card-header">
                <h2>🎓 لوحة تحكم الطالب</h2>
                <p style="color: #64748b;">مرحباً بك، تابع امتحاناتك ونتائجك ومجموعاتك من هنا</p>
            </div>
        </div>

        <!-- الإحصائيات -->
        <div class="stats-grid" id="statsArea"></div>

        <!-- الإجراءات السريعة -->
        <div class="card">
            <div class="card-header">
                <h3>⚡ الإجراءات السريعة</h3>
            </div>
            <div class="action-buttons">
                <button class="btn btn-primary" onclick="window.location.href='student-exams.html'">📝 استعراض الامتحانات المتاحة</button>
                <button class="btn btn-primary" onclick="window.location.href='student-groups.html'">👥 استعراض المجموعات</button>
                <button class="btn btn-outline" onclick="window.location.href='student-results.html'">📊 عرض نتائجي</button>
            </div>
        </div>

        <!-- الامتحانات المتاحة -->
        <div class="card">
            <div class="card-header">
                <h3>📝 الامتحانات المتاحة</h3>
                <button class="btn btn-outline btn-sm" onclick="window.location.href='student-exams.html'">عرض الكل →</button>
            </div>
            <div id="availableExamsList"></div>
        </div>
    </div>

    <script src="js/supabase-config.js"></script>
    <script>
        // ==================== التحقق من صلاحية الدخول ====================
        const currentUser = getUser();
        
        let originalUser = null;
        let isImpersonating = false;
        
        try {
            const storedOriginal = localStorage.getItem('originalUser');
            if (storedOriginal && storedOriginal !== 'undefined') {
                originalUser = JSON.parse(storedOriginal);
                isImpersonating = currentUser && currentUser.isImpersonating === true;
            }
        } catch(e) {
            console.log('خطأ في قراءة originalUser', e);
        }
        
        if (!currentUser) {
            window.location.href = 'index.html';
        }
        
        const allowedRoles = ['student', 'admin'];
        if (!allowedRoles.includes(currentUser.role) && !isImpersonating) {
            window.location.href = 'index.html';
        }
        
        document.getElementById('studentName').innerHTML = currentUser.name || currentUser.username || 'طالب';
        
        // إظهار شريط العودة إذا كان الدخول بواسطة الأدمن
        if (isImpersonating && originalUser && originalUser.role === 'admin') {
            const banner = document.getElementById('impersonateBanner');
            banner.style.display = 'flex';
            document.getElementById('impersonateUserName').innerHTML = currentUser.name || currentUser.username;
        }
        
        // ==================== العودة للأدمن ====================
        window.returnToAdmin = function() {
            try {
                const original = JSON.parse(localStorage.getItem('originalUser'));
                if (original && original.role === 'admin') {
                    localStorage.setItem('user', JSON.stringify(original));
                    localStorage.removeItem('originalUser');
                    window.location.href = 'admin-dashboard.html';
                } else {
                    window.location.href = 'admin-dashboard.html';
                }
            } catch(e) {
                window.location.href = 'admin-dashboard.html';
            }
        };
        
        // ==================== تحميل الإحصائيات ====================
        async function loadStats() {
            const stats = await fetchStudentStats(currentUser.id);
            document.getElementById('statsArea').innerHTML = `
                <div class="stat-card" onclick="window.location.href='student-results.html'">
                    <div class="stat-number">${stats.totalAttempts}</div>
                    <div class="stat-label">📝 الامتحانات المنجزة</div>
                </div>
                <div class="stat-card" onclick="window.location.href='student-groups.html'">
                    <div class="stat-number">${stats.totalGroups}</div>
                    <div class="stat-label">👥 المجموعات المنضم لها</div>
                </div>
                <div class="stat-card" onclick="window.location.href='student-results.html'">
                    <div class="stat-number">${stats.avgScore}%</div>
                    <div class="stat-label">⭐ متوسط الدرجات</div>
                </div>
            `;
        }
        
        async function loadAvailableExams() {
            let exams = await fetchExams({ status: 'published' }, 'student', currentUser.id);
            const requests = await fetchExamRequests({}, 'student', currentUser.id);
            const requestedExamIds = new Set(requests.map(r => r.exam_id));
            const availableExams = exams.filter(e => !requestedExamIds.has(e.id));
            const container = document.getElementById('availableExamsList');
            
            if (availableExams.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-state-icon">📭</div>
                        <p>لا توجد امتحانات متاحة حالياً</p>
                        <button class="btn btn-primary btn-sm" onclick="window.location.href='student-exams.html'" style="margin-top: 15px;">🔄 تحديث</button>
                    </div>
                `;
                return;
            }
            
            container.innerHTML = availableExams.map(e => `
                <div
