<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>منصة الاختبارات - تسجيل الدخول</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }
        .login-container { max-width: 450px; width: 100%; }
        .demo-info {
            margin-top: 20px;
            padding: 16px;
            background: var(--light);
            border-radius: 20px;
            font-size: 13px;
            text-align: right;
        }
        .demo-info h4 { color: var(--dark); margin-bottom: 10px; font-size: 14px; }
        .demo-info p { color: var(--gray); margin: 6px 0; }
        .demo-info strong { color: var(--primary); }
        .form-group { margin-bottom: 20px; text-align: right; }
        .form-group label { display: block; margin-bottom: 8px; font-weight: 600; color: var(--dark); }
        .form-group input {
            width: 100%;
            padding: 14px 16px;
            border: 2px solid var(--border);
            border-radius: 16px;
            font-size: 16px;
            font-family: inherit;
            transition: all 0.3s;
        }
        .form-group input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(99,102,241,0.1);
        }
        .logo { font-size: 56px; margin-bottom: 16px; }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="card" style="text-align: center;">
            <div class="logo">📚</div>
            <h1>منصة الاختبارات</h1>
            <p class="subtitle" style="color: var(--gray); margin-bottom: 30px;">سجل دخولك للمتابعة</p>

            <form id="loginForm">
                <div class="form-group">
                    <label>👤 البريد الإلكتروني أو رقم الهاتف</label>
                    <input type="text" id="identifier" placeholder="admin@exam.com أو 01000000000" autocomplete="off">
                </div>
                <div class="form-group">
                    <label>🔒 كلمة السر</label>
                    <input type="password" id="password" placeholder="أدخل كلمة السر">
                </div>
                <button type="submit" class="btn btn-primary" style="width: 100%; padding: 14px; font-size: 18px;" id="loginBtn">دخول</button>
            </form>

            <div id="error" style="background: #fee2e2; color: #dc2626; padding: 12px; border-radius: 12px; margin-top: 15px; display: none;"></div>

            <div class="register-link" style="margin-top: 25px; padding-top: 20px; border-top: 1px solid var(--border);">
                <a href="register.html" style="color: var(--primary); text-decoration: none; font-weight: 600;">✨ تسجيل حساب جديد</a>
            </div>
            
            <div class="demo-info">
                <h4>📝 بيانات الدخول التجريبية:</h4>
                <p><strong>👑 مدير:</strong> admin@exam.com / 123456</p>
                <p><strong>👨‍🏫 معلم:</strong> teacher@exam.com / 123456</p>
                <p><strong>👨‍🎓 طالب:</strong> student@exam.com / 123456</p>
            </div>
        </div>
    </div>

    <script src="js/supabase-config.js"></script>
    <script>
        const loginForm = document.getElementById('loginForm');
        const loginBtn = document.getElementById('loginBtn');
        const errorDiv = document.getElementById('error');

        function showError(msg) {
            errorDiv.innerHTML = msg;
            errorDiv.style.display = 'block';
            setTimeout(() => { errorDiv.style.display = 'none'; }, 4000);
        }

        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const identifier = document.getElementById('identifier').value.trim();
            const password = document.getElementById('password').value;
            
            if (!identifier || !password) {
                showError('❌ يرجى إدخال البريد/الهاتف وكلمة السر');
                return;
            }
            
            loginBtn.disabled = true;
            loginBtn.innerHTML = 'جاري التحقق... ⏳';
            
            const result = await loginUser(identifier, password);
            
            if (result.success) {
                setUser(result.user);
                showToast(`مرحباً ${result.user.name}! جاري التحويل...`, 'success');
                
                setTimeout(() => {
                    if (result.user.role === 'admin') {
                        window.location.href = 'admin-dashboard.html';
                    } else if (result.user.role === 'teacher') {
                        window.location.href = 'teacher-dashboard.html';
                    } else {
                        window.location.href = 'student-dashboard.html';
                    }
                }, 1000);
            } else {
                showError('❌ ' + result.error);
                loginBtn.disabled = false;
                loginBtn.innerHTML = 'دخول';
            }
        });
        
        const savedUser = getUser();
        if (savedUser) {
            if (savedUser.role === 'admin') window.location.href = 'admin-dashboard.html';
            else if (savedUser.role === 'teacher') window.location.href = 'teacher-dashboard.html';
            else if (savedUser.role === 'student') window.location.href = 'student-dashboard.html';
        }
    </script>
</body>
</html>
