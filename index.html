<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>منصة الاختبارات - تسجيل الدخول</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .login-container { max-width: 420px; width: 100%; }
        .demo-info {
            margin-top: 20px;
            padding: 15px;
            background: #f8fafc;
            border-radius: 16px;
            font-size: 13px;
            text-align: right;
        }
        .demo-info h4 { color: #1e293b; margin-bottom: 10px; }
        .demo-info p { color: #64748b; margin: 5px 0; }
        .demo-info strong { color: #667eea; }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="card" style="text-align: center;">
            <div class="logo" style="font-size: 48px; margin-bottom: 15px;">🎓</div>
            <h1>منصة الاختبارات</h1>
            <p class="subtitle" style="color: #64748b; margin-bottom: 30px;">سجل دخولك للمتابعة</p>

            <form id="loginForm">
                <div class="form-group" style="margin-bottom: 20px; text-align: right;">
                    <label style="display: block; margin-bottom: 8px; font-weight: 600;">👤 البريد الإلكتروني أو رقم الهاتف</label>
                    <input type="text" id="identifier" placeholder="admin@exam.com أو 01000000000" style="width: 100%; padding: 14px; border: 2px solid #e2e8f0; border-radius: 16px;">
                </div>
                <div class="form-group" style="margin-bottom: 20px; text-align: right;">
                    <label style="display: block; margin-bottom: 8px; font-weight: 600;">🔒 كلمة السر</label>
                    <input type="password" id="password" placeholder="أدخل كلمة السر" style="width: 100%; padding: 14px; border: 2px solid #e2e8f0; border-radius: 16px;">
                </div>
                <button type="submit" class="btn btn-primary" style="width: 100%; padding: 14px; font-size: 18px;" id="loginBtn">دخول</button>
            </form>

            <div id="error" style="background: #fee2e2; color: #dc2626; padding: 12px; border-radius: 12px; margin-top: 15px; display: none;"></div>

            <div class="register-link" style="margin-top: 25px; padding-top: 20px; border-top: 1px solid #e2e8f0;">
                <a href="register.html" style="color: #667eea; text-decoration: none;">✨ تسجيل حساب جديد</a>
            </div>
            
            <div class="demo-info">
                <h4>📝 بيانات الدخول التجريبية:</h4>
                <p><strong>مدير:</strong> admin@exam.com / 123456</p>
                <p><strong>معلم:</strong> teacher@exam.com / 123456</p>
                <p><strong>طالب:</strong> student@exam.com / 123456</p>
            </div>
        </div>
    </div>

    <script src="js/supabase-config.js"></script>
    <script>
        const loginForm = document.getElementById('loginForm');
        const loginBtn = document.getElementById('loginBtn');
        const errorDiv = document.getElementById('error');

        function showError(msg) {
            errorDiv.innerHTML = msg;
            errorDiv.style.display = 'block';
            setTimeout(() => { errorDiv.style.display = 'none'; }, 4000);
        }

        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const identifier = document.getElementById('identifier').value.trim();
            const password = document.getElementById('password').value;
            
            if (!identifier || !password) {
                showError('❌ يرجى إدخال البريد/الهاتف وكلمة السر');
                return;
            }
            
            loginBtn.disabled = true;
            loginBtn.innerHTML = 'جاري التحقق... ⏳';
            
            const result = await loginUser(identifier, password);
            
            if (result.success) {
                setUser(result.user);
                showToast(`مرحباً ${result.user.name}! جاري التحويل...`, 'success');
                
                setTimeout(() => {
                    if (result.user.role === 'admin') {
                        window.location.href = 'admin-dashboard.html';
                    } else if (result.user.role === 'teacher') {
                        window.location.href = 'teacher-dashboard.html';
                    } else {
                        window.location.href = 'student-dashboard.html';
                    }
                }, 1000);
            } else {
                showError('❌ ' + result.error);
                loginBtn.disabled = false;
                loginBtn.innerHTML = 'دخول';
            }
        });
        
        const savedUser = getUser();
        if (savedUser) {
            if (savedUser.role === 'admin') window.location.href = 'admin-dashboard.html';
            else if (savedUser.role === 'teacher') window.location.href = 'teacher-dashboard.html';
            else if (savedUser.role === 'student') window.location.href = 'student-dashboard.html';
        }
    </script>
</body>
</html>
