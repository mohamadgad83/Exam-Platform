<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إدارة المستخدمين - منصة الاختبارات</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Cairo', sans-serif; background: #f0f2f5; padding: 20px; }
        .container { max-width: 1400px; margin: 0 auto; }
        .admin-bar {
            background: linear-gradient(135deg, #1e293b, #0f172a);
            color: white;
            padding: 12px 24px;
            border-radius: 20px;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
        }
        .card {
            background: white;
            border-radius: 28px;
            padding: 25px;
            margin-bottom: 20px;
            box-shadow: 0 10px 25px -5px rgba(0,0,0,0.05);
            border: 1px solid #e2e8f0;
        }
        .header h1 {
            background: linear-gradient(135deg, #6366f1, #8b5cf6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-size: 28px;
        }
        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 14px;
            cursor: pointer;
            font-weight: 600;
            transition: 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            font-family: inherit;
        }
        .btn-primary { background: linear-gradient(135deg, #6366f1, #4f46e5); color: white; }
        .btn-success { background: #10b981; color: white; }
        .btn-danger { background: #ef4444; color: white; }
        .btn-warning { background: #f59e0b; color: white; }
        .btn-info { background: #3b82f6; color: white; }
        .btn-outline { background: transparent; border: 2px solid #6366f1; color: #6366f1; }
        .btn-sm { padding: 6px 14px; font-size: 12px; }
        .filter-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
            margin-bottom: 20px;
        }
        .search-input {
            padding: 10px 18px;
            border: 1px solid #e2e8f0;
            border-radius: 50px;
            width: 260px;
            font-family: inherit;
        }
        .filter-select {
            padding: 10px 18px;
            border: 1px solid #e2e8f0;
            border-radius: 50px;
            min-width: 150px;
            font-family: inherit;
        }
        .table-wrapper {
            overflow-x: auto;
            border-radius: 20px;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            min-width: 800px;
        }
        th, td {
            padding: 14px 16px;
            text-align: right;
            border-bottom: 1px solid #e2e8f0;
            color: #1e293b;
        }
        th {
            background: #f8fafc;
            font-weight: 700;
        }
        .badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 4px 12px;
            border-radius: 40px;
            font-size: 12px;
            font-weight: 600;
        }
        .badge-primary { background: linear-gradient(135deg, #6366f1, #8b5cf6); color: white; }
        .badge-success { background: #d1fae5; color: #065f46; }
        .badge-warning { background: #fef3c7; color: #d97706; }
        .badge-danger { background: #fee2e2; color: #991b1b; }
        .badge-info { background: #dbeafe; color: #1e40af; }
        .action-buttons { display: flex; gap: 8px; flex-wrap: wrap; }
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(5px);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
        .modal-content {
            background: white;
            border-radius: 32px;
            padding: 32px;
            width: 550px;
            max-width: 90%;
            max-height: 85vh;
            overflow-y: auto;
        }
        .modal-content input, .modal-content select, .modal-content textarea {
            width: 100%;
            padding: 12px 16px;
            margin: 10px 0;
            border: 1px solid #e2e8f0;
            border-radius: 16px;
            font-family: inherit;
        }
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; margin-bottom: 5px; font-weight: 600; color: #334155; }
        h4 { margin: 15px 0 10px 0; color: #1e293b; }
        
        .toast-notification {
            position: fixed;
            bottom: 30px;
            left: 30px;
            background: white;
            border-radius: 16px;
            padding: 16px 20px;
            display: flex;
            align-items: center;
            gap: 12px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            transform: translateX(-500px);
            transition: transform 0.3s ease;
            z-index: 10000;
            direction: rtl;
            border-right: 4px solid;
        }
        .toast-notification.show { transform: translateX(0); }
        .toast-success { border-right-color: #10b981; }
        .toast-error { border-right-color: #ef4444; }
        .toast-message { flex: 1; font-size: 14px; color: #333; }
        .toast-progress {
            position: absolute;
            bottom: 0;
            left: 0;
            height: 3px;
            width: 100%;
            animation: progress 3s linear forwards;
        }
        @keyframes progress { from { width: 100%; } to { width: 0%; } }
        
        .confirm-modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(5px);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 10001;
        }
        .confirm-content {
            background: white;
            border-radius: 28px;
            padding: 32px;
            text-align: center;
            width: 320px;
        }
        .confirm-buttons { display: flex; gap: 12px; margin-top: 20px; }
        .confirm-yes { background: #10b981; color: white; padding: 10px; border: none; border-radius: 12px; cursor: pointer; flex: 1; }
        .confirm-no { background: #e2e8f0; color: #333; padding: 10px; border: none; border-radius: 12px; cursor: pointer; flex: 1; }
        
        @media (max-width: 768px) {
            .filter-bar { flex-direction: column; align-items: stretch; }
            .search-input, .filter-select { width: 100%; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="admin-bar">
            <div><span style="font-size:20px;">👑</span> إدارة المستخدمين - <span id="adminName"></span></div>
            <div>
                <button class="btn btn-outline btn-sm" onclick="window.location.href='admin-dashboard.html'">🏠 الرئيسية</button>
                <button class="btn btn-danger btn-sm" onclick="logout()">🚪 خروج</button>
            </div>
        </div>

        <div class="card header">
            <h1>👥 إدارة المستخدمين</h1>
            <p>إضافة وتعديل وحذف المستخدمين - إدارة الصلاحيات</p>
        </div>

        <div class="card">
            <div class="filter-bar">
                <input type="text" id="searchInput" class="search-input" placeholder="🔍 بحث بالاسم أو الهاتف أو البريد...">
                <select id="roleFilter" class="filter-select">
                    <option value="all">كل الأدوار</option>
                    <option value="admin">مدير</option>
                    <option value="teacher">معلم</option>
                    <option value="student">طالب</option>
                </select>
                <select id="statusFilter" class="filter-select">
                    <option value="all">كل الحالات</option>
                    <option value="active">نشط</option>
                    <option value="pending">قيد الانتظار</option>
                    <option value="suspended">موقوف</option>
                </select>
                <button class="btn btn-primary" onclick="openAddUserModal()">➕ إضافة مستخدم</button>
            </div>

            <div class="table-wrapper">
                <table>
                    <thead>
                        <tr><th>#</th><th>الاسم</th><th>اسم المستخدم</th><th>رقم الهاتف</th><th>الصف</th><th>الدور</th><th>الحالة</th><th>الإجراءات</th></tr>
                    </thead>
                    <tbody id="usersTableBody"></tbody>
                </table>
            </div>
        </div>
    </div>

    <!-- مودال إضافة مستخدم -->
    <div id="userModal" class="modal">
        <div class="modal-content">
            <h3 id="modalTitle">➕ إضافة مستخدم جديد</h3>
            
            <div class="form-group">
                <label>👤 الاسم الكامل *</label>
                <input type="text" id="userName" placeholder="مثال: أحمد محمد علي">
            </div>
            
            <div class="form-group">
                <label>📞 رقم الهاتف * (للطلاب: يستخدم للدخول)</label>
                <input type="tel" id="userPhone" placeholder="مثال: 01012345678">
            </div>
            
            <div class="form-group">
                <label>📧 البريد الإلكتروني (اختياري)</label>
                <input type="email" id="userEmail" placeholder="example@email.com">
            </div>
            
            <div id="usernameField" style="display: none;">
                <div class="form-group">
                    <label>👤 اسم المستخدم * (للمعلمين والأدمن - يستخدم للدخول)</label>
                    <input type="text" id="userUsername" placeholder="مثال: ahmed_teacher">
                </div>
            </div>
            
            <div class="form-group">
                <label>🎭 الدور</label>
                <select id="userRole">
                    <option value="student">طالب</option>
                    <option value="teacher">معلم</option>
                    <option value="admin">مدير</option>
                </select>
            </div>
            
            <div id="classField">
                <div class="form-group">
                    <label>🎓 الصف الدراسي (للطلاب)</label>
                    <select id="userClassId">
                        <option value="">-- اختر الصف --</option>
                    </select>
                </div>
            </div>
            
            <div class="form-group">
                <label>🔒 كلمة السر *</label>
                <input type="password" id="userPassword" placeholder="أدخل كلمة السر (6 أحرف على الأقل)">
            </div>
            
            <div style="display: flex; gap: 12px; margin-top: 20px;">
                <button class="btn btn-primary" onclick="saveUser()">💾 حفظ</button>
                <button class="btn btn-outline" onclick="closeModal('userModal')">إلغاء</button>
            </div>
        </div>
    </div>

    <!-- مودال إعادة تعيين كلمة المرور -->
    <div id="resetPasswordModal" class="modal">
        <div class="modal-content">
            <h3>🔑 إعادة تعيين كلمة المرور</h3>
            <input type="password" id="newPassword" placeholder="كلمة المرور الجديدة">
            <input type="password" id="confirmNewPassword" placeholder="تأكيد كلمة المرور">
            <div style="display: flex; gap: 12px; margin-top: 20px;">
                <button class="btn btn-primary" onclick="confirmResetPassword()">تأكيد</button>
                <button class="btn btn-outline" onclick="closeModal('resetPasswordModal')">إلغاء</button>
            </div>
        </div>
    </div>

    <script src="js/supabase-config.js"></script>
    <script>
        // التحقق من صلاحية الدخول
        (function() {
            const user = getUser();
            if (!user || user.role !== 'admin') {
                window.location.href = 'index.html';
                return;
            }
            document.getElementById('adminName').innerHTML = user.name;
        })();
        
        let currentUserId = null;
        let currentResetUserId = null;
        
        // ==================== تحميل المستخدمين ====================
        async function loadUsers() {
            const search = document.getElementById('searchInput').value;
            const role = document.getElementById('roleFilter').value;
            const status = document.getElementById('statusFilter').value;
            
            const users = await fetchUsers({ search, role, status });
            const tbody = document.getElementById('usersTableBody');
            
            if (!users || users.length === 0) {
                tbody.innerHTML = '<tr><td colspan="8" style="text-align:center;">لا يوجد مستخدمون</td></tr>';
                return;
            }
            
            tbody.innerHTML = '';
            for (let i = 0; i < users.length; i++) {
                const u = users[i];
                let roleClass = 'badge-primary';
                let roleText = '';
                if (u.role === 'admin') { roleClass = 'badge-primary'; roleText = 'مدير'; }
                else if (u.role === 'teacher') { roleClass = 'badge-info'; roleText = 'معلم'; }
                else { roleClass = 'badge-success'; roleText = 'طالب'; }
                
                let statusClass = 'badge-warning';
                let statusText = '';
                if (u.status === 'active') { statusClass = 'badge-success'; statusText = 'نشط'; }
                else if (u.status === 'pending') { statusClass = 'badge-warning'; statusText = 'قيد الانتظار'; }
                else { statusClass = 'badge-danger'; statusText = 'موقوف'; }
                
                const row = document.createElement('tr');
                row.innerHTML = `
                    <td>${i+1}</td>
                    <td><strong>${u.name || ''}</strong></td>
                    <td>${u.username || '-'}</td>
                    <td>${u.phone || '-'}</td>
                    <td>${u.class_id || '-'}</td>
                    <td><span class="badge ${roleClass}">${roleText}</span></td>
                    <td><span class="badge ${statusClass}">${statusText}</span></td>
                    <td>
                        <div class="action-buttons">
                            ${u.status === 'pending' ? `<button class="btn btn-success btn-sm" onclick="approveUser(${u.id})">✅ تفعيل</button>` : ''}
                            <button class="btn btn-info btn-sm" onclick="goToUserDashboard(${u.id}, '${u.role}', '${u.name.replace(/'/g, "\\'")}')">🚪 دخول للوحة</button>
                            <button class="btn btn-warning btn-sm" onclick="openResetPassword(${u.id})">🔑 تغيير كلمة السر</button>
                            <button class="btn btn-danger btn-sm" onclick="deleteUserConfirm(${u.id})">🗑️ حذف</button>
                        </div>
                     </td>
                `;
                tbody.appendChild(row);
            }
        }
        
        // ==================== الدخول للوحة تحكم المستخدم ====================
        window.goToUserDashboard = async function(userId, role, userName) {
            const users = await fetchUsers({});
            const targetUser = users.find(u => u.id == userId);
            if (!targetUser) return;
            
            // حفظ بيانات الدخول المؤقتة مع حفظ بيانات الأدمن الأصلي
            const adminUser = getUser();
            localStorage.setItem('originalUser', JSON.stringify(adminUser));
            localStorage.setItem('user', JSON.stringify({
                id: targetUser.id,
                name: targetUser.name,
                role: targetUser.role,
                username: targetUser.username,
                phone: targetUser.phone,
                class_id: targetUser.class_id,
                isImpersonating: true
            }));
            
            showToast(`جاري الدخول كـ ${userName}...`, 'success');
            setTimeout(() => {
                if (targetUser.role === 'admin') window.location.href = 'admin-dashboard.html';
                else if (targetUser.role === 'teacher') window.location.href = 'teacher-dashboard.html';
                else window.location.href = 'student-dashboard.html';
            }, 1000);
        };
        
        // ==================== تحميل الصفوف للطلاب ====================
        async function loadClassesForSelect() {
            const classes = await fetchClasses();
            const select = document.getElementById('userClassId');
            select.innerHTML = '<option value="">-- اختر الصف --</option>';
            for (let i = 0; i < classes.length; i++) {
                const option = document.createElement('option');
                option.value = classes[i].id;
                option.textContent = classes[i].name;
                select.appendChild(option);
            }
        }
        
        // ==================== فتح مودال إضافة مستخدم ====================
        async function openAddUserModal() {
            currentUserId = null;
            document.getElementById('modalTitle').innerHTML = '➕ إضافة مستخدم جديد';
            document.getElementById('userName').value = '';
            document.getElementById('userPhone').value = '';
            document.getElementById('userEmail').value = '';
            document.getElementById('userUsername').value = '';
            document.getElementById('userRole').value = 'student';
            document.getElementById('userClassId').value = '';
            document.getElementById('userPassword').value = '';
            
            const role = document.getElementById('userRole').value;
            document.getElementById('usernameField').style.display = (role === 'teacher' || role === 'admin') ? 'block' : 'none';
            document.getElementById('classField').style.display = role === 'student' ? 'block' : 'none';
            
            await loadClassesForSelect();
            document.getElementById('userModal').style.display = 'flex';
            
            document.getElementById('userRole').onchange = function() {
                const selectedRole = this.value;
                document.getElementById('usernameField').style.display = (selectedRole === 'teacher' || selectedRole === 'admin') ? 'block' : 'none';
                document.getElementById('classField').style.display = selectedRole === 'student' ? 'block' : 'none';
            };
        }
        
        // ==================== حفظ المستخدم ====================
        async function saveUser() {
            const name = document.getElementById('userName').value;
            const phone = document.getElementById('userPhone').value;
            const email = document.getElementById('userEmail').value;
            const role = document.getElementById('userRole').value;
            const classId = document.getElementById('userClassId').value;
            const username = document.getElementById('userUsername').value;
            const password = document.getElementById('userPassword').value;
            
            if (!name || !phone || !password) {
                showToast('الاسم ورقم الهاتف وكلمة السر مطلوبة', 'error');
                return;
            }
            
            if (password.length < 6) {
                showToast('كلمة السر يجب أن تكون 6 أحرف على الأقل', 'error');
                return;
            }
            
            if ((role === 'teacher' || role === 'admin') && !username) {
                showToast('اسم المستخدم مطلوب للمعلمين والأدمن', 'error');
                return;
            }
            
            const hashedPassword = await hashPassword(password);
            
            const insertData = {
                name: name,
                phone: phone,
                email: email || null,
                password_hash: hashedPassword,
                role: role,
                class_id: classId || null,
                status: 'active'
            };
            
            if (role === 'teacher' || role === 'admin') {
                insertData.username = username;
            }
            
            const { error } = await sb
                .from('users')
                .insert(insertData)
                .select()
                .single();
            
            if (error) {
                showToast('حدث خطأ: ' + error.message, 'error');
                return;
            }
            
            showToast('تم إضافة المستخدم', 'success');
            closeModal('userModal');
            loadUsers();
        }
        
        // ==================== تفعيل المستخدم ====================
        async function approveUser(id) {
            await updateUserStatus(id, 'active');
            loadUsers();
        }
        
        // ==================== إعادة تعيين كلمة المرور ====================
        function openResetPassword(id) {
            currentResetUserId = id;
            document.getElementById('newPassword').value = '';
            document.getElementById('confirmNewPassword').value = '';
            document.getElementById('resetPasswordModal').style.display = 'flex';
        }
        
        async function confirmResetPassword() {
            const newPass = document.getElementById('newPassword').value;
            const confirmPass = document.getElementById('confirmNewPassword').value;
            
            if (!newPass || newPass.length < 6) {
                showToast('كلمة السر يجب أن تكون 6 أحرف على الأقل', 'error');
                return;
            }
            if (newPass !== confirmPass) {
                showToast('كلمة السر غير متطابقة', 'error');
                return;
            }
            
            await resetUserPassword(currentResetUserId, newPass);
            closeModal('resetPasswordModal');
        }
        
        // ==================== حذف المستخدم ====================
        function deleteUserConfirm(id) {
            showConfirm('هل أنت متأكد من حذف هذا المستخدم؟', async () => {
                await deleteUser(id);
                loadUsers();
            });
        }
        
        // ==================== إغلاق المودال ====================
        function closeModal(id) {
            document.getElementById(id).style.display = 'none';
        }
        
        // ==================== أحداث البحث والفلاتر ====================
        document.getElementById('searchInput').addEventListener('input', () => loadUsers());
        document.getElementById('roleFilter').addEventListener('change', () => loadUsers());
        document.getElementById('statusFilter').addEventListener('change', () => loadUsers());
        
        // ==================== تحميل أولي ====================
        loadUsers();
    </script>
</body>
</html>
