<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إدارة المستخدمين - منصة الاختبارات</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="container">
        <div class="admin-bar">
            <div><span style="font-size:20px;">👑</span> إدارة المستخدمين - <span id="adminName"></span></div>
            <div>
                <button class="btn btn-outline btn-sm" onclick="window.location.href='admin-dashboard.html'">🏠 الرئيسية</button>
                <button class="btn btn-danger btn-sm" onclick="logout()">🚪 خروج</button>
            </div>
        </div>

        <div class="card header">
            <h1>👥 إدارة المستخدمين</h1>
            <p>إضافة وتعديل وحذف المستخدمين - إدارة الصلاحيات والتعيينات</p>
        </div>

        <div class="card">
            <div class="filter-bar">
                <input type="text" id="searchInput" class="search-input" placeholder="🔍 بحث بالاسم أو الهاتف أو البريد...">
                <select id="roleFilter" class="filter-select">
                    <option value="all">كل الأدوار</option>
                    <option value="admin">مدير</option>
                    <option value="teacher">معلم</option>
                    <option value="student">طالب</option>
                </select>
                <select id="statusFilter" class="filter-select">
                    <option value="all">كل الحالات</option>
                    <option value="active">نشط</option>
                    <option value="pending">قيد الانتظار</option>
                    <option value="suspended">موقوف</option>
                </select>
                <button class="btn btn-primary" onclick="openAddUserModal()">➕ إضافة مستخدم</button>
            </div>

            <div class="table-wrapper">
                <table>
                    <thead>
                        <tr><th>#</th><th>الاسم</th><th>رقم الهاتف</th><th>البريد</th><th>الدور</th><th>الحالة</th><th>التسجيل</th><th>الإجراءات</th></tr>
                    </thead>
                    <tbody id="usersTableBody"></tbody>
                </table>
            </div>
        </div>
    </div>

    <!-- مودال إضافة مستخدم -->
    <div id="userModal" class="modal">
        <div class="modal-content">
            <h3 id="modalTitle">➕ إضافة مستخدم جديد</h3>
            <input type="text" id="userName" placeholder="الاسم الكامل">
            <input type="tel" id="userPhone" placeholder="رقم الهاتف">
            <input type="email" id="userEmail" placeholder="البريد الإلكتروني (اختياري)">
            <select id="userRole">
                <option value="student">طالب</option>
                <option value="teacher">معلم</option>
                <option value="admin">مدير</option>
            </select>
            <select id="userClassId">
                <option value="">-- اختر الصف (للطلاب) --</option>
            </select>
            <input type="password" id="userPassword" placeholder="كلمة السر">
            
            <!-- قسم تعيينات المعلم (يظهر فقط عند اختيار معلم) -->
            <div id="teacherAssignmentsSection" style="display:none; margin-top: 15px;">
                <h4>📚 تعيين المواد والصفوف للمعلم</h4>
                <div id="assignmentsList"></div>
                <button type="button" class="btn btn-outline btn-sm" onclick="addAssignmentRow()">+ إضافة تعيين</button>
            </div>
            
            <div style="display: flex; gap: 12px; margin-top: 20px;">
                <button class="btn btn-primary" onclick="saveUser()">💾 حفظ</button>
                <button class="btn btn-outline" onclick="closeModal('userModal')">إلغاء</button>
            </div>
        </div>
    </div>

    <!-- مودال تعيينات المعلم (للتعديل) -->
    <div id="assignmentsModal" class="modal">
        <div class="modal-content">
            <h3>📚 تعيين المواد والصفوف للمعلم</h3>
            <div id="editAssignmentsList"></div>
            <button type="button" class="btn btn-outline btn-sm" onclick="addEditAssignmentRow()">+ إضافة تعيين</button>
            <div style="display: flex; gap: 12px; margin-top: 20px;">
                <button class="btn btn-primary" onclick="saveAssignments()">💾 حفظ التعيينات</button>
                <button class="btn btn-outline" onclick="closeModal('assignmentsModal')">إلغاء</button>
            </div>
        </div>
    </div>

    <!-- مودال إعادة تعيين كلمة المرور -->
    <div id="resetPasswordModal" class="modal">
        <div class="modal-content">
            <h3>🔑 إعادة تعيين كلمة المرور</h3>
            <input type="password" id="newPassword" placeholder="كلمة المرور الجديدة">
            <input type="password" id="confirmNewPassword" placeholder="تأكيد كلمة المرور">
            <div style="display: flex; gap: 12px; margin-top: 20px;">
                <button class="btn btn-primary" onclick="confirmResetPassword()">تأكيد</button>
                <button class="btn btn-outline" onclick="closeModal('resetPasswordModal')">إلغاء</button>
            </div>
        </div>
    </div>

    <script src="js/supabase-config.js"></script>
    <script>
        if (!checkAuth(['admin'])) return;
        
        let currentUserId = null;
        let currentResetUserId = null;
        let currentTeacherId = null;
        let tempAssignments = [];
        let editAssignments = [];
        
        document.getElementById('adminName').innerHTML = getUser().name;
        
        async function loadUsers() {
            const search = document.getElementById('searchInput').value;
            const role = document.getElementById('roleFilter').value;
            const status = document.getElementById('statusFilter').value;
            
            const users = await fetchUsers({ search, role, status });
            const tbody = document.getElementById('usersTableBody');
            
            if (users.length === 0) {
                tbody.innerHTML = '<tr><td colspan="8" style="text-align:center;">لا يوجد مستخدمون</td></tr>';
                return;
            }
            
            tbody.innerHTML = users.map((u, i) => `
                <tr>
                    <td>${i+1}</td>
                    <td><strong>${u.name}</strong></td>
                    <td>${u.phone || '-'}</td>
                    <td>${u.email || '-'}</td>
                    <td><span class="badge ${u.role === 'admin' ? 'badge-primary' : u.role === 'teacher' ? 'badge-info' : 'badge-success'}">${u.role === 'admin' ? 'مدير' : u.role === 'teacher' ? 'معلم' : 'طالب'}</span></td>
                    <td><span class="badge ${u.status === 'active' ? 'badge-success' : u.status === 'pending' ? 'badge-warning' : 'badge-danger'}">${u.status === 'active' ? 'نشط' : u.status === 'pending' ? 'قيد الانتظار' : 'موقوف'}</span></td>
                    <td>${formatDate(u.created_at)}</td>
                    <td>
                        <div class="action-buttons">
                            ${u.status === 'pending' ? `<button class="btn btn-success btn-sm" onclick="approveUser(${u.id})">✅ تفعيل</button>` : ''}
                            ${u.role === 'teacher' ? `<button class="btn btn-info btn-sm" onclick="manageAssignments(${u.id})">📚 تعيينات</button>` : ''}
                            <button class="btn btn-warning btn-sm" onclick="openResetPassword(${u.id})">🔑 تغيير كلمة السر</button>
                            <button class="btn btn-danger btn-sm" onclick="deleteUserConfirm(${u.id})">🗑️ حذف</button>
                        </div>
                    </td>
                </tr>
            `).join('');
        }
        
        async function loadClassesAndSubjects() {
            const [classes, subjects] = await Promise.all([
                fetchClasses(), fetchSubjects()
            ]);
            return { classes, subjects };
        }
        
        function addAssignmentRow() {
            const container = document.getElementById('assignmentsList');
            const rowId = Date.now();
            container.innerHTML += `
                <div id="assign-row-${rowId}" style="display: flex; gap: 10px; margin-bottom: 10px;">
                    <select id="class-${rowId}" class="class-select" style="flex:1;">
                        <option value="">-- اختر الصف --</option>
                    </select>
                    <select id="subject-${rowId}" class="subject-select" style="flex:1;">
                        <option value="">-- اختر المادة --</option>
                    </select>
                    <button type="button" class="btn btn-danger btn-sm" onclick="removeAssignmentRow(${rowId})">🗑️</button>
                </div>
            `;
            loadSelectOptions(rowId);
        }
        
        function addEditAssignmentRow() {
            const container = document.getElementById('editAssignmentsList');
            const rowId = Date.now();
            container.innerHTML += `
                <div id="edit-assign-row-${rowId}" style="display: flex; gap: 10px; margin-bottom: 10px;">
                    <select id="edit-class-${rowId}" class="class-select" style="flex:1;">
                        <option value="">-- اختر الصف --</option>
                    </select>
                    <select id="edit-subject-${rowId}" class="subject-select" style="flex:1;">
                        <option value="">-- اختر المادة --</option>
                    </select>
                    <button type="button" class="btn btn-danger btn-sm" onclick="removeEditAssignmentRow(${rowId})">🗑️</button>
                </div>
            `;
            loadSelectOptions(rowId, 'edit');
        }
        
        async function loadSelectOptions(rowId, prefix = '') {
            const { classes, subjects } = await loadClassesAndSubjects();
            const classSelect = document.getElementById(`${prefix}class-${rowId}`);
            const subjectSelect = document.getElementById(`${prefix}subject-${rowId}`);
            
            if (classSelect) {
                classSelect.innerHTML = '<option value="">-- اختر الصف --</option>';
                classes.forEach(c => classSelect.innerHTML += `<option value="${c.id}">${c.name}</option>`);
            }
            if (subjectSelect) {
                subjectSelect.innerHTML = '<option value="">-- اختر المادة --</option>';
                subjects.forEach(s => subjectSelect.innerHTML += `<option value="${s.id}">${s.name}</option>`);
            }
        }
        
        function removeAssignmentRow(rowId) {
            document.getElementById(`assign-row-${rowId}`)?.remove();
        }
        
        function removeEditAssignmentRow(rowId) {
            document.getElementById(`edit-assign-row-${rowId}`)?.remove();
        }
        
        async function loadClassesForSelect() {
            const classes = await fetchClasses();
            const select = document.getElementById('userClassId');
            select.innerHTML = '<option value="">-- اختر الصف --</option>';
            classes.forEach(c => select.innerHTML += `<option value="${c.id}">${c.name}</option>`);
        }
        
        function openAddUserModal() {
            currentUserId = null;
            document.getElementById('modalTitle').innerHTML = '➕ إضافة مستخدم جديد';
            document.getElementById('userName').value = '';
            document.getElementById('userPhone').value = '';
            document.getElementById('userEmail').value = '';
            document.getElementById('userRole').value = 'student';
            document.getElementById('userClassId').value = '';
            document.getElementById('userPassword').value = '';
            document.getElementById('teacherAssignmentsSection').style.display = 'none';
            document.getElementById('assignmentsList').innerHTML = '';
            tempAssignments = [];
            loadClassesForSelect();
            document.getElementById('userModal').style.display = 'flex';
            
            document.getElementById('userRole').onchange = function() {
                const section = document.getElementById('teacherAssignmentsSection');
                section.style.display = this.value === 'teacher' ? 'block' : 'none';
                if (this.value === 'teacher') {
                    addAssignmentRow();
                }
            };
        }
        
        async function saveUser() {
            const name = document.getElementById('userName').value;
            const phone = document.getElementById('userPhone').value;
            const email = document.getElementById('userEmail').value;
            const role = document.getElementById('userRole').value;
            const classId = document.getElementById('userClassId').value;
            const password = document.getElementById('userPassword').value;
            
            if (!name || !phone || !password) {
                showToast('الاسم ورقم الهاتف وكلمة السر مطلوبة', 'error');
                return;
            }
            
            // جمع التعيينات للمعلم
            let assignments = [];
            if (role === 'teacher') {
                const rows = document.querySelectorAll('#assignmentsList [id^="assign-row-"]');
                for (const row of rows) {
                    const classSelect = row.querySelector('.class-select');
                    const subjectSelect = row.querySelector('.subject-select');
                    if (classSelect?.value && subjectSelect?.value) {
                        assignments.push({
                            class_id: parseInt(classSelect.value),
                            subject_id: parseInt(subjectSelect.value)
                        });
                    }
                }
            }
            
            const userData = {
                name, phone, email: email || null, password,
                role, class_id: classId || null, assignments
            };
            
            const result = await createUser(userData);
            
            if (result) {
                showToast('تم إضافة المستخدم', 'success');
                closeModal('userModal');
                loadUsers();
            } else {
                showToast('حدث خطأ', 'error');
            }
        }
        
        async function manageAssignments(teacherId) {
            currentTeacherId = teacherId;
            const assignments = await fetchTeacherAssignments(teacherId);
            editAssignments = assignments.map(a => ({ class_id: a.class_id, subject_id: a.subject_id }));
            
            const container = document.getElementById('editAssignmentsList');
            container.innerHTML = '';
            
            for (const a of editAssignments) {
                const rowId = Date.now() + Math.random();
                container.innerHTML += `
                    <div id="edit-assign-row-${rowId}" style="display: flex; gap: 10px; margin-bottom: 10px;">
                        <select id="edit-class-${rowId}" class="class-select" style="flex:1;">
                            <option value="">-- اختر الصف --</option>
                        </select>
                        <select id="edit-subject-${rowId}" class="subject-select" style="flex:1;">
                            <option value="">-- اختر المادة --</option>
                        </select>
                        <button type="button" class="btn btn-danger btn-sm" onclick="removeEditAssignmentRow(${rowId})">🗑️</button>
                    </div>
                `;
                await loadSelectOptions(rowId, 'edit');
                document.getElementById(`edit-class-${rowId}`).value = a.class_id;
                document.getElementById(`edit-subject-${rowId}`).value = a.subject_id;
            }
            
            document.getElementById('assignmentsModal').style.display = 'flex';
        }
        
        async function saveAssignments() {
            // حذف التعيينات القديمة
            const oldAssignments = await fetchTeacherAssignments(currentTeacherId);
            for (const a of oldAssignments) {
                await removeTeacherAssignment(a.id);
            }
            
            // إضافة التعيينات الجديدة
            const rows = document.querySelectorAll('#editAssignmentsList [id^="edit-assign-row-"]');
            for (const row of rows) {
                const classSelect = row.querySelector('.class-select');
                const subjectSelect = row.querySelector('.subject-select');
                if (classSelect?.value && subjectSelect?.value) {
                    await addTeacherAssignment(currentTeacherId, parseInt(classSelect.value), parseInt(subjectSelect.value));
                }
            }
            
            showToast('تم حفظ التعيينات', 'success');
            closeModal('assignmentsModal');
            loadUsers();
        }
        
        async function approveUser(id) {
            await updateUserStatus(id, 'active');
            loadUsers();
        }
        
        function openResetPassword(id) {
            currentResetUserId = id;
            document.getElementById('newPassword').value = '';
            document.getElementById('confirmNewPassword').value = '';
            document.getElementById('resetPasswordModal').style.display = 'flex';
        }
        
        async function confirmResetPassword() {
            const newPass = document.getElementById('newPassword').value;
            const confirmPass = document.getElementById('confirmNewPassword').value;
            
            if (!newPass || newPass.length < 6) {
                showToast('كلمة السر يجب أن تكون 6 أحرف على الأقل', 'error');
                return;
            }
            if (newPass !== confirmPass) {
                showToast('كلمة السر غير متطابقة', 'error');
                return;
            }
            
            await resetUserPassword(currentResetUserId, newPass);
            closeModal('resetPasswordModal');
        }
        
        function deleteUserConfirm(id) {
            showConfirm('هل أنت متأكد من حذف هذا المستخدم؟', async () => {
                await deleteUser(id);
                loadUsers();
            });
        }
        
        document.getElementById('searchInput').addEventListener('input', () => loadUsers());
        document.getElementById('roleFilter').addEventListener('change', () => loadUsers());
        document.getElementById('statusFilter').addEventListener('change', () => loadUsers());
        
        loadUsers();
    </script>
</body>
</html>
