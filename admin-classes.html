<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إدارة الصفوف والمواد - منصة الاختبارات</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Cairo', sans-serif; background: #f0f2f5; padding: 20px; }
        .container { max-width: 1400px; margin: 0 auto; }
        .admin-bar {
            background: linear-gradient(135deg, #1e293b, #0f172a);
            color: white;
            padding: 12px 24px;
            border-radius: 20px;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
        }
        .card {
            background: white;
            border-radius: 28px;
            padding: 25px;
            margin-bottom: 20px;
            box-shadow: 0 10px 25px -5px rgba(0,0,0,0.05);
            border: 1px solid #e2e8f0;
        }
        .header h1 {
            background: linear-gradient(135deg, #6366f1, #8b5cf6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-size: 28px;
        }
        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            border-bottom: 2px solid #e2e8f0;
            padding-bottom: 5px;
        }
        .tab-btn {
            background: transparent;
            border: none;
            padding: 10px 28px;
            border-radius: 30px;
            cursor: pointer;
            font-weight: 600;
            color: #64748b;
            transition: all 0.2s;
        }
        .tab-btn.active {
            background: linear-gradient(135deg, #6366f1, #8b5cf6);
            color: white;
        }
        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 14px;
            cursor: pointer;
            font-weight: 600;
            transition: 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            font-family: inherit;
        }
        .btn-primary { background: linear-gradient(135deg, #6366f1, #4f46e5); color: white; }
        .btn-success { background: #10b981; color: white; }
        .btn-danger { background: #ef4444; color: white; }
        .btn-warning { background: #f59e0b; color: white; }
        .btn-outline { background: transparent; border: 2px solid #6366f1; color: #6366f1; }
        .btn-sm { padding: 6px 14px; font-size: 12px; }
        .filter-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
            margin-bottom: 20px;
        }
        .search-input {
            padding: 10px 18px;
            border: 1px solid #e2e8f0;
            border-radius: 50px;
            width: 260px;
            font-family: inherit;
        }
        .table-wrapper {
            overflow-x: auto;
            border-radius: 20px;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            min-width: 500px;
        }
        th, td {
            padding: 14px 16px;
            text-align: right;
            border-bottom: 1px solid #e2e8f0;
            color: #1e293b;
        }
        th {
            background: #f8fafc;
            font-weight: 700;
        }
        .action-buttons { display: flex; gap: 8px; flex-wrap: wrap; }
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(5px);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
        .modal-content {
            background: white;
            border-radius: 32px;
            padding: 32px;
            width: 500px;
            max-width: 90%;
            max-height: 85vh;
            overflow-y: auto;
        }
        .modal-content input, .modal-content select, .modal-content textarea {
            width: 100%;
            padding: 12px 16px;
            margin: 10px 0;
            border: 1px solid #e2e8f0;
            border-radius: 16px;
            font-family: inherit;
        }
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; margin-bottom: 5px; font-weight: 600; color: #334155; }
        .toast-notification {
            position: fixed;
            bottom: 30px;
            left: 30px;
            background: white;
            border-radius: 16px;
            padding: 16px 20px;
            display: flex;
            align-items: center;
            gap: 12px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            transform: translateX(-500px);
            transition: transform 0.3s ease;
            z-index: 10000;
            direction: rtl;
            border-right: 4px solid;
        }
        .toast-notification.show { transform: translateX(0); }
        .toast-success { border-right-color: #10b981; }
        .toast-error { border-right-color: #ef4444; }
        .toast-message { flex: 1; font-size: 14px; color: #333; }
        .toast-progress {
            position: absolute;
            bottom: 0;
            left: 0;
            height: 3px;
            width: 100%;
            animation: progress 3s linear forwards;
        }
        .toast-success .toast-progress { background: #10b981; }
        @keyframes progress { from { width: 100%; } to { width: 0%; } }
        .confirm-modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(5px);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 10001;
        }
        .confirm-content {
            background: white;
            border-radius: 28px;
            padding: 32px;
            text-align: center;
            width: 320px;
        }
        .confirm-buttons { display: flex; gap: 12px; margin-top: 20px; }
        .confirm-yes { background: #10b981; color: white; padding: 10px; border: none; border-radius: 12px; cursor: pointer; flex: 1; }
        .confirm-no { background: #e2e8f0; color: #333; padding: 10px; border: none; border-radius: 12px; cursor: pointer; flex: 1; }
        .empty-state { text-align: center; padding: 40px; color: #64748b; }
        @media (max-width: 768px) { .filter-bar { flex-direction: column; align-items: stretch; } .search-input { width: 100%; } }
    </style>
</head>
<body>
    <div class="container">
        <div class="admin-bar">
            <div><span style="font-size:20px;">👑</span> إدارة الصفوف والمواد - <span id="adminName"></span></div>
            <div>
                <button class="btn btn-outline btn-sm" onclick="window.location.href='admin-dashboard.html'">🏠 الرئيسية</button>
                <button class="btn btn-danger btn-sm" onclick="logout()">🚪 خروج</button>
            </div>
        </div>

        <div class="card header">
            <h1>📚 إدارة الصفوف والمواد الدراسية</h1>
            <p>إضافة وتعديل وحذف الصفوف والمواد</p>
        </div>

        <div class="tabs">
            <button class="tab-btn active" onclick="showTab('classes')">🏫 الصفوف الدراسية</button>
            <button class="tab-btn" onclick="showTab('subjects')">📖 المواد الدراسية</button>
        </div>

        <!-- تبويب الصفوف -->
        <div id="classesTab">
            <div class="card">
                <div class="filter-bar">
                    <input type="text" id="classSearch" class="search-input" placeholder="🔍 بحث باسم الصف...">
                    <button class="btn btn-primary" onclick="openClassModal()">➕ إضافة صف</button>
                </div>
                <div class="table-wrapper">
                    <table>
                        <thead>
                            <tr><th>#</th><th>اسم الصف</th><th>المرحلة</th><th>تاريخ الإضافة</th><th>الإجراءات</th></tr>
                        </thead>
                        <tbody id="classesTableBody"></tbody>
                    </table>
                </div>
            </div>
        </div>

        <!-- تبويب المواد -->
        <div id="subjectsTab" style="display:none;">
            <div class="card">
                <div class="filter-bar">
                    <input type="text" id="subjectSearch" class="search-input" placeholder="🔍 بحث باسم المادة...">
                    <button class="btn btn-primary" onclick="openSubjectModal()">➕ إضافة مادة</button>
                </div>
                <div class="table-wrapper">
                    <table>
                        <thead>
                            <tr><th>#</th><th>اسم المادة</th><th>الوصف</th><th>تاريخ الإضافة</th><th>الإجراءات</th></tr>
                        </thead>
                        <tbody id="subjectsTableBody"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <!-- مودال إضافة/تعديل صف -->
    <div id="classModal" class="modal">
        <div class="modal-content">
            <h3 id="classModalTitle">➕ إضافة صف جديد</h3>
            <input type="text" id="className" placeholder="اسم الصف (مثال: الصف الأول الثانوي - أ)">
            <input type="text" id="classGradeLevel" placeholder="المرحلة الدراسية (مثال: الأول الثانوي)">
            <textarea id="classDesc" rows="3" placeholder="وصف الصف (اختياري)"></textarea>
            <div style="display: flex; gap: 12px; margin-top: 20px;">
                <button class="btn btn-primary" onclick="saveClass()">💾 حفظ</button>
                <button class="btn btn-outline" onclick="closeClassModal()">إلغاء</button>
            </div>
        </div>
    </div>

    <!-- مودال إضافة/تعديل مادة -->
    <div id="subjectModal" class="modal">
        <div class="modal-content">
            <h3 id="subjectModalTitle">➕ إضافة مادة جديدة</h3>
            <input type="text" id="subjectName" placeholder="اسم المادة (مثال: الرياضيات)">
            <textarea id="subjectDesc" rows="3" placeholder="وصف المادة (اختياري)"></textarea>
            <div style="display: flex; gap: 12px; margin-top: 20px;">
                <button class="btn btn-primary" onclick="saveSubject()">💾 حفظ</button>
                <button class="btn btn-outline" onclick="closeSubjectModal()">إلغاء</button>
            </div>
        </div>
    </div>

    <script src="js/supabase-config.js"></script>
    <script>
        // التحقق من صلاحية الدخول
        (function() {
            const user = getUser();
            if (!user || user.role !== 'admin') {
                window.location.href = 'index.html';
                return;
            }
            document.getElementById('adminName').innerHTML = user.name;
        })();
        
        let currentClassId = null;
        let currentSubjectId = null;
        
        // ==================== التبويبات ====================
        window.showTab = function(tab) {
            const classesTab = document.getElementById('classesTab');
            const subjectsTab = document.getElementById('subjectsTab');
            if (tab === 'classes') {
                classesTab.style.display = 'block';
                subjectsTab.style.display = 'none';
                loadClasses();
            } else {
                classesTab.style.display = 'none';
                subjectsTab.style.display = 'block';
                loadSubjects();
            }
            
            const btns = document.querySelectorAll('.tab-btn');
            btns.forEach(btn => btn.classList.remove('active'));
            if (event && event.target) event.target.classList.add('active');
        };
        
        // ==================== الصفوف ====================
        async function loadClasses() {
            const search = document.getElementById('classSearch').value;
            let classes = await fetchClasses();
            
            if (search) {
                classes = classes.filter(c => c.name.toLowerCase().includes(search.toLowerCase()));
            }
            
            const tbody = document.getElementById('classesTableBody');
            if (!classes || classes.length === 0) {
                tbody.innerHTML = '<tr><td colspan="5" class="empty-state">لا توجد صفوف</td></tr>';
                return;
            }
            
            tbody.innerHTML = '';
            for (let i = 0; i < classes.length; i++) {
                const c = classes[i];
                const row = document.createElement('tr');
                row.innerHTML = `
                    <td>${i+1}</td>
                    <td><strong>${c.name}</strong></td>
                    <td>${c.grade_level || '-'}</td>
                    <td>${formatDate(c.created_at)}</td>
                    <td>
                        <div class="action-buttons">
                            <button class="btn btn-warning btn-sm" onclick="editClass(${c.id})">✏️ تعديل</button>
                            <button class="btn btn-danger btn-sm" onclick="deleteClassConfirm(${c.id})">🗑️ حذف</button>
                        </div>
                    </td>
                `;
                tbody.appendChild(row);
            }
        }
        
        window.openClassModal = function() {
            currentClassId = null;
            document.getElementById('classModalTitle').innerHTML = '➕ إضافة صف جديد';
            document.getElementById('className').value = '';
            document.getElementById('classGradeLevel').value = '';
            document.getElementById('classDesc').value = '';
            document.getElementById('classModal').style.display = 'flex';
        };
        
        window.editClass = async function(id) {
            const classes = await fetchClasses();
            const c = classes.find(c => c.id === id);
            if (!c) return;
            
            currentClassId = id;
            document.getElementById('classModalTitle').innerHTML = '✏️ تعديل صف';
            document.getElementById('className').value = c.name;
            document.getElementById('classGradeLevel').value = c.grade_level || '';
            document.getElementById('classDesc').value = c.description || '';
            document.getElementById('classModal').style.display = 'flex';
        };
        
        window.saveClass = async function() {
            const name = document.getElementById('className').value;
            const gradeLevel = document.getElementById('classGradeLevel').value;
            const description = document.getElementById('classDesc').value;
            
            if (!name) {
                showToast('اسم الصف مطلوب', 'error');
                return;
            }
            
            const classData = {
                name: name,
                grade_level: gradeLevel || null,
                description: description || null
            };
            
            let result;
            if (currentClassId) {
                result = await updateClass(currentClassId, classData);
            } else {
                result = await createClass(classData);
            }
            
            if (result) {
                closeClassModal();
                loadClasses();
                showToast('تم ' + (currentClassId ? 'تعديل' : 'إضافة') + ' الصف', 'success');
            } else {
                showToast('حدث خطأ', 'error');
            }
        };
        
        window.deleteClassConfirm = function(id) {
            showConfirm('هل أنت متأكد من حذف هذا الصف؟', async function() {
                await deleteClass(id);
                loadClasses();
                showToast('تم حذف الصف', 'success');
            });
        };
        
        // ==================== المواد ====================
        async function loadSubjects() {
            const search = document.getElementById('subjectSearch').value;
            let subjects = await fetchSubjects();
            
            if (search) {
                subjects = subjects.filter(s => s.name.toLowerCase().includes(search.toLowerCase()));
            }
            
            const tbody = document.getElementById('subjectsTableBody');
            if (!subjects || subjects.length === 0) {
                tbody.innerHTML = '<tr><td colspan="5" class="empty-state">لا توجد مواد</td></tr>';
                return;
            }
            
            tbody.innerHTML = '';
            for (let i = 0; i < subjects.length; i++) {
                const s = subjects[i];
                const row = document.createElement('tr');
                row.innerHTML = `
                    <td>${i+1}</td>
                    <td><strong>${s.name}</strong></td>
                    <td>${s.description || '-'}</td>
                    <td>${formatDate(s.created_at)}</td>
                    <td>
                        <div class="action-buttons">
                            <button class="btn btn-warning btn-sm" onclick="editSubject(${s.id})">✏️ تعديل</button>
                            <button class="btn btn-danger btn-sm" onclick="deleteSubjectConfirm(${s.id})">🗑️ حذف</button>
                        </div>
                    </td>
                `;
                tbody.appendChild(row);
            }
        }
        
        window.openSubjectModal = function() {
            currentSubjectId = null;
            document.getElementById('subjectModalTitle').innerHTML = '➕ إضافة مادة جديدة';
            document.getElementById('subjectName').value = '';
            document.getElementById('subjectDesc').value = '';
            document.getElementById('subjectModal').style.display = 'flex';
        };
        
        window.editSubject = async function(id) {
            const subjects = await fetchSubjects();
            const s = subjects.find(s => s.id === id);
            if (!s) return;
            
            currentSubjectId = id;
            document.getElementById('subjectModalTitle').innerHTML = '✏️ تعديل مادة';
            document.getElementById('subjectName').value = s.name;
            document.getElementById('subjectDesc').value = s.description || '';
            document.getElementById('subjectModal').style.display = 'flex';
        };
        
        window.saveSubject = async function() {
            const name = document.getElementById('subjectName').value;
            const description = document.getElementById('subjectDesc').value;
            
            if (!name) {
                showToast('اسم المادة مطلوب', 'error');
                return;
            }
            
            const subjectData = {
                name: name,
                description: description || null
            };
            
            let result;
            if (currentSubjectId) {
                result = await updateSubject(currentSubjectId, subjectData);
            } else {
                result = await createSubject(subjectData);
            }
            
            if (result) {
                closeSubjectModal();
                loadSubjects();
                showToast('تم ' + (currentSubjectId ? 'تعديل' : 'إضافة') + ' المادة', 'success');
            } else {
                showToast('حدث خطأ', 'error');
            }
        };
        
        window.deleteSubjectConfirm = function(id) {
            showConfirm('هل أنت متأكد من حذف هذه المادة؟', async function() {
                await deleteSubject(id);
                loadSubjects();
                showToast('تم حذف المادة', 'success');
            });
        };
        
        // ==================== إغلاق المودالات ====================
        function closeClassModal() {
            document.getElementById('classModal').style.display = 'none';
        }
        
        function closeSubjectModal() {
            document.getElementById('subjectModal').style.display = 'none';
        }
        
        // ==================== أحداث البحث ====================
        document.getElementById('classSearch').addEventListener('input', function() { loadClasses(); });
        document.getElementById('subjectSearch').addEventListener('input', function() { loadSubjects(); });
        
        // ==================== تحميل أولي ====================
        loadClasses();
    </script>
</body>
</html>
