<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تسجيل طالب جديد - منصة الاختبارات</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Cairo', 'Tahoma', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 40px 20px;
        }
        .container { max-width: 500px; margin: 0 auto; }
        .card {
            background: white;
            border-radius: 32px;
            padding: 40px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.2);
        }
        h1 { text-align: center; color: #667eea; margin-bottom: 10px; font-size: 28px; }
        .subtitle { text-align: center; color: #666; margin-bottom: 30px; }
        .form-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; font-weight: 600; color: #333; }
        input, select {
            width: 100%;
            padding: 14px 16px;
            border: 2px solid #e5e7eb;
            border-radius: 16px;
            font-size: 16px;
            transition: all 0.3s;
            font-family: inherit;
        }
        input:focus, select:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102,126,234,0.1);
        }
        .btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border: none;
            border-radius: 16px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
            margin-top: 10px;
        }
        .btn:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(102,126,234,0.4); }
        .btn:disabled { opacity: 0.7; cursor: not-allowed; }
        .back-link { text-align: center; margin-top: 25px; }
        .back-link a { color: #667eea; text-decoration: none; }
        .error-message {
            background: #fee2e2;
            color: #dc2626;
            padding: 12px;
            border-radius: 12px;
            margin-top: 15px;
            font-size: 14px;
            display: none;
        }
        .loading-spinner {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 2px solid white;
            border-top-color: transparent;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-left: 8px;
            vertical-align: middle;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .toast-notification {
            position: fixed;
            bottom: 30px;
            left: 30px;
            background: white;
            border-radius: 16px;
            padding: 16px 20px;
            display: flex;
            align-items: center;
            gap: 12px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            transform: translateX(-400px);
            transition: transform 0.3s ease;
            z-index: 10000;
            direction: rtl;
        }
        .toast-notification.show { transform: translateX(0); }
        .toast-success { border-right: 4px solid #10b981; }
        .toast-error { border-right: 4px solid #ef4444; }
        .toast-icon { font-size: 24px; }
        .toast-message { flex: 1; font-size: 14px; color: #333; }
        .toast-progress {
            position: absolute;
            bottom: 0;
            left: 0;
            height: 3px;
            width: 100%;
            animation: progress 3s linear forwards;
            border-radius: 0 0 16px 16px;
        }
        .toast-success .toast-progress { background: #10b981; }
        .toast-error .toast-progress { background: #ef4444; }
        @keyframes progress { from { width: 100%; } to { width: 0%; } }
        @media (max-width: 600px) { .card { padding: 25px; } }
    </style>
</head>
<body>
    <div class="container">
        <div class="card">
            <h1>🎓 تسجيل طالب جديد</h1>
            <p class="subtitle">قم بإنشاء حسابك للبدء</p>
            
            <form id="registerForm">
                <div class="form-group">
                    <label>👤 الاسم الكامل</label>
                    <input type="text" id="fullName" placeholder="مثال: أحمد محمد علي" required>
                </div>
                <div class="form-group">
                    <label>📞 رقم الهاتف (اسم المستخدم للدخول)</label>
                    <input type="tel" id="phone" placeholder="01012345678" required>
                </div>
                <div class="form-group">
                    <label>📧 البريد الإلكتروني (اختياري)</label>
                    <input type="email" id="email" placeholder="example@email.com">
                </div>
                <div class="form-group">
                    <label>🎓 الصف الدراسي</label>
                    <select id="classId" required>
                        <option value="">-- اختر الصف --</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>🔒 كلمة السر</label>
                    <input type="password" id="password" placeholder="أدخل كلمة السر (6 أحرف على الأقل)" required>
                </div>
                <div class="form-group">
                    <label>🔐 تأكيد كلمة السر</label>
                    <input type="password" id="confirmPassword" placeholder="أعد كتابة كلمة السر" required>
                </div>
                <button type="submit" class="btn" id="registerBtn">تسجيل</button>
            </form>
            
            <div id="error" class="error-message"></div>
            
            <div class="back-link">
                <a href="index.html">← العودة لتسجيل الدخول</a>
            </div>
        </div>
    </div>

    <script src="js/supabase-config.js"></script>
    <script>
        const registerForm = document.getElementById('registerForm');
        const registerBtn = document.getElementById('registerBtn');
        const errorDiv = document.getElementById('error');
        
        // تحميل الصفوف
        async function loadClasses() {
            const { data, error } = await sb.from('classes').select('id, name').order('name');
            const classSelect = document.getElementById('classId');
            if (data && data.length > 0) {
                classSelect.innerHTML = '<option value="">-- اختر الصف --</option>';
                data.forEach(c => {
                    classSelect.innerHTML += `<option value="${c.id}">${c.name}</option>`;
                });
            } else {
                classSelect.innerHTML = '<option value="">لا توجد صفوف متاحة</option>';
            }
        }
        
        function showError(msg) {
            errorDiv.innerHTML = msg;
            errorDiv.style.display = 'block';
            setTimeout(() => { errorDiv.style.display = 'none'; }, 4000);
        }
        
        registerForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const name = document.getElementById('fullName').value.trim();
            const phone = document.getElementById('phone').value.trim();
            const email = document.getElementById('email').value.trim();
            const classId = document.getElementById('classId').value;
            const password = document.getElementById('password').value;
            const confirm = document.getElementById('confirmPassword').value;
            
            if (!name || !phone || !classId || !password) {
                showError('❌ جميع الحقول المطلوبة غير مكتملة');
                return;
            }
            
            if (password.length < 6) {
                showError('❌ كلمة السر يجب أن تكون 6 أحرف على الأقل');
                return;
            }
            
            if (password !== confirm) {
                showError('❌ كلمة السر غير متطابقة');
                return;
            }
            
            registerBtn.disabled = true;
            registerBtn.innerHTML = 'جاري التسجيل... <span class="loading-spinner"></span>';
            
            const result = await registerStudent(name, phone, password, classId, email || null);
            
            if (result.success) {
                showToast('✅ تم تسجيل حسابك بنجاح! جاري تحويلك...', 'success');
                setTimeout(() => {
                    window.location.href = 'index.html';
                }, 2000);
            } else {
                showError('❌ ' + result.error);
                registerBtn.disabled = false;
                registerBtn.innerHTML = 'تسجيل';
            }
        });
        
        // إضافة دالة registerStudent إلى supabase-config
        window.registerStudent = registerStudent;
        
        loadClasses();
    </script>
</body>
</html>
