<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نتيجة الامتحان - منصة الاختبارات</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <style>
        .result-card {
            text-align: center;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: white;
            padding: 30px;
            border-radius: 28px;
            margin-bottom: 20px;
        }
        .score-circle {
            width: 180px;
            height: 180px;
            margin: 20px auto;
            position: relative;
        }
        .score-number {
            font-size: 52px;
            font-weight: bold;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
        }
        .question-review {
            background: var(--light);
            border-radius: 16px;
            padding: 16px;
            margin-bottom: 12px;
            border-right: 4px solid var(--border);
        }
        .question-review.correct {
            border-right-color: var(--success);
            background: rgba(16, 185, 129, 0.05);
        }
        .question-review.wrong {
            border-right-color: var(--danger);
            background: rgba(239, 68, 68, 0.05);
        }
        .user-answer.correct {
            background: #d1fae5;
            color: #065f46;
            padding: 8px;
            border-radius: 8px;
            margin-top: 8px;
        }
        .user-answer.wrong {
            background: #fee2e2;
            color: #991b1b;
            padding: 8px;
            border-radius: 8px;
            margin-top: 8px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="top-bar">
            <div class="logo">📚 منصة الاختبارات</div>
            <div>
                <span style="margin-left: 15px;">👋 مرحباً <span id="studentName"></span></span>
                <button class="btn btn-outline btn-sm" onclick="window.location.href='student-dashboard.html'">🏠 الرئيسية</button>
                <button class="btn btn-outline btn-sm" onclick="logout()">🚪 خروج</button>
            </div>
        </div>

        <div id="app"></div>
    </div>

    <script src="js/supabase-config.js"></script>
    <script>
        if (!checkAuth(['student'])) return;
        
        const user = getUser();
        let attemptData = null;
        let examData = null;
        let questions = [];
        
        document.getElementById('studentName').innerHTML = user.name;
        
        async function loadResult() {
            // الحصول على معرف المحاولة من الرابط أو localStorage
            const urlParams = new URLSearchParams(window.location.search);
            let attemptId = urlParams.get('id');
            
            if (!attemptId) {
                const localResult = localStorage.getItem('lastExamResult');
                if (localResult) {
                    attemptId = JSON.parse(localResult).attemptId;
                    localStorage.removeItem('lastExamResult');
                }
            }
            
            if (!attemptId) {
                // جلب آخر محاولة
                const attempts = await fetchExamAttempts({}, 'student', user.id);
                if (attempts.length > 0) {
                    attemptId = attempts[0].id;
                }
            }
            
            if (!attemptId) {
                document.getElementById('app').innerHTML = '<div class="card empty-state">لا توجد نتائج لعرضها</div>';
                return;
            }
            
            // جلب بيانات المحاولة
            const { data: attempt } = await sb
                .from('exam_attempts')
                .select('*, exams(*)')
                .eq('id', attemptId)
                .single();
            
            if (!attempt) {
                document.getElementById('app').innerHTML = '<div class="card empty-state">لا توجد بيانات</div>';
                return;
            }
            
            attemptData = attempt;
            examData = attempt.exams;
            
            // جلب أسئلة الامتحان
            const examQuestions = await fetchExamQuestions(attempt.exam_id);
            questions = examQuestions.map(eq => ({
                id: eq.question_id,
                ...eq.questions,
                points: eq.points
            }));
            
            renderResult();
        }
        
        function renderResult() {
            const totalPoints = attemptData.total_points;
            const score = attemptData.score || 0;
            const percentage = totalPoints ? Math.round((score / totalPoints) * 100) : 0;
            const passed = percentage >= (examData?.passing_score || 50);
            
            const answers = attemptData.answers || {};
            
            // حساب الإحصائيات
            let correctCount = 0;
            let wrongCount = 0;
            let essayCount = 0;
            
            for (const q of questions) {
                if (q.type === 'essay') {
                    essayCount++;
                } else {
                    const userAnswer = answers[q.id];
                    if (userAnswer && userAnswer.trim() === q.correct_answer) {
                        correctCount++;
                    } else if (userAnswer) {
                        wrongCount++;
                    }
                }
            }
            
            document.getElementById('app').innerHTML = `
                <div class="result-card">
                    <h2>${examData?.title}</h2>
                    <div class="score-circle" style="position: relative;">
                        <canvas id="scoreCircle" width="180" height="180"></canvas>
                        <div class="score-number">${percentage}%</div>
                    </div>
                    <div style="font-size: 24px; font-weight: bold;">${score} / ${totalPoints}</div>
                    <div class="badge ${passed ? 'badge-success' : 'badge-danger'}" style="margin-top: 10px; font-size: 16px; padding: 6px 20px;">
                        ${passed ? '✅ ناجح' : '❌ راسب'}
                    </div>
                </div>
                
                <div class="card">
                    <h3>📊 ملخص النتائج</h3>
                    <div class="stats-grid" style="grid-template-columns: repeat(3, 1fr);">
                        <div class="stat-card" style="background: var(--success);">
                            <div class="stat-number">${correctCount}</div>
                            <div class="stat-label">✅ إجابات صحيحة</div>
                        </div>
                        <div class="stat-card" style="background: var(--danger);">
                            <div class="stat-number">${wrongCount}</div>
                            <div class="stat-label">❌ إجابات خاطئة</div>
                        </div>
                        <div class="stat-card" style="background: var(--warning);">
                            <div class="stat-number">${essayCount}</div>
                            <div class="stat-label">📝 أسئلة مقالية</div>
                        </div>
                    </div>
                    <div class="exam-info" style="justify-content: center; margin-top: 10px;">
                        <span>📅 تاريخ الأداء: ${formatDateTime(attemptData.submitted_at)}</span>
                    </div>
                </div>
                
                <div class="card">
                    <h3>📋 مراجعة الأسئلة</h3>
                    <div id="questionsReview"></div>
                </div>
            `;
            
            drawScoreCircle(percentage);
            renderQuestionsReview(answers);
        }
        
        function drawScoreCircle(percentage) {
            const canvas = document.getElementById('scoreCircle');
            if (!canvas) return;
            
            const ctx = canvas.getContext('2d');
            const centerX = 90, centerY = 90, radius = 80;
            const startAngle = -0.5 * Math.PI;
            const endAngle = startAngle + (2 * Math.PI * percentage / 100);
            
            ctx.clearRect(0, 0, 180, 180);
            
            // الخلفية
            ctx.beginPath();
            ctx.arc(centerX, centerY, radius, 0, 2 * Math.PI);
            ctx.fillStyle = 'rgba(255,255,255,0.2)';
            ctx.fill();
            
            // شريط التقدم
            ctx.beginPath();
            ctx.arc(centerX, centerY, radius, startAngle, endAngle);
            ctx.lineWidth = 12;
            ctx.strokeStyle = percentage >= 70 ? '#10b981' : percentage >= 50 ? '#f59e0b' : '#ef4444';
            ctx.stroke();
        }
        
        function renderQuestionsReview(answers) {
            const container = document.getElementById('questionsReview');
            
            let html = '';
            for (let i = 0; i < questions.length; i++) {
                const q = questions[i];
                const userAnswer = answers[q.id] || 'لم يتم الإجابة';
                let isCorrect = false;
                
                if (q.type !== 'essay') {
                    isCorrect = userAnswer && userAnswer.trim() === q.correct_answer;
                }
                
                html += `
                    <div class="question-review ${!isCorrect ? 'wrong' : ''}">
                        <div><strong>السؤال ${i+1}:</strong> ${q.text}</div>
                        <div class="exam-info" style="margin-top: 8px;">
                            <span class="badge ${q.type === 'mcq' ? 'badge-primary' : q.type === 'true_false' ? 'badge-info' : 'badge-warning'}">
                                ${q.type === 'mcq' ? 'اختيار من متعدد' : q.type === 'true_false' ? 'صح/خطأ' : 'مقالي'}
                            </span>
                            <span>⭐ ${q.points} درجة</span>
                        </div>
                `;
                
                if (q.type === 'essay') {
                    html += `
                        <div class="user-answer">
                            <strong>إجابتك:</strong><br>${userAnswer}
                            <div class="exam-info" style="margin-top: 8px;">
                                <span class="badge badge-warning">⏳ في انتظار تصحيح المعلم</span>
                            </div>
                        </div>
                    `;
                } else {
                    html += `
                        <div class="user-answer ${isCorrect ? 'correct' : 'wrong'}">
                            <strong>إجابتك:</strong> ${userAnswer}<br>
                            ${!isCorrect ? `<strong>الإجابة الصحيحة:</strong> ${q.correct_answer}` : ''}
                        </div>
                    `;
                }
                
                html += `</div>`;
            }
            
            container.innerHTML = html;
        }
        
        loadResult();
    </script>
</body>
</html>
