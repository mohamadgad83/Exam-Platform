<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>اختباراتي - المعلم</title>
  <link rel="stylesheet" href="../shared/styles.css">
</head>
<body>
  <div class="app-layout">
    <main class="main-content">
      <div class="content-area">
        <div class="stats-grid">
          <div class="stat-card"><div class="stat-icon indigo">📝</div><div class="stat-info"><h3>12</h3><p>إجمالي الاختبارات</p></div></div>
          <div class="stat-card"><div class="stat-icon green">✅</div><div class="stat-info"><h3>8</h3><p>منشورة</p></div></div>
          <div class="stat-card"><div class="stat-icon orange">🕐</div><div class="stat-info"><h3>3</h3><p>مسودات</p></div></div>
          <div class="stat-card"><div class="stat-icon red">🔒</div><div class="stat-info"><h3>1</h3><p>مغلقة</p></div></div>
        </div>

        <div class="card">
          <div class="card-header">
            <h2 class="card-title">📝 اختباراتي</h2>
            <a href="create-exam.html" class="btn btn-primary">+ إنشاء اختبار</a>
          </div>
          <div class="card-body">
            <div class="filter-bar">
              <div class="search-box"><span class="search-icon">🔍</span><input type="text" class="form-input" id="search-exams" placeholder="ابحث بعنوان الاختبار..."></div>
              <select class="form-select" id="filter-status" onchange="loadTeacherExams()">
                <option value="">كل الحالات</option>
                <option value="published">منشور</option>
                <option value="draft">مسودة</option>
                <option value="closed">مغلق</option>
              </select>
            </div>
            <div id="exams-container"></div>
          </div>
        </div>
      </div>
    </main>
  </div>
  <script src="../shared/app.js"></script>
  <script>
    if (!requireAuth('teacher')) throw new Error('Unauthorized');
    renderLayout('teacher', 'exams');

    const myExams = [
      { id: 1, title: 'اختبار الفيزياء - الفصل الأول', subject: 'فيزياء', duration: 60, questions: 30, status: 'published', group: 'ثالثة ثانوي - أ', date: '2024-06-15' },
      { id: 2, title: 'اختبار مراجعة نهائية', subject: 'فيزياء', duration: 120, questions: 50, status: 'draft', group: 'ثالثة ثانوي - أ', date: '2024-06-20' },
      { id: 3, title: 'اختبار تجريبي', subject: 'فيزياء', duration: 30, questions: 10, status: 'closed', group: 'تحضيرية', date: '2024-05-01' },
    ];

    function loadTeacherExams() {
      const status = document.getElementById('filter-status').value;
      const search = document.getElementById('search-exams').value.toLowerCase();
      let filtered = myExams.filter(e => (!status || e.status === status) && (!search || e.title.includes(search)));
      
      const container = document.getElementById('exams-container');
      if (!filtered.length) {
        container.innerHTML = `<div class="empty-state"><div class="empty-icon">📝</div><h3>لا توجد اختبارات</h3></div>`;
        return;
      }
      
      container.innerHTML = filtered.map(e => `
        <div class="exam-card" style="margin-bottom: 1.5rem;">
          <div class="exam-card-header">
            <div style="display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; gap:1rem;">
              <div>
                <h3 style="font-size:1.25rem; font-weight:700;">${e.title}</h3>
                <p style="opacity:0.9; margin-top:0.25rem;">${e.subject} • ${e.group}</p>
              </div>
              <span class="badge ${e.status === 'published' ? 'badge-success' : e.status === 'draft' ? 'badge-warning' : 'badge-secondary'}">${e.status === 'published' ? 'منشور' : e.status === 'draft' ? 'مسودة' : 'مغلق'}</span>
            </div>
          </div>
          <div class="exam-card-body">
            <div class="exam-meta">
              <span>⏱️ ${e.duration} دقيقة</span>
              <span>❓ ${e.questions} سؤال</span>
              <span>📅 ${formatDate(e.date)}</span>
            </div>
            <div style="display:flex; gap:0.5rem; margin-top:1.25rem; flex-wrap:wrap;">
              <a href="exam-preview.html?id=${e.id}" class="btn btn-sm btn-secondary">👁️ معاينة</a>
              <a href="submissions.html?exam=${e.id}" class="btn btn-sm btn-success">📋 التسليمات</a>
              <button class="btn btn-sm btn-primary" onclick="showToast('جاري التعديل...','info')">✏️ تعديل</button>
              ${e.status === 'draft' ? `<button class="btn btn-sm btn-success" onclick="publishExam(${e.id})">🚀 نشر</button>` : ''}
              <button class="btn btn-sm btn-danger" onclick="confirmDialog('حذف الاختبار نهائياً؟','deleteExam(${e.id})')">🗑️ حذف</button>
            </div>
          </div>
        </div>
      `).join('');
    }

    function publishExam(id) { showToast('تم نشر الاختبار بنجاح', 'success'); loadTeacherExams(); }
    function deleteExam(id) { showToast('تم حذف الاختبار', 'success'); loadTeacherExams(); }

    document.getElementById('search-exams')?.addEventListener('input', debounce(loadTeacherExams, 300));
    loadTeacherExams();
  </script>
</body>
</html>
