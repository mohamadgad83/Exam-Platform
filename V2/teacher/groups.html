<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إدارة المجموعات | منصة الاختبارات</title>
    <link rel="stylesheet" href="../shared/styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="app-container">
        <!-- Sidebar -->
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <div class="logo">
                    <i class="fas fa-graduation-cap"></i>
                    <span>منصة الاختبارات</span>
                </div>
                <button class="sidebar-toggle" id="sidebarToggle">
                    <i class="fas fa-bars"></i>
                </button>
            </div>
            <nav class="sidebar-nav">
                <a href="dashboard.html" class="nav-item">
                    <i class="fas fa-home"></i>
                    <span>الرئيسية</span>
                </a>
                <a href="create-exam.html" class="nav-item">
                    <i class="fas fa-plus-circle"></i>
                    <span>إنشاء اختبار</span>
                </a>
                <a href="questions.html" class="nav-item">
                    <i class="fas fa-database"></i>
                    <span>بنك الأسئلة</span>
                </a>
                <a href="submissions.html" class="nav-item">
                    <i class="fas fa-check-double"></i>
                    <span>التسليمات</span>
                </a>
                <a href="students.html" class="nav-item">
                    <i class="fas fa-user-graduate"></i>
                    <span>الطلاب</span>
                </a>
                <a href="groups.html" class="nav-item active">
                    <i class="fas fa-users"></i>
                    <span>المجموعات</span>
                </a>
            </nav>
            <div class="sidebar-footer">
                <div class="user-info">
                    <div class="user-avatar" id="userAvatar"><i class="fas fa-user"></i></div>
                    <div class="user-details">
                        <div class="user-name" id="userName">جاري التحميل...</div>
                        <div class="user-role">معلم</div>
                    </div>
                </div>
                <button class="btn btn-outline btn-sm" id="logoutBtn">
                    <i class="fas fa-sign-out-alt"></i>
                    <span>تسجيل الخروج</span>
                </button>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <header class="main-header">
                <h1 class="page-title">إدارة المجموعات</h1>
                <div class="header-actions">
                    <button class="btn btn-icon" id="themeToggle"><i class="fas fa-moon"></i></button>
                    <button class="btn btn-primary btn-sm" onclick="openGroupModal()">
                        <i class="fas fa-plus"></i> مجموعة جديدة
                    </button>
                </div>
            </header>

            <!-- Stats -->
            <div class="stats-grid">
                <div class="stat-card">
                    <div class="stat-icon bg-primary"><i class="fas fa-users"></i></div>
                    <div class="stat-info">
                        <div class="stat-value" id="totalGroups">0</div>
                        <div class="stat-label">إجمالي المجموعات</div>
                    </div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon bg-success"><i class="fas fa-user-check"></i></div>
                    <div class="stat-info">
                        <div class="stat-value" id="totalMembers">0</div>
                        <div class="stat-label">إجمالي الأعضاء</div>
                    </div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon bg-info"><i class="fas fa-clipboard-list"></i></div>
                    <div class="stat-info">
                        <div class="stat-value" id="avgGroupSize">0</div>
                        <div class="stat-label">متوسط الحجم</div>
                    </div>
                </div>
            </div>

            <!-- Groups Grid -->
            <div class="content-section">
                <div class="section-header">
                    <h2 class="section-title"><i class="fas fa-th-large"></i> المجموعات</h2>
                    <div class="section-actions">
                        <div class="search-box">
                            <i class="fas fa-search"></i>
                            <input type="text" class="form-input" id="searchInput" placeholder="ابحث في المجموعات..." oninput="debounceLoad()">
                        </div>
                    </div>
                </div>
                <div id="groupsGrid" class="groups-grid">
                    <div class="loading-spinner"><i class="fas fa-spinner fa-spin"></i> جاري التحميل...</div>
                </div>
            </div>
        </main>
    </div>

    <!-- Group Modal -->
    <div class="modal" id="groupModal">
        <div class="modal-overlay"></div>
        <div class="modal-content">
            <div class="modal-header">
                <h3 id="modalTitle">إنشاء مجموعة</h3>
                <button class="btn btn-icon" onclick="closeGroupModal()"><i class="fas fa-times"></i></button>
            </div>
            <div class="modal-body">
                <div class="form-group">
                    <label class="form-label required">اسم المجموعة</label>
                    <input type="text" class="form-input" id="groupName" placeholder="مثال: مجموعة الرياضيات المتقدمة">
                </div>
                <div class="form-group">
                    <label class="form-label">الوصف</label>
                    <textarea class="form-input" id="groupDesc" rows="2" placeholder="وصف مختصر للمجموعة..."></textarea>
                </div>
                <div class="form-group">
                    <label class="form-label required">الصف</label>
                    <select class="form-select" id="groupGrade">
                        <option value="">اختر الصف</option>
                    </select>
                </div>
                <div class="form-group">
                    <label class="form-label required">الطلاب</label>
                    <div class="search-box">
                        <i class="fas fa-search"></i>
                        <input type="text" class="form-input" id="memberSearch" placeholder="ابحث عن طالب..." oninput="filterMembers()">
                    </div>
                    <div class="selectable-list" id="membersList">
                        <div class="loading-spinner"><i class="fas fa-spinner fa-spin"></i> جاري التحميل...</div>
                    </div>
                </div>
                <div class="selected-summary">
                    <h4>المحدد: <span id="selectedMembersCount">0</span></h4>
                    <div id="selectedMembers"></div>
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn btn-outline" onclick="closeGroupModal()">إلغاء</button>
                <button class="btn btn-primary" onclick="saveGroup()">حفظ</button>
            </div>
        </div>
    </div>

    <!-- Group Details Modal -->
    <div class="modal" id="groupDetailsModal">
        <div class="modal-overlay"></div>
        <div class="modal-content modal-lg">
            <div class="modal-header">
                <h3 id="detailsTitle">تفاصيل المجموعة</h3>
                <button class="btn btn-icon" onclick="closeDetailsModal()"><i class="fas fa-times"></i></button>
            </div>
            <div class="modal-body">
                <div id="groupDetailsContent"></div>
            </div>
            <div class="modal-footer">
                <button class="btn btn-outline" onclick="closeDetailsModal()">إغلاق</button>
                <button class="btn btn-primary" onclick="editCurrentGroup()">تعديل</button>
            </div>
        </div>
    </div>

    <script src="../shared/supabase-client.js"></script>
    <script src="../shared/security.js"></script>
    <script src="../shared/app.js"></script>
    <script>
    (function() {
        'use strict';

        let editingGroupId = null;
        let currentGroupId = null;
        let allGroups = [];
        let allStudents = [];
        let selectedMembers = [];
        let debounceTimer = null;

        document.addEventListener('DOMContentLoaded', async function() {
            await App.init();
            const user = examAuth.getUser();
            if (!user) { window.location.href = '../login.html'; return; }
            const role = user.role || user.user_metadata?.role;
            if (role !== 'teacher' && role !== 'admin') {
                window.location.href = '../student/dashboard.html'; return;
            }
            document.getElementById('userName').textContent = user.name || user.email || 'معلم';
            await loadGrades();
            await loadGroups();
        });

        async function loadGrades() {
            try {
                const { data: grades } = await examDB.from('exam_grades').select('id, name').order('name');
                const select = document.getElementById('groupGrade');
                select.innerHTML = '<option value="">اختر الصف</option>' + (grades || []).map(g => `<option value="${g.id}">${g.name}</option>`).join('');
            } catch (e) { console.error('Error loading grades:', e); }
        }

        window.debounceLoad = function() {
            clearTimeout(debounceTimer);
            debounceTimer = setTimeout(loadGroups, 500);
        };

        window.loadGroups = async function() {
            try {
                const user = examAuth.getUser();
                const searchFilter = document.getElementById('searchInput')?.value.trim() || '';

                const { data: groups, error } = await examDB.from('exam_groups')
                    .select(`*, exam_grades(name)`)
                    .eq('teacher_id', user.id)
                    .order('created_at', { ascending: false });
                if (error) throw error;
                allGroups = groups || [];

                if (searchFilter) {
                    allGroups = allGroups.filter(g => 
                        g.name?.toLowerCase().includes(searchFilter.toLowerCase()) ||
                        g.description?.toLowerCase().includes(searchFilter.toLowerCase())
                    );
                }

                // Get member counts
                const { data: members } = await examDB.from('exam_group_members')
                    .select('group_id, student_id')
                    .in('group_id', allGroups.map(g => g.id));
                const memberCounts = {};
                members?.forEach(m => {
                    memberCounts[m.group_id] = (memberCounts[m.group_id] || 0) + 1;
                });

                // Stats
                document.getElementById('totalGroups').textContent = groups?.length || 0;
                document.getElementById('totalMembers').textContent = members?.length || 0;
                const avg = groups?.length ? Math.round((members?.length || 0) / groups.length) : 0;
                document.getElementById('avgGroupSize').textContent = avg;

                renderGroupsGrid(allGroups, memberCounts);
            } catch (error) {
                console.error('Error loading groups:', error);
                document.getElementById('groupsGrid').innerHTML = '<div class="empty-state text-error"><p>حدث خطأ أثناء التحميل</p></div>';
            }
        };

        function renderGroupsGrid(groups, memberCounts) {
            const container = document.getElementById('groupsGrid');
            if (!groups.length) {
                container.innerHTML = '<div class="empty-state"><i class="fas fa-users"></i><p>لا توجد مجموعات</p><button class="btn btn-primary btn-sm" onclick="openGroupModal()">إنشاء مجموعة</button></div>';
                return;
            }

            container.innerHTML = groups.map(g => {
                const count = memberCounts[g.id] || 0;
                return `
                    <div class="group-card">
                        <div class="group-header">
                            <div class="group-icon">
                                <i class="fas fa-users"></i>
                            </div>
                            <div class="group-info">
                                <h4>${g.name}</h4>
                                <span class="badge badge-outline">${g.exam_grades?.name || '-'}</span>
                            </div>
                        </div>
                        <div class="group-body">
                            <p class="group-desc">${g.description || 'لا يوجد وصف'}</p>
                            <div class="group-stats">
                                <span><i class="fas fa-user"></i> ${count} عضو</span>
                                <span><i class="fas fa-calendar"></i> ${App.formatDate(g.created_at)}</span>
                            </div>
                        </div>
                        <div class="group-footer">
                            <button class="btn btn-outline btn-sm" onclick="viewGroup('${g.id}')">
                                <i class="fas fa-eye"></i> عرض
                            </button>
                            <button class="btn btn-primary btn-sm" onclick="editGroup('${g.id}')">
                                <i class="fas fa-edit"></i> تعديل
                            </button>
                            <button class="btn btn-icon btn-sm text-error" onclick="deleteGroup('${g.id}')">
                                <i class="fas fa-trash"></i>
                            </button>
                        </div>
                    </div>
                `;
            }).join('');
        }

        window.openGroupModal = async function() {
            editingGroupId = null;
            selectedMembers = [];
            document.getElementById('modalTitle').textContent = 'إنشاء مجموعة';
            document.getElementById('groupName').value = '';
            document.getElementById('groupDesc').value = '';
            document.getElementById('groupGrade').value = '';
            document.getElementById('memberSearch').value = '';
            updateSelectedMembers();
            await loadStudentsForSelection();
            document.getElementById('groupModal').classList.add('active');
        };

        window.closeGroupModal = function() {
            document.getElementById('groupModal').classList.remove('active');
            editingGroupId = null;
            selectedMembers = [];
        };

        async function loadStudentsForSelection() {
            try {
                const user = examAuth.getUser();
                const { data: students } = await examDB.from('exam_students')
                    .select('id, name, email, grade_id')
                    .eq('teacher_id', user.id)
                    .order('name');
                allStudents = students || [];
                renderMembersList(allStudents);
            } catch (e) { console.error('Error loading students:', e); }
        }

        function renderMembersList(students) {
            const container = document.getElementById('membersList');
            if (!students.length) {
                container.innerHTML = '<div class="empty-state"><p>لا يوجد طلاب</p></div>';
                return;
            }
            container.innerHTML = students.map(s => {
                const isSelected = selectedMembers.find(m => m.id === s.id);
                return `
                    <label class="selectable-item ${isSelected ? 'selected' : ''}">
                        <input type="checkbox" value="${s.id}" data-name="${s.name}" ${isSelected ? 'checked' : ''} onchange="toggleMember(this)">
                        <div class="item-info">
                            <div class="item-name">${s.name}</div>
                            <div class="item-meta">${s.email || ''}</div>
                        </div>
                    </label>
                `;
            }).join('');
        }

        window.toggleMember = function(checkbox) {
            const id = checkbox.value;
            const name = checkbox.dataset.name;
            if (checkbox.checked) {
                if (!selectedMembers.find(m => m.id === id)) selectedMembers.push({ id, name });
            } else {
                const idx = selectedMembers.findIndex(m => m.id === id);
                if (idx > -1) selectedMembers.splice(idx, 1);
            }
            updateSelectedMembers();
            renderMembersList(allStudents);
        };

        window.filterMembers = function() {
            const search = document.getElementById('memberSearch').value.trim().toLowerCase();
            const filtered = allStudents.filter(s => 
                s.name?.toLowerCase().includes(search) ||
                s.email?.toLowerCase().includes(search)
            );
            renderMembersList(filtered);
        };

        function updateSelectedMembers() {
            document.getElementById('selectedMembersCount').textContent = selectedMembers.length;
            document.getElementById('selectedMembers').innerHTML = selectedMembers.map(m => `
                <span class="selected-tag">${m.name} <i class="fas fa-times" onclick="removeMember('${m.id}')"></i></span>
            `).join('');
        }

        window.removeMember = function(id) {
            const idx = selectedMembers.findIndex(m => m.id === id);
            if (idx > -1) selectedMembers.splice(idx, 1);
            document.querySelectorAll('#membersList input:checked').forEach(cb => {
                if (cb.value === id) cb.checked = false;
            });
            updateSelectedMembers();
            renderMembersList(allStudents);
        };

        window.saveGroup = async function() {
            try {
                const name = document.getElementById('groupName').value.trim();
                const desc = document.getElementById('groupDesc').value.trim();
                const gradeId = document.getElementById('groupGrade').value;

                if (!name || !gradeId) {
                    App.toast('يرجى ملء الحقول المطلوبة', 'error');
                    return;
                }

                const user = examAuth.getUser();
                let groupId = editingGroupId;

                if (editingGroupId) {
                    const { error } = await examDB.from('exam_groups')
                        .update({ name, description: desc, grade_id: gradeId })
                        .eq('id', editingGroupId);
                    if (error) throw error;
                    // Remove old members
                    await examDB.from('exam_group_members').delete().eq('group_id', editingGroupId);
                } else {
                    const { data: newGroup, error } = await examDB.from('exam_groups')
                        .insert({
                            teacher_id: user.id,
                            name,
                            description: desc,
                            grade_id: gradeId,
                            created_at: new Date().toISOString()
                        })
                        .select()
                        .single();
                    if (error) throw error;
                    groupId = newGroup.id;
                }

                // Add members
                for (const member of selectedMembers) {
                    await examDB.from('exam_group_members').insert({
                        group_id: groupId,
                        student_id: member.id,
                        created_at: new Date().toISOString()
                    });
                }

                App.toast(editingGroupId ? 'تم تحديث المجموعة' : 'تم إنشاء المجموعة');
                closeGroupModal();
                await loadGroups();
            } catch (error) {
                console.error('Error saving group:', error);
                App.toast('حدث خطأ', 'error');
            }
        };

        window.viewGroup = async function(id) {
            try {
                currentGroupId = id;
                const { data: group } = await examDB.from('exam_groups')
                    .select(`*, exam_grades(name)`)
                    .eq('id', id)
                    .single();

                const { data: members } = await examDB.from('exam_group_members')
                    .select(`*, exam_students(name, email)`)
                    .eq('group_id', id);

                document.getElementById('detailsTitle').textContent = group.name;
                document.getElementById('groupDetailsContent').innerHTML = `
                    <div class="group-details-info">
                        <p><strong>الوصف:</strong> ${group.description || 'لا يوجد'}</p>
                        <p><strong>الصف:</strong> ${group.exam_grades?.name || '-'}</p>
                        <p><strong>تاريخ الإنشاء:</strong> ${App.formatDate(group.created_at)}</p>
                    </div>
                    <h4>الأعضاء (${members?.length || 0})</h4>
                    <div class="members-table">
                        ${members?.length ? `
                            <table class="data-table">
                                <thead><tr><th>الطالب</th><th>البريد</th><th>تاريخ الانضمام</th></tr></thead>
                                <tbody>
                                    ${members.map(m => `
                                        <tr>
                                            <td>
                                                <div class="student-info">
                                                    <div class="student-avatar">${m.exam_students?.name?.charAt(0) || '?'}</div>
                                                    <div class="student-name">${m.exam_students?.name || 'Unknown'}</div>
                                                </div>
                                            </td>
                                            <td>${m.exam_students?.email || '-'}</td>
                                            <td>${App.formatDate(m.created_at)}</td>
                                        </tr>
                                    `).join('')}
                                </tbody>
                            </table>
                        ` : '<p class="text-muted">لا يوجد أعضاء</p>'}
                    </div>
                `;
                document.getElementById('groupDetailsModal').classList.add('active');
            } catch (error) {
                console.error('Error viewing group:', error);
                App.toast('حدث خطأ', 'error');
            }
        };

        window.closeDetailsModal = function() {
            document.getElementById('groupDetailsModal').classList.remove('active');
            currentGroupId = null;
        };

        window.editCurrentGroup = function() {
            closeDetailsModal();
            editGroup(currentGroupId);
        };

        window.editGroup = async function(id) {
            try {
                editingGroupId = id;
                const { data: group } = await examDB.from('exam_groups')
                    .select('*')
                    .eq('id', id)
                    .single();

                const { data: members } = await examDB.from('exam_group_members')
                    .select('student_id, exam_students(name)')
                    .eq('group_id', id);

                document.getElementById('modalTitle').textContent = 'تعديل مجموعة';
                document.getElementById('groupName').value = group.name || '';
                document.getElementById('groupDesc').value = group.description || '';
                document.getElementById('groupGrade').value = group.grade_id || '';

                selectedMembers = (members || []).map(m => ({ id: m.student_id, name: m.exam_students?.name || '' }));
                updateSelectedMembers();
                await loadStudentsForSelection();
                document.getElementById('groupModal').classList.add('active');
            } catch (error) {
                console.error('Error loading group for edit:', error);
                App.toast('حدث خطأ', 'error');
            }
        };

        window.deleteGroup = function(id) {
            App.confirm('هل أنت متأكد من حذف هذه المجموعة؟', async () => {
                try {
                    await examDB.from('exam_group_members').delete().eq('group_id', id);
                    await examDB.from('exam_groups').delete().eq('id', id);
                    App.toast('تم حذف المجموعة');
                    await loadGroups();
                } catch (error) {
                    console.error('Error deleting group:', error);
                    App.toast('حدث خطأ', 'error');
                }
            });
        };

        document.getElementById('logoutBtn').addEventListener('click', async () => {
            await examAuth.logout();
            window.location.href = '../login.html';
        });
    })();
    </script>
</body>
</html>
