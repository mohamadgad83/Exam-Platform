<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مجموعاتي - منصة الاختبارات</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="../shared/styles.css">
    <style>
        .groups-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px; }
        .group-card { background: var(--bg-surface); border: 1px solid var(--border-color); border-radius: var(--radius-lg); padding: 24px; transition: var(--transition); }
        .group-card:hover { transform: translateY(-4px); box-shadow: var(--shadow-xl); }
        .group-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; }
        .group-name { font-size: 1.125rem; font-weight: 700; color: var(--text-main); }
        .group-stats { display: flex; gap: 16px; margin-bottom: 16px; }
        .group-stat { text-align: center; }
        .group-stat-value { font-size: 1.25rem; font-weight: 800; color: var(--primary-600); }
        .group-stat-label { font-size: 0.75rem; color: var(--text-muted); }
        .members-preview { display: flex; margin-bottom: 16px; }
        .member-avatar-mini { width: 32px; height: 32px; border-radius: 50%; background: linear-gradient(135deg, var(--primary-500), var(--primary-700)); color: white; display: flex; align-items: center; justify-content: center; font-size: 0.625rem; font-weight: 700; border: 2px solid var(--bg-surface); margin-left: -8px; }
        .member-avatar-mini:first-child { margin-left: 0; }
        .member-count { width: 32px; height: 32px; border-radius: 50%; background: var(--bg-body); display: flex; align-items: center; justify-content: center; font-size: 0.625rem; font-weight: 700; color: var(--text-muted); border: 2px solid var(--bg-surface); margin-left: -8px; }
        .student-select-item { display: flex; align-items: center; gap: 12px; padding: 10px 14px; background: var(--bg-body); border-radius: var(--radius-md); margin-bottom: 8px; cursor: pointer; transition: var(--transition); border: 2px solid transparent; }
        .student-select-item:hover { border-color: var(--primary-300); background: var(--primary-50); }
        .student-select-item.selected { border-color: var(--primary-500); background: var(--primary-50); }
        .student-select-item input { width: 20px; height: 20px; accent-color: var(--primary-600); }
        .exams-list { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 12px; }
        .exam-tag { background: var(--bg-body); padding: 4px 10px; border-radius: 20px; font-size: 0.75rem; color: var(--text-secondary); border: 1px solid var(--border-color); }
    </style>
</head>
<body>
    <div class="app-layout">
        <aside class="sidebar">
            <div class="sidebar-header">
                <div class="brand-logo">📚</div>
                <span class="brand-text">منصة الاختبارات</span>
            </div>
            <nav class="sidebar-nav">
                <a href="dashboard.html" class="nav-item"><span class="nav-icon">📊</span><span>لوحة التحكم</span></a>
                <a href="exams.html" class="nav-item"><span class="nav-icon">📝</span><span>الامتحانات</span></a>
                <a href="create-exam.html" class="nav-item"><span class="nav-icon">➕</span><span>إنشاء امتحان</span></a>
                <a href="questions.html" class="nav-item"><span class="nav-icon">❓</span><span>الأسئلة</span></a>
                <a href="groups.html" class="nav-item active"><span class="nav-icon">👥</span><span>المجموعات</span></a>
                <a href="students.html" class="nav-item"><span class="nav-icon">👨‍🎓</span><span>الطلاب</span></a>
                <a href="submissions.html" class="nav-item"><span class="nav-icon">📋</span><span>التسليمات</span></a>
                <a href="monitor.html" class="nav-item"><span class="nav-icon">👁️</span><span>المراقبة</span></a>
            </nav>
            <div class="sidebar-footer">
                <button class="nav-item" onclick="logout()" style="color: var(--danger);"><span class="nav-icon">🚪</span><span>تسجيل الخروج</span></button>
            </div>
        </aside>

        <main class="main-content">
            <div class="top-bar">
                <h1 class="page-title">👥 مجموعاتي</h1>
                <div class="user-menu">
                    <button class="btn btn-primary" onclick="openGroupModal()">➕ مجموعة جديدة</button>
                </div>
            </div>

            <div class="content-wrapper">
                <div class="filter-bar" style="display: flex; gap: 12px; margin-bottom: 20px;">
                    <div class="search-box" style="flex: 1; position: relative;">
                        <span style="position: absolute; left: 12px; top: 50%; transform: translateY(-50%);">🔍</span>
                        <input type="text" class="form-input" id="searchInput" placeholder="ابحث باسم المجموعة..." oninput="debounceSearch()" style="padding-left: 40px;">
                    </div>
                    <button class="btn btn-secondary" onclick="exportGroups()">📥 تصدير</button>
                </div>

                <div class="groups-grid" id="groupsGrid">
                    <div class="group-card skeleton" style="height: 220px;"></div>
                    <div class="group-card skeleton" style="height: 220px;"></div>
                    <div class="group-card skeleton" style="height: 220px;"></div>
                </div>
            </div>
        </main>
    </div>

    <!-- Add/Edit Group Modal -->
    <div class="modal-overlay" id="groupModal">
        <div class="modal-content">
            <h3 id="groupModalTitle">➕ مجموعة جديدة</h3>
            <form class="modal-form" id="groupForm" onsubmit="saveGroup(event)">
                <input type="hidden" id="groupId">
                <div class="form-group">
                    <label class="form-label">اسم المجموعة *</label>
                    <input type="text" class="form-input" id="groupName" required placeholder="مثال: مجموعة الرياضيات المتقدمة">
                </div>
                <div class="form-group">
                    <label class="form-label">الصف الدراسي</label>
                    <select class="form-select" id="groupClass">
                        <option value="">-- اختر الصف --</option>
                    </select>
                </div>
                <div class="form-group">
                    <label class="form-label">الوصف</label>
                    <input type="text" class="form-input" id="groupDesc" placeholder="وصف اختياري للمجموعة">
                </div>
                <div style="display: flex; gap: 12px; justify-content: flex-end;">
                    <button type="button" class="btn btn-secondary" onclick="App.Modal.close('groupModal')">إلغاء</button>
                    <button type="submit" class="btn btn-primary">حفظ</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Members Modal -->
    <div class="modal-overlay" id="membersModal">
        <div class="modal-content" style="width: 600px; max-width: 95%;">
            <h3>👥 أعضاء المجموعة</h3>
            <div id="membersList" style="max-height: 400px; overflow-y: auto;"></div>
            <div style="margin-top: 20px; display: flex; justify-content: space-between; align-items: center;">
                <button class="btn btn-primary" onclick="openAddMembersModal()">➕ إضافة أعضاء</button>
                <button class="btn btn-secondary" onclick="App.Modal.close('membersModal')">إغلاق</button>
            </div>
        </div>
    </div>

    <!-- Add Members Modal -->
    <div class="modal-overlay" id="addMembersModal">
        <div class="modal-content" style="width: 500px; max-width: 95%;">
            <h3>➕ إضافة أعضاء للمجموعة</h3>
            <div class="form-group">
                <label class="form-label">ابحث عن الطلاب</label>
                <input type="text" class="form-input" id="studentSearch" placeholder="ابحث بالاسم..." oninput="filterStudents()">
            </div>
            <div id="studentsList" style="max-height: 300px; overflow-y: auto; margin-bottom: 16px;"></div>
            <div style="display: flex; gap: 12px; justify-content: flex-end;">
                <button type="button" class="btn btn-secondary" onclick="App.Modal.close('addMembersModal')">إلغاء</button>
                <button class="btn btn-primary" onclick="saveMembers()">إضافة المحددين</button>
            </div>
        </div>
    </div>

    <!-- Link Exams Modal -->
    <div class="modal-overlay" id="linkExamsModal">
        <div class="modal-content" style="width: 500px; max-width: 95%;">
            <h3>📝 ربط الامتحانات بالمجموعة</h3>
            <div id="examsListModal" style="max-height: 300px; overflow-y: auto; margin-bottom: 16px;"></div>
            <div style="display: flex; gap: 12px; justify-content: flex-end;">
                <button type="button" class="btn btn-secondary" onclick="App.Modal.close('linkExamsModal')">إلغاء</button>
                <button class="btn btn-primary" onclick="saveExamLinks()">حفظ</button>
            </div>
        </div>
    </div>

    <script src="../shared/supabase-client.js"></script>
    <script src="../shared/app.js"></script>

    <script>
        const currentUser = getUser();
        if (!currentUser || (currentUser.role !== 'teacher' && currentUser.role !== 'admin')) {
            window.location.href = '../login.html';
        }

        const teacherId = currentUser.id;
        let allGroups = [];
        let allStudents = [];
        let allExams = [];
        let currentGroupId = null;
        let selectedStudents = new Set();
        let selectedExams = new Set();
        let groupExams = new Map(); // groupId -> Set of examIds

        async function loadGroups() {
            App.Loading.show('جاري التحميل...');
            try {
                const { data: groups, error } = await sb.from(TABLES.groups)
                    .select('*')
                    .eq('teacher_id', teacherId)
                    .order('created_at', { ascending: false });
                if (error) throw error;
                allGroups = groups || [];
                renderGroups(groups || []);
            } catch (error) {
                console.error('Error:', error);
                App.Toast.error('حدث خطأ');
            }
            App.Loading.hide();
        }

        async function renderGroups(groups) {
            const search = document.getElementById('searchInput').value.toLowerCase();
            const filtered = groups.filter(g => !search || g.name?.toLowerCase().includes(search));

            const grid = document.getElementById('groupsGrid');
            if (filtered.length === 0) {
                grid.innerHTML = `
                    <div class="empty-state" style="grid-column: 1/-1;">
                        <div class="empty-state-icon">👥</div>
                        <p>لا توجد مجموعات</p>
                        <button class="btn btn-primary" onclick="openGroupModal()" style="margin-top: 16px;">➕ إنشاء مجموعة</button>
                    </div>
                `;
                return;
            }

            // Get members count for each group
            const groupIds = filtered.map(g => g.id);
            const { data: allMembers } = groupIds.length > 0 
                ? await sb.from(TABLES.group_members).select('group_id, student_id').in('group_id', groupIds)
                : { data: [] };

            const memberCounts = {};
            const memberStudents = {};
            allMembers?.forEach(m => {
                memberCounts[m.group_id] = (memberCounts[m.group_id] || 0) + 1;
                if (!memberStudents[m.group_id]) memberStudents[m.group_id] = [];
                memberStudents[m.group_id].push(m.student_id);
            });

            // Get linked exams
            const { data: examLinks } = groupIds.length > 0
                ? await sb.from('exam_exam_groups').select('group_id, exam_id').in('group_id', groupIds)
                : { data: [] };

            examLinks?.forEach(el => {
                if (!groupExams.has(el.group_id)) groupExams.set(el.group_id, new Set());
                groupExams.get(el.group_id).add(el.exam_id);
            });

            // Get student names for avatars
            const studentIds = [...new Set(allMembers?.map(m => m.student_id) || [])];
            const { data: students } = studentIds.length > 0
                ? await sb.from(TABLES.users).select('id, name').in('id', studentIds)
                : { data: [] };
            const studentMap = {};
            students?.forEach(s => studentMap[s.id] = s.name);

            grid.innerHTML = filtered.map(g => {
                const count = memberCounts[g.id] || 0;
                const members = memberStudents[g.id] || [];
                const examsCount = groupExams.get(g.id)?.size || 0;

                return `
                    <div class="group-card">
                        <div class="group-header">
                            <div class="group-name">${App.sanitizeHtml(g.name)}</div>
                            <div style="display: flex; gap: 6px;">
                                <button class="btn btn-sm btn-ghost" onclick="editGroup(${g.id})" title="تعديل">✏️</button>
                                <button class="btn btn-sm btn-danger" onclick="deleteGroup(${g.id})" title="حذف">🗑️</button>
                            </div>
                        </div>
                        <div style="font-size: 0.875rem; color: var(--text-muted); margin-bottom: 12px;">${g.description || 'بدون وصف'}</div>
                        <div class="members-preview">
                            ${members.slice(0, 5).map(sid => `
                                <div class="member-avatar-mini" title="${studentMap[sid] || '?'}">${(studentMap[sid] || '?').charAt(0)}</div>
                            `).join('')}
                            ${count > 5 ? `<div class="member-count">+${count - 5}</div>` : ''}
                            ${count === 0 ? '<span style="font-size: 0.75rem; color: var(--text-muted);">لا يوجد أعضاء</span>' : ''}
                        </div>
                        <div class="group-stats">
                            <div class="group-stat">
                                <div class="group-stat-value">${count}</div>
                                <div class="group-stat-label">عضو</div>
                            </div>
                            <div class="group-stat">
                                <div class="group-stat-value">${examsCount}</div>
                                <div class="group-stat-label">امتحان</div>
                            </div>
                        </div>
                        <div style="display: flex; gap: 8px;">
                            <button class="btn btn-sm btn-secondary" onclick="viewMembers(${g.id})">👥 الأعضاء</button>
                            <button class="btn btn-sm btn-outline" onclick="linkExams(${g.id})">📝 ربط امتحان</button>
                        </div>
                    </div>
                `;
            }).join('');
        }

        const debounceSearch = App.debounce(() => renderGroups(allGroups), 300);

        async function loadClasses() {
            const classes = await fetchClasses();
            const select = document.getElementById('groupClass');
            select.innerHTML = '<option value="">-- اختر الصف --</option>' + 
                classes.map(c => `<option value="${c.id}">${c.name}</option>`).join('');
        }

        function openGroupModal() {
            document.getElementById('groupForm').reset();
            document.getElementById('groupId').value = '';
            document.getElementById('groupModalTitle').textContent = '➕ مجموعة جديدة';
            App.Modal.open('groupModal');
        }

        async function editGroup(id) {
            const group = allGroups.find(g => g.id === id);
            if (!group) return;
            document.getElementById('groupId').value = group.id;
            document.getElementById('groupName').value = group.name || '';
            document.getElementById('groupClass').value = group.class_id || '';
            document.getElementById('groupDesc').value = group.description || '';
            document.getElementById('groupModalTitle').textContent = '✏️ تعديل مجموعة';
            App.Modal.open('groupModal');
        }

        async function saveGroup(e) {
            e.preventDefault();
            App.Loading.show('جاري الحفظ...');
            try {
                const id = document.getElementById('groupId').value;
                const data = {
                    name: document.getElementById('groupName').value,
                    teacher_id: teacherId,
                    class_id: document.getElementById('groupClass').value || null,
                    description: document.getElementById('groupDesc').value,
                    updated_at: new Date().toISOString()
                };
                if (id) {
                    await sb.from(TABLES.groups).update(data).eq('id', id);
                    App.Toast.success('تم التحديث');
                } else {
                    data.created_at = new Date().toISOString();
                    await sb.from(TABLES.groups).insert(data);
                    App.Toast.success('تم إنشاء المجموعة');
                }
                App.Modal.close('groupModal');
                loadGroups();
            } catch (error) {
                App.Toast.error('حدث خطأ');
            }
            App.Loading.hide();
        }

        async function deleteGroup(id) {
            if (!await App.confirm('هل أنت متأكد من حذف هذه المجموعة؟')) return;
            App.Loading.show('جاري الحذف...');
            try {
                await sb.from(TABLES.groups).delete().eq('id', id);
                App.Toast.success('تم الحذف');
                loadGroups();
            } catch (error) {
                App.Toast.error('حدث خطأ');
            }
            App.Loading.hide();
        }

        async function viewMembers(groupId) {
            currentGroupId = groupId;
            App.Loading.show('جاري التحميل...');
            try {
                const { data: members } = await sb.from(TABLES.group_members)
                    .select('student_id')
                    .eq('group_id', groupId);

                const studentIds = members?.map(m => m.student_id) || [];
                if (studentIds.length === 0) {
                    document.getElementById('membersList').innerHTML = '<div class="empty-state"><p>لا يوجد أعضاء</p></div>';
                    App.Modal.open('membersModal');
                    App.Loading.hide();
                    return;
                }

                const { data: students } = await sb.from(TABLES.users)
                    .select('id, name, email, phone, class_id')
                    .in('id', studentIds);

                document.getElementById('membersList').innerHTML = (students || []).map(s => `
                    <div style="display: flex; align-items: center; justify-content: space-between; padding: 12px; border-bottom: 1px solid var(--border-light);">
                        <div style="display: flex; align-items: center; gap: 12px;">
                            <div class="user-avatar-sm">${s.name?.charAt(0) || '?'}</div>
                            <div>
                                <div style="font-weight: 600;">${App.sanitizeHtml(s.name)}</div>
                                <div style="font-size: 0.75rem; color: var(--text-muted);">${s.email || s.phone || ''}</div>
                            </div>
                        </div>
                        <button class="btn btn-sm btn-danger" onclick="removeMember(${groupId}, ${s.id})">🗑️</button>
                    </div>
                `).join('');

                App.Modal.open('membersModal');
            } catch (error) {
                App.Toast.error('حدث خطأ');
            }
            App.Loading.hide();
        }

        async function removeMember(groupId, studentId) {
            if (!await App.confirm('هل أنت متأكد من إزالة هذا العضو؟')) return;
            try {
                await sb.from(TABLES.group_members).delete().eq('group_id', groupId).eq('student_id', studentId);
                App.Toast.success('تم الإزالة');
                viewMembers(groupId);
            } catch (error) {
                App.Toast.error('حدث خطأ');
            }
        }

        async function openAddMembersModal() {
            App.Modal.close('membersModal');
            selectedStudents.clear();

            // Get current members
            const { data: currentMembers } = await sb.from(TABLES.group_members)
                .select('student_id')
                .eq('group_id', currentGroupId);
            const currentIds = new Set(currentMembers?.map(m => m.student_id) || []);

            // Get available students
            const { data: students } = await sb.from(TABLES.users)
                .select('id, name, email, class_id')
                .eq('role', 'student')
                .eq('status', 'active');

            allStudents = (students || []).filter(s => !currentIds.has(s.id));
            renderStudentsList(allStudents);
            App.Modal.open('addMembersModal');
        }

        function renderStudentsList(students) {
            const container = document.getElementById('studentsList');
            if (students.length === 0) {
                container.innerHTML = '<div class="empty-state"><p>لا يوجد طلاب متاحين</p></div>';
                return;
            }
            container.innerHTML = students.map(s => `
                <label class="student-select-item ${selectedStudents.has(s.id) ? 'selected' : ''}">
                    <input type="checkbox" value="${s.id}" ${selectedStudents.has(s.id) ? 'checked' : ''} 
                        onchange="toggleStudent(${s.id})">
                    <div class="user-avatar-sm">${s.name?.charAt(0) || '?'}</div>
                    <div style="flex: 1;">
                        <div style="font-weight: 600;">${App.sanitizeHtml(s.name)}</div>
                        <div style="font-size: 0.75rem; color: var(--text-muted);">${s.email || ''}</div>
                    </div>
                </label>
            `).join('');
        }

        function toggleStudent(studentId) {
            if (selectedStudents.has(studentId)) {
                selectedStudents.delete(studentId);
            } else {
                selectedStudents.add(studentId);
            }
            renderStudentsList(allStudents);
        }

        function filterStudents() {
            const search = document.getElementById('studentSearch').value.toLowerCase();
            const filtered = allStudents.filter(s => s.name?.toLowerCase().includes(search));
            renderStudentsList(filtered);
        }

        async function saveMembers() {
            if (selectedStudents.size === 0) {
                App.Toast.warning('اختر طالباً واحداً على الأقل');
                return;
            }
            App.Loading.show('جاري الإضافة...');
            try {
                const members = Array.from(selectedStudents).map(sid => ({
                    group_id: currentGroupId,
                    student_id: sid
                }));
                await sb.from(TABLES.group_members).insert(members);
                App.Toast.success(`تم إضافة ${selectedStudents.size} طالب`);
                App.Modal.close('addMembersModal');
                loadGroups();
            } catch (error) {
                App.Toast.error('حدث خطأ');
            }
            App.Loading.hide();
        }

        async function linkExams(groupId) {
            currentGroupId = groupId;
            selectedExams.clear();

            // Get teacher's exams
            const { data: exams } = await sb.from(TABLES.exams)
                .select('id, title, status')
                .eq('teacher_id', teacherId)
                .order('created_at', { ascending: false });

            allExams = exams || [];

            // Get already linked exams
            const linked = groupExams.get(groupId) || new Set();
            linked.forEach(id => selectedExams.add(id));

            renderExamsList();
            App.Modal.open('linkExamsModal');
        }

        function renderExamsList() {
            const container = document.getElementById('examsListModal');
            if (allExams.length === 0) {
                container.innerHTML = '<div class="empty-state"><p>لا توجد امتحانات</p></div>';
                return;
            }
            container.innerHTML = allExams.map(e => `
                <label class="student-select-item ${selectedExams.has(e.id) ? 'selected' : ''}" style="cursor: pointer;">
                    <input type="checkbox" value="${e.id}" ${selectedExams.has(e.id) ? 'checked' : ''} 
                        onchange="toggleExam(${e.id})" style="width: 20px; height: 20px; accent-color: var(--primary-600);">
                    <div style="flex: 1;">
                        <div style="font-weight: 600;">${App.sanitizeHtml(e.title)}</div>
                        <div style="font-size: 0.75rem; color: var(--text-muted);">
                            ${e.status === 'published' ? '✅ منشور' : e.status === 'draft' ? '📝 مسودة' : '❌ مغلق'}
                        </div>
                    </div>
                </label>
            `).join('');
        }

        function toggleExam(examId) {
            if (selectedExams.has(examId)) {
                selectedExams.delete(examId);
            } else {
                selectedExams.add(examId);
            }
            renderExamsList();
        }

        async function saveExamLinks() {
            App.Loading.show('جاري الحفظ...');
            try {
                // Delete old links
                await sb.from('exam_exam_groups').delete().eq('group_id', currentGroupId);

                // Insert new links
                if (selectedExams.size > 0) {
                    const links = Array.from(selectedExams).map(eid => ({
                        group_id: currentGroupId,
                        exam_id: eid
                    }));
                    await sb.from('exam_exam_groups').insert(links);
                }

                App.Toast.success('تم حفظ الروابط');
                App.Modal.close('linkExamsModal');
                loadGroups();
            } catch (error) {
                App.Toast.error('حدث خطأ');
            }
            App.Loading.hide();
        }

        function exportGroups() {
            const data = allGroups.map(g => ({
                الاسم: g.name,
                الوصف: g.description,
                'تاريخ الإنشاء': App.DateTime.dateOnly(g.created_at)
            }));
            App.exportCSV(data, 'my_groups_export');
        }

        loadClasses();
        loadGroups();
    </script>
</body>
</html>
