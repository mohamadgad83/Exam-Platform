<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>التسليمات والتصحيح | منصة الاختبارات</title>
    <link rel="stylesheet" href="../shared/styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="app-container">
        <!-- Sidebar -->
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <div class="logo">
                    <i class="fas fa-graduation-cap"></i>
                    <span>منصة الاختبارات</span>
                </div>
                <button class="sidebar-toggle" id="sidebarToggle">
                    <i class="fas fa-bars"></i>
                </button>
            </div>
            <nav class="sidebar-nav">
                <a href="dashboard.html" class="nav-item">
                    <i class="fas fa-home"></i>
                    <span>الرئيسية</span>
                </a>
                <a href="create-exam.html" class="nav-item">
                    <i class="fas fa-plus-circle"></i>
                    <span>إنشاء اختبار</span>
                </a>
                <a href="questions.html" class="nav-item">
                    <i class="fas fa-database"></i>
                    <span>بنك الأسئلة</span>
                </a>
                <a href="submissions.html" class="nav-item active">
                    <i class="fas fa-check-double"></i>
                    <span>التسليمات</span>
                </a>
                <a href="students.html" class="nav-item">
                    <i class="fas fa-user-graduate"></i>
                    <span>الطلاب</span>
                </a>
                <a href="groups.html" class="nav-item">
                    <i class="fas fa-users"></i>
                    <span>المجموعات</span>
                </a>
            </nav>
            <div class="sidebar-footer">
                <div class="user-info">
                    <div class="user-avatar" id="userAvatar"><i class="fas fa-user"></i></div>
                    <div class="user-details">
                        <div class="user-name" id="userName">جاري التحميل...</div>
                        <div class="user-role">معلم</div>
                    </div>
                </div>
                <button class="btn btn-outline btn-sm" id="logoutBtn">
                    <i class="fas fa-sign-out-alt"></i>
                    <span>تسجيل الخروج</span>
                </button>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <header class="main-header">
                <h1 class="page-title">التسليمات والتصحيح</h1>
                <div class="header-actions">
                    <button class="btn btn-icon" id="themeToggle"><i class="fas fa-moon"></i></button>
                </div>
            </header>

            <!-- Filters -->
            <div class="card filter-card">
                <div class="card-body">
                    <div class="filter-row">
                        <div class="form-group">
                            <label class="form-label">الاختبار</label>
                            <select class="form-select" id="filterExam" onchange="loadSubmissions()">
                                <option value="">كل الاختبارات</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label class="form-label">الحالة</label>
                            <select class="form-select" id="filterStatus" onchange="loadSubmissions()">
                                <option value="">الكل</option>
                                <option value="submitted">بانتظار التصحيح</option>
                                <option value="graded">مصحح</option>
                                <option value="in_progress">قيد التنفيذ</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label class="form-label">الطالب</label>
                            <input type="text" class="form-input" id="filterStudent" placeholder="ابحث بالاسم..." oninput="debounceLoad()">
                        </div>
                        <div class="form-group">
                            <label class="form-label">التاريخ</label>
                            <input type="date" class="form-input" id="filterDate" onchange="loadSubmissions()">
                        </div>
                    </div>
                </div>
            </div>

            <!-- Stats -->
            <div class="stats-grid">
                <div class="stat-card">
                    <div class="stat-icon bg-warning"><i class="fas fa-clock"></i></div>
                    <div class="stat-info">
                        <div class="stat-value" id="pendingCount">0</div>
                        <div class="stat-label">بانتظار التصحيح</div>
                    </div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon bg-success"><i class="fas fa-check-circle"></i></div>
                    <div class="stat-info">
                        <div class="stat-value" id="gradedCount">0</div>
                        <div class="stat-label">مصحح</div>
                    </div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon bg-info"><i class="fas fa-chart-line"></i></div>
                    <div class="stat-info">
                        <div class="stat-value" id="avgScoreAll">0%</div>
                        <div class="stat-label">متوسط الدرجات</div>
                    </div>
                </div>
            </div>

            <!-- Submissions Table -->
            <div class="content-section">
                <div class="section-header">
                    <h2 class="section-title"><i class="fas fa-clipboard-list"></i> قائمة التسليمات</h2>
                    <div class="section-actions">
                        <button class="btn btn-outline btn-sm" onclick="exportSubmissions()">
                            <i class="fas fa-file-export"></i> تصدير
                        </button>
                    </div>
                </div>
                <div class="table-container">
                    <table class="data-table">
                        <thead>
                            <tr>
                                <th>الطالب</th>
                                <th>الاختبار</th>
                                <th>تاريخ التسليم</th>
                                <th>الحالة</th>
                                <th>الدرجة</th>
                                <th>النسبة</th>
                                <th>الإجراءات</th>
                            </tr>
                        </thead>
                        <tbody id="submissionsTable">
                            <tr><td colspan="7" class="text-center"><div class="loading-spinner"><i class="fas fa-spinner fa-spin"></i> جاري التحميل...</div></td></tr>
                        </tbody>
                    </table>
                </div>
                <div class="pagination" id="pagination"></div>
            </div>
        </main>
    </div>

    <!-- Grading Modal -->
    <div class="modal" id="gradingModal">
        <div class="modal-overlay"></div>
        <div class="modal-content modal-xl">
            <div class="modal-header">
                <h3>تصحيح الاختبار</h3>
                <button class="btn btn-icon" onclick="closeGradingModal()"><i class="fas fa-times"></i></button>
            </div>
            <div class="modal-body">
                <div class="grading-info" id="gradingInfo"></div>
                <div id="gradingQuestions"></div>
            </div>
            <div class="modal-footer">
                <button class="btn btn-outline" onclick="closeGradingModal()">إلغاء</button>
                <button class="btn btn-success" onclick="saveGrades()">
                    <i class="fas fa-save"></i> حفظ التصحيح
                </button>
            </div>
        </div>
    </div>

    <script src="../shared/supabase-client.js"></script>
    <script src="../shared/security.js"></script>
    <script src="../shared/app.js"></script>
    <script>
    (function() {
        'use strict';

        let currentAttempt = null;
        let currentAnswers = [];
        let debounceTimer = null;

        document.addEventListener('DOMContentLoaded', async function() {
            await App.init();
            const user = examAuth.getUser();
            if (!user) { window.location.href = '../login.html'; return; }
            const role = user.role || user.user_metadata?.role;
            if (role !== 'teacher' && role !== 'admin') {
                window.location.href = '../student/dashboard.html'; return;
            }
            document.getElementById('userName').textContent = user.name || user.email || 'معلم';
            await loadExamsFilter();
            await loadSubmissions();
        });

        async function loadExamsFilter() {
            try {
                const user = examAuth.getUser();
                const { data: exams } = await examDB.from('exam_exams')
                    .select('id, title')
                    .eq('teacher_id', user.id)
                    .order('created_at', { ascending: false });
                const select = document.getElementById('filterExam');
                exams?.forEach(e => {
                    select.innerHTML += `<option value="${e.id}">${e.title}</option>`;
                });
            } catch (e) { console.error('Error loading exams:', e); }
        }

        window.debounceLoad = function() {
            clearTimeout(debounceTimer);
            debounceTimer = setTimeout(loadSubmissions, 500);
        };

        window.loadSubmissions = async function() {
            try {
                const user = examAuth.getUser();
                let query = examDB.from('exam_attempts')
                    .select(`*, exam_students(name, email), exam_exams(title, total_marks)`)
                    .eq('teacher_id', user.id)
                    .order('submitted_at', { ascending: false });

                const examFilter = document.getElementById('filterExam').value;
                const statusFilter = document.getElementById('filterStatus').value;
                const studentFilter = document.getElementById('filterStudent').value;
                const dateFilter = document.getElementById('filterDate').value;

                if (examFilter) query = query.eq('exam_id', examFilter);
                if (statusFilter) query = query.eq('status', statusFilter);
                if (dateFilter) {
                    const start = new Date(dateFilter);
                    const end = new Date(start);
                    end.setDate(end.getDate() + 1);
                    query = query.gte('submitted_at', start.toISOString()).lt('submitted_at', end.toISOString());
                }

                const { data: submissions, error } = await query;
                if (error) throw error;

                let filtered = submissions || [];
                if (studentFilter) {
                    filtered = filtered.filter(s => 
                        s.exam_students?.name?.toLowerCase().includes(studentFilter.toLowerCase()) ||
                        s.exam_students?.email?.toLowerCase().includes(studentFilter.toLowerCase())
                    );
                }

                // Update stats
                const pending = filtered.filter(s => s.status === 'submitted').length;
                const graded = filtered.filter(s => s.status === 'graded').length;
                const gradedScores = filtered.filter(s => s.status === 'graded' && s.total_score > 0)
                    .map(s => (s.score / s.total_score) * 100);
                const avg = gradedScores.length ? Math.round(gradedScores.reduce((a, b) => a + b, 0) / gradedScores.length) : 0;

                document.getElementById('pendingCount').textContent = pending;
                document.getElementById('gradedCount').textContent = graded;
                document.getElementById('avgScoreAll').textContent = avg + '%';

                renderSubmissionsTable(filtered);
            } catch (error) {
                console.error('Error loading submissions:', error);
                document.getElementById('submissionsTable').innerHTML = '<tr><td colspan="7" class="text-center text-error">حدث خطأ</td></tr>';
            }
        };

        function renderSubmissionsTable(submissions) {
            const tbody = document.getElementById('submissionsTable');
            if (!submissions.length) {
                tbody.innerHTML = '<tr><td colspan="7" class="text-center"><div class="empty-state"><i class="fas fa-inbox"></i><p>لا توجد تسليمات</p></div></td></tr>';
                return;
            }

            tbody.innerHTML = submissions.map(s => {
                const statusClass = s.status === 'graded' ? 'badge-success' : 
                                   s.status === 'submitted' ? 'badge-warning' : 'badge-info';
                const statusText = s.status === 'graded' ? 'مصحح' : 
                                  s.status === 'submitted' ? 'بانتظار التصحيح' : 'قيد التنفيذ';
                const percent = s.total_score > 0 ? Math.round((s.score / s.total_score) * 100) : 0;
                const percentClass = percent >= 60 ? 'text-success' : percent >= 40 ? 'text-warning' : 'text-error';

                return `
                    <tr>
                        <td>
                            <div class="student-info">
                                <div class="student-avatar">${s.exam_students?.name?.charAt(0) || '?'}</div>
                                <div>
                                    <div class="student-name">${s.exam_students?.name || 'Unknown'}</div>
                                    <div class="student-email">${s.exam_students?.email || ''}</div>
                                </div>
                            </div>
                        </td>
                        <td>${s.exam_exams?.title || '-'}</td>
                        <td>${s.submitted_at ? App.formatDate(s.submitted_at) : '-'}</td>
                        <td><span class="badge ${statusClass}">${statusText}</span></td>
                        <td>${s.status === 'graded' ? `${s.score}/${s.total_score}` : '-'}</td>
                        <td class="${percentClass}">${s.status === 'graded' ? percent + '%' : '-'}</td>
                        <td>
                            <div class="action-buttons">
                                ${s.status === 'submitted' ? `
                                    <button class="btn btn-primary btn-sm" onclick="openGrading('${s.id}')">
                                        <i class="fas fa-pen"></i> تصحيح
                                    </button>
                                ` : s.status === 'graded' ? `
                                    <button class="btn btn-outline btn-sm" onclick="openGrading('${s.id}')">
                                        <i class="fas fa-eye"></i> مراجعة
                                    </button>
                                ` : `
                                    <button class="btn btn-outline btn-sm" onclick="viewProgress('${s.id}')">
                                        <i class="fas fa-eye"></i> متابعة
                                    </button>
                                `}
                            </div>
                        </td>
                    </tr>
                `;
            }).join('');
        }

        window.openGrading = async function(attemptId) {
            try {
                const { data: attempt, error } = await examDB.from('exam_attempts')
                    .select(`*, exam_students(name, email), exam_exams(title, total_marks)`)
                    .eq('id', attemptId)
                    .single();
                if (error) throw error;
                currentAttempt = attempt;

                document.getElementById('gradingInfo').innerHTML = `
                    <div class="grading-student">
                        <div class="student-avatar lg">${attempt.exam_students?.name?.charAt(0) || '?'}</div>
                        <div>
                            <h4>${attempt.exam_students?.name || 'Unknown'}</h4>
                            <p>${attempt.exam_exams?.title || ''}</p>
                            <p class="text-muted">تاريخ التسليم: ${App.formatDate(attempt.submitted_at)}</p>
                        </div>
                    </div>
                `;

                const { data: answers } = await examDB.from('exam_attempt_answers')
                    .select(`*, exam_exam_questions(*)`)
                    .eq('attempt_id', attemptId)
                    .order('question_order', { ascending: true });

                currentAnswers = answers || [];
                renderGradingQuestions();
                document.getElementById('gradingModal').classList.add('active');
            } catch (error) {
                console.error('Error opening grading:', error);
                App.toast('حدث خطأ', 'error');
            }
        };

        function renderGradingQuestions() {
            const container = document.getElementById('gradingQuestions');
            container.innerHTML = currentAnswers.map((ans, i) => {
                const q = ans.exam_exam_questions;
                const isGraded = ans.score !== null;
                const typeLabels = { mcq: 'اختيار متعدد', true_false: 'صح/خطأ', essay: 'مقالي', fill_blank: 'اكمل الفراغ', matching: 'توصيل' };

                let answerDisplay = '';
                if (q.question_type === 'mcq') {
                    const correctLabel = q.correct_answer !== null ? String.fromCharCode(65 + q.correct_answer) : '-';
                    const studentLabel = ans.answer !== null ? String.fromCharCode(65 + parseInt(ans.answer)) : '-';
                    const isCorrect = ans.answer == q.correct_answer;
                    answerDisplay = `
                        <div class="answer-comparison">
                            <div class="student-answer ${isCorrect ? 'correct' : 'incorrect'}">
                                <strong>إجابة الطالب:</strong> ${studentLabel}
                            </div>
                            <div class="correct-answer">
                                <strong>الإجابة الصحيحة:</strong> ${correctLabel}
                            </div>
                        </div>
                    `;
                } else if (q.question_type === 'true_false') {
                    const studentAns = ans.answer === 'true' ? 'صح' : ans.answer === 'false' ? 'خطأ' : '-';
                    const correctAns = q.correct_answer === true ? 'صح' : 'خطأ';
                    const isCorrect = ans.answer === String(q.correct_answer);
                    answerDisplay = `
                        <div class="answer-comparison">
                            <div class="student-answer ${isCorrect ? 'correct' : 'incorrect'}">
                                <strong>إجابة الطالب:</strong> ${studentAns}
                            </div>
                            <div class="correct-answer">
                                <strong>الإجابة الصحيحة:</strong> ${correctAns}
                            </div>
                        </div>
                    `;
                } else {
                    answerDisplay = `
                        <div class="essay-answer">
                            <strong>إجابة الطالب:</strong>
                            <div class="essay-text">${ans.answer_text || 'لا توجد إجابة'}</div>
                            ${q.correct_answer ? `<div class="model-answer"><strong>الإجابة النموذجية:</strong> ${q.correct_answer}</div>` : ''}
                        </div>
                    `;
                }

                const autoScore = q.question_type === 'mcq' || q.question_type === 'true_false' 
                    ? (ans.answer == q.correct_answer ? q.marks : 0) : null;

                return `
                    <div class="grading-question-card">
                        <div class="grading-q-header">
                            <span class="question-number">س ${i + 1}</span>
                            <span class="badge">${typeLabels[q.question_type]}</span>
                            <span class="q-marks">${q.marks} درجة</span>
                        </div>
                        <div class="grading-q-text">${q.question_text}</div>
                        ${q.hint ? `<div class="question-hint"><i class="fas fa-lightbulb"></i> ${q.hint}</div>` : ''}
                        ${answerDisplay}
                        <div class="grading-input">
                            <label>الدرجة:</label>
                            <input type="number" class="form-input score-input" 
                                value="${isGraded ? ans.score : (autoScore !== null ? autoScore : '')}" 
                                min="0" max="${q.marks}" 
                                data-index="${i}"
                                ${autoScore !== null ? 'readonly' : ''}>
                            <span class="text-muted">/ ${q.marks}</span>
                        </div>
                        <div class="grading-input">
                            <label>ملاحظة:</label>
                            <input type="text" class="form-input" id="feedback-${i}" 
                                value="${ans.feedback || ''}" placeholder="ملاحظة للطالب...">
                        </div>
                    </div>
                `;
            }).join('');
        }

        window.saveGrades = async function() {
            try {
                let totalScore = 0;
                for (let i = 0; i < currentAnswers.length; i++) {
                    const scoreInput = document.querySelector(`input[data-index="${i}"]`);
                    const feedbackInput = document.getElementById(`feedback-${i}`);
                    const score = parseFloat(scoreInput?.value) || 0;
                    const feedback = feedbackInput?.value || '';
                    totalScore += score;

                    await examDB.from('exam_attempt_answers')
                        .update({ score, feedback, graded_at: new Date().toISOString() })
                        .eq('id', currentAnswers[i].id);
                }

                await examDB.from('exam_attempts')
                    .update({ 
                        score: totalScore, 
                        status: 'graded',
                        graded_at: new Date().toISOString()
                    })
                    .eq('id', currentAttempt.id);

                // Send notification
                await examDB.from('exam_notifications').insert({
                    user_id: currentAttempt.student_id,
                    title: 'تم تصحيح اختبارك',
                    message: `تم تصحيح اختبار ${currentAttempt.exam_exams?.title}. درجتك: ${totalScore}/${currentAttempt.exam_exams?.total_marks}`,
                    is_read: false,
                    created_at: new Date().toISOString()
                });

                App.toast('تم حفظ التصحيح بنجاح');
                closeGradingModal();
                await loadSubmissions();
            } catch (error) {
                console.error('Error saving grades:', error);
                App.toast('حدث خطأ أثناء الحفظ', 'error');
            }
        };

        window.closeGradingModal = function() {
            document.getElementById('gradingModal').classList.remove('active');
            currentAttempt = null;
            currentAnswers = [];
        };

        window.viewProgress = function(attemptId) {
            App.toast('جاري تحميل التقدم...');
            // View progress logic
        };

        window.exportSubmissions = function() {
            App.toast('جاري تصدير البيانات...');
            setTimeout(() => App.toast('تم التصدير'), 1000);
        };

        document.getElementById('logoutBtn').addEventListener('click', async () => {
            await examAuth.logout();
            window.location.href = '../login.html';
        });
    })();
    </script>
</body>
</html>
