<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>التسليمات والتصحيح - منصة الاختبارات</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="../shared/styles.css">
    <style>
        .filter-bar { display: flex; gap: 12px; margin-bottom: 20px; flex-wrap: wrap; }
        .search-box { flex: 1; min-width: 250px; position: relative; }
        .search-box input { width: 100%; padding: 10px 16px 10px 40px; }
        .search-box .search-icon { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); }
        .submission-row { display: flex; align-items: center; justify-content: space-between; padding: 16px; background: var(--bg-body); border-radius: var(--radius-md); margin-bottom: 10px; transition: var(--transition); border-right: 4px solid var(--border-color); }
        .submission-row:hover { background: var(--primary-50); border-right-color: var(--primary-500); }
        .submission-row.graded { border-right-color: var(--success); }
        .submission-row.pending { border-right-color: var(--warning); }
        .submission-info h4 { font-size: 1rem; font-weight: 700; color: var(--text-main); margin-bottom: 4px; }
        .submission-info p { font-size: 0.875rem; color: var(--text-muted); }
        .submission-meta { display: flex; gap: 16px; font-size: 0.75rem; color: var(--text-muted); margin-top: 6px; }
        .score-display { font-size: 1.5rem; font-weight: 800; color: var(--primary-600); }
        .score-display.pending { color: var(--warning); }
        .grading-section { background: var(--bg-body); border-radius: var(--radius-md); padding: 20px; margin-bottom: 16px; }
        .grading-question { background: var(--bg-surface); border-radius: var(--radius-md); padding: 20px; margin-bottom: 16px; border: 1px solid var(--border-color); }
        .grading-question-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; padding-bottom: 12px; border-bottom: 1px solid var(--border-light); }
        .grading-question-text { font-weight: 600; color: var(--text-main); line-height: 1.8; margin-bottom: 12px; }
        .student-answer { background: #f0fdf4; border: 1px solid #bbf7d0; border-radius: var(--radius-md); padding: 16px; margin-bottom: 12px; }
        .student-answer.wrong { background: #fef2f2; border-color: #fecaca; }
        .student-answer.pending { background: #fffbeb; border-color: #fde68a; }
        .correct-answer { background: #ecfdf5; border: 2px solid var(--success); border-radius: var(--radius-md); padding: 12px; margin-bottom: 12px; color: #065f46; font-weight: 600; }
        .grade-input { width: 100px; padding: 8px 12px; border: 2px solid var(--border-color); border-radius: var(--radius-md); text-align: center; font-weight: 700; font-size: 1rem; }
        .grade-input:focus { outline: none; border-color: var(--primary-500); }
        .feedback-textarea { width: 100%; min-height: 80px; padding: 12px; border: 2px solid var(--border-color); border-radius: var(--radius-md); font-family: inherit; resize: vertical; }
        .auto-grade-badge { display: inline-block; padding: 4px 12px; border-radius: 20px; font-size: 0.75rem; font-weight: 700; background: #dbeafe; color: #1e40af; }
        .manual-grade-badge { display: inline-block; padding: 4px 12px; border-radius: 20px; font-size: 0.75rem; font-weight: 700; background: #fef3c7; color: #92400e; }
        .tabs-row { display: flex; gap: 8px; margin-bottom: 20px; border-bottom: 2px solid var(--border-color); padding-bottom: 8px; }
        .tab-item { padding: 10px 24px; border-radius: var(--radius-md) var(--radius-md) 0 0; border: none; background: transparent; color: var(--text-muted); font-weight: 600; cursor: pointer; font-family: inherit; transition: var(--transition); border-bottom: 3px solid transparent; margin-bottom: -11px; }
        .tab-item:hover { color: var(--primary-600); background: var(--primary-50); }
        .tab-item.active { color: var(--primary-700); border-bottom-color: var(--primary-600); background: var(--primary-50); }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
    </style>
</head>
<body>
    <div class="app-layout">
        <aside class="sidebar">
            <div class="sidebar-header">
                <div class="brand-logo">📚</div>
                <span class="brand-text">منصة الاختبارات</span>
            </div>
            <nav class="sidebar-nav">
                <a href="dashboard.html" class="nav-item"><span class="nav-icon">📊</span><span>لوحة التحكم</span></a>
                <a href="exams.html" class="nav-item"><span class="nav-icon">📝</span><span>الامتحانات</span></a>
                <a href="create-exam.html" class="nav-item"><span class="nav-icon">➕</span><span>إنشاء امتحان</span></a>
                <a href="questions.html" class="nav-item"><span class="nav-icon">❓</span><span>الأسئلة</span></a>
                <a href="groups.html" class="nav-item"><span class="nav-icon">👥</span><span>المجموعات</span></a>
                <a href="students.html" class="nav-item"><span class="nav-icon">👨‍🎓</span><span>الطلاب</span></a>
                <a href="submissions.html" class="nav-item active"><span class="nav-icon">📋</span><span>التسليمات</span></a>
                <a href="monitor.html" class="nav-item"><span class="nav-icon">👁️</span><span>المراقبة</span></a>
            </nav>
            <div class="sidebar-footer">
                <button class="nav-item" onclick="logout()" style="color: var(--danger);"><span class="nav-icon">🚪</span><span>تسجيل الخروج</span></button>
            </div>
        </aside>

        <main class="main-content">
            <div class="top-bar">
                <h1 class="page-title">📋 التسليمات والتصحيح</h1>
                <div class="user-menu">
                    <button class="btn btn-secondary" onclick="exportSubmissions()">📥 تصدير</button>
                </div>
            </div>

            <div class="content-wrapper">
                <!-- Tabs -->
                <div class="tabs-row">
                    <button class="tab-item active" onclick="showTab('pending', this)">⏳ بانتظار التصحيح</button>
                    <button class="tab-item" onclick="showTab('graded', this)">✅ تم التصحيح</button>
                    <button class="tab-item" onclick="showTab('all', this)">الكل</button>
                </div>

                <!-- Filters -->
                <div class="filter-bar">
                    <div class="search-box">
                        <span class="search-icon">🔍</span>
                        <input type="text" class="form-input" id="searchInput" placeholder="ابحث باسم الطالب أو الامتحان..." oninput="debounceSearch()">
                    </div>
                    <select class="form-select" id="examFilter" onchange="loadSubmissions()" style="min-width: 180px;">
                        <option value="all">كل الامتحانات</option>
                    </select>
                </div>

                <!-- Submissions List -->
                <div id="submissionsList">
                    <div class="empty-state">
                        <div class="empty-state-icon">📋</div>
                        <p>جاري تحميل التسليمات...</p>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <!-- Grade Modal -->
    <div class="modal-overlay" id="gradeModal">
        <div class="modal-content" style="width: 800px; max-width: 95%; max-height: 85vh; overflow-y: auto;">
            <h3>📋 تصحيح التسليم</h3>
            <div id="gradeContent"></div>
            <div style="display: flex; gap: 12px; justify-content: flex-end; margin-top: 20px; padding-top: 16px; border-top: 2px solid var(--border-color);">
                <button type="button" class="btn btn-secondary" onclick="App.Modal.close('gradeModal')">إلغاء</button>
                <button class="btn btn-primary" onclick="saveGrading()">💾 حفظ التصحيح</button>
            </div>
        </div>
    </div>

    <script src="../shared/supabase-client.js"></script>
    <script src="../shared/app.js"></script>

    <script>
        const currentUser = getUser();
        if (!currentUser || (currentUser.role !== 'teacher' && currentUser.role !== 'admin')) {
            window.location.href = '../login.html';
        }

        const teacherId = currentUser.id;
        let allSubmissions = [];
        let currentTab = 'pending';
        let currentAttemptId = null;
        let currentExamQuestions = [];
        let manualGrades = {}; // questionId -> {score, feedback}

        async function loadSubmissions() {
            App.Loading.show('جاري تحميل التسليمات...');
            try {
                // Get teacher's exams
                const { data: exams } = await sb.from(TABLES.exams).select('id, title').eq('teacher_id', teacherId);
                const examIds = exams?.map(e => e.id) || [];
                const examMap = {};
                exams?.forEach(e => examMap[e.id] = e.title);

                // Update exam filter
                const examFilter = document.getElementById('examFilter');
                examFilter.innerHTML = '<option value="all">كل الامتحانات</option>' + 
                    exams?.map(e => `<option value="${e.id}">${e.title}</option>`).join('') || '';

                if (examIds.length === 0) {
                    document.getElementById('submissionsList').innerHTML = `
                        <div class="empty-state">
                            <div class="empty-state-icon">📋</div>
                            <p>لا توجد تسليمات</p>
                        </div>
                    `;
                    App.Loading.hide();
                    return;
                }

                // Filter by exam if selected
                const selectedExam = examFilter.value;
                let query = sb.from(TABLES.attempts).select('*').in('exam_id', examIds);
                if (selectedExam !== 'all') query = query.eq('exam_id', selectedExam);

                const { data: attempts } = await query.order('created_at', { ascending: false });

                // Get student names
                const studentIds = [...new Set(attempts?.map(a => a.student_id) || [])];
                const { data: students } = studentIds.length > 0
                    ? await sb.from(TABLES.users).select('id, name').in('id', studentIds)
                    : { data: [] };
                const studentMap = {};
                students?.forEach(s => studentMap[s.id] = s.name);

                allSubmissions = (attempts || []).map(a => ({
                    ...a,
                    examName: examMap[a.exam_id] || 'غير معروف',
                    studentName: studentMap[a.student_id] || 'غير معروف',
                    isGraded: a.status === 'graded' || a.status === 'completed',
                    needsManual: a.needs_manual_review === true
                }));

                renderSubmissions();
            } catch (error) {
                console.error('Error:', error);
                App.Toast.error('حدث خطأ');
            }
            App.Loading.hide();
        }

        function renderSubmissions() {
            const container = document.getElementById('submissionsList');
            const search = document.getElementById('searchInput').value.toLowerCase();

            let filtered = allSubmissions.filter(s => {
                const matchSearch = !search || s.studentName?.toLowerCase().includes(search) || s.examName?.toLowerCase().includes(search);
                const matchTab = currentTab === 'all' ? true : currentTab === 'pending' ? !s.isGraded : s.isGraded;
                return matchSearch && matchTab;
            });

            if (filtered.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-state-icon">📋</div>
                        <p>لا توجد تسليمات ${currentTab === 'pending' ? 'بانتظار التصحيح' : currentTab === 'graded' ? 'تم تصحيحها' : ''}</p>
                    </div>
                `;
                return;
            }

            container.innerHTML = filtered.map(s => {
                const pct = s.total_points > 0 ? Math.round((s.score / s.total_points) * 100) : 0;
                const rowClass = s.isGraded ? 'graded' : s.needsManual ? 'pending' : '';
                const scoreClass = s.isGraded ? '' : 'pending';
                const statusBadge = s.isGraded 
                    ? '<span class="badge badge-success">✅ تم التصحيح</span>' 
                    : s.needsManual 
                        ? '<span class="badge badge-warning">⏳ يحتاج تصحيح يدوي</span>'
                        : '<span class="badge badge-info">🤖 تصحيح تلقائي</span>';

                return `
                    <div class="submission-row ${rowClass}">
                        <div class="submission-info">
                            <h4>${App.sanitizeHtml(s.examName)}</h4>
                            <p>👨‍🎓 ${App.sanitizeHtml(s.studentName)}</p>
                            <div class="submission-meta">
                                <span>📅 ${App.DateTime.relative(s.created_at)}</span>
                                <span>⏱️ ${s.duration ? Math.round(s.duration / 60) + ' دقيقة' : 'غير محدد'}</span>
                                ${statusBadge}
                            </div>
                        </div>
                        <div style="display: flex; align-items: center; gap: 16px;">
                            <div style="text-align: center;">
                                <div class="score-display ${scoreClass}">${s.score}/${s.total_points}</div>
                                <div style="font-size: 0.75rem; color: var(--text-muted);">${pct}%</div>
                            </div>
                            <button class="btn btn-sm btn-primary" onclick="gradeSubmission(${s.id})">✏️ تصحيح</button>
                        </div>
                    </div>
                `;
            }).join('');
        }

        function showTab(tab, btn) {
            currentTab = tab;
            document.querySelectorAll('.tab-item').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            renderSubmissions();
        }

        const debounceSearch = App.debounce(() => renderSubmissions(), 300);

        async function gradeSubmission(attemptId) {
            currentAttemptId = attemptId;
            manualGrades = {};
            App.Loading.show('جاري تحميل التفاصيل...');

            try {
                const submission = allSubmissions.find(s => s.id === attemptId);
                if (!submission) return;

                // Get exam questions
                const { data: examQuestions } = await sb.from(TABLES.exam_questions)
                    .select('*')
                    .eq('exam_id', submission.exam_id)
                    .order('question_order', { ascending: true });

                const questionIds = examQuestions?.map(eq => eq.question_id) || [];

                // Get question details
                const { data: questions } = questionIds.length > 0
                    ? await sb.from(TABLES.questions).select('*').in('id', questionIds)
                    : { data: [] };
                const questionMap = {};
                questions?.forEach(q => questionMap[q.id] = q);

                // Get student answers (from exam_attempts or answers table)
                const { data: answers } = await sb.from('exam_answers')
                    .select('*')
                    .eq('attempt_id', attemptId);
                const answerMap = {};
                answers?.forEach(a => answerMap[a.question_id] = a);

                currentExamQuestions = examQuestions || [];

                // Build grading content
                let content = `
                    <div style="background: var(--primary-50); padding: 16px; border-radius: var(--radius-md); margin-bottom: 20px;">
                        <div style="display: flex; justify-content: space-between; align-items: center;">
                            <div>
                                <div style="font-weight: 700; font-size: 1.125rem;">${App.sanitizeHtml(submission.examName)}</div>
                                <div style="color: var(--text-muted); font-size: 0.875rem;">👨‍🎓 ${App.sanitizeHtml(submission.studentName)}</div>
                            </div>
                            <div style="text-align: center;">
                                <div style="font-size: 1.5rem; font-weight: 800; color: var(--primary-600);">${submission.score}/${submission.total_points}</div>
                                <div style="font-size: 0.75rem; color: var(--text-muted);">النتيجة الحالية</div>
                            </div>
                        </div>
                    </div>
                `;

                content += (examQuestions || []).map((eq, idx) => {
                    const q = questionMap[eq.question_id];
                    if (!q) return '';

                    const answer = answerMap[eq.question_id];
                    const isAutoGraded = q.type === 'mcq' || q.type === 'true_false';
                    const isCorrect = answer?.is_correct === true;
                    const earnedPoints = answer?.score || 0;
                    const maxPoints = eq.points || q.points || 1;

                    let answerDisplay = '';
                    let correctDisplay = '';

                    if (q.type === 'mcq') {
                        try {
                            const opts = typeof q.options === 'string' ? JSON.parse(q.options) : q.options;
                            const studentAnswer = answer?.answer_text;
                            const correctIdx = q.correct_answer;
                            answerDisplay = `<div class="student-answer ${isCorrect ? '' : 'wrong'}">
                                <strong>إجابة الطالب:</strong> ${studentAnswer ? String.fromCharCode(65 + parseInt(studentAnswer)) + '. ' + App.sanitizeHtml(opts[parseInt(studentAnswer)] || '') : 'لم يجب'}
                            </div>`;
                            correctDisplay = `<div class="correct-answer">الإجابة الصحيحة: ${String.fromCharCode(65 + correctIdx)}. ${App.sanitizeHtml(opts[correctIdx] || '')}</div>`;
                        } catch (e) {}
                    } else if (q.type === 'true_false') {
                        const studentAnswer = answer?.answer_text;
                        const correctAnswer = q.correct_answer === 0 ? 'صحيح' : 'خطأ';
                        answerDisplay = `<div class="student-answer ${isCorrect ? '' : 'wrong'}">
                            <strong>إجابة الطالب:</strong> ${studentAnswer === '0' ? '✅ صحيح' : studentAnswer === '1' ? '❌ خطأ' : 'لم يجب'}
                        </div>`;
                        correctDisplay = `<div class="correct-answer">الإجابة الصحيحة: ${correctAnswer === 'صحيح' ? '✅ صحيح' : '❌ خطأ'}</div>`;
                    } else if (q.type === 'essay') {
                        answerDisplay = `<div class="student-answer pending">
                            <strong>إجابة الطالب:</strong>
                            <div style="margin-top: 8px; line-height: 1.8;">${App.sanitizeHtml(answer?.answer_text || 'لم يجب')}</div>
                        </div>`;
                    } else if (q.type === 'fill_blank') {
                        answerDisplay = `<div class="student-answer ${isCorrect ? '' : 'wrong'}">
                            <strong>إجابة الطالب:</strong> ${App.sanitizeHtml(answer?.answer_text || 'لم يجب')}
                        </div>`;
                        correctDisplay = `<div class="correct-answer">الإجابة الصحيحة: ${App.sanitizeHtml(q.correct_answer_text || '')}</div>`;
                    }

                    return `
                        <div class="grading-question">
                            <div class="grading-question-header">
                                <div style="display: flex; align-items: center; gap: 12px;">
                                    <div style="background: var(--primary-500); color: white; width: 32px; height: 32px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 700;">${idx + 1}</div>
                                    <div>
                                        <span class="${isAutoGraded ? 'auto-grade-badge' : 'manual-grade-badge'}">${isAutoGraded ? '🤖 تلقائي' : '✏️ يدوي'}</span>
                                        <span style="font-size: 0.75rem; color: var(--text-muted); margin-right: 8px;">${q.type === 'mcq' ? 'اختيار من متعدد' : q.type === 'true_false' ? 'صح/خطأ' : q.type === 'essay' ? 'مقالي' : 'ملء فراغ'}</span>
                                    </div>
                                </div>
                                <div style="display: flex; align-items: center; gap: 8px;">
                                    <span style="font-size: 0.875rem; color: var(--text-muted);">الدرجة:</span>
                                    <input type="number" class="grade-input" id="grade_${q.id}" value="${earnedPoints}" min="0" max="${maxPoints}" step="0.5"
                                        onchange="updateManualGrade(${q.id}, this.value, ${maxPoints})">
                                    <span style="font-weight: 700;">/ ${maxPoints}</span>
                                </div>
                            </div>
                            <div class="grading-question-text">${App.sanitizeHtml(q.question_text || '')}</div>
                            ${answerDisplay}
                            ${correctDisplay}
                            <div class="form-group" style="margin-top: 12px; margin-bottom: 0;">
                                <label style="font-size: 0.875rem; color: var(--text-muted);">تعليق المعلم (اختياري)</label>
                                <textarea class="feedback-textarea" id="feedback_${q.id}" placeholder="اكتب تعليقك على إجابة الطالب...">${answer?.feedback || ''}</textarea>
                            </div>
                        </div>
                    `;
                }).join('');

                // Overall feedback
                content += `
                    <div class="grading-section">
                        <div class="form-group" style="margin-bottom: 0;">
                            <label class="form-label">تعليق عام على الامتحان (اختياري)</label>
                            <textarea class="feedback-textarea" id="overallFeedback" placeholder="اكتب تعليقك العام على أداء الطالب...">${submission.feedback || ''}</textarea>
                        </div>
                    </div>
                `;

                document.getElementById('gradeContent').innerHTML = content;
                App.Modal.open('gradeModal');

            } catch (error) {
                console.error('Error:', error);
                App.Toast.error('حدث خطأ');
            }
            App.Loading.hide();
        }

        function updateManualGrade(questionId, score, maxPoints) {
            const val = parseFloat(score);
            if (val > maxPoints) {
                App.Toast.warning(`الدرجة لا يمكن أن تتجاوز ${maxPoints}`);
                document.getElementById(`grade_${questionId}`).value = maxPoints;
                return;
            }
            manualGrades[questionId] = { score: val };
        }

        async function saveGrading() {
            if (!currentAttemptId) return;

            App.Loading.show('جاري حفظ التصحيح...');
            try {
                const submission = allSubmissions.find(s => s.id === currentAttemptId);

                // Calculate new total score
                let totalScore = 0;
                for (const eq of currentExamQuestions) {
                    const qId = eq.question_id;
                    const gradeInput = document.getElementById(`grade_${qId}`);
                    const feedbackInput = document.getElementById(`feedback_${qId}`);

                    if (gradeInput) {
                        const score = parseFloat(gradeInput.value) || 0;
                        totalScore += score;

                        // Update answer record
                        const { error } = await sb.from('exam_answers')
                            .update({ 
                                score: score, 
                                feedback: feedbackInput?.value || '',
                                graded_by: teacherId,
                                graded_at: new Date().toISOString()
                            })
                            .eq('attempt_id', currentAttemptId)
                            .eq('question_id', qId);

                        if (error) console.warn('Answer update error:', error);
                    }
                }

                // Update attempt
                const overallFeedback = document.getElementById('overallFeedback')?.value || '';
                await sb.from(TABLES.attempts)
                    .update({ 
                        score: totalScore, 
                        feedback: overallFeedback,
                        status: 'graded',
                        graded_by: teacherId,
                        graded_at: new Date().toISOString()
                    })
                    .eq('id', currentAttemptId);

                App.Toast.success('✅ تم حفظ التصحيح بنجاح');
                App.Modal.close('gradeModal');
                loadSubmissions();

            } catch (error) {
                console.error('Error:', error);
                App.Toast.error('حدث خطأ في الحفظ');
            }
            App.Loading.hide();
        }

        function exportSubmissions() {
            const data = allSubmissions.map(s => ({
                الامتحان: s.examName,
                الطالب: s.studentName,
                الدرجة: `${s.score}/${s.total_points}`,
                النسبة: s.total_points > 0 ? Math.round((s.score / s.total_points) * 100) + '%' : '0%',
                الحالة: s.isGraded ? 'تم التصحيح' : 'بانتظار التصحيح',
                التاريخ: App.DateTime.dateOnly(s.created_at)
            }));
            App.exportCSV(data, 'submissions_export');
        }

        loadSubmissions();
    </script>
</body>
</html>
