<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>معاينة الامتحان - منصة الاختبارات</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="../shared/styles.css">
    <style>
        .preview-header { background: linear-gradient(135deg, var(--primary-600), var(--primary-700)); color: white; padding: 32px; border-radius: var(--radius-lg); margin-bottom: 24px; text-align: center; }
        .preview-header h2 { font-size: 1.75rem; margin-bottom: 12px; }
        .preview-header p { opacity: 0.9; }
        .preview-meta { display: flex; justify-content: center; gap: 32px; margin-top: 20px; flex-wrap: wrap; }
        .preview-meta-item { text-align: center; }
        .preview-meta-item .value { font-size: 1.5rem; font-weight: 800; }
        .preview-meta-item .label { font-size: 0.875rem; opacity: 0.8; }
        .question-preview { background: var(--bg-surface); border: 1px solid var(--border-color); border-radius: var(--radius-lg); padding: 24px; margin-bottom: 20px; }
        .question-preview-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; padding-bottom: 12px; border-bottom: 1px solid var(--border-light); }
        .question-number { background: var(--primary-500); color: white; width: 32px; height: 32px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 0.875rem; }
        .question-points { background: var(--warning); color: white; padding: 4px 12px; border-radius: 20px; font-size: 0.75rem; font-weight: 700; }
        .question-text-preview { font-size: 1.125rem; font-weight: 600; line-height: 1.8; margin-bottom: 16px; color: var(--text-main); }
        .options-preview { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .option-preview { padding: 14px 18px; background: var(--bg-body); border: 2px solid var(--border-color); border-radius: var(--radius-md); cursor: pointer; transition: var(--transition); font-size: 0.9375rem; }
        .option-preview:hover { border-color: var(--primary-300); background: var(--primary-50); }
        .option-preview.correct { border-color: var(--success); background: #d1fae5; color: #065f46; font-weight: 700; }
        .option-letter { display: inline-block; width: 28px; height: 28px; background: var(--primary-500); color: white; border-radius: 50%; text-align: center; line-height: 28px; font-weight: 700; font-size: 0.75rem; margin-left: 10px; }
        .essay-answer-preview { background: var(--bg-body); border: 2px dashed var(--border-color); border-radius: var(--radius-md); padding: 40px 20px; text-align: center; color: var(--text-muted); }
        .fill-blank-preview { background: var(--bg-body); border-radius: var(--radius-md); padding: 16px; }
        .blank-input { display: inline-block; min-width: 120px; border-bottom: 2px solid var(--primary-500); margin: 0 4px; }
        .true-false-options { display: flex; gap: 16px; }
        .tf-option { flex: 1; padding: 16px; background: var(--bg-body); border: 2px solid var(--border-color); border-radius: var(--radius-md); text-align: center; font-weight: 600; cursor: pointer; transition: var(--transition); }
        .tf-option:hover { border-color: var(--primary-300); }
        .tf-option.correct { border-color: var(--success); background: #d1fae5; color: #065f46; }
        .preview-actions { display: flex; gap: 12px; justify-content: center; margin-top: 32px; padding: 24px; background: var(--bg-body); border-radius: var(--radius-lg); border: 1px solid var(--border-color); position: sticky; bottom: 24px; }
        .badge-preview { display: inline-block; padding: 4px 10px; border-radius: 12px; font-size: 0.625rem; font-weight: 700; margin-left: 8px; }
        .badge-mcq { background: #dbeafe; color: #1e40af; }
        .badge-essay { background: #fef3c7; color: #92400e; }
        .badge-true_false { background: #d1fae5; color: #065f46; }
        .badge-fill_blank { background: #fce7f3; color: #be185d; }
    </style>
</head>
<body>
    <div class="app-layout">
        <aside class="sidebar">
            <div class="sidebar-header">
                <div class="brand-logo">📚</div>
                <span class="brand-text">منصة الاختبارات</span>
            </div>
            <nav class="sidebar-nav">
                <a href="dashboard.html" class="nav-item"><span class="nav-icon">📊</span><span>لوحة التحكم</span></a>
                <a href="exams.html" class="nav-item"><span class="nav-icon">📝</span><span>الامتحانات</span></a>
                <a href="create-exam.html" class="nav-item"><span class="nav-icon">➕</span><span>إنشاء امتحان</span></a>
                <a href="questions.html" class="nav-item"><span class="nav-icon">❓</span><span>الأسئلة</span></a>
                <a href="groups.html" class="nav-item"><span class="nav-icon">👥</span><span>المجموعات</span></a>
                <a href="students.html" class="nav-item"><span class="nav-icon">👨‍🎓</span><span>الطلاب</span></a>
                <a href="submissions.html" class="nav-item"><span class="nav-icon">📋</span><span>التسليمات</span></a>
                <a href="monitor.html" class="nav-item"><span class="nav-icon">👁️</span><span>المراقبة</span></a>
            </nav>
            <div class="sidebar-footer">
                <button class="nav-item" onclick="logout()" style="color: var(--danger);"><span class="nav-icon">🚪</span><span>تسجيل الخروج</span></button>
            </div>
        </aside>

        <main class="main-content">
            <div class="top-bar">
                <h1 class="page-title">👁️ معاينة الامتحان</h1>
                <div class="user-menu">
                    <button class="btn btn-secondary" onclick="window.close()">❌ إغلاق</button>
                </div>
            </div>

            <div class="content-wrapper">
                <!-- Exam Header -->
                <div class="preview-header" id="examHeader">
                    <h2 id="previewTitle">جاري التحميل...</h2>
                    <p id="previewDesc"></p>
                    <div class="preview-meta">
                        <div class="preview-meta-item">
                            <div class="value" id="previewDuration">-</div>
                            <div class="label">دقيقة</div>
                        </div>
                        <div class="preview-meta-item">
                            <div class="value" id="previewPoints">-</div>
                            <div class="label">نقطة</div>
                        </div>
                        <div class="preview-meta-item">
                            <div class="value" id="previewQuestions">-</div>
                            <div class="label">سؤال</div>
                        </div>
                    </div>
                </div>

                <!-- Questions -->
                <div id="questionsPreview">
                    <div class="empty-state">
                        <div class="empty-state-icon">📝</div>
                        <p>جاري تحميل الأسئلة...</p>
                    </div>
                </div>

                <!-- Preview Actions -->
                <div class="preview-actions">
                    <span style="color: var(--text-muted);">هذه معاينة فقط - الطالب سيرى الامتحان بهذا الشكل</span>
                    <button class="btn btn-primary" onclick="window.print()">🖨️ طباعة</button>
                    <button class="btn btn-secondary" onclick="location.href='exams.html'">↩️ رجوع للامتحانات</button>
                </div>
            </div>
        </main>
    </div>

    <script src="../shared/supabase-client.js"></script>
    <script src="../shared/app.js"></script>

    <script>
        const currentUser = getUser();
        if (!currentUser || (currentUser.role !== 'teacher' && currentUser.role !== 'admin')) {
            window.location.href = '../login.html';
        }

        const urlParams = new URLSearchParams(window.location.search);
        const examId = urlParams.get('id');

        if (!examId) {
            App.Toast.error('معرف الامتحان غير موجود');
            setTimeout(() => location.href = 'exams.html', 1500);
        }

        async function loadExamPreview() {
            App.Loading.show('جاري تحميل الامتحان...');
            try {
                // Load exam
                const { data: exam, error: examError } = await sb.from(TABLES.exams)
                    .select('*')
                    .eq('id', examId)
                    .single();

                if (examError || !exam) throw new Error('الامتحان غير موجود');

                document.getElementById('previewTitle').textContent = exam.title;
                document.getElementById('previewDesc').textContent = exam.description || 'لا يوجد وصف';
                document.getElementById('previewDuration').textContent = exam.duration;
                document.getElementById('previewPoints').textContent = exam.total_points;

                // Load exam questions with question details
                const { data: examQuestions, error: eqError } = await sb.from(TABLES.exam_questions)
                    .select('*')
                    .eq('exam_id', examId)
                    .order('question_order', { ascending: true });

                if (eqError) throw eqError;

                document.getElementById('previewQuestions').textContent = examQuestions?.length || 0;

                if (!examQuestions || examQuestions.length === 0) {
                    document.getElementById('questionsPreview').innerHTML = `
                        <div class="empty-state">
                            <div class="empty-state-icon">❓</div>
                            <p>لا توجد أسئلة في هذا الامتحان</p>
                        </div>
                    `;
                    App.Loading.hide();
                    return;
                }

                // Load question details
                const questionIds = examQuestions.map(eq => eq.question_id);
                const { data: questions } = await sb.from(TABLES.questions)
                    .select('*')
                    .in('id', questionIds);

                const questionMap = {};
                questions?.forEach(q => { questionMap[q.id] = q; });

                // Render questions
                const container = document.getElementById('questionsPreview');
                container.innerHTML = examQuestions.map((eq, idx) => {
                    const q = questionMap[eq.question_id];
                    if (!q) return '';

                    const typeText = q.type === 'mcq' ? 'اختيار من متعدد' : 
                                    q.type === 'true_false' ? 'صح/خطأ' : 
                                    q.type === 'essay' ? 'مقالي' : 'ملء فراغ';
                    const badgeClass = `badge-${q.type}`;

                    let optionsHtml = '';

                    if (q.type === 'mcq' && q.options) {
                        try {
                            const opts = typeof q.options === 'string' ? JSON.parse(q.options) : q.options;
                            optionsHtml = `<div class="options-preview">${opts.map((opt, i) => 
                                `<div class="option-preview ${i === q.correct_answer ? 'correct' : ''}">
                                    <span class="option-letter">${String.fromCharCode(65 + i)}</span>
                                    ${App.sanitizeHtml(opt)}
                                </div>`
                            ).join('')}</div>`;
                        } catch (e) {}
                    } else if (q.type === 'true_false') {
                        optionsHtml = `<div class="true-false-options">
                            <div class="tf-option ${q.correct_answer === 0 ? 'correct' : ''}">✅ صحيح</div>
                            <div class="tf-option ${q.correct_answer === 1 ? 'correct' : ''}">❌ خطأ</div>
                        </div>`;
                    } else if (q.type === 'essay') {
                        optionsHtml = `<div class="essay-answer-preview">
                            <div style="font-size: 2rem; margin-bottom: 8px;">✏️</div>
                            <div>مساحة إجابة مقالية (الطالب يكتب إجابته هنا)</div>
                        </div>`;
                    } else if (q.type === 'fill_blank') {
                        const text = q.question_text || '';
                        const filled = text.replace(/_{2,}/g, '<span class="blank-input"></span>');
                        optionsHtml = `<div class="fill-blank-preview">${App.sanitizeHtml(filled)}</div>`;
                    }

                    return `
                        <div class="question-preview">
                            <div class="question-preview-header">
                                <div style="display: flex; align-items: center; gap: 12px;">
                                    <div class="question-number">${idx + 1}</div>
                                    <span class="badge-preview ${badgeClass}">${typeText}</span>
                                </div>
                                <div class="question-points">${eq.points || q.points || 1} نقطة</div>
                            </div>
                            <div class="question-text-preview">${App.sanitizeHtml(q.question_text || '')}</div>
                            ${optionsHtml}
                            ${q.type === 'mcq' || q.type === 'true_false' ? `
                                <div style="margin-top: 12px; padding: 8px 12px; background: #d1fae5; border-radius: var(--radius-sm); color: #065f46; font-size: 0.875rem; font-weight: 600;">
                                    ✅ الإجابة الصحيحة: ${q.type === 'mcq' ? String.fromCharCode(65 + (q.correct_answer || 0)) : (q.correct_answer === 0 ? 'صحيح' : 'خطأ')}
                                </div>
                            ` : ''}
                        </div>
                    `;
                }).join('');

            } catch (error) {
                console.error('Error:', error);
                App.Toast.error('حدث خطأ في تحميل الامتحان');
            }
            App.Loading.hide();
        }

        loadExamPreview();
    </script>
</body>
</html>
