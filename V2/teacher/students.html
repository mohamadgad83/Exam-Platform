<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>طلابي - منصة الاختبارات</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="../shared/styles.css">
    <style>
        .filter-bar { display: flex; gap: 12px; margin-bottom: 20px; flex-wrap: wrap; }
        .search-box { flex: 1; min-width: 250px; position: relative; }
        .search-box input { width: 100%; padding: 10px 16px 10px 40px; }
        .search-box .search-icon { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); }
        .student-row { display: flex; align-items: center; justify-content: space-between; padding: 16px; background: var(--bg-body); border-radius: var(--radius-md); margin-bottom: 10px; transition: var(--transition); }
        .student-row:hover { background: var(--primary-50); }
        .student-info { display: flex; align-items: center; gap: 14px; }
        .student-avatar { width: 48px; height: 48px; border-radius: 50%; background: linear-gradient(135deg, var(--primary-500), var(--primary-700)); color: white; display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 1.125rem; }
        .student-details h4 { font-size: 1rem; font-weight: 700; color: var(--text-main); margin-bottom: 2px; }
        .student-details p { font-size: 0.875rem; color: var(--text-muted); }
        .student-stats { display: flex; gap: 24px; }
        .student-stat { text-align: center; }
        .student-stat .value { font-size: 1.25rem; font-weight: 800; color: var(--primary-600); }
        .student-stat .label { font-size: 0.75rem; color: var(--text-muted); }
        .performance-bar { width: 60px; height: 60px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 800; font-size: 0.875rem; color: white; }
        .perf-excellent { background: linear-gradient(135deg, #10b981, #34d399); }
        .perf-good { background: linear-gradient(135deg, #3b82f6, #60a5fa); }
        .perf-average { background: linear-gradient(135deg, #f59e0b, #fbbf24); }
        .perf-poor { background: linear-gradient(135deg, #ef4444, #f87171); }
        .group-tag { display: inline-block; padding: 2px 10px; border-radius: 20px; font-size: 0.625rem; font-weight: 700; background: var(--primary-100); color: var(--primary-700); margin-left: 4px; }
        .tabs-row { display: flex; gap: 8px; margin-bottom: 20px; }
        .tab-pill { padding: 8px 20px; border-radius: 40px; border: none; background: var(--bg-body); color: var(--text-secondary); font-weight: 600; cursor: pointer; font-family: inherit; transition: var(--transition); }
        .tab-pill:hover { background: var(--primary-50); color: var(--primary-600); }
        .tab-pill.active { background: linear-gradient(135deg, var(--primary-500), var(--primary-600)); color: white; }
    </style>
</head>
<body>
    <div class="app-layout">
        <aside class="sidebar">
            <div class="sidebar-header">
                <div class="brand-logo">📚</div>
                <span class="brand-text">منصة الاختبارات</span>
            </div>
            <nav class="sidebar-nav">
                <a href="dashboard.html" class="nav-item"><span class="nav-icon">📊</span><span>لوحة التحكم</span></a>
                <a href="exams.html" class="nav-item"><span class="nav-icon">📝</span><span>الامتحانات</span></a>
                <a href="create-exam.html" class="nav-item"><span class="nav-icon">➕</span><span>إنشاء امتحان</span></a>
                <a href="questions.html" class="nav-item"><span class="nav-icon">❓</span><span>الأسئلة</span></a>
                <a href="groups.html" class="nav-item"><span class="nav-icon">👥</span><span>المجموعات</span></a>
                <a href="students.html" class="nav-item active"><span class="nav-icon">👨‍🎓</span><span>الطلاب</span></a>
                <a href="submissions.html" class="nav-item"><span class="nav-icon">📋</span><span>التسليمات</span></a>
                <a href="monitor.html" class="nav-item"><span class="nav-icon">👁️</span><span>المراقبة</span></a>
            </nav>
            <div class="sidebar-footer">
                <button class="nav-item" onclick="logout()" style="color: var(--danger);"><span class="nav-icon">🚪</span><span>تسجيل الخروج</span></button>
            </div>
        </aside>

        <main class="main-content">
            <div class="top-bar">
                <h1 class="page-title">👨‍🎓 طلابي</h1>
                <div class="user-menu">
                    <button class="btn btn-secondary" onclick="exportStudents()">📥 تصدير</button>
                </div>
            </div>

            <div class="content-wrapper">
                <!-- Tabs -->
                <div class="tabs-row">
                    <button class="tab-pill active" onclick="filterByGroup('all', this)">الكل</button>
                    <button class="tab-pill" onclick="filterByGroup('ungrouped', this)">غير مرتبطين</button>
                </div>

                <!-- Filters -->
                <div class="filter-bar">
                    <div class="search-box">
                        <span class="search-icon">🔍</span>
                        <input type="text" class="form-input" id="searchInput" placeholder="ابحث بالاسم أو البريد..." oninput="debounceSearch()">
                    </div>
                    <select class="form-select" id="groupFilter" onchange="loadStudents()" style="min-width: 180px;">
                        <option value="all">كل المجموعات</option>
                    </select>
                </div>

                <!-- Students List -->
                <div class="card">
                    <div id="studentsList">
                        <div class="empty-state">
                            <div class="empty-state-icon">👨‍🎓</div>
                            <p>جاري تحميل الطلاب...</p>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <!-- Student Detail Modal -->
    <div class="modal-overlay" id="studentModal">
        <div class="modal-content" style="width: 700px; max-width: 95%;">
            <h3>👨‍🎓 تفاصيل الطالب</h3>
            <div id="studentDetail"></div>
            <div style="margin-top: 20px;">
                <h4 style="margin-bottom: 12px;">📊 أداء الامتحانات</h4>
                <div id="studentAttempts"></div>
            </div>
            <div style="display: flex; gap: 12px; justify-content: flex-end; margin-top: 20px;">
                <button class="btn btn-secondary" onclick="App.Modal.close('studentModal')">إغلاق</button>
            </div>
        </div>
    </div>

    <script src="../shared/supabase-client.js"></script>
    <script src="../shared/app.js"></script>

    <script>
        const currentUser = getUser();
        if (!currentUser || (currentUser.role !== 'teacher' && currentUser.role !== 'admin')) {
            window.location.href = '../login.html';
        }

        const teacherId = currentUser.id;
        let allStudents = [];
        let allGroups = [];
        let currentGroupFilter = 'all';

        async function loadStudents() {
            App.Loading.show('جاري تحميل الطلاب...');
            try {
                // Get teacher's groups
                const { data: groups } = await sb.from(TABLES.groups).select('*').eq('teacher_id', teacherId);
                allGroups = groups || [];
                const groupIds = allGroups.map(g => g.id);

                // Get group filter
                const filterGroupId = document.getElementById('groupFilter').value;
                let memberQuery = sb.from(TABLES.group_members).select('student_id, group_id');

                if (filterGroupId !== 'all') {
                    memberQuery = memberQuery.eq('group_id', filterGroupId);
                } else if (groupIds.length > 0) {
                    memberQuery = memberQuery.in('group_id', groupIds);
                }

                const { data: members } = await memberQuery;
                const studentIds = [...new Set(members?.map(m => m.student_id) || [])];

                if (studentIds.length === 0) {
                    document.getElementById('studentsList').innerHTML = `
                        <div class="empty-state">
                            <div class="empty-state-icon">👨‍🎓</div>
                            <p>لا يوجد طلاب في مجموعاتك</p>
                            <a href="groups.html" class="btn btn-primary" style="margin-top: 16px;">👥 إدارة المجموعات</a>
                        </div>
                    `;
                    App.Loading.hide();
                    return;
                }

                // Get student details
                const { data: students } = await sb.from(TABLES.users)
                    .select('*')
                    .in('id', studentIds)
                    .eq('role', 'student');

                // Get attempts for each student
                const { data: teacherExams } = await sb.from(TABLES.exams).select('id').eq('teacher_id', teacherId);
                const examIds = teacherExams?.map(e => e.id) || [];

                let attempts = [];
                if (examIds.length > 0) {
                    const { data: attData } = await sb.from(TABLES.attempts)
                        .select('student_id, score, total_points, exam_id, created_at')
                        .in('exam_id', examIds)
                        .in('student_id', studentIds);
                    attempts = attData || [];
                }

                // Build student data with stats
                allStudents = (students || []).map(s => {
                    const studentAttempts = attempts.filter(a => a.student_id === s.id);
                    const avgScore = studentAttempts.length > 0
                        ? Math.round(studentAttempts.reduce((sum, a) => sum + (a.score / a.total_points * 100), 0) / studentAttempts.length)
                        : 0;
                    const studentGroups = members?.filter(m => m.student_id === s.id).map(m => m.group_id) || [];
                    return { ...s, attempts: studentAttempts.length, avgScore, groups: studentGroups };
                });

                renderStudents(allStudents);
                updateGroupFilter();

            } catch (error) {
                console.error('Error:', error);
                App.Toast.error('حدث خطأ');
            }
            App.Loading.hide();
        }

        function renderStudents(students) {
            const container = document.getElementById('studentsList');
            const search = document.getElementById('searchInput').value.toLowerCase();

            const filtered = students.filter(s => 
                !search || s.name?.toLowerCase().includes(search) || s.email?.toLowerCase().includes(search)
            );

            if (filtered.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-state-icon">👨‍🎓</div>
                        <p>لا يوجد طلاب مطابقين</p>
                    </div>
                `;
                return;
            }

            container.innerHTML = filtered.map(s => {
                const perfClass = s.avgScore >= 90 ? 'perf-excellent' : s.avgScore >= 70 ? 'perf-good' : s.avgScore >= 50 ? 'perf-average' : 'perf-poor';
                const groupNames = s.groups.map(gid => {
                    const g = allGroups.find(grp => grp.id === gid);
                    return g ? `<span class="group-tag">${App.sanitizeHtml(g.name)}</span>` : '';
                }).join('');

                return `
                    <div class="student-row" onclick="viewStudent(${s.id})" style="cursor: pointer;">
                        <div class="student-info">
                            <div class="student-avatar">${s.name?.charAt(0) || '?'}</div>
                            <div class="student-details">
                                <h4>${App.sanitizeHtml(s.name)}</h4>
                                <p>${s.email || s.phone || ''} ${groupNames}</p>
                            </div>
                        </div>
                        <div class="student-stats">
                            <div class="student-stat">
                                <div class="value">${s.attempts}</div>
                                <div class="label">امتحان</div>
                            </div>
                            <div class="student-stat">
                                <div class="value">${s.avgScore}%</div>
                                <div class="label">متوسط</div>
                            </div>
                            <div class="performance-bar ${perfClass}">${s.avgScore}%</div>
                        </div>
                    </div>
                `;
            }).join('');
        }

        const debounceSearch = App.debounce(() => renderStudents(allStudents), 300);

        function updateGroupFilter() {
            const select = document.getElementById('groupFilter');
            select.innerHTML = '<option value="all">كل المجموعات</option>' + 
                allGroups.map(g => `<option value="${g.id}">${g.name}</option>`).join('');
        }

        function filterByGroup(type, btn) {
            currentGroupFilter = type;
            document.querySelectorAll('.tab-pill').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            loadStudents();
        }

        async function viewStudent(studentId) {
            const student = allStudents.find(s => s.id === studentId);
            if (!student) return;

            App.Loading.show('جاري التحميل...');
            try {
                document.getElementById('studentDetail').innerHTML = `
                    <div style="display: flex; align-items: center; gap: 16px; margin-bottom: 20px;">
                        <div class="student-avatar" style="width: 64px; height: 64px; font-size: 1.5rem;">${student.name?.charAt(0) || '?'}</div>
                        <div>
                            <h3 style="font-size: 1.25rem; font-weight: 700;">${App.sanitizeHtml(student.name)}</h3>
                            <p style="color: var(--text-muted);">${student.email || ''} | ${student.phone || ''}</p>
                            <div style="margin-top: 6px;">${student.groups.map(gid => {
                                const g = allGroups.find(grp => grp.id === gid);
                                return g ? `<span class="group-tag">${App.sanitizeHtml(g.name)}</span>` : '';
                            }).join('')}</div>
                        </div>
                    </div>
                    <div style="display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; margin-bottom: 20px;">
                        <div style="background: var(--bg-body); padding: 16px; border-radius: var(--radius-md); text-align: center;">
                            <div style="font-size: 1.5rem; font-weight: 800; color: var(--primary-600);">${student.attempts}</div>
                            <div style="font-size: 0.75rem; color: var(--text-muted);">امتحان منجز</div>
                        </div>
                        <div style="background: var(--bg-body); padding: 16px; border-radius: var(--radius-md); text-align: center;">
                            <div style="font-size: 1.5rem; font-weight: 800; color: var(--primary-600);">${student.avgScore}%</div>
                            <div style="font-size: 0.75rem; color: var(--text-muted);">متوسط الأداء</div>
                        </div>
                        <div style="background: var(--bg-body); padding: 16px; border-radius: var(--radius-md); text-align: center;">
                            <div style="font-size: 1.5rem; font-weight: 800; color: var(--primary-600);">${student.groups.length}</div>
                            <div style="font-size: 0.75rem; color: var(--text-muted);">مجموعة</div>
                        </div>
                    </div>
                `;

                // Load attempts
                const { data: teacherExams } = await sb.from(TABLES.exams).select('id, title').eq('teacher_id', teacherId);
                const examMap = {};
                teacherExams?.forEach(e => examMap[e.id] = e.title);

                const { data: attempts } = await sb.from(TABLES.attempts)
                    .select('*')
                    .eq('student_id', studentId)
                    .order('created_at', { ascending: false });

                const attemptsContainer = document.getElementById('studentAttempts');
                if (!attempts || attempts.length === 0) {
                    attemptsContainer.innerHTML = '<div class="empty-state" style="padding: 20px;"><p>لا توجد محاولات</p></div>';
                } else {
                    attemptsContainer.innerHTML = `
                        <div class="table-wrapper">
                            <table class="data-table">
                                <thead>
                                    <tr><th>الامتحان</th><th>الدرجة</th><th>النسبة</th><th>الحالة</th><th>التاريخ</th></tr>
                                </thead>
                                <tbody>
                                    ${attempts.map(a => {
                                        const pct = Math.round((a.score / a.total_points) * 100);
                                        const status = pct >= 60 ? '✅ ناجح' : '❌ راسب';
                                        return `
                                            <tr>
                                                <td>${App.sanitizeHtml(examMap[a.exam_id] || 'غير معروف')}</td>
                                                <td><strong>${a.score}/${a.total_points}</strong></td>
                                                <td>
                                                    <div style="display: flex; align-items: center; gap: 8px;">
                                                        <div class="progress-bar" style="width: 60px; height: 6px;"><div class="progress-fill" style="width: ${pct}%; background: ${pct >= 60 ? 'var(--success)' : 'var(--danger)'}"></div></div>
                                                        <span>${pct}%</span>
                                                    </div>
                                                </td>
                                                <td>${status}</td>
                                                <td>${App.DateTime.dateOnly(a.created_at)}</td>
                                            </tr>
                                        `;
                                    }).join('')}
                                </tbody>
                            </table>
                        </div>
                    `;
                }

                App.Modal.open('studentModal');
            } catch (error) {
                console.error('Error:', error);
            }
            App.Loading.hide();
        }

        function exportStudents() {
            const data = allStudents.map(s => ({
                الاسم: s.name,
                البريد: s.email,
                الهاتف: s.phone,
                الامتحانات: s.attempts,
                المتوسط: s.avgScore + '%',
                المجموعات: s.groups.length
            }));
            App.exportCSV(data, 'my_students_export');
        }

        loadStudents();
    </script>
</body>
</html>
