<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>الطلاب - منصة الاختبارات</title>
  <link rel="stylesheet" href="../shared/styles.css">
  <style>
    .student-avatar { width: 40px; height: 40px; border-radius: 50%; background: linear-gradient(135deg, var(--primary-light), var(--info-light)); color: var(--primary); display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 1rem; flex-shrink: 0; }
    .student-cell { display: flex; align-items: center; gap: 0.75rem; }
  </style>
</head>
<body>
  <div class="app-layout">
    <main class="main-content">
      <div class="content-area">

        <!-- Stats -->
        <div class="stats-grid" style="grid-template-columns:repeat(4,1fr);margin-bottom:1.5rem;">
          <div class="stat-card"><div class="stat-icon green">👨‍🎓</div><div class="stat-info"><h3 id="stat-total">-</h3><p>إجمالي الطلاب</p></div></div>
          <div class="stat-card"><div class="stat-icon blue">✅</div><div class="stat-info"><h3 id="stat-active">-</h3><p>نشطون</p></div></div>
          <div class="stat-card"><div class="stat-icon orange">📊</div><div class="stat-info"><h3 id="stat-avg">-</h3><p>متوسط الدرجات</p></div></div>
          <div class="stat-card"><div class="stat-icon purple">📋</div><div class="stat-info"><h3 id="stat-exams-done">-</h3><p>اختبارات مكتملة</p></div></div>
        </div>

        <!-- Students Table -->
        <div class="card">
          <div class="card-header">
            <h2 class="card-title">👨‍🎓 طلابي</h2>
            <button class="btn btn-primary" onclick="showAddStudent()">➕ إضافة طالب</button>
          </div>
          <!-- Filter Bar -->
          <div style="padding:1rem 1.5rem;border-bottom:1px solid var(--gray-100);display:flex;gap:1rem;flex-wrap:wrap;">
            <select class="form-select" style="width:auto;min-width:160px;" id="filter-group" onchange="filterStudents()">
              <option value="">كل المجموعات</option>
            </select>
            <input type="text" class="form-input" id="search-student" placeholder="🔍 بحث بالاسم أو البريد..." style="max-width:280px;" oninput="filterStudents()">
          </div>
          <div class="table-container" style="border-radius:0;border:none;">
            <table class="data-table">
              <thead>
                <tr>
                  <th>الطالب</th>
                  <th>البريد الإلكتروني</th>
                  <th>المجموعة</th>
                  <th>الاختبارات</th>
                  <th>متوسط الدرجات</th>
                  <th>الإجراء</th>
                </tr>
              </thead>
              <tbody id="students-body">
                <tr><td colspan="6" style="text-align:center;padding:2rem;"><div class="spinner"></div></td></tr>
              </tbody>
            </table>
          </div>
          <div class="card-footer">
            <span id="students-count" style="color:var(--gray-500);font-size:0.875rem;"></span>
          </div>
        </div>

      </div>
    </main>
  </div>

  <!-- Add Student to Group Modal -->
  <div class="modal-overlay" id="add-student-modal" onclick="if(event.target===this)closeAddStudent()">
    <div class="modal">
      <div class="modal-header">
        <h3>➕ إضافة طالب للمجموعة</h3>
        <button class="btn btn-sm btn-ghost" onclick="closeAddStudent()">✕</button>
      </div>
      <div class="modal-body">
        <p style="color:var(--gray-500);margin-bottom:1rem;font-size:0.9rem;">ابحث عن الطالب بالاسم أو البريد الإلكتروني ثم أضفه لمجموعة</p>
        <div class="form-group">
          <label class="form-label">البحث عن الطالب</label>
          <input type="text" class="form-input" id="add-search-student" placeholder="اكتب اسم الطالب أو بريده..." oninput="searchStudentToAdd()">
          <div id="search-results" style="margin-top:0.5rem;max-height:200px;overflow-y:auto;border:1px solid var(--gray-200);border-radius:var(--radius);display:none;"></div>
        </div>
        <div class="form-group">
          <label class="form-label required">اختر المجموعة</label>
          <select class="form-select" id="add-to-group"></select>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" onclick="closeAddStudent()">إلغاء</button>
        <button class="btn btn-primary" id="add-student-btn" onclick="addStudentToGroup()">➕ إضافة</button>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="../shared/app.js"></script>
  <script src="../shared/supabase-client.js"></script>
  <script>
    requireAuth('teacher');
    renderLayout('teacher', 'students');

    const user = JSON.parse(localStorage.getItem('exam_platform_user') || '{}');
    const sb = getSupabase();
    let allStudents = [];
    let myGroups = [];
    let selectedStudentId = null;

    async function loadData() {
      try {
        // Get teacher's groups
        const { data: groups } = await sb.from('groups').select('id, name').eq('teacher_id', user.id);
        myGroups = groups || [];

        // Populate group filter
        const filterGroup = document.getElementById('filter-group');
        const addToGroup = document.getElementById('add-to-group');
        myGroups.forEach(g => {
          filterGroup.innerHTML += `<option value="${g.id}">${sanitizeHTML(g.name)}</option>`;
          addToGroup.innerHTML += `<option value="${g.id}">${sanitizeHTML(g.name)}</option>`;
        });

        if (myGroups.length === 0) {
          document.getElementById('students-body').innerHTML = `<tr><td colspan="6">
            <div class="empty-state"><div class="empty-icon">👥</div>
            <h3>لا توجد مجموعات</h3>
            <p>أنشئ مجموعة أولاً لإضافة طلاب</p>
            <a href="groups.html" class="btn btn-primary" style="margin-top:1rem;">👥 إنشاء مجموعة</a>
            </div></td></tr>`;
          return;
        }

        const groupIds = myGroups.map(g => g.id);

        // Get all students in teacher's groups
        const { data: members } = await sb
          .from('group_members')
          .select('student_id, group_id, joined_at, groups(name), users(id, full_name, email, role)')
          .in('group_id', groupIds)
          .eq('users.role', 'student');

        // Get submissions stats
        const studentIds = [...new Set((members || []).map(m => m.student_id))];
        let submissionsMap = {};

        if (studentIds.length > 0) {
          const { data: subs } = await sb
            .from('exam_submissions')
            .select('student_id, score, total_marks, passed')
            .in('student_id', studentIds);

          (subs || []).forEach(s => {
            if (!submissionsMap[s.student_id]) submissionsMap[s.student_id] = [];
            submissionsMap[s.student_id].push(s);
          });
        }

        // Build student list
        const studentMap = {};
        (members || []).forEach(m => {
          if (!m.users) return;
          const sid = m.student_id;
          if (!studentMap[sid]) {
            studentMap[sid] = { ...m.users, groups: [], submissions: submissionsMap[sid] || [] };
          }
          studentMap[sid].groups.push(m.groups?.name || '-');
        });

        allStudents = Object.values(studentMap);

        // Stats
        document.getElementById('stat-total').textContent = allStudents.length;
        document.getElementById('stat-active').textContent = allStudents.length;
        const allSubs = allStudents.flatMap(s => s.submissions);
        document.getElementById('stat-exams-done').textContent = allSubs.length;
        const avgScore = allSubs.length > 0
          ? Math.round(allSubs.reduce((sum, s) => sum + (s.total_marks > 0 ? (s.score / s.total_marks * 100) : 0), 0) / allSubs.length)
          : 0;
        document.getElementById('stat-avg').textContent = avgScore + '%';

        renderStudents(allStudents);
      } catch (err) {
        console.error(err);
        showToast('حدث خطأ في تحميل البيانات', 'error');
      }
    }

    function filterStudents() {
      const groupId = document.getElementById('filter-group').value;
      const search = document.getElementById('search-student').value.toLowerCase();
      let filtered = allStudents;
      if (search) {
        filtered = filtered.filter(s =>
          s.full_name?.toLowerCase().includes(search) || s.email?.toLowerCase().includes(search)
        );
      }
      renderStudents(filtered);
    }

    function renderStudents(students) {
      document.getElementById('students-count').textContent = `إجمالي: ${students.length} طالب`;
      const tbody = document.getElementById('students-body');

      if (students.length === 0) {
        tbody.innerHTML = `<tr><td colspan="6">
          <div class="empty-state"><div class="empty-icon">👨‍🎓</div>
          <h3>لا يوجد طلاب</h3><p>أضف طلاباً لمجموعاتك</p></div></td></tr>`;
        return;
      }

      tbody.innerHTML = students.map(s => {
        const subs = s.submissions || [];
        const avg = subs.length > 0
          ? Math.round(subs.reduce((sum, x) => sum + (x.total_marks > 0 ? x.score/x.total_marks*100 : 0), 0) / subs.length)
          : null;
        return `<tr>
          <td>
            <div class="student-cell">
              <div class="student-avatar">${(s.full_name?.[0] || '?').toUpperCase()}</div>
              <strong>${sanitizeHTML(s.full_name || 'غير معروف')}</strong>
            </div>
          </td>
          <td style="direction:ltr;text-align:right;color:var(--gray-600);">${sanitizeHTML(s.email || '-')}</td>
          <td>${(s.groups || []).map(g => `<span class="badge badge-secondary" style="margin-left:4px;">${sanitizeHTML(g)}</span>`).join('')}</td>
          <td><strong>${subs.length}</strong></td>
          <td>${avg !== null ? `<span style="color:${getGradeColor(avg)};font-weight:700;">${avg}%</span>` : '<span style="color:var(--gray-400);">-</span>'}</td>
          <td>
            <button class="btn btn-outline btn-sm" onclick="viewStudentDetails('${s.id}', '${sanitizeHTML(s.full_name || '')}')">📊 تفاصيل</button>
          </td>
        </tr>`;
      }).join('');
    }

    async function viewStudentDetails(studentId, name) {
      showModal(`📊 تفاصيل الطالب: ${name}`, '<div style="text-align:center;padding:1rem;"><div class="spinner"></div></div>');
      try {
        const { data: subs } = await sb.from('exam_submissions')
          .select('*, exams(title, subject)')
          .eq('student_id', studentId)
          .order('submitted_at', { ascending: false })
          .limit(10);

        const rows = (subs || []);
        const content = rows.length === 0
          ? '<div class="empty-state"><p>لم يؤدِ هذا الطالب أي اختبار بعد</p></div>'
          : `<div class="table-container"><table class="data-table">
              <thead><tr><th>الاختبار</th><th>الدرجة</th><th>النتيجة</th><th>التاريخ</th></tr></thead>
              <tbody>${rows.map(s => `<tr>
                <td>${sanitizeHTML(s.exams?.title || '-')}</td>
                <td>${formatGrade(s.score, s.total_marks)}</td>
                <td><span class="badge ${s.passed?'badge-success':'badge-danger'}">${s.passed?'ناجح':'راسب'}</span></td>
                <td style="color:var(--gray-500);font-size:0.875rem;">${formatDate(s.submitted_at)}</td>
              </tr>`).join('')}</tbody>
            </table></div>`;
        document.querySelector('.modal-body').innerHTML = content;
      } catch (e) {
        document.querySelector('.modal-body').innerHTML = '<p style="color:var(--danger);">تعذّر التحميل</p>';
      }
    }

    function showAddStudent() {
      document.getElementById('add-search-student').value = '';
      document.getElementById('search-results').style.display = 'none';
      selectedStudentId = null;
      document.getElementById('add-student-modal').classList.add('active');
    }

    function closeAddStudent() {
      document.getElementById('add-student-modal').classList.remove('active');
    }

    const searchStudentToAdd = debounce(async () => {
      const query = document.getElementById('add-search-student').value.trim();
      const resultsEl = document.getElementById('search-results');
      if (query.length < 2) { resultsEl.style.display = 'none'; return; }

      const { data } = await sb.from('users').select('id, full_name, email').eq('role', 'student')
        .or(`full_name.ilike.%${query}%,email.ilike.%${query}%`).limit(5);

      if (!data || data.length === 0) {
        resultsEl.style.display = 'block';
        resultsEl.innerHTML = '<div style="padding:0.75rem;color:var(--gray-500);">لا توجد نتائج</div>';
        return;
      }

      resultsEl.style.display = 'block';
      resultsEl.innerHTML = data.map(u => `
        <div style="padding:0.75rem 1rem;cursor:pointer;border-bottom:1px solid var(--gray-100);display:flex;align-items:center;gap:0.75rem;"
          onmouseover="this.style.background='var(--gray-50)'" onmouseout="this.style.background=''"
          onclick="selectStudent('${u.id}', '${sanitizeHTML(u.full_name)}', '${sanitizeHTML(u.email)}')">
          <div style="width:32px;height:32px;border-radius:50%;background:var(--primary-light);color:var(--primary);display:flex;align-items:center;justify-content:center;font-weight:700;">${(u.full_name?.[0]||'?').toUpperCase()}</div>
          <div><div style="font-weight:600;">${sanitizeHTML(u.full_name)}</div><div style="font-size:0.8125rem;color:var(--gray-500);">${sanitizeHTML(u.email)}</div></div>
        </div>
      `).join('');
    }, 400);

    function selectStudent(id, name, email) {
      selectedStudentId = id;
      document.getElementById('add-search-student').value = `${name} (${email})`;
      document.getElementById('search-results').style.display = 'none';
    }

    async function addStudentToGroup() {
      if (!selectedStudentId) { showToast('اختر طالباً أولاً', 'warning'); return; }
      const groupId = document.getElementById('add-to-group').value;
      if (!groupId) { showToast('اختر مجموعة', 'warning'); return; }

      const btn = document.getElementById('add-student-btn');
      showLoading(btn, 'جاري الإضافة...');
      try {
        const { error } = await sb.from('group_members').insert({ group_id: groupId, student_id: selectedStudentId });
        if (error && error.code === '23505') { showToast('هذا الطالب مضاف للمجموعة بالفعل', 'warning'); return; }
        if (error) throw error;
        showToast('تم إضافة الطالب للمجموعة ✅', 'success');
        closeAddStudent();
        loadData();
      } catch (err) {
        showToast('حدث خطأ: ' + err.message, 'error');
      } finally {
        hideLoading(btn);
      }
    }

    loadData();
  </script>
</body>
</html>
