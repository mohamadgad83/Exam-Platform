<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>بنك الأسئلة | مدرس</title>
    <link rel="stylesheet" href="../shared/styles.css">
    <style>
        .question-form .options-area { display: flex; flex-direction: column; gap: 10px; margin-top: 12px; }
        .option-input-row { display: flex; gap: 10px; align-items: center; }
        .option-input-row input[type="radio"] { width: 20px; height: 20px; accent-color: var(--primary-color); }
        .option-input-row .form-input { flex: 1; }
        .questions-list { display: flex; flex-direction: column; gap: 16px; }
        .question-item { background: var(--card-bg); border: 1px solid var(--border-color); border-radius: var(--radius-lg); padding: 20px; }
        .question-item-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 12px; }
        .question-item-text { font-size: 1.05rem; line-height: 1.7; margin-bottom: 12px; }
        .question-item-options { display: flex; flex-wrap: wrap; gap: 8px; }
        .question-item-options span { padding: 4px 12px; background: var(--bg-primary); border-radius: 20px; font-size: 0.85rem; }
        .question-item-options span.correct { background: rgba(34,197,94,0.15); color: var(--success-color); border: 1px solid var(--success-color); }
        .q-type-badge { padding: 4px 12px; border-radius: 20px; font-size: 0.75rem; background: var(--bg-tertiary); color: var(--text-secondary); }
        .filter-bar { display: flex; gap: 12px; margin-bottom: 24px; flex-wrap: wrap; }
    </style>
</head>
<body class="dark-mode">
    <div class="app-layout">
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header"><h2>🎓 منصة الاختبارات</h2><button class="sidebar-toggle" id="sidebarToggle">☰</button></div>
            <nav class="sidebar-nav">
                <a href="./dashboard.html" class="nav-item"><span class="nav-icon">📊</span><span class="nav-text">لوحة التحكم</span></a>
                <a href="./exams.html" class="nav-item"><span class="nav-icon">📝</span><span class="nav-text">الاختبارات</span></a>
                <a href="./questions.html" class="nav-item active"><span class="nav-icon">❓</span><span class="nav-text">بنك الأسئلة</span></a>
                <a href="./monitor.html" class="nav-item"><span class="nav-icon">👁️</span><span class="nav-text">المراقبة</span></a>
                <a href="./results.html" class="nav-item"><span class="nav-icon">📈</span><span class="nav-text">النتائج</span></a>
            </nav>
            <div class="sidebar-footer"><button class="btn btn-danger" id="logoutBtn">🚪 تسجيل الخروج</button></div>
        </aside>

        <main class="main-content">
            <header class="top-bar">
                <h1>بنك الأسئلة</h1>
                <button class="btn btn-primary" onclick="openQuestionModal()">➕ سؤال جديد</button>
            </header>

            <div class="content-wrapper">
                <div class="filter-bar">
                    <select class="form-select" id="typeFilter" style="width: auto; min-width: 160px;">
                        <option value="">جميع الأنواع</option>
                        <option value="multiple_choice">اختيار من متعدد</option>
                        <option value="true_false">صح / خطأ</option>
                        <option value="short_answer">إجابة قصيرة</option>
                        <option value="essay">مقالي</option>
                    </select>
                    <input type="text" class="form-input" id="searchInput" placeholder="بحث في الأسئلة..." style="width: auto; min-width: 250px;">
                </div>
                <div class="questions-list" id="questionsList"><div class="text-center" style="padding:60px;color:var(--text-muted)">جاري التحميل...</div></div>
            </div>
        </main>
    </div>

    <!-- Question Modal -->
    <div class="modal-overlay" id="qModal" style="display:none;">
        <div class="modal" style="max-width: 700px;">
            <div class="modal-header"><h3 id="qModalTitle">سؤال جديد</h3><button class="modal-close" onclick="App.Modal.close('qModal')">×</button></div>
            <div class="modal-body">
                <form id="questionForm" class="question-form">
                    <div class="form-group"><label>نوع السؤال</label>
                        <select class="form-select" id="qType" onchange="onTypeChange()">
                            <option value="multiple_choice">اختيار من متعدد</option>
                            <option value="true_false">صح / خطأ</option>
                            <option value="short_answer">إجابة قصيرة</option>
                            <option value="essay">مقالي</option>
                        </select>
                    </div>
                    <div class="form-group"><label>نص السؤال</label><textarea class="form-input" id="qText" rows="3" required></textarea></div>
                    <div class="form-group"><label>الدرجة</label><input type="number" class="form-input" id="qPoints" value="1" min="1" required></div>
                    <div class="form-group" id="optionsGroup">
                        <label>الخيارات <small style="color:var(--text-muted)">(حدد الإجابة الصحيحة)</small></label>
                        <div class="options-area" id="optionsArea">
                            <div class="option-input-row"><input type="radio" name="correctOpt" value="0" checked><input type="text" class="form-input" placeholder="الخيار أ" required></div>
                            <div class="option-input-row"><input type="radio" name="correctOpt" value="1"><input type="text" class="form-input" placeholder="الخيار ب" required></div>
                            <div class="option-input-row"><input type="radio" name="correctOpt" value="2"><input type="text" class="form-input" placeholder="الخيار ج"></div>
                            <div class="option-input-row"><input type="radio" name="correctOpt" value="3"><input type="text" class="form-input" placeholder="الخيار د"></div>
                        </div>
                        <button type="button" class="btn btn-sm btn-secondary" onclick="addOption()" style="margin-top:10px;">➕ إضافة خيار</button>
                    </div>
                    <div class="form-group" id="correctAnswerGroup" style="display:none;"><label>الإجابة الصحيحة</label><input type="text" class="form-input" id="qCorrectText"></div>
                    <div class="form-group"><label>التعليل <small style="color:var(--text-muted)">(اختياري)</small></label><textarea class="form-input" id="qExplanation" rows="2"></textarea></div>
                </form>
            </div>
            <div class="modal-footer">
                <button class="btn btn-secondary" onclick="App.Modal.close('qModal')">إلغاء</button>
                <button class="btn btn-primary" onclick="saveQuestion()">حفظ السؤال</button>
            </div>
        </div>
    </div>

    <div class="toast-container" id="toastContainer"></div>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="../shared/supabase-client.js"></script>
    <script src="../shared/app.js"></script>
    <script>
        let allQuestions = [], editingQId = null;

        document.addEventListener('DOMContentLoaded', async function() {
            const user = await examAuth.getUser();
            if (!user) { window.location.href = '../login.html'; return; }
            if (!await examAuth.isTeacher() && !await examAuth.isAdmin()) { window.location.href = '../unauthorized.html'; return; }

            document.getElementById('sidebarToggle').addEventListener('click', () => document.getElementById('sidebar').classList.toggle('collapsed'));
            document.getElementById('logoutBtn').addEventListener('click', async () => { await examAuth.signOut(); window.location.href = '../login.html'; });

            await loadQuestions();

            document.getElementById('typeFilter').addEventListener('change', filterQuestions);
            document.getElementById('searchInput').addEventListener('input', debounce(filterQuestions, 300));
        });

        async function loadQuestions() {
            App.Loading.show();
            try {
                const user = await examAuth.getUser();
                const { data } = await examDB.questionsBank().select('*').eq('created_by', user.id).order('created_at', { ascending: false });
                allQuestions = data || [];
                renderQuestions(allQuestions);
            } catch (e) { App.Toast.error('خطأ في التحميل'); }
            finally { App.Loading.hide(); }
        }

        function renderQuestions(questions) {
            const list = document.getElementById('questionsList');
            if (!questions.length) { list.innerHTML = '<div class="text-center" style="padding:60px;color:var(--text-muted)">لا توجد أسئلة</div>'; return; }

            list.innerHTML = questions.map(q => {
                const typeLabels = { multiple_choice: 'اختيار من متعدد', true_false: 'صح/خطأ', short_answer: 'إجابة قصيرة', essay: 'مقالي' };
                let optionsHtml = '';
                if (q.question_type === 'multiple_choice' || q.question_type === 'true_false') {
                    const opts = q.options || [];
                    optionsHtml = '<div class="question-item-options">' + opts.map((opt, i) => {
                        const isCorrect = i === q.correct_answer;
                        return `<span class="${isCorrect ? 'correct' : ''}">${String.fromCharCode(65 + i)}. ${opt}</span>`;
                    }).join('') + '</div>';
                } else {
                    optionsHtml = `<div style="color:var(--text-secondary);font-size:0.9rem;">✓ الإجابة: ${q.correct_answer || '—'}</div>`;
                }

                return `
                    <div class="question-item">
                        <div class="question-item-header">
                            <span class="q-type-badge">${typeLabels[q.question_type] || q.question_type}</span>
                            <div style="display:flex;gap:8px;">
                                <button class="btn btn-sm btn-secondary" onclick="editQuestion('${q.id}')">تعديل</button>
                                <button class="btn btn-sm btn-danger" onclick="deleteQuestion('${q.id}')">حذف</button>
                            </div>
                        </div>
                        <div class="question-item-text">${q.question_text}</div>
                        ${optionsHtml}
                        <div style="margin-top:10px;font-size:0.85rem;color:var(--text-muted);">📊 ${q.points || 1} نقطة</div>
                    </div>`;
            }).join('');
        }

        function onTypeChange() {
            const type = document.getElementById('qType').value;
            const showOptions = type === 'multiple_choice' || type === 'true_false';
            document.getElementById('optionsGroup').style.display = showOptions ? '' : 'none';
            document.getElementById('correctAnswerGroup').style.display = showOptions ? 'none' : '';
            if (type === 'true_false') {
                document.getElementById('optionsArea').innerHTML = `
                    <div class="option-input-row"><input type="radio" name="correctOpt" value="0" checked><input type="text" class="form-input" value="صح" readonly></div>
                    <div class="option-input-row"><input type="radio" name="correctOpt" value="1"><input type="text" class="form-input" value="خطأ" readonly></div>`;
            }
        }

        function addOption() {
            const area = document.getElementById('optionsArea');
            const count = area.children.length;
            const div = document.createElement('div');
            div.className = 'option-input-row';
            div.innerHTML = `<input type="radio" name="correctOpt" value="${count}"><input type="text" class="form-input" placeholder="الخيار ${String.fromCharCode(65 + count)}" required>
                <button type="button" class="btn btn-sm btn-danger" onclick="this.parentElement.remove()">🗑️</button>`;
            area.appendChild(div);
        }

        function openQuestionModal() {
            editingQId = null;
            document.getElementById('qModalTitle').textContent = 'سؤال جديد';
            document.getElementById('questionForm').reset();
            document.getElementById('optionsArea').innerHTML = `
                <div class="option-input-row"><input type="radio" name="correctOpt" value="0" checked><input type="text" class="form-input" placeholder="الخيار أ" required></div>
                <div class="option-input-row"><input type="radio" name="correctOpt" value="1"><input type="text" class="form-input" placeholder="الخيار ب" required></div>`;
            onTypeChange();
            App.Modal.open('qModal');
        }

        async function saveQuestion() {
            const type = document.getElementById('qType').value;
            const text = document.getElementById('qText').value.trim();
            const points = parseInt(document.getElementById('qPoints').value) || 1;
            const explanation = document.getElementById('qExplanation').value.trim();

            if (!text) { App.Toast.error('أدخل نص السؤال'); return; }

            let options = [], correctAnswer = null;

            if (type === 'multiple_choice') {
                const rows = document.querySelectorAll('#optionsArea .option-input-row');
                rows.forEach(row => {
                    const input = row.querySelector('input[type="text"]');
                    if (input && input.value.trim()) options.push(input.value.trim());
                });
                if (options.length < 2) { App.Toast.error('أدخل خيارين على الأقل'); return; }
                const checked = document.querySelector('input[name="correctOpt"]:checked');
                correctAnswer = checked ? parseInt(checked.value) : 0;
            } else if (type === 'true_false') {
                options = ['صح', 'خطأ'];
                const checked = document.querySelector('input[name="correctOpt"]:checked');
                correctAnswer = checked ? parseInt(checked.value) : 0;
            } else {
                correctAnswer = document.getElementById('qCorrectText').value.trim();
                if (!correctAnswer) { App.Toast.error('أدخل الإجابة الصحيحة'); return; }
            }

            App.Loading.show();
            try {
                const user = await examAuth.getUser();
                const data = {
                    question_type: type, question_text: text, options, correct_answer: correctAnswer,
                    points, explanation, created_by: user.id, updated_at: new Date().toISOString()
                };

                if (editingQId) {
                    await examDB.questionsBank().update(data).eq('id', editingQId);
                } else {
                    await examDB.questionsBank().insert({ ...data, created_at: new Date().toISOString() });
                }

                App.Toast.success('تم الحفظ');
                App.Modal.close('qModal');
                await loadQuestions();
            } catch (e) { console.error(e); App.Toast.error('حدث خطأ'); }
            finally { App.Loading.hide(); }
        }

        async function editQuestion(id) {
            const q = allQuestions.find(x => x.id === id);
            if (!q) return;
            editingQId = id;
            document.getElementById('qModalTitle').textContent = 'تعديل سؤال';
            document.getElementById('qType').value = q.question_type;
            document.getElementById('qText').value = q.question_text;
            document.getElementById('qPoints').value = q.points || 1;
            document.getElementById('qExplanation').value = q.explanation || '';

            onTypeChange();

            if (q.question_type === 'multiple_choice') {
                const area = document.getElementById('optionsArea');
                area.innerHTML = '';
                (q.options || []).forEach((opt, i) => {
                    const div = document.createElement('div');
                    div.className = 'option-input-row';
                    const isCorrect = i === q.correct_answer;
                    div.innerHTML = `<input type="radio" name="correctOpt" value="${i}" ${isCorrect ? 'checked' : ''}><input type="text" class="form-input" value="${opt}" required>
                        ${i > 1 ? '<button type="button" class="btn btn-sm btn-danger" onclick="this.parentElement.remove()">🗑️</button>' : ''}`;
                    area.appendChild(div);
                });
            } else if (q.question_type !== 'true_false') {
                document.getElementById('qCorrectText').value = q.correct_answer || '';
            }

            App.Modal.open('qModal');
        }

        async function deleteQuestion(id) {
            if (!await App.confirm('هل أنت متأكد من حذف هذا السؤال؟ قد يكون مستخدماً في اختبارات.', 'تأكيد الحذف')) return;
            App.Loading.show();
            try {
                await examDB.examQuestions().delete().eq('question_id', id);
                await examDB.questionsBank().delete().eq('id', id);
                App.Toast.success('تم الحذف'); await loadQuestions();
            } catch (e) { App.Toast.error('لا يمكن الحذف — السؤال مستخدم في اختبارات'); }
            finally { App.Loading.hide(); }
        }

        function filterQuestions() {
            const type = document.getElementById('typeFilter').value;
            const search = document.getElementById('searchInput').value.toLowerCase();
            let filtered = allQuestions.filter(q => {
                if (type && q.question_type !== type) return false;
                if (search && !q.question_text.toLowerCase().includes(search)) return false;
                return true;
            });
            renderQuestions(filtered);
        }
    </script>
</body>
</html>
