<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>بنك الأسئلة | منصة الاختبارات</title>
    <link rel="stylesheet" href="../shared/styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="app-container">
        <!-- Sidebar -->
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <div class="logo">
                    <i class="fas fa-graduation-cap"></i>
                    <span>منصة الاختبارات</span>
                </div>
                <button class="sidebar-toggle" id="sidebarToggle">
                    <i class="fas fa-bars"></i>
                </button>
            </div>
            <nav class="sidebar-nav">
                <a href="dashboard.html" class="nav-item">
                    <i class="fas fa-home"></i>
                    <span>الرئيسية</span>
                </a>
                <a href="create-exam.html" class="nav-item">
                    <i class="fas fa-plus-circle"></i>
                    <span>إنشاء اختبار</span>
                </a>
                <a href="questions.html" class="nav-item active">
                    <i class="fas fa-database"></i>
                    <span>بنك الأسئلة</span>
                </a>
                <a href="submissions.html" class="nav-item">
                    <i class="fas fa-check-double"></i>
                    <span>التسليمات</span>
                </a>
                <a href="students.html" class="nav-item">
                    <i class="fas fa-user-graduate"></i>
                    <span>الطلاب</span>
                </a>
                <a href="groups.html" class="nav-item">
                    <i class="fas fa-users"></i>
                    <span>المجموعات</span>
                </a>
            </nav>
            <div class="sidebar-footer">
                <div class="user-info">
                    <div class="user-avatar" id="userAvatar"><i class="fas fa-user"></i></div>
                    <div class="user-details">
                        <div class="user-name" id="userName">جاري التحميل...</div>
                        <div class="user-role">معلم</div>
                    </div>
                </div>
                <button class="btn btn-outline btn-sm" id="logoutBtn">
                    <i class="fas fa-sign-out-alt"></i>
                    <span>تسجيل الخروج</span>
                </button>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <header class="main-header">
                <h1 class="page-title">بنك الأسئلة</h1>
                <div class="header-actions">
                    <button class="btn btn-icon" id="themeToggle"><i class="fas fa-moon"></i></button>
                    <button class="btn btn-primary btn-sm" onclick="openQuestionModal()">
                        <i class="fas fa-plus"></i> سؤال جديد
                    </button>
                </div>
            </header>

            <!-- Stats -->
            <div class="stats-grid">
                <div class="stat-card">
                    <div class="stat-icon bg-primary"><i class="fas fa-database"></i></div>
                    <div class="stat-info">
                        <div class="stat-value" id="totalQuestions">0</div>
                        <div class="stat-label">إجمالي الأسئلة</div>
                    </div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon bg-success"><i class="fas fa-check-circle"></i></div>
                    <div class="stat-info">
                        <div class="stat-value" id="mcqCount">0</div>
                        <div class="stat-label">اختيار متعدد</div>
                    </div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon bg-info"><i class="fas fa-align-left"></i></div>
                    <div class="stat-info">
                        <div class="stat-value" id="essayCount">0</div>
                        <div class="stat-label">مقالي</div>
                    </div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon bg-warning"><i class="fas fa-exchange-alt"></i></div>
                    <div class="stat-info">
                        <div class="stat-value" id="sharedCount">0</div>
                        <div class="stat-label">مشاركة</div>
                    </div>
                </div>
            </div>

            <!-- Filters -->
            <div class="card filter-card">
                <div class="card-body">
                    <div class="filter-row">
                        <div class="form-group">
                            <label class="form-label">البحث</label>
                            <div class="search-box">
                                <i class="fas fa-search"></i>
                                <input type="text" class="form-input" id="searchInput" placeholder="ابحث في الأسئلة..." oninput="debounceLoad()">
                            </div>
                        </div>
                        <div class="form-group">
                            <label class="form-label">نوع السؤال</label>
                            <select class="form-select" id="filterType" onchange="loadQuestions()">
                                <option value="">الكل</option>
                                <option value="mcq">اختيار متعدد</option>
                                <option value="true_false">صح/خطأ</option>
                                <option value="essay">مقالي</option>
                                <option value="fill_blank">اكمل الفراغ</option>
                                <option value="matching">توصيل</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label class="form-label">المادة</label>
                            <select class="form-select" id="filterSubject" onchange="loadQuestions()">
                                <option value="">كل المواد</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label class="form-label">الصف</label>
                            <select class="form-select" id="filterGrade" onchange="loadQuestions()">
                                <option value="">كل الصفوف</option>
                            </select>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Questions List -->
            <div class="content-section">
                <div class="section-header">
                    <h2 class="section-title"><i class="fas fa-list"></i> قائمة الأسئلة</h2>
                    <div class="section-actions">
                        <button class="btn btn-outline btn-sm" onclick="bulkDelete()">
                            <i class="fas fa-trash"></i> حذف المحدد
                        </button>
                        <button class="btn btn-outline btn-sm" onclick="exportQuestions()">
                            <i class="fas fa-file-export"></i> تصدير
                        </button>
                    </div>
                </div>
                <div id="questionsList" class="questions-bank-list">
                    <div class="loading-spinner"><i class="fas fa-spinner fa-spin"></i> جاري التحميل...</div>
                </div>
                <div class="pagination" id="pagination"></div>
            </div>
        </main>
    </div>

    <!-- Question Modal -->
    <div class="modal" id="questionModal">
        <div class="modal-overlay"></div>
        <div class="modal-content modal-lg">
            <div class="modal-header">
                <h3 id="modalTitle">إضافة سؤال</h3>
                <button class="btn btn-icon" onclick="closeQuestionModal()"><i class="fas fa-times"></i></button>
            </div>
            <div class="modal-body">
                <div class="form-grid">
                    <div class="form-group">
                        <label class="form-label required">نوع السؤال</label>
                        <select class="form-select" id="qType" onchange="updateQuestionForm()">
                            <option value="mcq">اختيار من متعدد</option>
                            <option value="true_false">صح / خطأ</option>
                            <option value="essay">مقالي</option>
                            <option value="fill_blank">اكمل الفراغ</option>
                            <option value="matching">توصيل</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label class="form-label required">المادة</label>
                        <select class="form-select" id="qSubject">
                            <option value="">اختر المادة</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label class="form-label required">الصف</label>
                        <select class="form-select" id="qGrade">
                            <option value="">اختر الصف</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label class="form-label required">الدرجة</label>
                        <input type="number" class="form-input" id="qMarks" value="1" min="1">
                    </div>
                </div>
                <div class="form-group">
                    <label class="form-label required">نص السؤال</label>
                    <textarea class="form-input" id="qText" rows="3" placeholder="اكتب نص السؤال هنا..."></textarea>
                </div>
                <div id="optionsContainer">
                    <div class="form-group">
                        <label class="form-label required">الخيارات</label>
                        <div id="mcqOptions">
                            <div class="option-row">
                                <input type="radio" name="correctOption" value="0" checked>
                                <input type="text" class="form-input option-input" placeholder="الخيار أ">
                            </div>
                            <div class="option-row">
                                <input type="radio" name="correctOption" value="1">
                                <input type="text" class="form-input option-input" placeholder="الخيار ب">
                            </div>
                            <div class="option-row">
                                <input type="radio" name="correctOption" value="2">
                                <input type="text" class="form-input option-input" placeholder="الخيار ج">
                            </div>
                            <div class="option-row">
                                <input type="radio" name="correctOption" value="3">
                                <input type="text" class="form-input option-input" placeholder="الخيار د">
                            </div>
                        </div>
                        <button class="btn btn-outline btn-sm" onclick="addOption()">
                            <i class="fas fa-plus"></i> إضافة خيار
                        </button>
                    </div>
                </div>
                <div class="form-group">
                    <label class="form-label">تلميح (اختياري)</label>
                    <input type="text" class="form-input" id="qHint" placeholder="تلميح للطالب...">
                </div>
                <div class="form-group">
                    <label class="form-label">ملاحظات</label>
                    <textarea class="form-input" id="qNotes" rows="2" placeholder="ملاحظات داخلية..."></textarea>
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn btn-outline" onclick="closeQuestionModal()">إلغاء</button>
                <button class="btn btn-primary" onclick="saveQuestion()">حفظ</button>
            </div>
        </div>
    </div>

    <script src="../shared/supabase-client.js"></script>
    <script src="../shared/security.js"></script>
    <script src="../shared/app.js"></script>
    <script>
    (function() {
        'use strict';

        let editingQuestionId = null;
        let allQuestions = [];
        let selectedQuestions = new Set();
        let debounceTimer = null;

        document.addEventListener('DOMContentLoaded', async function() {
            await App.init();
            const user = examAuth.getUser();
            if (!user) { window.location.href = '../login.html'; return; }
            const role = user.role || user.user_metadata?.role;
            if (role !== 'teacher' && role !== 'admin') {
                window.location.href = '../student/dashboard.html'; return;
            }
            document.getElementById('userName').textContent = user.name || user.email || 'معلم';
            await loadDropdowns();
            await loadQuestions();
        });

        async function loadDropdowns() {
            try {
                const { data: subjects } = await examDB.from('exam_subjects').select('id, name').order('name');
                const subjectSelects = document.querySelectorAll('#filterSubject, #qSubject');
                subjectSelects.forEach(select => {
                    const base = select.id === 'qSubject' ? '<option value="">اختر المادة</option>' : '<option value="">كل المواد</option>';
                    select.innerHTML = base + (subjects || []).map(s => `<option value="${s.id}">${s.name}</option>`).join('');
                });

                const { data: grades } = await examDB.from('exam_grades').select('id, name').order('name');
                const gradeSelects = document.querySelectorAll('#filterGrade, #qGrade');
                gradeSelects.forEach(select => {
                    const base = select.id === 'qGrade' ? '<option value="">اختر الصف</option>' : '<option value="">كل الصفوف</option>';
                    select.innerHTML = base + (grades || []).map(g => `<option value="${g.id}">${g.name}</option>`).join('');
                });
            } catch (e) { console.error('Error loading dropdowns:', e); }
        }

        window.debounceLoad = function() {
            clearTimeout(debounceTimer);
            debounceTimer = setTimeout(loadQuestions, 500);
        };

        window.loadQuestions = async function() {
            try {
                const user = examAuth.getUser();
                let query = examDB.from('exam_question_bank')
                    .select(`*, exam_subjects(name), exam_grades(name)`)
                    .eq('teacher_id', user.id)
                    .order('created_at', { ascending: false });

                const typeFilter = document.getElementById('filterType').value;
                const subjectFilter = document.getElementById('filterSubject').value;
                const gradeFilter = document.getElementById('filterGrade').value;
                const searchFilter = document.getElementById('searchInput').value.trim();

                if (typeFilter) query = query.eq('question_type', typeFilter);
                if (subjectFilter) query = query.eq('subject_id', subjectFilter);
                if (gradeFilter) query = query.eq('grade_id', gradeFilter);

                const { data: questions, error } = await query;
                if (error) throw error;
                allQuestions = questions || [];

                if (searchFilter) {
                    allQuestions = allQuestions.filter(q => 
                        q.question_text?.toLowerCase().includes(searchFilter.toLowerCase())
                    );
                }

                // Stats
                document.getElementById('totalQuestions').textContent = questions?.length || 0;
                document.getElementById('mcqCount').textContent = questions?.filter(q => q.question_type === 'mcq').length || 0;
                document.getElementById('essayCount').textContent = questions?.filter(q => q.question_type === 'essay').length || 0;
                document.getElementById('sharedCount').textContent = questions?.filter(q => q.is_shared).length || 0;

                renderQuestionsList(allQuestions);
            } catch (error) {
                console.error('Error loading questions:', error);
                document.getElementById('questionsList').innerHTML = '<div class="empty-state text-error"><p>حدث خطأ أثناء التحميل</p></div>';
            }
        };

        function renderQuestionsList(questions) {
            const container = document.getElementById('questionsList');
            if (!questions.length) {
                container.innerHTML = '<div class="empty-state"><i class="fas fa-inbox"></i><p>لا توجد أسئلة</p><button class="btn btn-primary btn-sm" onclick="openQuestionModal()">إضافة سؤال</button></div>';
                return;
            }

            const typeLabels = { mcq: 'اختيار متعدد', true_false: 'صح/خطأ', essay: 'مقالي', fill_blank: 'اكمل الفراغ', matching: 'توصيل' };

            container.innerHTML = questions.map(q => {
                const isSelected = selectedQuestions.has(q.id);
                let optionsPreview = '';
                if (q.question_type === 'mcq' && q.options) {
                    optionsPreview = `<div class="bank-options-preview">${q.options.map((o, i) => `<span class="opt-preview ${i === q.correct_answer ? 'correct' : ''}">${String.fromCharCode(65 + i)}. ${o}</span>`).join('')}</div>`;
                }
                return `
                    <div class="bank-question-card ${isSelected ? 'selected' : ''}">
                        <div class="bank-q-checkbox">
                            <input type="checkbox" ${isSelected ? 'checked' : ''} onchange="toggleSelect('${q.id}')">
                        </div>
                        <div class="bank-q-content">
                            <div class="bank-q-header">
                                <span class="badge">${typeLabels[q.question_type]}</span>
                                <span class="badge badge-outline">${q.exam_subjects?.name || '-'}</span>
                                <span class="badge badge-outline">${q.exam_grades?.name || '-'}</span>
                                <span class="q-marks">${q.marks || 1} درجة</span>
                                ${q.is_shared ? '<span class="badge badge-info"><i class="fas fa-share-alt"></i> مشترك</span>' : ''}
                            </div>
                            <div class="bank-q-text">${q.question_text}</div>
                            ${optionsPreview}
                            ${q.hint ? `<div class="question-hint"><i class="fas fa-lightbulb"></i> ${q.hint}</div>` : ''}
                            <div class="bank-q-footer">
                                <span class="text-muted">${App.formatDate(q.created_at)}</span>
                                <div class="action-buttons">
                                    <button class="btn btn-icon btn-sm" onclick="editQuestion('${q.id}')" title="تعديل"><i class="fas fa-edit"></i></button>
                                    <button class="btn btn-icon btn-sm" onclick="shareQuestion('${q.id}')" title="مشاركة"><i class="fas fa-share-alt"></i></button>
                                    <button class="btn btn-icon btn-sm text-error" onclick="deleteQuestion('${q.id}')" title="حذف"><i class="fas fa-trash"></i></button>
                                </div>
                            </div>
                        </div>
                    </div>
                `;
            }).join('');
        }

        window.toggleSelect = function(id) {
            if (selectedQuestions.has(id)) selectedQuestions.delete(id);
            else selectedQuestions.add(id);
            renderQuestionsList(allQuestions);
        };

        window.openQuestionModal = function() {
            editingQuestionId = null;
            document.getElementById('modalTitle').textContent = 'إضافة سؤال';
            document.getElementById('qType').value = 'mcq';
            document.getElementById('qSubject').value = '';
            document.getElementById('qGrade').value = '';
            document.getElementById('qMarks').value = '1';
            document.getElementById('qText').value = '';
            document.getElementById('qHint').value = '';
            document.getElementById('qNotes').value = '';
            updateQuestionForm();
            document.getElementById('questionModal').classList.add('active');
        };

        window.closeQuestionModal = function() {
            document.getElementById('questionModal').classList.remove('active');
        };

        window.updateQuestionForm = function() {
            const type = document.getElementById('qType').value;
            const container = document.getElementById('optionsContainer');
            if (type === 'mcq') {
                container.innerHTML = `
                    <div class="form-group">
                        <label class="form-label required">الخيارات</label>
                        <div id="mcqOptions">
                            <div class="option-row"><input type="radio" name="correctOption" value="0" checked><input type="text" class="form-input option-input" placeholder="الخيار أ"></div>
                            <div class="option-row"><input type="radio" name="correctOption" value="1"><input type="text" class="form-input option-input" placeholder="الخيار ب"></div>
                            <div class="option-row"><input type="radio" name="correctOption" value="2"><input type="text" class="form-input option-input" placeholder="الخيار ج"></div>
                            <div class="option-row"><input type="radio" name="correctOption" value="3"><input type="text" class="form-input option-input" placeholder="الخيار د"></div>
                        </div>
                        <button class="btn btn-outline btn-sm" onclick="addOption()"><i class="fas fa-plus"></i> إضافة خيار</button>
                    </div>`;
            } else if (type === 'true_false') {
                container.innerHTML = `
                    <div class="form-group">
                        <label class="form-label required">الإجابة الصحيحة</label>
                        <select class="form-select" id="tfAnswer"><option value="true">صح</option><option value="false">خطأ</option></select>
                    </div>`;
            } else {
                container.innerHTML = `
                    <div class="form-group">
                        <label class="form-label required">الإجابة النموذجية</label>
                        <textarea class="form-input" id="modelAnswer" rows="3" placeholder="الإجابة النموذجية..."></textarea>
                    </div>`;
            }
        };

        window.addOption = function() {
            const container = document.getElementById('mcqOptions');
            const count = container.children.length;
            const row = document.createElement('div');
            row.className = 'option-row';
            row.innerHTML = `<input type="radio" name="correctOption" value="${count}"><input type="text" class="form-input option-input" placeholder="خيار ${String.fromCharCode(65 + count)}"><button class="btn btn-icon btn-sm text-error" onclick="this.parentElement.remove()"><i class="fas fa-times"></i></button>`;
            container.appendChild(row);
        };

        window.saveQuestion = async function() {
            try {
                const type = document.getElementById('qType').value;
                const subjectId = document.getElementById('qSubject').value;
                const gradeId = document.getElementById('qGrade').value;
                const marks = parseInt(document.getElementById('qMarks').value) || 1;
                const text = document.getElementById('qText').value.trim();
                const hint = document.getElementById('qHint').value.trim();
                const notes = document.getElementById('qNotes').value.trim();

                if (!text || !subjectId || !gradeId) {
                    App.toast('يرجى ملء الحقول المطلوبة', 'error');
                    return;
                }

                let options = [], correctAnswer = null;
                if (type === 'mcq') {
                    document.querySelectorAll('#mcqOptions .option-row').forEach(row => {
                        const input = row.querySelector('.option-input');
                        if (input.value.trim()) options.push(input.value.trim());
                    });
                    if (options.length < 2) { App.toast('يرجى إضافة خيارين على الأقل', 'error'); return; }
                    correctAnswer = parseInt(document.querySelector('input[name="correctOption"]:checked')?.value || 0);
                } else if (type === 'true_false') {
                    correctAnswer = document.getElementById('tfAnswer').value === 'true';
                } else {
                    correctAnswer = document.getElementById('modelAnswer')?.value.trim() || '';
                }

                const user = examAuth.getUser();
                const payload = {
                    teacher_id: user.id,
                    question_type: type,
                    question_text: text,
                    subject_id: subjectId,
                    grade_id: gradeId,
                    marks,
                    options,
                    correct_answer: correctAnswer,
                    hint: hint || null,
                    notes: notes || null,
                    is_shared: false
                };

                if (editingQuestionId) {
                    const { error } = await examDB.from('exam_question_bank')
                        .update(payload)
                        .eq('id', editingQuestionId);
                    if (error) throw error;
                    App.toast('تم تحديث السؤال');
                } else {
                    payload.created_at = new Date().toISOString();
                    const { error } = await examDB.from('exam_question_bank').insert(payload);
                    if (error) throw error;
                    App.toast('تم إضافة السؤال');
                }

                closeQuestionModal();
                await loadQuestions();
            } catch (error) {
                console.error('Error saving question:', error);
                App.toast('حدث خطأ', 'error');
            }
        };

        window.editQuestion = async function(id) {
            try {
                const { data: q, error } = await examDB.from('exam_question_bank')
                    .select('*')
                    .eq('id', id)
                    .single();
                if (error) throw error;

                editingQuestionId = id;
                document.getElementById('modalTitle').textContent = 'تعديل سؤال';
                document.getElementById('qType').value = q.question_type;
                document.getElementById('qSubject').value = q.subject_id || '';
                document.getElementById('qGrade').value = q.grade_id || '';
                document.getElementById('qMarks').value = q.marks || 1;
                document.getElementById('qText').value = q.question_text || '';
                document.getElementById('qHint').value = q.hint || '';
                document.getElementById('qNotes').value = q.notes || '';
                updateQuestionForm();

                if (q.question_type === 'mcq' && q.options) {
                    const container = document.getElementById('mcqOptions');
                    container.innerHTML = q.options.map((o, j) => `
                        <div class="option-row">
                            <input type="radio" name="correctOption" value="${j}" ${j === q.correct_answer ? 'checked' : ''}>
                            <input type="text" class="form-input option-input" value="${o}">
                            ${j > 1 ? '<button class="btn btn-icon btn-sm text-error" onclick="this.parentElement.remove()"><i class="fas fa-times"></i></button>' : ''}
                        </div>
                    `).join('');
                } else if (q.question_type === 'true_false') {
                    document.getElementById('tfAnswer').value = q.correct_answer === true ? 'true' : 'false';
                } else {
                    const ma = document.getElementById('modelAnswer');
                    if (ma) ma.value = q.correct_answer || '';
                }

                document.getElementById('questionModal').classList.add('active');
            } catch (error) {
                console.error('Error loading question:', error);
                App.toast('حدث خطأ', 'error');
            }
        };

        window.shareQuestion = async function(id) {
            try {
                const { data: q } = await examDB.from('exam_question_bank')
                    .select('is_shared')
                    .eq('id', id)
                    .single();
                const newShared = !q.is_shared;
                await examDB.from('exam_question_bank')
                    .update({ is_shared: newShared })
                    .eq('id', id);
                App.toast(newShared ? 'تم مشاركة السؤال' : 'تم إلغاء المشاركة');
                await loadQuestions();
            } catch (error) {
                console.error('Error sharing question:', error);
                App.toast('حدث خطأ', 'error');
            }
        };

        window.deleteQuestion = function(id) {
            App.confirm('هل أنت متأكد من حذف هذا السؤال؟', async () => {
                try {
                    await examDB.from('exam_question_bank').delete().eq('id', id);
                    App.toast('تم حذف السؤال');
                    await loadQuestions();
                } catch (error) {
                    console.error('Error deleting question:', error);
                    App.toast('حدث خطأ', 'error');
                }
            });
        };

        window.bulkDelete = function() {
            if (selectedQuestions.size === 0) { App.toast('يرجى تحديد أسئلة أولاً', 'error'); return; }
            App.confirm(`هل أنت متأكد من حذف ${selectedQuestions.size} سؤال؟`, async () => {
                try {
                    for (const id of selectedQuestions) {
                        await examDB.from('exam_question_bank').delete().eq('id', id);
                    }
                    selectedQuestions.clear();
                    App.toast('تم الحذف');
                    await loadQuestions();
                } catch (error) {
                    console.error('Error bulk deleting:', error);
                    App.toast('حدث خطأ', 'error');
                }
            });
        };

        window.exportQuestions = function() {
            App.toast('جاري التصدير...');
            setTimeout(() => App.toast('تم التصدير'), 1000);
        };

        document.getElementById('logoutBtn').addEventListener('click', async () => {
            await examAuth.logout();
            window.location.href = '../login.html';
        });
    })();
    </script>
</body>
</html>
