<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تسجيل الدخول — منصة الاختبارات</title>
    <link rel="stylesheet" href="shared/styles.css">
    <style>
        /* أنماط إضافية لصفحة تسجيل الدخول */
        .login-container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 20px;
        }
        
        .login-box {
            background: white;
            border-radius: 20px;
            padding: 40px;
            width: 100%;
            max-width: 450px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        
        .login-header {
            text-align: center;
            margin-bottom: 30px;
        }
        
        .login-header h1 {
            color: #333;
            font-size: 28px;
            margin-bottom: 10px;
        }
        
        .login-header p {
            color: #666;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 600;
        }
        
        .form-group input {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 16px;
            transition: border-color 0.3s;
        }
        
        .form-group input:focus {
            outline: none;
            border-color: #667eea;
        }
        
        .btn-login {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s;
        }
        
        .btn-login:hover {
            transform: translateY(-2px);
        }
        
        .btn-login:disabled {
            opacity: 0.7;
            cursor: not-allowed;
            transform: none;
        }
        
        .login-footer {
            text-align: center;
            margin-top: 20px;
        }
        
        .login-footer a {
            color: #667eea;
            text-decoration: none;
        }
        
        .error-message {
            background: #fee;
            color: #c33;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: none;
        }
        
        .success-message {
            background: #efe;
            color: #3c3;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: none;
        }
        
        .admin-info {
            background: #f0f0ff;
            border: 1px solid #667eea;
            border-radius: 8px;
            padding: 15px;
            margin-top: 20px;
            font-size: 14px;
        }
        
        .admin-info h4 {
            color: #667eea;
            margin-top: 0;
        }
        
        .spinner {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255,255,255,.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 1s ease-in-out infinite;
            margin-left: 10px;
            vertical-align: middle;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-box">
            <div class="login-header">
                <h1>📚 منصة الاختبارات الذكية</h1>
                <p>سجل الدخول إلى حسابك</p>
            </div>
            
            <div id="errorMsg" class="error-message"></div>
            <div id="successMsg" class="success-message"></div>
            
            <form id="loginForm" onsubmit="return handleLogin(event)">
                <div class="form-group">
                    <label for="identifier">البريد الإلكتروني / اسم المستخدم / رقم الهاتف</label>
                    <input type="text" id="identifier" name="identifier" required 
                           placeholder="أدخل بريدك أو اسم المستخدم">
                </div>
                
                <div class="form-group">
                    <label for="password">كلمة المرور</label>
                    <input type="password" id="password" name="password" required 
                           placeholder="أدخل كلمة المرور">
                </div>
                
                <button type="submit" class="btn-login" id="loginBtn">
                    تسجيل الدخول
                </button>
            </form>
            
            <div class="login-footer">
                <p>ليس لديك حساب؟ <a href="register.html">سجل الآن</a></p>
                <p><a href="forgot-password.html">نسيت كلمة المرور؟</a></p>
            </div>
            
            <!-- معلومات الأدمن الافتراضي -->
            <div class="admin-info" id="adminInfo" style="display: none;">
                <h4>🔐 معلومات الأدمن الافتراضي</h4>
                <p><strong>اسم المستخدم:</strong> admin</p>
                <p><strong>كلمة المرور:</strong> admin123</p>
                <p><strong>البريد:</strong> admin@examplatform.com</p>
                <button onclick="createAdminAndShow()" style="margin-top: 10px; padding: 8px 16px; background: #667eea; color: white; border: none; border-radius: 5px; cursor: pointer;">
                    إنشاء حساب أدمن افتراضي
                </button>
            </div>
        </div>
    </div>

    <!-- ============================================ -->
    <!-- ترتيب تحميل الملفات مهم جداً! -->
    <!-- ============================================ -->
    
    <!-- 1. مكتبة Supabase (يجب أن تُحمّل أولاً) -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <!-- 2. supabase-client.js (يعتمد على مكتبة Supabase) -->
    <script src="shared/supabase-client.js"></script>
    
    <!-- 3. app.js (يعتمد على supabase-client.js) -->
    <script src="shared/app.js"></script>
    
    <!-- 4. كود صفحة تسجيل الدخول -->
    <script>
        // ============================================
        // Login Handler
        // ============================================
        async function handleLogin(event) {
            event.preventDefault();
            
            const identifier = document.getElementById('identifier').value.trim();
            const password = document.getElementById('password').value;
            const loginBtn = document.getElementById('loginBtn');
            const errorMsg = document.getElementById('errorMsg');
            const successMsg = document.getElementById('successMsg');
            
            // إخفاء الرسائل السابقة
            errorMsg.style.display = 'none';
            successMsg.style.display = 'none';
            
            // التحقق من المدخلات
            if (!identifier || !password) {
                showError('يرجى ملء جميع الحقول');
                return false;
            }
            
            // تفعيل حالة التحميل
            loginBtn.disabled = true;
            loginBtn.innerHTML = '<span class="spinner"></span> جاري تسجيل الدخول...';
            
            try {
                // التحقق من توفر الدوال
                if (typeof loginUser !== 'function') {
                    throw new Error('loginUser function not available. Check script loading order.');
                }
                
                const result = await loginUser(identifier, password);
                
                if (result.success) {
                    // حفظ بيانات المستخدم
                    setUser(result.user);
                    
                    showSuccess('تم تسجيل الدخول بنجاح! جاري التوجيه...');
                    
                    // التوجيه حسب الدور
                    setTimeout(() => {
                        switch(result.user.role) {
                            case 'admin':
                                window.location.href = 'admin/dashboard.html';
                                break;
                            case 'teacher':
                                window.location.href = 'teacher/dashboard.html';
                                break;
                            case 'student':
                                window.location.href = 'student/dashboard.html';
                                break;
                            default:
                                window.location.href = 'index.html';
                        }
                    }, 1500);
                } else {
                    showError(result.error || 'فشل تسجيل الدخول');
                }
            } catch (error) {
                console.error('Login error:', error);
                showError('حدث خطأ: ' + error.message);
            } finally {
                loginBtn.disabled = false;
                loginBtn.innerHTML = 'تسجيل الدخول';
            }
            
            return false;
        }
        
        function showError(message) {
            const errorMsg = document.getElementById('errorMsg');
            errorMsg.textContent = message;
            errorMsg.style.display = 'block';
        }
        
        function showSuccess(message) {
            const successMsg = document.getElementById('successMsg');
            successMsg.textContent = message;
            successMsg.style.display = 'block';
        }
        
        // ============================================
        // Create Default Admin
        // ============================================
        async function createAdminAndShow() {
            const btn = event.target;
            btn.disabled = true;
            btn.textContent = 'جاري الإنشاء...';
            
            try {
                if (typeof createDefaultAdmin !== 'function') {
                    throw new Error('createDefaultAdmin not available');
                }
                
                const result = await createDefaultAdmin();
                
                if (result.success) {
                    if (result.created) {
                        showSuccess('✅ تم إنشاء حساب الأدمن بنجاح! يمكنك تسجيل الدخول الآن.');
                    } else {
                        showSuccess('ℹ️ ' + result.message);
                    }
                } else {
                    showError('❌ خطأ: ' + result.error);
                }
            } catch (error) {
                showError('❌ خطأ: ' + error.message);
            } finally {
                btn.disabled = false;
                btn.textContent = 'إنشاء حساب أدمن افتراضي';
            }
        }
        
        // ============================================
        // Check if admin exists and show info
        // ============================================
        async function checkAdminStatus() {
            try {
                const client = getSupabaseClient();
                if (!client) return;
                
                const { data, error } = await client
                    .from('exam_users')
                    .select('id')
                    .eq('role', 'admin')
                    .limit(1);
                
                const adminInfo = document.getElementById('adminInfo');
                
                if (error || !data || data.length === 0) {
                    // لا يوجد أدمن - أظهر زر الإنشاء
                    adminInfo.style.display = 'block';
                }
            } catch (e) {
                console.log('Could not check admin status:', e);
            }
        }
        
        // تشغيل الفحص عند تحميل الصفحة
        document.addEventListener('DOMContentLoaded', checkAdminStatus);
        
        // ============================================
        // Auto-fill for testing (remove in production)
        // ============================================
        // Uncomment the following lines for easier testing:
        // document.getElementById('identifier').value = 'admin';
        // document.getElementById('password').value = 'admin123';
    </script>
</body>
</html>
