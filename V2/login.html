<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تسجيل الدخول — منصة الاختبارات الذكية</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Tajawal', sans-serif;
            background: #f0f4f8;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* ========== Animated Background ========== */
        .bg-animation {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            overflow: hidden;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
        }

        .bg-animation .shape {
            position: absolute;
            filter: blur(60px);
            opacity: 0.4;
            animation: float 20s infinite ease-in-out;
        }

        .shape-1 {
            width: 400px;
            height: 400px;
            background: linear-gradient(45deg, #e94560, #ff6b6b);
            border-radius: 50%;
            top: -100px;
            right: -100px;
            animation-delay: 0s;
        }

        .shape-2 {
            width: 300px;
            height: 300px;
            background: linear-gradient(45deg, #533483, #7b2cbf);
            border-radius: 50%;
            bottom: -50px;
            left: -50px;
            animation-delay: -5s;
        }

        .shape-3 {
            width: 200px;
            height: 200px;
            background: linear-gradient(45deg, #0f3460, #16c79a);
            border-radius: 50%;
            top: 50%;
            left: 50%;
            animation-delay: -10s;
        }

        @keyframes float {
            0%, 100% { transform: translate(0, 0) scale(1); }
            25% { transform: translate(30px, -30px) scale(1.1); }
            50% { transform: translate(-20px, 20px) scale(0.9); }
            75% { transform: translate(20px, 10px) scale(1.05); }
        }

        /* ========== Floating Particles ========== */
        .particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            pointer-events: none;
        }

        .particle {
            position: absolute;
            width: 4px;
            height: 4px;
            background: rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            animation: particle-float 15s infinite linear;
        }

        @keyframes particle-float {
            0% { transform: translateY(100vh) rotate(0deg); opacity: 0; }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% { transform: translateY(-100vh) rotate(720deg); opacity: 0; }
        }

        /* ========== Main Container ========== */
        .main-container {
            position: relative;
            z-index: 2;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
        }

        /* ========== Login Card ========== */
        .login-card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(20px);
            border-radius: 24px;
            box-shadow: 0 25px 80px rgba(0, 0, 0, 0.3), 
                        0 0 0 1px rgba(255, 255, 255, 0.1);
            width: 100%;
            max-width: 460px;
            overflow: hidden;
            position: relative;
            animation: card-appear 0.8s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        @keyframes card-appear {
            0% { opacity: 0; transform: translateY(60px) scale(0.9); }
            100% { opacity: 1; transform: translateY(0) scale(1); }
        }

        /* ========== Header ========== */
        .card-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 50%, #f093fb 100%);
            padding: 40px 30px 60px;
            text-align: center;
            position: relative;
            overflow: hidden;
        }

        .card-header::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(255,255,255,0.1) 1px, transparent 1px);
            background-size: 20px 20px;
            animation: grid-move 20s linear infinite;
        }

        @keyframes grid-move {
            0% { transform: translate(0, 0); }
            100% { transform: translate(20px, 20px); }
        }

        .logo-icon {
            width: 70px;
            height: 70px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px;
            font-size: 32px;
            backdrop-filter: blur(10px);
            border: 2px solid rgba(255, 255, 255, 0.3);
            animation: logo-bounce 2s ease-in-out infinite;
        }

        @keyframes logo-bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        .card-header h1 {
            color: white;
            font-size: 28px;
            font-weight: 800;
            margin-bottom: 8px;
            position: relative;
            z-index: 1;
        }

        .card-header p {
            color: rgba(255, 255, 255, 0.85);
            font-size: 15px;
            position: relative;
            z-index: 1;
        }

        /* ========== Form Body ========== */
        .card-body {
            padding: 30px 35px 35px;
            position: relative;
        }

        .card-body::before {
            content: '';
            position: absolute;
            top: -30px;
            left: 0;
            right: 0;
            height: 60px;
            background: rgba(255, 255, 255, 0.95);
            border-radius: 30px 30px 0 0;
        }

        /* ========== Messages ========== */
        .message {
            padding: 14px 18px;
            border-radius: 12px;
            margin-bottom: 20px;
            font-size: 14px;
            font-weight: 500;
            display: none;
            align-items: center;
            gap: 10px;
            animation: message-slide 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
            position: relative;
            z-index: 1;
        }

        @keyframes message-slide {
            0% { opacity: 0; transform: translateY(-10px); }
            100% { opacity: 1; transform: translateY(0); }
        }

        .message.error {
            background: #fee;
            color: #c0392b;
            border-right: 4px solid #e74c3c;
        }

        .message.success {
            background: #efe;
            color: #27ae60;
            border-right: 4px solid #2ecc71;
        }

        .message.info {
            background: #e8f4fd;
            color: #2980b9;
            border-right: 4px solid #3498db;
        }

        .message.visible {
            display: flex;
        }

        /* ========== Form Groups ========== */
        .form-group {
            margin-bottom: 22px;
            position: relative;
            z-index: 1;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 600;
            font-size: 14px;
            transition: color 0.3s;
        }

        .form-group:focus-within label {
            color: #667eea;
        }

        .input-wrapper {
            position: relative;
        }

        .input-wrapper i {
            position: absolute;
            right: 16px;
            top: 50%;
            transform: translateY(-50%);
            color: #aaa;
            font-size: 16px;
            transition: all 0.3s;
        }

        .input-wrapper input:focus + i,
        .input-wrapper input:not(:placeholder-shown) + i {
            color: #667eea;
        }

        .input-wrapper input {
            width: 100%;
            padding: 14px 45px 14px 16px;
            border: 2px solid #e8e8e8;
            border-radius: 14px;
            font-size: 15px;
            font-family: 'Tajawal', sans-serif;
            transition: all 0.3s;
            background: #fafafa;
            color: #333;
        }

        .input-wrapper input:focus {
            outline: none;
            border-color: #667eea;
            background: white;
            box-shadow: 0 0 0 4px rgba(102, 126, 234, 0.1);
        }

        .input-wrapper input::placeholder {
            color: #bbb;
        }

        .input-wrapper .toggle-password {
            position: absolute;
            left: 16px;
            top: 50%;
            transform: translateY(-50%);
            color: #aaa;
            cursor: pointer;
            font-size: 16px;
            transition: color 0.3s;
        }

        .input-wrapper .toggle-password:hover {
            color: #667eea;
        }

        /* ========== Remember & Forgot ========== */
        .form-options {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
            position: relative;
            z-index: 1;
        }

        .remember-me {
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
        }

        .remember-me input {
            width: 18px;
            height: 18px;
            accent-color: #667eea;
            cursor: pointer;
        }

        .remember-me span {
            font-size: 13px;
            color: #666;
        }

        .forgot-link {
            font-size: 13px;
            color: #667eea;
            text-decoration: none;
            font-weight: 600;
            transition: color 0.3s;
        }

        .forgot-link:hover {
            color: #764ba2;
        }

        /* ========== Submit Button ========== */
        .btn-submit {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 14px;
            font-size: 17px;
            font-weight: 700;
            font-family: 'Tajawal', sans-serif;
            cursor: pointer;
            transition: all 0.3s;
            position: relative;
            overflow: hidden;
            z-index: 1;
        }

        .btn-submit::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
            transition: left 0.5s;
        }

        .btn-submit:hover::before {
            left: 100%;
        }

        .btn-submit:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(102, 126, 234, 0.4);
        }

        .btn-submit:disabled {
            opacity: 0.7;
            cursor: not-allowed;
            transform: none;
        }

        .btn-submit .spinner {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255,255,255,0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-left: 10px;
            vertical-align: middle;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* ========== Social Login ========== */
        .social-login {
            margin-top: 25px;
            position: relative;
            z-index: 1;
        }

        .social-divider {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 20px;
            color: #aaa;
            font-size: 13px;
        }

        .social-divider::before,
        .social-divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: #e8e8e8;
        }

        .social-buttons {
            display: flex;
            gap: 12px;
            justify-content: center;
        }

        .social-btn {
            width: 50px;
            height: 50px;
            border-radius: 14px;
            border: 2px solid #e8e8e8;
            background: white;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s;
            font-size: 20px;
        }

        .social-btn:hover {
            border-color: #667eea;
            transform: translateY(-3px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }

        /* ========== Demo Mode Buttons ========== */
        .demo-section {
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid #f0f0f0;
            position: relative;
            z-index: 1;
        }

        .demo-title {
            text-align: center;
            font-size: 13px;
            color: #aaa;
            margin-bottom: 12px;
        }

        .demo-buttons {
            display: flex;
            gap: 8px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .demo-btn {
            padding: 8px 16px;
            border-radius: 20px;
            border: 2px solid #e8e8e8;
            background: white;
            font-family: 'Tajawal', sans-serif;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }

        .demo-btn:hover {
            border-color: #667eea;
            background: linear-gradient(135deg, rgba(102,126,234,0.1), rgba(118,75,162,0.1));
            transform: translateY(-2px);
        }

        /* ========== Admin Info ========== */
        .admin-info {
            background: linear-gradient(135deg, #f0f0ff, #e8e8ff);
            border: 2px solid #667eea;
            border-radius: 14px;
            padding: 18px;
            margin-top: 20px;
            position: relative;
            z-index: 1;
            animation: admin-pulse 2s ease-in-out infinite;
        }

        @keyframes admin-pulse {
            0%, 100% { box-shadow: 0 0 0 0 rgba(102, 126, 234, 0.2); }
            50% { box-shadow: 0 0 0 8px rgba(102, 126, 234, 0); }
        }

        .admin-info h4 {
            color: #667eea;
            margin-bottom: 10px;
            font-size: 15px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .admin-info p {
            font-size: 13px;
            color: #555;
            margin-bottom: 5px;
        }

        .admin-info strong {
            color: #333;
        }

        .btn-create-admin {
            margin-top: 12px;
            width: 100%;
            padding: 10px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border: none;
            border-radius: 10px;
            font-family: 'Tajawal', sans-serif;
            font-size: 14px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn-create-admin:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.3);
        }

        /* ========== Footer ========== */
        .card-footer {
            text-align: center;
            padding: 20px 35px 30px;
            border-top: 1px solid #f0f0f0;
            position: relative;
            z-index: 1;
        }

        .card-footer p {
            color: #888;
            font-size: 14px;
        }

        .card-footer a {
            color: #667eea;
            text-decoration: none;
            font-weight: 700;
            transition: all 0.3s;
        }

        .card-footer a:hover {
            color: #764ba2;
        }

        /* ========== Responsive ========== */
        @media (max-width: 480px) {
            .login-card {
                border-radius: 0;
                min-height: 100vh;
            }

            .card-header {
                padding: 30px 20px 50px;
            }

            .card-body {
                padding: 25px 20px 30px;
            }

            .form-options {
                flex-direction: column;
                gap: 10px;
                align-items: flex-start;
            }
        }
    </style>
</head>
<body>
    <!-- Background Animation -->
    <div class="bg-animation">
        <div class="shape shape-1"></div>
        <div class="shape shape-2"></div>
        <div class="shape shape-3"></div>
    </div>

    <!-- Floating Particles -->
    <div class="particles" id="particles"></div>

    <!-- Main Container -->
    <div class="main-container">
        <div class="login-card">
            <!-- Header -->
            <div class="card-header">
                <div class="logo-icon">🎓</div>
                <h1>مرحباً بعودتك</h1>
                <p>سجل الدخول إلى منصة الاختبارات الذكية</p>
            </div>

            <!-- Body -->
            <div class="card-body">
                <!-- Messages -->
                <div id="errorMsg" class="message error">
                    <i class="fas fa-exclamation-circle"></i>
                    <span></span>
                </div>
                <div id="successMsg" class="message success">
                    <i class="fas fa-check-circle"></i>
                    <span></span>
                </div>
                <div id="infoMsg" class="message info">
                    <i class="fas fa-info-circle"></i>
                    <span></span>
                </div>

                <!-- Form -->
                <form id="loginForm" onsubmit="return handleLogin(event)">
                    <div class="form-group">
                        <label for="identifier">البريد الإلكتروني / اسم المستخدم / الهاتف</label>
                        <div class="input-wrapper">
                            <input type="text" id="identifier" name="identifier" required 
                                   placeholder="أدخل بياناتك" autocomplete="username">
                            <i class="fas fa-user"></i>
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="password">كلمة المرور</label>
                        <div class="input-wrapper">
                            <input type="password" id="password" name="password" required 
                                   placeholder="أدخل كلمة المرور" autocomplete="current-password">
                            <i class="fas fa-lock"></i>
                            <i class="fas fa-eye toggle-password" onclick="togglePassword()"></i>
                        </div>
                    </div>

                    <div class="form-options">
                        <label class="remember-me">
                            <input type="checkbox" id="remember" name="remember">
                            <span>تذكرني</span>
                        </label>
                        <a href="forgot-password.html" class="forgot-link">نسيت كلمة المرور؟</a>
                    </div>

                    <button type="submit" class="btn-submit" id="loginBtn">
                        تسجيل الدخول
                    </button>
                </form>

                <!-- Social Login -->
                <div class="social-login">
                    <div class="social-divider">أو سجل باستخدام</div>
                    <div class="social-buttons">
                        <button class="social-btn" title="Google">
                            <i class="fab fa-google" style="color:#DB4437;"></i>
                        </button>
                        <button class="social-btn" title="Facebook">
                            <i class="fab fa-facebook-f" style="color:#4267B2;"></i>
                        </button>
                        <button class="social-btn" title="Twitter">
                            <i class="fab fa-twitter" style="color:#1DA1F2;"></i>
                        </button>
                    </div>
                </div>

                <!-- Demo Mode -->
                <div class="demo-section">
                    <div class="demo-title">وضع المعاينة السريع</div>
                    <div class="demo-buttons">
                        <button class="demo-btn" onclick="demoLogin('admin')">👤 أدمن</button>
                        <button class="demo-btn" onclick="demoLogin('teacher')">👨‍🏫 معلم</button>
                        <button class="demo-btn" onclick="demoLogin('student')">👨‍🎓 طالب</button>
                    </div>
                </div>

                <!-- Admin Info (shown when no admin exists) -->
                <div class="admin-info" id="adminInfo" style="display: none;">
                    <h4><i class="fas fa-shield-alt"></i> معلومات الأدمن الافتراضي</h4>
                    <p><strong>اسم المستخدم:</strong> admin</p>
                    <p><strong>كلمة المرور:</strong> admin123</p>
                    <p><strong>البريد:</strong> admin@examplatform.com</p>
                    <button class="btn-create-admin" onclick="createAdminAndShow()">
                        <i class="fas fa-plus-circle"></i> إنشاء حساب أدمن افتراضي
                    </button>
                </div>
            </div>

            <!-- Footer -->
            <div class="card-footer">
                <p>ليس لديك حساب؟ <a href="register.html">سجل الآن مجاناً</a></p>
            </div>
        </div>
    </div>

    <!-- ============================================ -->
    <!-- Scripts -->
    <!-- ============================================ -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="shared/supabase-client.js"></script>
    <script src="shared/app.js"></script>

    <script>
        // ========== Particles ==========
        function createParticles() {
            const container = document.getElementById('particles');
            for (let i = 0; i < 30; i++) {
                const particle = document.createElement('div');
                particle.className = 'particle';
                particle.style.left = Math.random() * 100 + '%';
                particle.style.animationDelay = Math.random() * 15 + 's';
                particle.style.animationDuration = (10 + Math.random() * 10) + 's';
                container.appendChild(particle);
            }
        }
        createParticles();

        // ========== Toggle Password ==========
        function togglePassword() {
            const field = document.getElementById('password');
            const icon = event.target;
            if (field.type === 'password') {
                field.type = 'text';
                icon.classList.remove('fa-eye');
                icon.classList.add('fa-eye-slash');
            } else {
                field.type = 'password';
                icon.classList.remove('fa-eye-slash');
                icon.classList.add('fa-eye');
            }
        }

        // ========== Show Messages ==========
        function showError(message) {
            const msg = document.getElementById('errorMsg');
            msg.querySelector('span').textContent = message;
            msg.classList.add('visible');
            document.getElementById('successMsg').classList.remove('visible');
            document.getElementById('infoMsg').classList.remove('visible');
        }

        function showSuccess(message) {
            const msg = document.getElementById('successMsg');
            msg.querySelector('span').textContent = message;
            msg.classList.add('visible');
            document.getElementById('errorMsg').classList.remove('visible');
            document.getElementById('infoMsg').classList.remove('visible');
        }

        function showInfo(message) {
            const msg = document.getElementById('infoMsg');
            msg.querySelector('span').textContent = message;
            msg.classList.add('visible');
            document.getElementById('errorMsg').classList.remove('visible');
            document.getElementById('successMsg').classList.remove('visible');
        }

        function hideMessages() {
            document.getElementById('errorMsg').classList.remove('visible');
            document.getElementById('successMsg').classList.remove('visible');
            document.getElementById('infoMsg').classList.remove('visible');
        }

        // ========== Hash Password (SHA-256) ==========
        async function hashPassword(password) {
            const encoder = new TextEncoder();
            const data = encoder.encode(password);
            const hashBuffer = await crypto.subtle.digest('SHA-256', data);
            const hashArray = Array.from(new Uint8Array(hashBuffer));
            return hashArray.map(b => b.toString(16).padStart(2, '0')).join('');
        }

        // ========== Handle Login ==========
        async function handleLogin(event) {
            event.preventDefault();
            hideMessages();

            const identifier = document.getElementById('identifier').value.trim();
            const password = document.getElementById('password').value;
            const btn = document.getElementById('loginBtn');

            if (!identifier || !password) {
                showError('يرجى ملء جميع الحقول');
                return false;
            }

            btn.disabled = true;
            btn.innerHTML = '<span class="spinner"></span> جاري تسجيل الدخول...';

            try {
                const client = getSupabaseClient();
                if (!client) {
                    throw new Error('فشل الاتصال بقاعدة البيانات');
                }

                const hashedPassword = await hashPassword(password);

                // Try username first
                let query = client.from('exam_users').select('*');
                if (/^\d+$/.test(identifier)) {
                    query = query.eq('phone', identifier);
                } else if (identifier.includes('@')) {
                    query = query.eq('email', identifier);
                } else {
                    query = query.eq('username', identifier);
                }

                const { data, error } = await query.single();

                if (error || !data) {
                    showError('المستخدم غير موجود');
                    return false;
                }

                if (data.password_hash !== hashedPassword) {
                    showError('كلمة المرور غير صحيحة');
                    return false;
                }

                if (data.status !== 'active') {
                    showError('الحساب غير مفعل');
                    return false;
                }

                // Success
                const user = {
                    id: data.id,
                    name: data.name,
                    role: data.role,
                    email: data.email,
                    phone: data.phone,
                    username: data.username,
                    class_id: data.class_id,
                    status: data.status
                };

                setUser(user);

                showSuccess('تم تسجيل الدخول بنجاح! جاري التوجيه...');

                setTimeout(() => {
                    switch(user.role) {
                        case 'admin':
                            window.location.href = 'admin/dashboard.html';
                            break;
                        case 'teacher':
                            window.location.href = 'teacher/dashboard.html';
                            break;
                        case 'student':
                            window.location.href = 'student/dashboard.html';
                            break;
                        default:
                            window.location.href = 'index.html';
                    }
                }, 1500);

            } catch (error) {
                console.error('Login error:', error);
                showError('حدث خطأ: ' + error.message);
            } finally {
                btn.disabled = false;
                btn.innerHTML = 'تسجيل الدخول';
            }

            return false;
        }

        // ========== Create Default Admin ==========
        async function createAdminAndShow() {
            const btn = event.target;
            btn.disabled = true;
            btn.innerHTML = '<span class="spinner"></span> جاري الإنشاء...';

            try {
                const client = getSupabaseClient();
                if (!client) throw new Error('No database connection');

                const { data: existing, error: checkError } = await client
                    .from('exam_users')
                    .select('id')
                    .eq('role', 'admin')
                    .limit(1);

                if (checkError) throw checkError;

                if (existing && existing.length > 0) {
                    showInfo('ℹ️ حساب الأدمن موجود بالفعل');
                    return;
                }

                const hashedPassword = await hashPassword('admin123');
                const { error: insertError } = await client
                    .from('exam_users')
                    .insert({
                        name: 'مدير النظام',
                        username: 'admin',
                        email: 'admin@examplatform.com',
                        password_hash: hashedPassword,
                        role: 'admin',
                        status: 'active',
                        phone: '01000000000',
                        created_at: new Date().toISOString()
                    });

                if (insertError) throw insertError;

                showSuccess('✅ تم إنشاء حساب الأدمن بنجاح! يمكنك تسجيل الدخول الآن.');

            } catch (error) {
                showError('❌ خطأ: ' + error.message);
            } finally {
                btn.disabled = false;
                btn.innerHTML = '<i class="fas fa-plus-circle"></i> إنشاء حساب أدمن افتراضي';
            }
        }

        // ========== Demo Login ==========
        async function demoLogin(role) {
            hideMessages();
            showInfo('جاري تسجيل الدخول كـ ' + (role === 'admin' ? 'مدير' : role === 'teacher' ? 'معلم' : 'طالب') + '...');

            const demoUsers = {
                admin: { name: 'مدير النظام', username: 'admin', role: 'admin' },
                teacher: { name: 'أحمد المعلم', username: 'teacher1', role: 'teacher' },
                student: { name: 'محمد الطالب', username: 'student1', role: 'student' }
            };

            const demo = demoUsers[role];
            setUser({
                id: 'demo-' + role,
                name: demo.name,
                role: demo.role,
                username: demo.username,
                email: demo.username + '@demo.com',
                status: 'active'
            });

            setTimeout(() => {
                switch(role) {
                    case 'admin':
                        window.location.href = 'admin/dashboard.html';
                        break;
                    case 'teacher':
                        window.location.href = 'teacher/dashboard.html';
                        break;
                    case 'student':
                        window.location.href = 'student/dashboard.html';
                        break;
                }
            }, 1000);
        }

        // ========== Check Admin Status ==========
        async function checkAdminStatus() {
            try {
                const client = getSupabaseClient();
                if (!client) return;

                const { data, error } = await client
                    .from('exam_users')
                    .select('id')
                    .eq('role', 'admin')
                    .limit(1);

                const adminInfo = document.getElementById('adminInfo');

                if (error || !data || data.length === 0) {
                    adminInfo.style.display = 'block';
                }
            } catch (e) {
                console.log('Could not check admin status:', e);
            }
        }

        // Run on load
        document.addEventListener('DOMContentLoaded', checkAdminStatus);
    </script>
