<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>الاختبارات | منصة الاختبارات</title>
    <link rel="stylesheet" href="../shared/styles.css">
</head>
<body class="dark-mode">
    <div class="app-layout">
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <h2>🎓 منصة الاختبارات</h2>
                <button class="sidebar-toggle" id="sidebarToggle">☰</button>
            </div>
            <nav class="sidebar-nav">
                <a href="./dashboard.html" class="nav-item">
                    <span class="nav-icon">📊</span>
                    <span class="nav-text">لوحة التحكم</span>
                </a>
                <a href="./exams.html" class="nav-item active">
                    <span class="nav-icon">📝</span>
                    <span class="nav-text">الاختبارات</span>
                </a>
                <a href="./results.html" class="nav-item">
                    <span class="nav-icon">📈</span>
                    <span class="nav-text">النتائج</span>
                </a>
                <a href="./profile.html" class="nav-item">
                    <span class="nav-icon">👤</span>
                    <span class="nav-text">الملف الشخصي</span>
                </a>
                <a href="../admin/dashboard.html" class="nav-item admin-only" style="display:none;">
                    <span class="nav-icon">🔧</span>
                    <span class="nav-text">لوحة الأدمن</span>
                </a>
            </nav>
            <div class="sidebar-footer">
                <button class="btn btn-danger" id="logoutBtn">🚪 تسجيل الخروج</button>
            </div>
        </aside>

        <main class="main-content">
            <header class="top-bar">
                <h1>الاختبارات المتاحة</h1>
                <div class="filters">
                    <select id="subjectFilter" class="form-select">
                        <option value="">جميع المواد</option>
                    </select>
                    <select id="statusFilter" class="form-select">
                        <option value="">جميع الحالات</option>
                        <option value="available">متاح الآن</option>
                        <option value="upcoming">قادم</option>
                        <option value="completed">مكتمل</option>
                    </select>
                    <input type="text" id="searchInput" class="form-input" placeholder="بحث...">
                </div>
            </header>

            <div class="content-wrapper">
                <div class="exams-grid" id="examsGrid">
                    <div class="loading-spinner">جاري التحميل...</div>
                </div>
            </div>
        </main>
    </div>

    <!-- Exam Start Modal -->
    <div class="modal-overlay" id="startModal" style="display:none;">
        <div class="modal">
            <div class="modal-header">
                <h3>بدء الاختبار</h3>
                <button class="modal-close" onclick="App.Modal.close('startModal')">×</button>
            </div>
            <div class="modal-body">
                <p id="examConfirmText">هل أنت متأكد من بدء هذا الاختبار؟</p>
                <ul class="info-list">
                    <li>⏱️ المدة: <span id="modalDuration">-</span></li>
                    <li>❓ عدد الأسئلة: <span id="modalQuestions">-</span></li>
                    <li>📊 الدرجة الكلية: <span id="modalTotal">-</span></li>
                    <li>⚠️ لا يمكنك إعادة الاختبار بعد البدء</li>
                </ul>
            </div>
            <div class="modal-footer">
                <button class="btn btn-secondary" onclick="App.Modal.close('startModal')">إلغاء</button>
                <button class="btn btn-primary" id="confirmStartBtn">بدء الاختبار</button>
            </div>
        </div>
    </div>

    <div class="toast-container" id="toastContainer"></div>

    <script src="../shared/supabase-client.js"></script>
    <script src="../shared/app.js"></script>
    <script>
        let allExams = [];
        let studentId = null;
        let currentExam = null;

        document.addEventListener('DOMContentLoaded', async function() {
            const user = await examAuth.getUser();
            if (!user) { window.location.href = '../login.html'; return; }
            
            const isAdmin = await examAuth.isAdmin();
            const isStudent = user.role === 'student' || user.user_metadata?.role === 'student';
            if (!isStudent && !isAdmin) { window.location.href = '../unauthorized.html'; return; }
            
            if (isAdmin) document.querySelectorAll('.admin-only').forEach(el => el.style.display = '');

            document.getElementById('logoutBtn').addEventListener('click', async () => {
                await examAuth.signOut();
                window.location.href = '../login.html';
            });
            document.getElementById('sidebarToggle').addEventListener('click', () => {
                document.getElementById('sidebar').classList.toggle('collapsed');
            });

            // Get student record
            const { data: student } = await examDB.students()
                .select('id')
                .eq('user_id', user.id)
                .single();
            studentId = student?.id;

            await loadSubjects();
            await loadExams();
            
            // Filters
            document.getElementById('subjectFilter').addEventListener('change', filterExams);
            document.getElementById('statusFilter').addEventListener('change', filterExams);
            document.getElementById('searchInput').addEventListener('input', App.debounce(filterExams, 300));
        });

        async function loadSubjects() {
            const { data } = await examDB.subjects().select('id, name').order('name');
            const select = document.getElementById('subjectFilter');
            if (data) {
                data.forEach(s => {
                    select.innerHTML += `<option value="${s.id}">${s.name}</option>`;
                });
            }
        }

        async function loadExams() {
            App.Loading.show();
            try {
                const { data: exams } = await examDB.exams()
                    .select('*, exam_subjects(name), exam_exam_questions(count)')
                    .eq('status', 'published')
                    .order('start_time', { ascending: false });

                // Get attempts for this student
                const { data: attempts } = studentId ? await examDB.attempts()
                    .select('exam_id, status, score')
                    .eq('student_id', studentId) : { data: [] };

                allExams = (exams || []).map(exam => {
                    const attempt = attempts?.find(a => a.exam_id === exam.id);
                    return { ...exam, attempt };
                });

                renderExams(allExams);
            } catch (err) {
                App.Toast.error('حدث خطأ في تحميل الاختبارات');
            } finally {
                App.Loading.hide();
            }
        }

        function renderExams(exams) {
            const grid = document.getElementById('examsGrid');
            if (!exams.length) {
                grid.innerHTML = '<div class="empty-state">لا توجد اختبارات</div>';
                return;
            }

            grid.innerHTML = exams.map(exam => {
                const now = new Date();
                const start = new Date(exam.start_time);
                const end = exam.end_time ? new Date(exam.end_time) : null;
                const isAvailable = start <= now && (!end || now <= end);
                const isCompleted = exam.attempt?.status === 'completed';
                const isStarted = exam.attempt?.status === 'in_progress';

                let statusClass = 'badge-warning';
                let statusText = 'قادم';
                let actionBtn = '';

                if (isCompleted) {
                    statusClass = 'badge-success';
                    statusText = 'مكتمل';
                    actionBtn = `<a href="./exam-review.html?attempt=${exam.attempt.id}" class="btn btn-sm">مراجعة</a>`;
                } else if (isStarted) {
                    statusClass = 'badge-info';
                    statusText = 'مستمر';
                    actionBtn = `<a href="exam-session.html?exam=${exam.id}" class="btn btn-sm btn-primary">استمرار</a>`;
                } else if (isAvailable) {
                    statusClass = 'badge-success';
                    statusText = 'متاح';
                    actionBtn = `<button class="btn btn-sm btn-primary" onclick="showStartModal('${exam.id}')">بدء</button>`;
                }

                return `
                    <div class="exam-card">
                        <div class="exam-header">
                            <span class="badge ${statusClass}">${statusText}</span>
                            <span class="exam-subject">${exam.exam_subjects?.name || '-'}</span>
                        </div>
                        <h3 class="exam-title">${exam.title}</h3>
                        <p class="exam-desc">${exam.description || ''}</p>
                        <div class="exam-meta">
                            <span>⏱️ ${exam.duration_minutes} دقيقة</span>
                            <span>❓ ${exam.exam_exam_questions?.count || 0} سؤال</span>
                            <span>📊 ${exam.total_score} درجة</span>
                        </div>
                        <div class="exam-footer">
                            <span class="exam-date">${App.DateTime.format(exam.start_time)}</span>
                            ${actionBtn}
                        </div>
                    </div>
                `;
            }).join('');
        }

        function filterExams() {
            const subject = document.getElementById('subjectFilter').value;
            const status = document.getElementById('statusFilter').value;
            const search = document.getElementById('searchInput').value.toLowerCase();

            let filtered = allExams.filter(exam => {
                if (subject && exam.subject_id !== subject) return false;
                if (search && !exam.title.toLowerCase().includes(search) && !exam.description?.toLowerCase().includes(search)) return false;
                if (status) {
                    const now = new Date();
                    const start = new Date(exam.start_time);
                    const end = exam.end_time ? new Date(exam.end_time) : null;
                    const isAvailable = start <= now && (!end || now <= end);
                    const isCompleted = exam.attempt?.status === 'completed';
                    
                    if (status === 'available' && !isAvailable) return false;
                    if (status === 'upcoming' && start > now) return true;
                    if (status === 'completed' && !isCompleted) return false;
                    if (status === 'upcoming' && start <= now) return false;
                }
                return true;
            });

            renderExams(filtered);
        }

        async function showStartModal(examId) {
            const exam = allExams.find(e => e.id === examId);
            if (!exam) return;
            currentExam = exam;

            document.getElementById('examConfirmText').textContent = `هل أنت متأكد من بدء اختبار: ${exam.title}؟`;
            document.getElementById('modalDuration').textContent = exam.duration_minutes + ' دقيقة';
            document.getElementById('modalQuestions').textContent = exam.exam_exam_questions?.count || 0;
            document.getElementById('modalTotal').textContent = exam.total_score;

            document.getElementById('confirmStartBtn').onclick = startExam;
            App.Modal.open('startModal');
        }

        async function startExam() {
            if (!currentExam || !studentId) return;
            
            App.Loading.show();
            try {
                // Create attempt
                const { data: attempt, error } = await examDB.attempts().insert({
                    exam_id: currentExam.id,
                    student_id: studentId,
                    status: 'in_progress',
                    started_at: new Date().toISOString()
                }).select().single();

                if (error) throw error;

                App.Toast.success('تم بدء الاختبار');
                window.location.href = `exam-session.html?exam=${currentExam.id}&attempt=${attempt.id}`;
            } catch (err) {
                App.Toast.error('حدث خطأ في بدء الاختبار');
                App.Loading.hide();
            }
        }
    </script>
</body>
</html>
