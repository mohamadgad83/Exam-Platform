<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>نتائجي - منصة الاختبارات</title>
  <link rel="stylesheet" href="../shared/styles.css">
  <style>
    .results-chart { display: flex; align-items: flex-end; gap: 0.5rem; height: 120px; padding: 1rem 1.5rem; border-bottom: 2px solid var(--gray-200); overflow-x: auto; }
    .chart-bar-wrap { display: flex; flex-direction: column; align-items: center; gap: 0.375rem; min-width: 48px; }
    .chart-bar { width: 36px; border-radius: 4px 4px 0 0; transition: height 0.5s ease; cursor: pointer; position: relative; }
    .chart-bar:hover::after { content: attr(data-tooltip); position: absolute; bottom: 100%; left: 50%; transform: translateX(-50%); background: var(--gray-900); color: white; padding: 0.25rem 0.625rem; border-radius: var(--radius); font-size: 0.75rem; white-space: nowrap; margin-bottom: 4px; }
    .chart-label { font-size: 0.65rem; color: var(--gray-500); text-align: center; max-width: 48px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  </style>
</head>
<body>
  <div class="app-layout">
    <main class="main-content">
      <div class="content-area">

        <!-- Stats -->
        <div class="stats-grid" style="margin-bottom:1.5rem;">
          <div class="stat-card"><div class="stat-icon blue">📝</div><div class="stat-info"><h3 id="stat-total">-</h3><p>إجمالي الاختبارات</p></div></div>
          <div class="stat-card"><div class="stat-icon green">✅</div><div class="stat-info"><h3 id="stat-passed">-</h3><p>ناجح</p></div></div>
          <div class="stat-card"><div class="stat-icon orange">📊</div><div class="stat-info"><h3 id="stat-avg">-</h3><p>متوسط الدرجات</p></div></div>
          <div class="stat-card"><div class="stat-icon purple">🏆</div><div class="stat-info"><h3 id="stat-best">-</h3><p>أعلى درجة</p></div></div>
        </div>

        <!-- Performance Chart -->
        <div class="card" style="margin-bottom:1.5rem;">
          <div class="card-header">
            <h2 class="card-title">📈 أداؤي في آخر 10 اختبارات</h2>
          </div>
          <div class="results-chart" id="results-chart">
            <div style="width:100%;text-align:center;padding:1rem;"><div class="spinner"></div></div>
          </div>
        </div>

        <!-- Results Table -->
        <div class="card">
          <div class="card-header">
            <h2 class="card-title">📋 سجل نتائجي</h2>
            <div style="display:flex;gap:0.75rem;">
              <select class="form-select" style="width:auto;" id="filter-result" onchange="filterResults()">
                <option value="">كل النتائج</option>
                <option value="passed">✅ ناجح فقط</option>
                <option value="failed">❌ راسب فقط</option>
              </select>
            </div>
          </div>
          <div class="table-container" style="border-radius:0;border:none;">
            <table class="data-table">
              <thead>
                <tr>
                  <th>الاختبار</th>
                  <th>المادة</th>
                  <th>الدرجة</th>
                  <th>النسبة</th>
                  <th>النتيجة</th>
                  <th>التاريخ</th>
                  <th>الإجراء</th>
                </tr>
              </thead>
              <tbody id="results-body">
                <tr><td colspan="7" style="text-align:center;padding:2rem;"><div class="spinner"></div></td></tr>
              </tbody>
            </table>
          </div>
        </div>

      </div>
    </main>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="../shared/app.js"></script>
  <script src="../shared/supabase-client.js"></script>
  <script>
    requireAuth('student');
    renderLayout('student', 'results');

    const user = JSON.parse(localStorage.getItem('exam_platform_user') || '{}');
    const sb = getSupabase();
    let allResults = [];

    const subjectMap = { math:'الرياضيات', arabic:'اللغة العربية', english:'الإنجليزية', science:'العلوم', history:'التاريخ', other:'أخرى' };

    async function loadResults() {
      try {
        const { data, error } = await sb
          .from('exam_submissions')
          .select('*, exams(title, subject)')
          .eq('student_id', user.id)
          .order('submitted_at', { ascending: false });

        if (error) throw error;
        allResults = data || [];

        // Stats
        const total = allResults.length;
        const passed = allResults.filter(r => r.passed).length;
        const percentages = allResults.map(r => r.percentage || (r.total_marks > 0 ? (r.score/r.total_marks*100) : 0));
        const avg = total > 0 ? Math.round(percentages.reduce((a,b) => a+b, 0) / total) : 0;
        const best = total > 0 ? Math.round(Math.max(...percentages)) : 0;

        document.getElementById('stat-total').textContent = total;
        document.getElementById('stat-passed').textContent = passed;
        document.getElementById('stat-avg').textContent = avg + '%';
        document.getElementById('stat-best').textContent = best + '%';

        // Chart (last 10)
        const chartData = [...allResults].reverse().slice(-10);
        const chartEl = document.getElementById('results-chart');
        if (chartData.length === 0) {
          chartEl.innerHTML = '<div style="width:100%;text-align:center;color:var(--gray-400);">لا توجد بيانات بعد</div>';
        } else {
          chartEl.innerHTML = chartData.map(r => {
            const pct = r.percentage || (r.total_marks > 0 ? Math.round(r.score/r.total_marks*100) : 0);
            const color = pct >= 90 ? 'var(--success)' : pct >= 70 ? 'var(--warning)' : pct >= 50 ? 'var(--info)' : 'var(--danger)';
            const title = (r.exams?.title || '').substring(0, 10);
            return `<div class="chart-bar-wrap">
              <div class="chart-bar" style="height:${pct}px;background:${color};" data-tooltip="${pct}%"></div>
              <div class="chart-label">${pct}%</div>
              <div class="chart-label">${sanitizeHTML(title)}</div>
            </div>`;
          }).join('');
        }

        filterResults();
      } catch (err) {
        console.error(err);
        showToast('حدث خطأ في تحميل النتائج', 'error');
      }
    }

    function filterResults() {
      const filter = document.getElementById('filter-result').value;
      let filtered = allResults;
      if (filter === 'passed') filtered = filtered.filter(r => r.passed);
      if (filter === 'failed') filtered = filtered.filter(r => !r.passed);
      renderTable(filtered);
    }

    function renderTable(results) {
      const tbody = document.getElementById('results-body');
      if (results.length === 0) {
        tbody.innerHTML = `<tr><td colspan="7">
          <div class="empty-state"><div class="empty-icon">📊</div>
          <h3>لا توجد نتائج</h3>
          <p>لم تؤدِ أي اختبار بعد</p>
          <a href="exams.html" class="btn btn-primary" style="margin-top:1rem;">📝 ابدأ اختباراً</a>
          </div></td></tr>`;
        return;
      }

      tbody.innerHTML = results.map(r => {
        const pct = r.percentage || (r.total_marks > 0 ? Math.round(r.score/r.total_marks*100) : 0);
        return `<tr>
          <td><strong>${sanitizeHTML(r.exams?.title || '-')}</strong></td>
          <td>${subjectMap[r.exams?.subject] || r.exams?.subject || '-'}</td>
          <td><strong style="color:${getGradeColor(pct)}">${r.score}/${r.total_marks}</strong></td>
          <td>
            <div style="display:flex;align-items:center;gap:0.5rem;">
              <div class="progress" style="width:80px;"><div class="progress-bar ${r.passed?'success':'danger'}" style="width:${pct}%"></div></div>
              <span style="font-weight:600;color:${getGradeColor(pct)}">${pct}%</span>
            </div>
          </td>
          <td><span class="badge ${r.passed?'badge-success':'badge-danger'}">${r.passed?'✅ ناجح':'❌ راسب'}</span></td>
          <td style="color:var(--gray-500);font-size:0.875rem;">${formatDate(r.submitted_at)}</td>
          <td><a href="exam-review.html?submission_id=${r.id}" class="btn btn-outline btn-sm">👁️ مراجعة</a></td>
        </tr>`;
      }).join('');
    }

    loadResults();
  </script>
</body>
</html>
