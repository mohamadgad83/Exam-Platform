<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>النتائج | منصة الاختبارات</title>
    <link rel="stylesheet" href="../shared/styles.css">
</head>
<body class="dark-mode">
    <div class="app-layout">
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <h2>🎓 منصة الاختبارات</h2>
                <button class="sidebar-toggle" id="sidebarToggle">☰</button>
            </div>
            <nav class="sidebar-nav">
                <a href="./dashboard.html" class="nav-item">
                    <span class="nav-icon">📊</span>
                    <span class="nav-text">لوحة التحكم</span>
                </a>
                <a href="./exams.html" class="nav-item">
                    <span class="nav-icon">📝</span>
                    <span class="nav-text">الاختبارات</span>
                </a>
                <a href="./results.html" class="nav-item active">
                    <span class="nav-icon">📈</span>
                    <span class="nav-text">النتائج</span>
                </a>
                <a href="./profile.html" class="nav-item">
                    <span class="nav-icon">👤</span>
                    <span class="nav-text">الملف الشخصي</span>
                </a>
                <a href="../admin/dashboard.html" class="nav-item admin-only" style="display:none;">
                    <span class="nav-icon">🔧</span>
                    <span class="nav-text">لوحة الأدمن</span>
                </a>
            </nav>
            <div class="sidebar-footer">
                <button class="btn btn-danger" id="logoutBtn">🚪 تسجيل الخروج</button>
            </div>
        </aside>

        <main class="main-content">
            <header class="top-bar">
                <h1>سجل النتائج</h1>
                <div class="filters">
                    <select id="subjectFilter" class="form-select">
                        <option value="">جميع المواد</option>
                    </select>
                    <select id="periodFilter" class="form-select">
                        <option value="">كل الفترات</option>
                        <option value="week">آخر أسبوع</option>
                        <option value="month">آخر شهر</option>
                        <option value="year">آخر سنة</option>
                    </select>
                </div>
            </header>

            <div class="content-wrapper">
                <div class="section-card">
                    <div class="table-responsive">
                        <table class="data-table" id="resultsTable">
                            <thead>
                                <tr>
                                    <th>الاختبار</th>
                                    <th>المادة</th>
                                    <th>الدرجة</th>
                                    <th>النسبة</th>
                                    <th>الحالة</th>
                                    <th>التاريخ</th>
                                    <th>الإجراءات</th>
                                </tr>
                            </thead>
                            <tbody id="resultsBody">
                                <tr><td colspan="7" class="text-center">جاري التحميل...</td></tr>
                            </tbody>
                        </table>
                    </div>
                    <div class="pagination" id="pagination"></div>
                </div>
            </div>
        </main>
    </div>

    <div class="toast-container" id="toastContainer"></div>

    <script src="../shared/supabase-client.js"></script>
    <script src="../shared/app.js"></script>
    <script>
        let allResults = [];
        let studentId = null;

        document.addEventListener('DOMContentLoaded', async function() {
            const user = await examAuth.getUser();
            if (!user) { window.location.href = '../login.html'; return; }
            
            const isAdmin = await examAuth.isAdmin();
            const isStudent = user.role === 'student' || user.user_metadata?.role === 'student';
            if (!isStudent && !isAdmin) { window.location.href = '../unauthorized.html'; return; }
            
            if (isAdmin) document.querySelectorAll('.admin-only').forEach(el => el.style.display = '');

            document.getElementById('logoutBtn').addEventListener('click', async () => {
                await examAuth.signOut();
                window.location.href = '../login.html';
            });
            document.getElementById('sidebarToggle').addEventListener('click', () => {
                document.getElementById('sidebar').classList.toggle('collapsed');
            });

            const { data: student } = await examDB.students()
                .select('id')
                .eq('user_id', user.id)
                .single();
            studentId = student?.id;

            await loadSubjects();
            await loadResults();

            document.getElementById('subjectFilter').addEventListener('change', filterResults);
            document.getElementById('periodFilter').addEventListener('change', filterResults);
        });

        async function loadSubjects() {
            const { data } = await examDB.subjects().select('id, name').order('name');
            const select = document.getElementById('subjectFilter');
            if (data) {
                data.forEach(s => {
                    select.innerHTML += `<option value="${s.id}">${s.name}</option>`;
                });
            }
        }

        async function loadResults() {
            App.Loading.show();
            try {
                const { data: attempts } = await examDB.attempts()
                    .select('*, exam_exams(title, total_score, subject_id, exam_subjects(name))')
                    .eq('student_id', studentId)
                    .eq('status', 'completed')
                    .order('ended_at', { ascending: false });

                allResults = attempts || [];
                renderResults(allResults);
            } catch (err) {
                App.Toast.error('حدث خطأ في تحميل النتائج');
            } finally {
                App.Loading.hide();
            }
        }

        function renderResults(results) {
            const tbody = document.getElementById('resultsBody');
            if (!results.length) {
                tbody.innerHTML = '<tr><td colspan="7" class="text-center">لا توجد نتائج</td></tr>';
                return;
            }

            tbody.innerHTML = results.map(r => {
                const total = r.exam_exams?.total_score || 1;
                const score = r.score || 0;
                const pct = Math.round((score / total) * 100);
                const badgeClass = pct >= 80 ? 'badge-success' : pct >= 60 ? 'badge-warning' : 'badge-danger';

                return `
                    <tr>
                        <td>${r.exam_exams?.title || '-'}</td>
                        <td>${r.exam_exams?.exam_subjects?.name || '-'}</td>
                        <td>${score} / ${total}</td>
                        <td>
                            <div class="progress-bar">
                                <div class="progress-fill" style="width: ${pct}%; background: ${pct >= 80 ? '#4caf50' : pct >= 60 ? '#ff9800' : '#f44336'}"></div>
                                <span>${pct}%</span>
                            </div>
                        </td>
                        <td><span class="badge ${badgeClass}">${pct >= 80 ? 'ممتاز' : pct >= 60 ? 'جيد' : 'يحتاج تحسين'}</span></td>
                        <td>${App.DateTime.format(r.ended_at || r.created_at)}</td>
                        <td>
                            <a href="./exam-review.html?attempt=${r.id}" class="btn btn-sm">مراجعة</a>
                        </td>
                    </tr>
                `;
            }).join('');
        }

        function filterResults() {
            const subject = document.getElementById('subjectFilter').value;
            const period = document.getElementById('periodFilter').value;

            let filtered = allResults.filter(r => {
                if (subject && r.exam_exams?.subject_id !== subject) return false;
                if (period) {
                    const date = new Date(r.ended_at || r.created_at);
                    const now = new Date();
                    const diff = now - date;
                    if (period === 'week' && diff > 7 * 24 * 60 * 60 * 1000) return false;
                    if (period === 'month' && diff > 30 * 24 * 60 * 60 * 1000) return false;
                    if (period === 'year' && diff > 365 * 24 * 60 * 60 * 1000) return false;
                }
                return true;
            });

            renderResults(filtered);
        }
    </script>
</body>
</html>
