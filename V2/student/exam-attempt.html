<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>إجراء الاختبار - منصة الاختبارات</title>
  <link rel="stylesheet" href="../shared/styles.css">
  <style>
    .exam-container {
      max-width: 900px;
      margin: 0 auto;
      padding: 2rem 1rem;
    }
    .exam-header {
      background: white;
      border-radius: var(--radius-xl);
      padding: 1.5rem 2rem;
      margin-bottom: 1.5rem;
      box-shadow: var(--shadow);
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 1rem;
    }
    .exam-header h1 {
      font-size: 1.25rem;
      color: var(--gray-900);
    }
    .exam-meta {
      display: flex;
      gap: 1.5rem;
      color: var(--gray-500);
      font-size: 0.875rem;
    }
    .question-nav {
      position: fixed;
      left: 1rem;
      top: 50%;
      transform: translateY(-50%);
      background: white;
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow-lg);
      padding: 1rem;
      z-index: 40;
      max-height: 70vh;
      overflow-y: auto;
      width: 80px;
    }
    .question-nav-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 0.5rem;
    }
    .nav-q-btn {
      width: 32px;
      height: 32px;
      border-radius: var(--radius);
      border: 2px solid var(--gray-300);
      background: white;
      cursor: pointer;
      font-size: 0.75rem;
      font-weight: 600;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s;
    }
    .nav-q-btn:hover { border-color: var(--primary); }
    .nav-q-btn.answered { background: var(--primary); color: white; border-color: var(--primary); }
    .nav-q-btn.current { border-color: var(--warning); border-width: 3px; }
    .nav-q-btn.flagged { border-color: var(--danger); }
    .exam-actions {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 2rem;
      padding-top: 1.5rem;
      border-top: 2px solid var(--gray-200);
    }
    .flag-btn {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.625rem 1rem;
      border: 2px solid var(--gray-300);
      background: white;
      border-radius: var(--radius);
      cursor: pointer;
      font-weight: 500;
      transition: all 0.2s;
    }
    .flag-btn:hover { border-color: var(--danger); }
    .flag-btn.flagged { background: #fee2e2; border-color: var(--danger); color: var(--danger); }
    .progress-section {
      background: white;
      border-radius: var(--radius-lg);
      padding: 1rem 1.5rem;
      margin-bottom: 1.5rem;
      box-shadow: var(--shadow);
    }
    .progress-info {
      display: flex;
      justify-content: space-between;
      margin-bottom: 0.5rem;
      font-size: 0.875rem;
    }
    @media (max-width: 768px) {
      .question-nav { display: none; }
      .exam-header { flex-direction: column; align-items: flex-start; }
    }
  </style>
</head>
<body>
  <!-- Exam Container -->
  <div class="exam-container">
    <!-- Header -->
    <div class="exam-header">
      <div>
        <h1 id="exam-title">جاري تحميل الاختبار...</h1>
        <div class="exam-meta">
          <span>📊 <span id="exam-marks">0</span> درجة</span>
          <span>❓ <span id="exam-questions">0</span> سؤال</span>
          <span>⏱️ <span id="exam-duration">0</span> دقيقة</span>
        </div>
      </div>
      <div style="text-align: left;">
        <div style="font-size: 0.875rem; color: var(--gray-500);">الوقت المتبقي</div>
        <div style="font-size: 1.5rem; font-weight: 700; color: var(--primary); font-family: monospace;" id="timer-display">00:00</div>
      </div>
    </div>

    <!-- Progress -->
    <div class="progress-section">
      <div class="progress-info">
        <span>التقدم: <strong id="progress-text">0/0</strong></span>
        <span>متبقي: <strong id="remaining-text">0</strong></span>
      </div>
      <div class="progress-bar">
        <div class="progress-fill" id="progress-fill" style="width: 0%"></div>
      </div>
    </div>

    <!-- Question -->
    <div id="question-container">
      <!-- Question loaded here -->
    </div>

    <!-- Actions -->
    <div class="exam-actions">
      <button class="flag-btn" id="flag-btn" onclick="toggleFlag()">
        <span>🚩</span>
        <span>علم للمراجعة</span>
      </button>
      <div style="display: flex; gap: 0.75rem;">
        <button class="btn btn-secondary" id="prev-btn" onclick="prevQuestion()" disabled>← السابق</button>
        <button class="btn btn-primary" id="next-btn" onclick="nextQuestion()">التالي →</button>
      </div>
    </div>
  </div>

  <!-- Question Navigation (Fixed Left) -->
  <div class="question-nav" id="question-nav">
    <div style="text-align: center; margin-bottom: 0.75rem; font-weight: 600; font-size: 0.75rem; color: var(--gray-600);">الأسئلة</div>
    <div class="question-nav-grid" id="nav-grid">
      <!-- Nav buttons generated here -->
    </div>
  </div>

  <!-- Submit Confirmation Modal -->
  <div class="modal-overlay" id="submit-modal">
    <div class="modal">
      <div class="modal-header">
        <h3>⚠️ تأكيد التسليم</h3>
      </div>
      <div class="modal-body">
        <p>هل أنت متأكد من تسليم الاختبار؟</p>
        <div style="background: var(--gray-100); padding: 1rem; border-radius: var(--radius); margin-top: 1rem;">
          <p>✅ مجاب عليه: <strong id="answered-count">0</strong></p>
          <p>❌ غير مجاب: <strong id="unanswered-count">0</strong></p>
          <p>🚩 علم للمراجعة: <strong id="flagged-count">0</strong></p>
        </div>
        <p style="color: var(--danger); margin-top: 1rem; font-size: 0.875rem;">⚠️ لا يمكن التراجع عن التسليم!</p>
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" onclick="closeSubmitModal()">إلغاء</button>
        <button class="btn btn-danger" onclick="confirmSubmit()">تسليم الاختبار</button>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="../shared/app.js"></script>
  <script src="../shared/supabase-client.js"></script>
  <script src="../shared/security.js"></script>
  <script>
    // ============ EXAM STATE ============
    let examData = null;
    let questions = [];
    let currentQuestionIndex = 0;
    let answers = {}; // { questionId: selectedOption }
    let flagged = new Set();
    let security = null;
    let timerInterval = null;
    let remainingSeconds = 0;

    // ============ DEMO DATA ============
    const demoQuestions = [
      {
        id: 1,
        question_text: 'ما هو حل المعادلة 2x + 5 = 15؟',
        type: 'mcq',
        options: ['x = 5', 'x = 10', 'x = 7.5', 'x = 20'],
        correct_answer: 0,
        marks: 2
      },
      {
        id: 2,
        question_text: 'إذا كان طول ضلع المربع 4 سم، فما هو محيطه؟',
        type: 'mcq',
        options: ['12 سم', '16 سم', '8 سم', '20 سم'],
        correct_answer: 1,
        marks: 2
      },
      {
        id: 3,
        question_text: 'أي من التالي يمثل العدد الأولي؟',
        type: 'mcq',
        options: ['9', '15', '17', '21'],
        correct_answer: 2,
        marks: 2
      },
      {
        id: 4,
        question_text: 'ما هو ناتج 3² + 4²؟',
        type: 'mcq',
        options: ['25', '49', '7', '14'],
        correct_answer: 0,
        marks: 2
      },
      {
        id: 5,
        question_text: 'إذا كان سعر 5 كتب 75 جنيهاً، فما سعر 8 كتب؟',
        type: 'mcq',
        options: ['100 جنيه', '120 جنيه', '90 جنيه', '150 جنيه'],
        correct_answer: 1,
        marks: 2
      }
    ];

    const demoExam = {
      id: 1,
      title: 'اختبار الرياضيات - الوحدة الأولى: الجبر',
      subject: 'الرياضيات',
      duration: 45,
      total_marks: 10,
      questions_count: 5
    };

    // ============ INITIALIZATION ============
    document.addEventListener('DOMContentLoaded', async () => {
      // Check auth
      const user = JSON.parse(localStorage.getItem('exam_platform_user') || '{}');
      if (!user.id) {
        window.location.href = '/login.html';
        return;
      }

      // Load exam data
      const urlParams = new URLSearchParams(window.location.search);
      const examId = urlParams.get('id') || '1';

      examData = demoExam;
      questions = demoQuestions;
      remainingSeconds = examData.duration * 60;

      // Update UI
      document.getElementById('exam-title').textContent = examData.title;
      document.getElementById('exam-marks').textContent = examData.total_marks;
      document.getElementById('exam-questions').textContent = examData.questions_count;
      document.getElementById('exam-duration').textContent = examData.duration;
      document.title = examData.title;

      // Initialize security
      security = initExamSecurity({
        enforceFullscreen: true,
        detectTabSwitch: true,
        blockCopyPaste: true,
        blockRightClick: true,
        blockDevTools: true,
        watermark: true,
        timer: false, // We handle timer manually
        webcam: false,
        maxTabSwitches: 3
      });
      security.init(examData);

      // Setup timer
      setupTimer();

      // Render navigation
      renderNavGrid();

      // Render first question
      renderQuestion(0);

      // Listen for auto-submit
      window.addEventListener('examAutoSubmit', (e) => {
        showToast('🚫 تم تسليم الاختبار تلقائياً: ' + e.detail.reason, 'error');
        setTimeout(() => submitExam(true), 2000);
      });
    });

    // ============ TIMER ============
    function setupTimer() {
      updateTimerDisplay();
      timerInterval = setInterval(() => {
        remainingSeconds--;
        updateTimerDisplay();

        if (remainingSeconds <= 0) {
          clearInterval(timerInterval);
          showToast('⏰ انتهى الوقت! جاري التسليم التلقائي...', 'warning');
          setTimeout(() => submitExam(true), 3000);
        }
      }, 1000);
    }

    function updateTimerDisplay() {
      const mins = Math.floor(remainingSeconds / 60);
      const secs = remainingSeconds % 60;
      const display = document.getElementById('timer-display');
      display.textContent = `${mins.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`;

      if (remainingSeconds <= 60) {
        display.style.color = 'var(--danger)';
      } else if (remainingSeconds <= 300) {
        display.style.color = 'var(--warning)';
      }
    }

    // ============ QUESTION RENDERING ============
    function renderQuestion(index) {
      currentQuestionIndex = index;
      const q = questions[index];

      const container = document.getElementById('question-container');
      container.innerHTML = `
        <div class="question-card">
          <div class="question-number">${index + 1}</div>
          <div class="question-text">${q.question_text}</div>
          <div class="answer-options">
            ${q.options.map((opt, i) => `
              <label class="answer-option ${answers[q.id] === i ? 'selected' : ''}" onclick="selectAnswer(${q.id}, ${i})">
                <input type="radio" name="q${q.id}" value="${i}" ${answers[q.id] === i ? 'checked' : ''}>
                <span>${String.fromCharCode(1611 + i)}) ${opt}</span>
              </label>
            `).join('')}
          </div>
        </div>
      `;

      // Update buttons
      document.getElementById('prev-btn').disabled = index === 0;

      if (index === questions.length - 1) {
        document.getElementById('next-btn').textContent = '✅ تسليم الاختبار';
        document.getElementById('next-btn').onclick = showSubmitModal;
        document.getElementById('next-btn').classList.add('btn-success');
        document.getElementById('next-btn').classList.remove('btn-primary');
      } else {
        document.getElementById('next-btn').textContent = 'التالي →';
        document.getElementById('next-btn').onclick = nextQuestion;
        document.getElementById('next-btn').classList.add('btn-primary');
        document.getElementById('next-btn').classList.remove('btn-success');
      }

      // Update flag button
      const flagBtn = document.getElementById('flag-btn');
      if (flagged.has(q.id)) {
        flagBtn.classList.add('flagged');
        flagBtn.innerHTML = '<span>🚩</span><span>إلغاء العلم</span>';
      } else {
        flagBtn.classList.remove('flagged');
        flagBtn.innerHTML = '<span>🚩</span><span>علم للمراجعة</span>';
      }

      // Update progress
      updateProgress();
      updateNavGrid();
    }

    function selectAnswer(questionId, optionIndex) {
      answers[questionId] = optionIndex;

      // Update visual selection
      document.querySelectorAll('.answer-option').forEach((el, i) => {
        el.classList.toggle('selected', i === optionIndex);
      });

      updateProgress();
      updateNavGrid();
    }

    function nextQuestion() {
      if (currentQuestionIndex < questions.length - 1) {
        renderQuestion(currentQuestionIndex + 1);
      }
    }

    function prevQuestion() {
      if (currentQuestionIndex > 0) {
        renderQuestion(currentQuestionIndex - 1);
      }
    }

    function toggleFlag() {
      const q = questions[currentQuestionIndex];
      if (flagged.has(q.id)) {
        flagged.delete(q.id);
      } else {
        flagged.add(q.id);
      }
      renderQuestion(currentQuestionIndex);
    }

    // ============ NAVIGATION GRID ============
    function renderNavGrid() {
      const grid = document.getElementById('nav-grid');
      grid.innerHTML = questions.map((q, i) => `
        <button class="nav-q-btn ${answers[q.id] !== undefined ? 'answered' : ''} ${i === currentQuestionIndex ? 'current' : ''} ${flagged.has(q.id) ? 'flagged' : ''}"
                onclick="renderQuestion(${i})" title="سؤال ${i + 1}">
          ${i + 1}
        </button>
      `).join('');
    }

    function updateNavGrid() {
      renderNavGrid();
    }

    // ============ PROGRESS ============
    function updateProgress() {
      const answered = Object.keys(answers).length;
      const total = questions.length;
      const pct = (answered / total) * 100;

      document.getElementById('progress-text').textContent = `${answered}/${total}`;
      document.getElementById('remaining-text').textContent = total - answered;
      document.getElementById('progress-fill').style.width = `${pct}%`;
    }

    // ============ SUBMIT ============
    function showSubmitModal() {
      const answered = Object.keys(answers).length;
      const total = questions.length;

      document.getElementById('answered-count').textContent = answered;
      document.getElementById('unanswered-count').textContent = total - answered;
      document.getElementById('flagged-count').textContent = flagged.size;

      document.getElementById('submit-modal').classList.add('active');
    }

    function closeSubmitModal() {
      document.getElementById('submit-modal').classList.remove('active');
    }

    function confirmSubmit() {
      closeSubmitModal();
      submitExam(false);
    }

    async function submitExam(auto = false) {
      clearInterval(timerInterval);

      // Calculate score
      let score = 0;
      let correct = 0;
      const detailedAnswers = questions.map(q => {
        const studentAnswer = answers[q.id];
        const isCorrect = studentAnswer === q.correct_answer;
        if (isCorrect) {
          score += q.marks;
          correct++;
        }
        return {
          question_id: q.id,
          selected_option: studentAnswer,
          is_correct: isCorrect,
          marks_obtained: isCorrect ? q.marks : 0
        };
      });

      const submission = {
        exam_id: examData.id,
        student_id: JSON.parse(localStorage.getItem('exam_platform_user') || '{}').id,
        score: score,
        total_marks: examData.total_marks,
        correct_count: correct,
        total_questions: questions.length,
        answers: detailedAnswers,
        time_taken: (examData.duration * 60) - remainingSeconds,
        security_violations: security ? security.getSecurityReport() : {},
        submitted_at: new Date().toISOString()
      };

      // Save to localStorage (demo)
      const submissions = JSON.parse(localStorage.getItem('exam_submissions') || '[]');
      submissions.push(submission);
      localStorage.setItem('exam_submissions', JSON.stringify(submissions));

      // Cleanup security
      if (security) security.submit();

      // Show result
      showToast(auto ? '✅ تم التسليم التلقائي!' : '✅ تم تسليم الاختبار بنجاح!', 'success');

      setTimeout(() => {
        window.location.href = `exam-review.html?id=${examData.id}&submission=${submission.submitted_at}`;
      }, 2000);
    }
  </script>
</body>
</html>
