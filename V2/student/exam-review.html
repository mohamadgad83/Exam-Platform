<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مراجعة الاختبار | منصة الاختبارات</title>
    <link rel="stylesheet" href="../shared/styles.css">
    <style>
        .review-container { max-width: 800px; margin: 0 auto; }
        .question-card { background: var(--card-bg); border-radius: 12px; padding: 20px; margin-bottom: 20px; border: 1px solid var(--border-color); }
        .question-header { display: flex; justify-content: space-between; margin-bottom: 15px; }
        .question-number { font-weight: bold; color: var(--primary-color); }
        .question-status { padding: 4px 12px; border-radius: 20px; font-size: 12px; }
        .status-correct { background: #4caf5022; color: #4caf50; }
        .status-wrong { background: #f4433622; color: #f44336; }
        .options-list { display: flex; flex-direction: column; gap: 10px; }
        .option-item { padding: 12px 15px; border-radius: 8px; border: 2px solid var(--border-color); display: flex; align-items: center; gap: 10px; }
        .option-correct { border-color: #4caf50; background: #4caf5011; }
        .option-wrong { border-color: #f44336; background: #f4433611; }
        .option-selected::before { content: '✓'; font-weight: bold; }
        .option-correct::before { content: '✓'; color: #4caf50; font-weight: bold; }
        .option-wrong.option-selected::before { content: '✗'; color: #f44336; }
        .explanation { background: var(--bg-secondary); padding: 15px; border-radius: 8px; margin-top: 15px; font-size: 14px; }
        .score-banner { text-align: center; padding: 30px; background: var(--card-bg); border-radius: 16px; margin-bottom: 30px; }
        .score-circle { width: 120px; height: 120px; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 20px; font-size: 32px; font-weight: bold; border: 4px solid; }
        .score-high { border-color: #4caf50; color: #4caf50; }
        .score-mid { border-color: #ff9800; color: #ff9800; }
        .score-low { border-color: #f44336; color: #f44336; }
    </style>
</head>
<body class="dark-mode">
    <div class="app-layout">
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <h2>🎓 منصة الاختبارات</h2>
                <button class="sidebar-toggle" id="sidebarToggle">☰</button>
            </div>
            <nav class="sidebar-nav">
                <a href="./dashboard.html" class="nav-item">
                    <span class="nav-icon">📊</span>
                    <span class="nav-text">لوحة التحكم</span>
                </a>
                <a href="./exams.html" class="nav-item">
                    <span class="nav-icon">📝</span>
                    <span class="nav-text">الاختبارات</span>
                </a>
                <a href="./results.html" class="nav-item">
                    <span class="nav-icon">📈</span>
                    <span class="nav-text">النتائج</span>
                </a>
                <a href="./profile.html" class="nav-item">
                    <span class="nav-icon">👤</span>
                    <span class="nav-text">الملف الشخصي</span>
                </a>
            </nav>
            <div class="sidebar-footer">
                <button class="btn btn-danger" id="logoutBtn">🚪 تسجيل الخروج</button>
            </div>
        </aside>

        <main class="main-content">
            <header class="top-bar">
                <h1>مراجعة الاختبار</h1>
                <a href="./results.html" class="btn btn-sm">← العودة للنتائج</a>
            </header>

            <div class="content-wrapper">
                <div class="review-container" id="reviewContainer">
                    <div class="loading-spinner">جاري التحميل...</div>
                </div>
            </div>
        </main>
    </div>

    <div class="toast-container" id="toastContainer"></div>

    <script src="../shared/supabase-client.js"></script>
    <script src="../shared/app.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', async function() {
            const user = await examAuth.getUser();
            if (!user) { window.location.href = '../login.html'; return; }
            
            const isAdmin = await examAuth.isAdmin();
            const isStudent = user.role === 'student' || user.user_metadata?.role === 'student';
            if (!isStudent && !isAdmin) { window.location.href = '../unauthorized.html'; return; }

            document.getElementById('logoutBtn').addEventListener('click', async () => {
                await examAuth.signOut();
                window.location.href = '../login.html';
            });
            document.getElementById('sidebarToggle').addEventListener('click', () => {
                document.getElementById('sidebar').classList.toggle('collapsed');
            });

            const params = new URLSearchParams(window.location.search);
            const attemptId = params.get('attempt');
            if (!attemptId) {
                App.Toast.error('معرف المحاولة غير موجود');
                return;
            }

            await loadReview(attemptId, user.id, isAdmin);
        });

        async function loadReview(attemptId, userId, isAdmin) {
            App.Loading.show();
            try {
                // Get attempt with exam details
                let query = examDB.attempts()
                    .select('*, exam_exams(*, exam_subjects(name)), exam_students(user_id)')
                    .eq('id', attemptId)
                    .single();
                
                const { data: attempt, error } = await query;
                if (error || !attempt) throw new Error('المحاولة غير موجودة');

                // Security: only owner or admin can view
                if (!isAdmin && attempt.exam_students?.user_id !== userId) {
                    window.location.href = '../unauthorized.html';
                    return;
                }

                // Get questions and answers
                const { data: questions } = await examDB.examQuestions()
                    .select('*, exam_questions_bank(*, exam_exam_answers(*))')
                    .eq('exam_id', attempt.exam_id)
                    .order('order_index', { ascending: true });

                // Get student answers
                const { data: answers } = await examDB.from('exam_student_answers')
                    .select('*')
                    .eq('attempt_id', attemptId);

                const totalScore = attempt.exam_exams?.total_score || 1;
                const score = attempt.score || 0;
                const pct = Math.round((score / totalScore) * 100);
                const scoreClass = pct >= 80 ? 'score-high' : pct >= 60 ? 'score-mid' : 'score-low';

                const container = document.getElementById('reviewContainer');
                container.innerHTML = `
                    <div class="score-banner">
                        <div class="score-circle ${scoreClass}">${pct}%</div>
                        <h2>${attempt.exam_exams?.title || 'اختبار'}</h2>
                        <p>الدرجة: ${score} / ${totalScore} | ${attempt.exam_exams?.exam_subjects?.name || ''}</p>
                        <p>تاريخ الاختبار: ${App.DateTime.format(attempt.created_at)}</p>
                        <p>المدة: ${Math.round((new Date(attempt.ended_at || Date.now()) - new Date(attempt.started_at)) / 60000} دقيقة</p>
                    </div>
                    <div id="questionsList"></div>
                `;

                const list = document.getElementById('questionsList');
                if (questions) {
                    list.innerHTML = questions.map((q, idx) => {
                        const qb = q.exam_questions_bank;
                        const studentAnswer = answers?.find(a => a.question_id === q.id);
                        const isCorrect = studentAnswer?.is_correct;
                        const correctAnswer = qb?.exam_exam_answers?.find(a => a.is_correct);

                        const options = qb?.options || [];
                        return `
                            <div class="question-card">
                                <div class="question-header">
                                    <span class="question-number">سؤال ${idx + 1}</span>
                                    <span class="question-status ${isCorrect ? 'status-correct' : 'status-wrong'}">
                                        ${isCorrect ? '✓ صحيح' : '✗ خطأ'} (${studentAnswer?.score_earned || 0}/${q.points})
                                    </span>
                                </div>
                                <p class="question-text">${qb?.question_text || ''}</p>
                                <div class="options-list">
                                    ${options.map((opt, oIdx) => {
                                        const isSelected = studentAnswer?.answer_text === opt || studentAnswer?.selected_option_index === oIdx;
                                        const isCorrectOpt = correctAnswer?.answer_text === opt || correctAnswer?.option_index === oIdx;
                                        let cls = 'option-item';
                                        if (isCorrectOpt) cls += ' option-correct';
                                        else if (isSelected && !isCorrectOpt) cls += ' option-wrong option-selected';
                                        else if (isSelected) cls += ' option-selected';
                                        
                                        return `<div class="${cls}">${opt}</div>`;
                                    }).join('')}
                                </div>
                                ${qb?.explanation ? `
                                    <div class="explanation">
                                        <strong>💡 التوضيح:</strong> ${qb.explanation}
                                    </div>
                                ` : ''}
                            </div>
                        `;
                    }).join('');
                }

            } catch (err) {
                console.error(err);
                App.Toast.error('حدث خطأ في تحميل المراجعة');
            } finally {
                App.Loading.hide();
            }
        }
    </script>
</body>
</html>
