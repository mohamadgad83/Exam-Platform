<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>الملف الشخصي | منصة الاختبارات</title>
    <link rel="stylesheet" href="../shared/styles.css">
    <style>
        .profile-grid {
            display: grid;
            grid-template-columns: 300px 1fr;
            gap: 24px;
        }

        .profile-sidebar {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .profile-card {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-lg);
            padding: 24px;
            text-align: center;
        }

        .profile-avatar {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.5rem;
            margin: 0 auto 16px;
            color: white;
            font-weight: 700;
        }

        .profile-card h3 {
            margin-bottom: 4px;
        }

        .profile-card p {
            color: var(--text-secondary);
            font-size: 0.9rem;
        }

        .profile-stats {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-top: 16px;
        }

        .profile-stat {
            background: var(--bg-primary);
            border-radius: var(--radius-md);
            padding: 12px;
        }

        .profile-stat .value {
            font-size: 1.3rem;
            font-weight: 700;
            color: var(--primary-light);
        }

        .profile-stat .label {
            font-size: 0.75rem;
            color: var(--text-secondary);
        }

        .profile-content {
            display: flex;
            flex-direction: column;
            gap: 24px;
        }

        .settings-card {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-lg);
            padding: 24px;
        }

        .settings-card h3 {
            margin-bottom: 20px;
            padding-bottom: 12px;
            border-bottom: 1px solid var(--border-color);
            font-size: 1.1rem;
        }

        .password-strength {
            height: 4px;
            background: var(--bg-tertiary);
            border-radius: 2px;
            margin-top: 8px;
            overflow: hidden;
        }

        .password-strength-fill {
            height: 100%;
            border-radius: 2px;
            transition: all var(--transition-fast);
            width: 0%;
        }

        .strength-weak { background: var(--danger-color); }
        .strength-fair { background: var(--warning-color); }
        .strength-good { background: var(--info-color); }
        .strength-strong { background: var(--success-color); }

        .strength-text {
            font-size: 0.8rem;
            margin-top: 4px;
            color: var(--text-secondary);
        }

        .activity-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .activity-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px;
            background: var(--bg-primary);
            border-radius: var(--radius-md);
            border-right: 3px solid var(--border-color);
        }

        .activity-item.success { border-right-color: var(--success-color); }
        .activity-item.warning { border-right-color: var(--warning-color); }

        .activity-icon {
            font-size: 1.5rem;
        }

        .activity-info {
            flex: 1;
        }

        .activity-info .title {
            font-weight: 600;
            font-size: 0.9rem;
        }

        .activity-info .time {
            font-size: 0.8rem;
            color: var(--text-muted);
        }

        @media (max-width: 768px) {
            .profile-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body class="dark-mode">
    <div class="app-layout">
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <h2>🎓 منصة الاختبارات</h2>
                <button class="sidebar-toggle" id="sidebarToggle">☰</button>
            </div>
            <nav class="sidebar-nav">
                <a href="./dashboard.html" class="nav-item">
                    <span class="nav-icon">📊</span>
                    <span class="nav-text">لوحة التحكم</span>
                </a>
                <a href="./exams.html" class="nav-item">
                    <span class="nav-icon">📝</span>
                    <span class="nav-text">الاختبارات</span>
                </a>
                <a href="./results.html" class="nav-item">
                    <span class="nav-icon">📈</span>
                    <span class="nav-text">النتائج</span>
                </a>
                <a href="./profile.html" class="nav-item active">
                    <span class="nav-icon">👤</span>
                    <span class="nav-text">الملف الشخصي</span>
                </a>
            </nav>
            <div class="sidebar-footer">
                <button class="btn btn-danger" id="logoutBtn">🚪 تسجيل الخروج</button>
            </div>
        </aside>

        <main class="main-content">
            <header class="top-bar">
                <h1>الملف الشخصي</h1>
                <div class="user-info">
                    <span id="userName">...</span>
                    <span class="badge badge-primary" id="userRole">طالب</span>
                </div>
            </header>

            <div class="content-wrapper">
                <div class="profile-grid">
                    <!-- Sidebar -->
                    <div class="profile-sidebar">
                        <div class="profile-card">
                            <div class="profile-avatar" id="profileAvatar">👤</div>
                            <h3 id="profileName">—</h3>
                            <p id="profileEmail">—</p>
                            <span class="badge badge-primary" id="profileRole">طالب</span>
                            
                            <div class="profile-stats">
                                <div class="profile-stat">
                                    <div class="value" id="statExams">0</div>
                                    <div class="label">اختبار</div>
                                </div>
                                <div class="profile-stat">
                                    <div class="value" id="statAvg">0%</div>
                                    <div class="label">متوسط</div>
                                </div>
                            </div>
                        </div>
                    </div>

                    <!-- Content -->
                    <div class="profile-content">
                        <!-- Personal Info -->
                        <div class="settings-card">
                            <h3>👤 المعلومات الشخصية</h3>
                            <form id="profileForm">
                                <div class="form-group">
                                    <label>الاسم الكامل</label>
                                    <input type="text" class="form-input" id="editName" required>
                                </div>
                                <div class="form-group">
                                    <label>البريد الإلكتروني</label>
                                    <input type="email" class="form-input" id="editEmail" disabled style="opacity: 0.6;">
                                    <small style="color: var(--text-muted);">لا يمكن تغيير البريد الإلكتروني</small>
                                </div>
                                <button type="submit" class="btn btn-primary">حفظ التغييرات</button>
                            </form>
                        </div>

                        <!-- Change Password -->
                        <div class="settings-card">
                            <h3>🔐 تغيير كلمة المرور</h3>
                            <form id="passwordForm">
                                <div class="form-group">
                                    <label>كلمة المرور الحالية</label>
                                    <input type="password" class="form-input" id="currentPassword" required placeholder="••••••••">
                                </div>
                                <div class="form-group">
                                    <label>كلمة المرور الجديدة</label>
                                    <input type="password" class="form-input" id="newPassword" required minlength="8" placeholder="••••••••">
                                    <div class="password-strength">
                                        <div class="password-strength-fill" id="strengthFill"></div>
                                    </div>
                                    <div class="strength-text" id="strengthText">أدخل كلمة مرور جديدة</div>
                                </div>
                                <div class="form-group">
                                    <label>تأكيد كلمة المرور الجديدة</label>
                                    <input type="password" class="form-input" id="confirmPassword" required placeholder="••••••••">
                                </div>
                                <button type="submit" class="btn btn-primary">تحديث كلمة المرور</button>
                            </form>
                        </div>

                        <!-- Recent Activity -->
                        <div class="settings-card">
                            <h3>📋 النشاط الأخير</h3>
                            <div class="activity-list" id="activityList">
                                <div class="text-center" style="padding: 40px; color: var(--text-muted);">جاري التحميل...</div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <div class="toast-container" id="toastContainer"></div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="../shared/supabase-client.js"></script>
    <script src="../shared/app.js"></script>
    <script>
        let currentUser = null;
        let studentId = null;

        document.addEventListener('DOMContentLoaded', async function() {
            currentUser = await examAuth.getUser();
            if (!currentUser) { window.location.href = '../login.html'; return; }

            document.getElementById('userName').textContent = currentUser.user_metadata?.full_name || currentUser.email || 'طالب';
            document.getElementById('profileName').textContent = currentUser.user_metadata?.full_name || '—';
            document.getElementById('profileEmail').textContent = currentUser.email || '—';
            document.getElementById('editName').value = currentUser.user_metadata?.full_name || '';
            document.getElementById('editEmail').value = currentUser.email || '';
            
            // Avatar initial
            const name = currentUser.user_metadata?.full_name || currentUser.email || 'U';
            document.getElementById('profileAvatar').textContent = name.charAt(0).toUpperCase();

            document.getElementById('sidebarToggle').addEventListener('click', () => {
                document.getElementById('sidebar').classList.toggle('collapsed');
            });

            document.getElementById('logoutBtn').addEventListener('click', async () => {
                await examAuth.signOut();
                window.location.href = '../login.html';
            });

            // Get student
            const { data: student } = await examDB.students()
                .select('id')
                .eq('user_id', currentUser.id)
                .single();
            studentId = student?.id;

            await loadStats();
            await loadActivity();

            // Forms
            document.getElementById('profileForm').addEventListener('submit', updateProfile);
            document.getElementById('passwordForm').addEventListener('submit', updatePassword);
            document.getElementById('newPassword').addEventListener('input', checkPasswordStrength);
        });

        async function loadStats() {
            if (!studentId) return;
            
            const { data: attempts } = await examDB.attempts()
                .select('score, exam_exams(total_score)')
                .eq('student_id', studentId)
                .eq('status', 'completed');

            const total = attempts?.length || 0;
            const scores = attempts?.map(a => ((a.score || 0) / (a.exam_exams?.total_score || 1)) * 100) || [];
            const avg = scores.length ? Math.round(scores.reduce((a,b) => a+b, 0) / scores.length) : 0;

            document.getElementById('statExams').textContent = total;
            document.getElementById('statAvg').textContent = avg + '%';
        }

        async function loadActivity() {
            if (!studentId) return;

            const { data: attempts } = await examDB.attempts()
                .select('*, exam_exams(title)')
                .eq('student_id', studentId)
                .order('ended_at', { ascending: false })
                .limit(5);

            const list = document.getElementById('activityList');
            
            if (!attempts?.length) {
                list.innerHTML = '<div class="text-center" style="padding: 40px; color: var(--text-muted);">لا يوجد نشاط حديث</div>';
                return;
            }

            list.innerHTML = attempts.map(a => {
                const exam = a.exam_exams;
                const isSuccess = a.status === 'completed' && ((a.score || 0) / (exam?.total_score || 1)) >= 0.6;
                const icon = isSuccess ? '🎉' : a.status === 'time_expired' ? '⏰' : '📝';
                const title = isSuccess ? `أكمل ${exam?.title || 'اختبار'}` : 
                              a.status === 'time_expired' ? `انتهى وقت ${exam?.title || 'اختبار'}` :
                              `شارك في ${exam?.title || 'اختبار'}`;
                
                return `
                    <div class="activity-item ${isSuccess ? 'success' : 'warning'}">
                        <div class="activity-icon">${icon}</div>
                        <div class="activity-info">
                            <div class="title">${title}</div>
                            <div class="time">${App.DateTime.relative(a.ended_at || a.created_at)}</div>
                        </div>
                    </div>
                `;
            }).join('');
        }

        async function updateProfile(e) {
            e.preventDefault();
            App.Loading.show('جاري الحفظ...');

            const newName = document.getElementById('editName').value.trim();
            
            try {
                // Update auth metadata
                const { error: authError } = await examDB.client().auth.updateUser({
                    data: { full_name: newName }
                });

                if (authError) throw authError;

                // Update profiles
                await examDB.profiles()
                    .update({ full_name: newName, updated_at: new Date().toISOString() })
                    .eq('id', currentUser.id);

                // Update students
                if (studentId) {
                    await examDB.students()
                        .update({ full_name: newName, updated_at: new Date().toISOString() })
                        .eq('id', studentId);
                }

                document.getElementById('profileName').textContent = newName;
                document.getElementById('userName').textContent = newName;
                App.Toast.success('تم تحديث الملف الشخصي');

            } catch (err) {
                console.error(err);
                App.Toast.error('حدث خطأ في التحديث');
            } finally {
                App.Loading.hide();
            }
        }

        function checkPasswordStrength() {
            const password = document.getElementById('newPassword').value;
            const result = App.Validator.password(password);
            const fill = document.getElementById('strengthFill');
            const text = document.getElementById('strengthText');

            const widths = ['0%', '25%', '50%', '75%', '100%'];
            const classes = ['', 'strength-weak', 'strength-fair', 'strength-good', 'strength-strong'];
            const labels = ['أدخل كلمة مرور', 'ضعيفة', 'متوسطة', 'جيدة', 'قوية'];

            fill.style.width = widths[result.score];
            fill.className = 'password-strength-fill ' + classes[result.score];
            text.textContent = labels[result.score];
            text.style.color = result.score >= 3 ? 'var(--success-color)' : result.score >= 2 ? 'var(--warning-color)' : 'var(--danger-color)';
        }

        async function updatePassword(e) {
            e.preventDefault();
            
            const current = document.getElementById('currentPassword').value;
            const newPass = document.getElementById('newPassword').value;
            const confirm = document.getElementById('confirmPassword').value;

            if (newPass !== confirm) {
                App.Toast.error('كلمات المرور الجديدة غير متطابقة');
                return;
            }

            const validation = App.Validator.password(newPass);
            if (!validation.valid) {
                App.Toast.error('كلمة المرور ضعيفة جداً');
                return;
            }

            App.Loading.show('جاري التحديث...');

            try {
                // Verify current password by signing in
                const { error: verifyError } = await examAuth.signIn(currentUser.email, current);
                if (verifyError) {
                    App.Toast.error('كلمة المرور الحالية غير صحيحة');
                    return;
                }

                // Update password
                const { error } = await examAuth.updatePassword(newPass);
                if (error) throw error;

                App.Toast.success('تم تحديث كلمة المرور بنجاح');
                document.getElementById('passwordForm').reset();
                document.getElementById('strengthFill').style.width = '0%';
                document.getElementById('strengthText').textContent = 'أدخل كلمة مرور جديدة';

            } catch (err) {
                console.error(err);
                App.Toast.error('حدث خطأ في تحديث كلمة المرور');
            } finally {
                App.Loading.hide();
            }
        }
    </script>
</body>
</html>
