<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>الملف الشخصي | منصة الاختبارات</title>
    <link rel="stylesheet" href="../shared/styles.css">
</head>
<body class="dark-mode">
    <div class="app-layout">
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <h2>🎓 منصة الاختبارات</h2>
                <button class="sidebar-toggle" id="sidebarToggle">☰</button>
            </div>
            <nav class="sidebar-nav">
                <a href="./dashboard.html" class="nav-item">
                    <span class="nav-icon">📊</span>
                    <span class="nav-text">لوحة التحكم</span>
                </a>
                <a href="./exams.html" class="nav-item">
                    <span class="nav-icon">📝</span>
                    <span class="nav-text">الاختبارات</span>
                </a>
                <a href="./results.html" class="nav-item">
                    <span class="nav-icon">📈</span>
                    <span class="nav-text">النتائج</span>
                </a>
                <a href="./profile.html" class="nav-item active">
                    <span class="nav-icon">👤</span>
                    <span class="nav-text">الملف الشخصي</span>
                </a>
                <a href="../admin/dashboard.html" class="nav-item admin-only" style="display:none;">
                    <span class="nav-icon">🔧</span>
                    <span class="nav-text">لوحة الأدمن</span>
                </a>
            </nav>
            <div class="sidebar-footer">
                <button class="btn btn-danger" id="logoutBtn">🚪 تسجيل الخروج</button>
            </div>
        </aside>

        <main class="main-content">
            <header class="top-bar">
                <h1>الملف الشخصي</h1>
            </header>

            <div class="content-wrapper">
                <div class="profile-grid">
                    <!-- Profile Info -->
                    <div class="section-card">
                        <h2>👤 المعلومات الشخصية</h2>
                        <form id="profileForm" class="form-grid">
                            <div class="form-group">
                                <label>الاسم الكامل</label>
                                <input type="text" id="fullName" class="form-input" required>
                            </div>
                            <div class="form-group">
                                <label>البريد الإلكتروني</label>
                                <input type="email" id="email" class="form-input" disabled>
                            </div>
                            <div class="form-group">
                                <label>رقم الهاتف</label>
                                <input type="tel" id="phone" class="form-input">
                            </div>
                            <div class="form-group">
                                <label>الصف الدراسي</label>
                                <input type="text" id="gradeName" class="form-input" disabled>
                            </div>
                            <div class="form-group">
                                <label>المرحلة الدراسية</label>
                                <input type="text" id="stageName" class="form-input" disabled>
                            </div>
                            <div class="form-group full-width">
                                <label>نبذة</label>
                                <textarea id="bio" class="form-input" rows="3"></textarea>
                            </div>
                            <div class="form-actions full-width">
                                <button type="submit" class="btn btn-primary">حفظ التغييرات</button>
                            </div>
                        </form>
                    </div>

                    <!-- Change Password -->
                    <div class="section-card">
                        <h2>🔐 تغيير كلمة المرور</h2>
                        <form id="passwordForm" class="form-grid">
                            <div class="form-group">
                                <label>كلمة المرور الحالية</label>
                                <input type="password" id="currentPassword" class="form-input" required>
                            </div>
                            <div class="form-group">
                                <label>كلمة المرور الجديدة</label>
                                <input type="password" id="newPassword" class="form-input" required minlength="6">
                            </div>
                            <div class="form-group">
                                <label>تأكيد كلمة المرور</label>
                                <input type="password" id="confirmPassword" class="form-input" required>
                            </div>
                            <div class="form-actions full-width">
                                <button type="submit" class="btn btn-secondary">تغيير كلمة المرور</button>
                            </div>
                        </form>
                    </div>

                    <!-- Stats -->
                    <div class="section-card">
                        <h2>📊 إحصائيات</h2>
                        <div class="stats-list">
                            <div class="stat-row">
                                <span>📅 تاريخ الانضمام</span>
                                <span id="joinDate">-</span>
                            </div>
                            <div class="stat-row">
                                <span>📝 الاختبارات المكتملة</span>
                                <span id="completedCount">0</span>
                            </div>
                            <div class="stat-row">
                                <span>⭐ المتوسط العام</span>
                                <span id="avgScore">0%</span>
                            </div>
                            <div class="stat-row">
                                <span>🏆 أفضل نتيجة</span>
                                <span id="bestScore">0%</span>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <div class="toast-container" id="toastContainer"></div>

    <script src="../shared/supabase-client.js"></script>
    <script src="../shared/app.js"></script>
    <script>
        let studentData = null;

        document.addEventListener('DOMContentLoaded', async function() {
            const user = await examAuth.getUser();
            if (!user) { window.location.href = '../login.html'; return; }
            
            const isAdmin = await examAuth.isAdmin();
            const isStudent = user.role === 'student' || user.user_metadata?.role === 'student';
            if (!isStudent && !isAdmin) { window.location.href = '../unauthorized.html'; return; }
            
            if (isAdmin) document.querySelectorAll('.admin-only').forEach(el => el.style.display = '');

            document.getElementById('logoutBtn').addEventListener('click', async () => {
                await examAuth.signOut();
                window.location.href = '../login.html';
            });
            document.getElementById('sidebarToggle').addEventListener('click', () => {
                document.getElementById('sidebar').classList.toggle('collapsed');
            });

            await loadProfile(user.id);
            await loadStats(user.id);

            document.getElementById('profileForm').addEventListener('submit', updateProfile);
            document.getElementById('passwordForm').addEventListener('submit', updatePassword);
        });

        async function loadProfile(userId) {
            App.Loading.show();
            try {
                const { data: student } = await examDB.students()
                    .select('*, exam_grades(name), exam_stages(name)')
                    .eq('user_id', userId)
                    .single();

                if (!student) {
                    App.Toast.error('لم يتم العثور على بيانات الطالب');
                    return;
                }

                studentData = student;
                document.getElementById('fullName').value = student.full_name || '';
                document.getElementById('email').value = student.email || '';
                document.getElementById('phone').value = student.phone || '';
                document.getElementById('gradeName').value = student.exam_grades?.name || '';
                document.getElementById('stageName').value = student.exam_stages?.name || '';
                document.getElementById('bio').value = student.bio || '';
                document.getElementById('joinDate').textContent = App.DateTime.format(student.created_at);

            } catch (err) {
                App.Toast.error('حدث خطأ في تحميل البيانات');
            } finally {
                App.Loading.hide();
            }
        }

        async function loadStats(userId) {
            try {
                const { data: student } = await examDB.students()
                    .select('id')
                    .eq('user_id', userId)
                    .single();

                if (!student) return;

                const { data: attempts } = await examDB.attempts()
                    .select('score, exam_exams(total_score)')
                    .eq('student_id', student.id)
                    .eq('status', 'completed');

                const completed = attempts ? attempts.length : 0;
                const scores = attempts ? attempts.filter(a => a.score !== null).map(a => (a.score / a.exam_exams.total_score) * 100) : [];
                const avg = scores.length ? Math.round(scores.reduce((a,b) => a+b, 0) / scores.length) : 0;
                const best = scores.length ? Math.round(Math.max(...scores)) : 0;

                document.getElementById('completedCount').textContent = completed;
                document.getElementById('avgScore').textContent = avg + '%';
                document.getElementById('bestScore').textContent = best + '%';

            } catch (err) {
                console.error(err);
            }
        }

        async function updateProfile(e) {
            e.preventDefault();
            if (!studentData) return;

            App.Loading.show();
            try {
                const { error } = await examDB.students()
                    .update({
                        full_name: document.getElementById('fullName').value,
                        phone: document.getElementById('phone').value,
                        bio: document.getElementById('bio').value,
                        updated_at: new Date().toISOString()
                    })
                    .eq('id', studentData.id);

                if (error) throw error;

                // Update user metadata
                await examAuth.updateUser({
                    data: { full_name: document.getElementById('fullName').value }
                });

                App.Toast.success('تم تحديث الملف الشخصي');
            } catch (err) {
                App.Toast.error('حدث خطأ في التحديث');
            } finally {
                App.Loading.hide();
            }
        }

        async function updatePassword(e) {
            e.preventDefault();
            const newPass = document.getElementById('newPassword').value;
            const confirmPass = document.getElementById('confirmPassword').value;

            if (newPass !== confirmPass) {
                App.Toast.error('كلمات المرور غير متطابقة');
                return;
            }

            App.Loading.show();
            try {
                const { error } = await examAuth.updateUser({ password: newPass });
                if (error) throw error;
                
                App.Toast.success('تم تغيير كلمة المرور');
                document.getElementById('passwordForm').reset();
            } catch (err) {
                App.Toast.error('حدث خطأ في تغيير كلمة المرور');
            } finally {
                App.Loading.hide();
            }
        }
    </script>
</body>
</html>
