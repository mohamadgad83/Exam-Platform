# ============================================
# Nginx Configuration - Security Headers
# ============================================
# 
# WHERE TO PUT THIS:
# - If using Nginx: /etc/nginx/sites-available/your-site
# - If using Apache: Convert to .htaccess format
# - If using Cloudflare: Add in Transform Rules
#
# IMPORTANT: Replace 'your-domain.com' with your actual domain

server {
    listen 80;
    server_name your-domain.com www.your-domain.com;

    # Redirect HTTP to HTTPS
    return 301 https://$server_name$request_uri;
}

server {
    listen 443 ssl http2;
    server_name your-domain.com www.your-domain.com;

    root /var/www/exam-platform;
    index index.html;

    # SSL Configuration
    ssl_certificate /path/to/your/certificate.crt;
    ssl_certificate_key /path/to/your/private.key;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers 'ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256';
    ssl_prefer_server_ciphers on;

    # ============================================
    # SECURITY HEADERS (CRITICAL)
    # ============================================

    # HSTS - Force HTTPS for 1 year
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;

    # Content Security Policy - Restrict resources
    add_header Content-Security-Policy "
        default-src 'self';
        script-src 'self' https://cdn.jsdelivr.net https://unpkg.com 'unsafe-inline';
        style-src 'self' https://fonts.googleapis.com 'unsafe-inline';
        font-src 'self' https://fonts.gstatic.com;
        img-src 'self' data: https://*.supabase.co https://*.supabase.in;
        connect-src 'self' https://*.supabase.co https://*.supabase.in https://api.ipify.org;
        frame-ancestors 'none';
        base-uri 'self';
        form-action 'self';
    " always;

    # Prevent clickjacking
    add_header X-Frame-Options "DENY" always;

    # Prevent MIME type sniffing
    add_header X-Content-Type-Options "nosniff" always;

    # XSS Protection
    add_header X-XSS-Protection "1; mode=block" always;

    # Referrer Policy
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Permissions Policy
    add_header Permissions-Policy "
        camera=(self), 
        microphone=(self), 
        geolocation=(), 
        payment=(), 
        usb=(), 
        magnetometer=(), 
        gyroscope=(), 
        speaker=(self)
    " always;

    # Remove server info
    server_tokens off;

    # ============================================
    # RATE LIMITING
    # ============================================

    # Limit requests per IP
    limit_req_zone $binary_remote_addr zone=general:10m rate=10r/s;
    limit_req_zone $binary_remote_addr zone=login:10m rate=5r/m;
    limit_req_zone $binary_remote_addr zone=api:10m rate=30r/m;

    # Limit connections per IP
    limit_conn_zone $binary_remote_addr zone=addr:10m;

    # ============================================
    # LOCATION BLOCKS
    # ============================================

    # Static files - cache aggressively
    location ~* \.(css|js|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # Login page - strict rate limiting
    location = /login.html {
        limit_req zone=login burst=3 nodelay;
        limit_conn addr 5;
        try_files $uri $uri/ =404;
    }

    # API calls - moderate rate limiting
    location ~ \.js$ {
        limit_req zone=api burst=10 nodelay;
        try_files $uri $uri/ =404;
    }

    # General pages
    location / {
        limit_req zone=general burst=20 nodelay;
        try_files $uri $uri/ /index.html;
    }

    # Deny access to sensitive files
    location ~ /\. {
        deny all;
        return 404;
    }

    location ~ \.(env|config|sql|log|git)$ {
        deny all;
        return 404;
    }

    # Supabase Edge Functions proxy (if self-hosting)
    location /functions/ {
        proxy_pass https://your-project.supabase.co/functions/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
