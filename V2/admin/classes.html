<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>الفصول والمجموعات - لوحة التحكم</title>
  <link rel="stylesheet" href="../shared/styles.css">
</head>
<body>
  <div class="app-layout">
    <main class="main-content">
      <div class="content-area">
        <div class="card">
          <div class="card-header">
            <h2 class="card-title">🏫 الفصول والمجموعات</h2>
            <button class="btn btn-primary" onclick="showModal('إضافة مجموعة','<div class=form-group><label class=form-label>اسم المجموعة</label><input class=form-input id=g-name></div><div class=form-group><label class=form-label>المعلم المسؤول</label><select class=form-select id=g-teacher><option>د. سارة علي</option><option>أ. محمد أحمد</option></select></div>',[{text:'إلغاء',class:'btn-secondary',action:'closeModal()'},{text:'حفظ',class:'btn-primary',action:'closeModal();showToast(`تم الإضافة`,`success`)'}])">+ مجموعة جديدة</button>
          </div>
          <div class="card-body">
            <div class="table-container">
              <table class="data-table">
                <thead>
                  <tr><th>المجموعة</th><th>المعلم</th><th>عدد الطلاب</th><th>الاختبارات</th><th>إجراءات</th></tr>
                </thead>
                <tbody>
                  <tr>
                    <td><strong>الصف الثالث الثانوي - أ</strong></td>
                    <td>د. سارة علي</td>
                    <td>32</td>
                    <td>5</td>
                    <td class="table-actions"><button class="btn btn-sm btn-secondary">تعديل</button><button class="btn btn-sm btn-danger">حذف</button></td>
                  </tr>
                  <tr>
                    <td><strong>الصف الثالث الثانوي - ب</strong></td>
                    <td>أ. محمد أحمد</td>
                    <td>28</td>
                    <td>5</td>
                    <td class="table-actions"><button class="btn btn-sm btn-secondary">تعديل</button><button class="btn btn-sm btn-danger">حذف</button></td>
                  </tr>
                  <tr>
                    <td><strong>تحضيرية جامعة</strong></td>
                    <td>د. خالد محمود</td>
                    <td>45</td>
                    <td>3</td>
                    <td class="table-actions"><button class="btn btn-sm btn-secondary">تعديل</button><button class="btn btn-sm btn-danger">حذف</button></td>
                  </tr>
                </tbody>
              </table>
            </div>
          </div>
        </div>
      </div>
    </main>
  </div>
  <script src="../shared/app.js"></script>
  <script>
    if (!requireAuth('admin')) throw new Error('Unauthorized');
    renderLayout('admin', 'classes');
  </script>
</body>
</html>
