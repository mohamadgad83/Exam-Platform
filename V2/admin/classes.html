<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إدارة الصفوف - منصة الاختبارات</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="../shared/styles.css">
    <style>
        .classes-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; }
        .class-card { background: var(--bg-surface); border: 1px solid var(--border-color); border-radius: var(--radius-lg); padding: 24px; transition: var(--transition); }
        .class-card:hover { transform: translateY(-4px); box-shadow: var(--shadow-xl); border-color: var(--primary-200); }
        .class-icon { width: 56px; height: 56px; border-radius: var(--radius-md); background: linear-gradient(135deg, var(--primary-500), var(--primary-700)); color: white; display: flex; align-items: center; justify-content: center; font-size: 1.5rem; margin-bottom: 16px; }
        .class-name { font-size: 1.125rem; font-weight: 700; color: var(--text-main); margin-bottom: 8px; }
        .class-meta { font-size: 0.875rem; color: var(--text-muted); margin-bottom: 16px; }
        .class-actions { display: flex; gap: 8px; }
        .subjects-list { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 12px; }
        .subject-tag { background: var(--bg-body); padding: 4px 10px; border-radius: 20px; font-size: 0.75rem; color: var(--text-secondary); border: 1px solid var(--border-color); }
        .tabs-content { display: none; }
        .tabs-content.active { display: block; }
        .subject-row { display: flex; align-items: center; justify-content: space-between; padding: 12px; background: var(--bg-body); border-radius: var(--radius-md); margin-bottom: 8px; }
    </style>
</head>
<body>
    <div class="app-layout">
        <aside class="sidebar">
            <div class="sidebar-header">
                <div class="brand-logo">📚</div>
                <span class="brand-text">منصة الاختبارات</span>
            </div>
            <nav class="sidebar-nav">
                <a href="dashboard.html" class="nav-item"><span class="nav-icon">📊</span><span>لوحة التحكم</span></a>
                <a href="users.html" class="nav-item"><span class="nav-icon">👥</span><span>المستخدمين</span></a>
                <a href="classes.html" class="nav-item active"><span class="nav-icon">🏫</span><span>الصفوف</span></a>
                <a href="exams.html" class="nav-item"><span class="nav-icon">📝</span><span>الامتحانات</span></a>
                <a href="groups.html" class="nav-item"><span class="nav-icon">👥</span><span>المجموعات</span></a>
                <a href="questions.html" class="nav-item"><span class="nav-icon">❓</span><span>الأسئلة</span></a>
                <a href="reports.html" class="nav-item"><span class="nav-icon">📈</span><span>التقارير</span></a>
                <a href="settings.html" class="nav-item"><span class="nav-icon">⚙️</span><span>الإعدادات</span></a>
            </nav>
            <div class="sidebar-footer">
                <button class="nav-item" onclick="logout()" style="color: var(--danger);"><span class="nav-icon">🚪</span><span>تسجيل الخروج</span></button>
            </div>
        </aside>

        <main class="main-content">
            <div class="top-bar">
                <h1 class="page-title">🏫 إدارة الصفوف والمواد</h1>
                <div class="user-menu">
                    <button class="btn btn-primary" onclick="openClassModal()">➕ صف جديد</button>
                </div>
            </div>

            <div class="content-wrapper">
                <!-- Tabs -->
                <div class="tabs">
                    <button class="tab-btn active" onclick="showTab('classes', this)">📚 الصفوف</button>
                    <button class="tab-btn" onclick="showTab('subjects', this)">📖 المواد</button>
                </div>

                <!-- Classes Tab -->
                <div class="tabs-content active" id="classesTab">
                    <div class="classes-grid" id="classesGrid">
                        <div class="class-card skeleton" style="height: 200px;"></div>
                        <div class="class-card skeleton" style="height: 200px;"></div>
                        <div class="class-card skeleton" style="height: 200px;"></div>
                    </div>
                </div>

                <!-- Subjects Tab -->
                <div class="tabs-content" id="subjectsTab">
                    <div style="display: flex; justify-content: flex-end; margin-bottom: 20px;">
                        <button class="btn btn-primary" onclick="openSubjectModal()">➕ مادة جديدة</button>
                    </div>
                    <div class="card">
                        <div id="subjectsList">
                            <div class="empty-state">
                                <div class="empty-state-icon">📖</div>
                                <p>جاري تحميل المواد...</p>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <!-- Add/Edit Class Modal -->
    <div class="modal-overlay" id="classModal">
        <div class="modal-content">
            <h3 id="classModalTitle">➕ صف جديد</h3>
            <form class="modal-form" id="classForm" onsubmit="saveClass(event)">
                <input type="hidden" id="classId">
                <div class="form-group">
                    <label class="form-label">اسم الصف</label>
                    <input type="text" class="form-input" id="className" required placeholder="مثال: الصف الأول الثانوي">
                </div>
                <div class="form-group">
                    <label class="form-label">الوصف</label>
                    <input type="text" class="form-input" id="classDesc" placeholder="وصف اختياري">
                </div>
                <div style="display: flex; gap: 12px; justify-content: flex-end;">
                    <button type="button" class="btn btn-secondary" onclick="App.Modal.close('classModal')">إلغاء</button>
                    <button type="submit" class="btn btn-primary">حفظ</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Add/Edit Subject Modal -->
    <div class="modal-overlay" id="subjectModal">
        <div class="modal-content">
            <h3 id="subjectModalTitle">➕ مادة جديدة</h3>
            <form class="modal-form" id="subjectForm" onsubmit="saveSubject(event)">
                <input type="hidden" id="subjectId">
                <div class="form-group">
                    <label class="form-label">اسم المادة</label>
                    <input type="text" class="form-input" id="subjectName" required placeholder="مثال: الرياضيات">
                </div>
                <div class="form-group">
                    <label class="form-label">الكود</label>
                    <input type="text" class="form-input" id="subjectCode" placeholder="مثال: MATH">
                </div>
                <div style="display: flex; gap: 12px; justify-content: flex-end;">
                    <button type="button" class="btn btn-secondary" onclick="App.Modal.close('subjectModal')">إلغاء</button>
                    <button type="submit" class="btn btn-primary">حفظ</button>
                </div>
            </form>
        </div>
    </div>

    <script src="../shared/supabase-client.js"></script>
    <script src="../shared/app.js"></script>

    <script>
        const currentUser = getUser();
        if (!currentUser || currentUser.role !== 'admin') {
            window.location.href = '../login.html';
        }

        let allClasses = [];
        let allSubjects = [];

        function showTab(tab, btn) {
            document.querySelectorAll('.tabs-content').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(tab + 'Tab').classList.add('active');
            btn.classList.add('active');
        }

        async function loadClasses() {
            try {
                const classes = await fetchClasses();
                allClasses = classes;

                // Get subjects for each class
                const { data: classSubjects } = await sb.from(TABLES.class_subjects).select('*');
                const { data: subjects } = await sb.from(TABLES.subjects).select('*');
                allSubjects = subjects || [];

                const grid = document.getElementById('classesGrid');
                if (classes.length === 0) {
                    grid.innerHTML = `
                        <div class="empty-state" style="grid-column: 1/-1;">
                            <div class="empty-state-icon">🏫</div>
                            <p>لا توجد صفوف</p>
                            <button class="btn btn-primary" onclick="openClassModal()" style="margin-top: 16px;">➕ إضافة صف</button>
                        </div>
                    `;
                    return;
                }

                grid.innerHTML = classes.map(c => {
                    const classSubIds = classSubjects?.filter(cs => cs.class_id === c.id).map(cs => cs.subject_id) || [];
                    const classSubs = subjects?.filter(s => classSubIds.includes(s.id)) || [];

                    return `
                        <div class="class-card">
                            <div class="class-icon">🏫</div>
                            <div class="class-name">${App.sanitizeHtml(c.name)}</div>
                            <div class="class-meta">${c.description || 'لا يوجد وصف'}</div>
                            <div class="subjects-list">
                                ${classSubs.length > 0 
                                    ? classSubs.map(s => `<span class="subject-tag">${App.sanitizeHtml(s.name)}</span>`).join('')
                                    : '<span style="color: var(--text-muted); font-size: 0.75rem;">لا توجد مواد مرتبطة</span>'
                                }
                            </div>
                            <div class="class-actions" style="margin-top: 16px;">
                                <button class="btn btn-sm btn-ghost" onclick="editClass(${c.id})">✏️ تعديل</button>
                                <button class="btn btn-sm btn-danger" onclick="deleteClass(${c.id})">🗑️ حذف</button>
                            </div>
                        </div>
                    `;
                }).join('');
            } catch (error) {
                console.error('Error:', error);
                App.Toast.error('حدث خطأ في تحميل الصفوف');
            }
        }

        async function loadSubjects() {
            try {
                const subjects = await fetchSubjects();
                allSubjects = subjects;
                const container = document.getElementById('subjectsList');

                if (subjects.length === 0) {
                    container.innerHTML = `
                        <div class="empty-state">
                            <div class="empty-state-icon">📖</div>
                            <p>لا توجد مواد</p>
                        </div>
                    `;
                    return;
                }

                container.innerHTML = subjects.map(s => `
                    <div class="subject-row">
                        <div style="display: flex; align-items: center; gap: 12px;">
                            <div class="user-avatar-sm">📖</div>
                            <div>
                                <div style="font-weight: 600;">${App.sanitizeHtml(s.name)}</div>
                                <div style="font-size: 0.75rem; color: var(--text-muted);">${s.code || 'بدون كود'}</div>
                            </div>
                        </div>
                        <div style="display: flex; gap: 6px;">
                            <button class="btn btn-sm btn-ghost" onclick="editSubject(${s.id})">✏️</button>
                            <button class="btn btn-sm btn-danger" onclick="deleteSubject(${s.id})">🗑️</button>
                        </div>
                    </div>
                `).join('');
            } catch (error) {
                console.error('Error:', error);
            }
        }

        function openClassModal() {
            document.getElementById('classForm').reset();
            document.getElementById('classId').value = '';
            document.getElementById('classModalTitle').textContent = '➕ صف جديد';
            App.Modal.open('classModal');
        }

        async function editClass(id) {
            const cls = allClasses.find(c => c.id === id);
            if (!cls) return;
            document.getElementById('classId').value = cls.id;
            document.getElementById('className').value = cls.name || '';
            document.getElementById('classDesc').value = cls.description || '';
            document.getElementById('classModalTitle').textContent = '✏️ تعديل صف';
            App.Modal.open('classModal');
        }

        async function saveClass(e) {
            e.preventDefault();
            App.Loading.show('جاري الحفظ...');
            try {
                const id = document.getElementById('classId').value;
                const data = {
                    name: document.getElementById('className').value,
                    description: document.getElementById('classDesc').value
                };
                if (id) {
                    await sb.from(TABLES.classes).update(data).eq('id', id);
                    App.Toast.success('تم تحديث الصف');
                } else {
                    await sb.from(TABLES.classes).insert(data);
                    App.Toast.success('تم إضافة الصف');
                }
                App.Modal.close('classModal');
                loadClasses();
            } catch (error) {
                App.Toast.error('حدث خطأ');
            }
            App.Loading.hide();
        }

        async function deleteClass(id) {
            if (!await App.confirm('هل أنت متأكد من حذف هذا الصف؟')) return;
            App.Loading.show('جاري الحذف...');
            try {
                await sb.from(TABLES.classes).delete().eq('id', id);
                App.Toast.success('تم الحذف');
                loadClasses();
            } catch (error) {
                App.Toast.error('حدث خطأ');
            }
            App.Loading.hide();
        }

        function openSubjectModal() {
            document.getElementById('subjectForm').reset();
            document.getElementById('subjectId').value = '';
            document.getElementById('subjectModalTitle').textContent = '➕ مادة جديدة';
            App.Modal.open('subjectModal');
        }

        async function editSubject(id) {
            const sub = allSubjects.find(s => s.id === id);
            if (!sub) return;
            document.getElementById('subjectId').value = sub.id;
            document.getElementById('subjectName').value = sub.name || '';
            document.getElementById('subjectCode').value = sub.code || '';
            document.getElementById('subjectModalTitle').textContent = '✏️ تعديل مادة';
            App.Modal.open('subjectModal');
        }

        async function saveSubject(e) {
            e.preventDefault();
            App.Loading.show('جاري الحفظ...');
            try {
                const id = document.getElementById('subjectId').value;
                const data = {
                    name: document.getElementById('subjectName').value,
                    code: document.getElementById('subjectCode').value
                };
                if (id) {
                    await sb.from(TABLES.subjects).update(data).eq('id', id);
                    App.Toast.success('تم التحديث');
                } else {
                    await sb.from(TABLES.subjects).insert(data);
                    App.Toast.success('تم الإضافة');
                }
                App.Modal.close('subjectModal');
                loadSubjects();
                loadClasses();
            } catch (error) {
                App.Toast.error('حدث خطأ');
            }
            App.Loading.hide();
        }

        async function deleteSubject(id) {
            if (!await App.confirm('هل أنت متأكد من حذف هذه المادة؟')) return;
            App.Loading.show('جاري الحذف...');
            try {
                await sb.from(TABLES.subjects).delete().eq('id', id);
                App.Toast.success('تم الحذف');
                loadSubjects();
                loadClasses();
            } catch (error) {
                App.Toast.error('حدث خطأ');
            }
            App.Loading.hide();
        }

        loadClasses();
        loadSubjects();
    </script>
</body>
</html>
