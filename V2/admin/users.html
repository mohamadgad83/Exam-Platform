<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إدارة المستخدمين - منصة الاختبارات</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="../shared/styles.css">
    <style>
        .filter-bar { display: flex; gap: 12px; margin-bottom: 20px; flex-wrap: wrap; }
        .search-box { flex: 1; min-width: 250px; position: relative; }
        .search-box input { width: 100%; padding: 10px 16px 10px 40px; }
        .search-box .search-icon { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); }
        .filter-select { min-width: 150px; }
        .user-avatar-sm { width: 36px; height: 36px; border-radius: 50%; background: linear-gradient(135deg, var(--primary-500), var(--primary-700)); color: white; display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 0.75rem; }
        .user-role-badge { padding: 4px 10px; border-radius: 20px; font-size: 0.75rem; font-weight: 700; }
        .role-admin { background: #fee2e2; color: #991b1b; }
        .role-teacher { background: #dbeafe; color: #1e40af; }
        .role-student { background: #d1fae5; color: #065f46; }
        .status-active { color: var(--success); }
        .status-inactive { color: var(--danger); }
        .action-btns { display: flex; gap: 4px; }
        .action-btns button { padding: 6px 10px; font-size: 0.75rem; }
        .modal-form { display: flex; flex-direction: column; gap: 16px; }
        .modal-form .form-group { margin: 0; }
        .tabs-row { display: flex; gap: 8px; margin-bottom: 20px; }
        .tab-pill { padding: 8px 20px; border-radius: 40px; border: none; background: var(--bg-body); color: var(--text-secondary); font-weight: 600; cursor: pointer; font-family: inherit; transition: var(--transition); }
        .tab-pill:hover { background: var(--primary-50); color: var(--primary-600); }
        .tab-pill.active { background: linear-gradient(135deg, var(--primary-500), var(--primary-600)); color: white; }
    </style>
</head>
<body>
    <div class="app-layout">
        <aside class="sidebar">
            <div class="sidebar-header">
                <div class="brand-logo">📚</div>
                <span class="brand-text">منصة الاختبارات</span>
            </div>
            <nav class="sidebar-nav">
                <a href="dashboard.html" class="nav-item"><span class="nav-icon">📊</span><span>لوحة التحكم</span></a>
                <a href="users.html" class="nav-item active"><span class="nav-icon">👥</span><span>المستخدمين</span></a>
                <a href="classes.html" class="nav-item"><span class="nav-icon">🏫</span><span>الصفوف</span></a>
                <a href="exams.html" class="nav-item"><span class="nav-icon">📝</span><span>الامتحانات</span></a>
                <a href="groups.html" class="nav-item"><span class="nav-icon">👥</span><span>المجموعات</span></a>
                <a href="questions.html" class="nav-item"><span class="nav-icon">❓</span><span>الأسئلة</span></a>
                <a href="reports.html" class="nav-item"><span class="nav-icon">📈</span><span>التقارير</span></a>
                <a href="settings.html" class="nav-item"><span class="nav-icon">⚙️</span><span>الإعدادات</span></a>
            </nav>
            <div class="sidebar-footer">
                <button class="nav-item" onclick="logout()" style="color: var(--danger);"><span class="nav-icon">🚪</span><span>تسجيل الخروج</span></button>
            </div>
        </aside>

        <main class="main-content">
            <div class="top-bar">
                <h1 class="page-title">👥 إدارة المستخدمين</h1>
                <div class="user-menu">
                    <button class="btn btn-primary" onclick="openAddModal()">➕ مستخدم جديد</button>
                </div>
            </div>

            <div class="content-wrapper">
                <!-- Tabs -->
                <div class="tabs-row">
                    <button class="tab-pill active" onclick="filterByRole('all', this)">الكل</button>
                    <button class="tab-pill" onclick="filterByRole('admin', this)">👑 مديرين</button>
                    <button class="tab-pill" onclick="filterByRole('teacher', this)">👨‍🏫 معلمين</button>
                    <button class="tab-pill" onclick="filterByRole('student', this)">👨‍🎓 طلاب</button>
                </div>

                <!-- Filters -->
                <div class="filter-bar">
                    <div class="search-box">
                        <span class="search-icon">🔍</span>
                        <input type="text" class="form-input" id="searchInput" placeholder="ابحث بالاسم أو البريد أو رقم الهاتف..." oninput="debounceSearch()">
                    </div>
                    <select class="form-select filter-select" id="statusFilter" onchange="loadUsers()">
                        <option value="all">كل الحالات</option>
                        <option value="active">✅ نشط</option>
                        <option value="inactive">❌ غير نشط</option>
                    </select>
                    <button class="btn btn-secondary" onclick="exportUsers()">📥 تصدير</button>
                </div>

                <!-- Users Table -->
                <div class="card">
                    <div class="table-wrapper">
                        <table class="data-table" id="usersTable">
                            <thead>
                                <tr>
                                    <th>المستخدم</th>
                                    <th>اسم المستخدم</th>
                                    <th>رقم الهاتف</th>
                                    <th>الدور</th>
                                    <th>الحالة</th>
                                    <th>تاريخ التسجيل</th>
                                    <th>الإجراءات</th>
                                </tr>
                            </thead>
                            <tbody id="usersTableBody">
                                <tr><td colspan="7" style="text-align: center; padding: 40px;"><div class="skeleton" style="height: 40px;"></div></td></tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <!-- Add/Edit User Modal -->
    <div class="modal-overlay" id="userModal">
        <div class="modal-content">
            <h3 id="modalTitle">➕ مستخدم جديد</h3>
            <form class="modal-form" id="userForm" onsubmit="saveUser(event)">
                <input type="hidden" id="userId">
                <div class="form-group">
                    <label class="form-label">الاسم الكامل</label>
                    <input type="text" class="form-input" id="userName" required>
                </div>
                <div class="form-group">
                    <label class="form-label">اسم المستخدم</label>
                    <input type="text" class="form-input" id="userUsername" required>
                </div>
                <div class="form-group">
                    <label class="form-label">البريد الإلكتروني</label>
                    <input type="email" class="form-input" id="userEmail" required>
                </div>
                <div class="form-group">
                    <label class="form-label">رقم الهاتف</label>
                    <input type="tel" class="form-input" id="userPhone">
                </div>
                <div class="form-group">
                    <label class="form-label">الدور</label>
                    <select class="form-select" id="userRole" required>
                        <option value="student">👨‍🎓 طالب</option>
                        <option value="teacher">👨‍🏫 معلم</option>
                        <option value="admin">👑 مدير</option>
                    </select>
                </div>
                <div class="form-group">
                    <label class="form-label">الصف الدراسي</label>
                    <select class="form-select" id="userClass">
                        <option value="">-- اختر الصف --</option>
                    </select>
                </div>
                <div class="form-group" id="passwordGroup">
                    <label class="form-label">كلمة المرور</label>
                    <input type="password" class="form-input" id="userPassword" placeholder="اتركه فارغاً للحفاظ على كلمة المرور الحالية">
                </div>
                <div style="display: flex; gap: 12px; justify-content: flex-end;">
                    <button type="button" class="btn btn-secondary" onclick="App.Modal.close('userModal')">إلغاء</button>
                    <button type="submit" class="btn btn-primary">حفظ</button>
                </div>
            </form>
        </div>
    </div>

    <script src="../shared/supabase-client.js"></script>
    <script src="../shared/app.js"></script>

    <script>
        const currentUser = getUser();
        if (!currentUser || currentUser.role !== 'admin') {
            window.location.href = '../login.html';
        }

        let currentRoleFilter = 'all';
        let allUsers = [];

        async function loadUsers() {
            App.Loading.show('جاري تحميل المستخدمين...');
            try {
                const filters = {};
                if (currentRoleFilter !== 'all') filters.role = currentRoleFilter;

                const status = document.getElementById('statusFilter').value;
                if (status !== 'all') filters.status = status;

                const users = await fetchUsers(filters);
                allUsers = users;
                renderUsers(users);
            } catch (error) {
                console.error('Error:', error);
                App.Toast.error('حدث خطأ في تحميل المستخدمين');
            }
            App.Loading.hide();
        }

        function renderUsers(users) {
            const tbody = document.getElementById('usersTableBody');
            const search = document.getElementById('searchInput').value.toLowerCase();

            const filtered = users.filter(u => 
                !search || 
                u.name?.toLowerCase().includes(search) ||
                u.username?.toLowerCase().includes(search) ||
                u.email?.toLowerCase().includes(search) ||
                u.phone?.includes(search)
            );

            if (filtered.length === 0) {
                tbody.innerHTML = `
                    <tr><td colspan="7">
                        <div class="empty-state">
                            <div class="empty-state-icon">👥</div>
                            <p>لا يوجد مستخدمين</p>
                        </div>
                    </td></tr>
                `;
                return;
            }

            tbody.innerHTML = filtered.map(u => `
                <tr>
                    <td>
                        <div style="display: flex; align-items: center; gap: 10px;">
                            <div class="user-avatar-sm">${u.name?.charAt(0) || '?'}</div>
                            <div>
                                <div style="font-weight: 600;">${App.sanitizeHtml(u.name || '')}</div>
                                <div style="font-size: 0.75rem; color: var(--text-muted);">${App.sanitizeHtml(u.email || '')}</div>
                            </div>
                        </div>
                    </td>
                    <td>${App.sanitizeHtml(u.username || '')}</td>
                    <td>${u.phone || '-'}</td>
                    <td><span class="user-role-badge role-${u.role}">${u.role === 'admin' ? '👑 مدير' : u.role === 'teacher' ? '👨‍🏫 معلم' : '👨‍🎓 طالب'}</span></td>
                    <td class="status-${u.status}">${u.status === 'active' ? '✅ نشط' : '❌ غير نشط'}</td>
                    <td>${App.DateTime.dateOnly(u.created_at)}</td>
                    <td>
                        <div class="action-btns">
                            <button class="btn btn-sm btn-secondary" onclick="viewAsUser(${u.id})" title="تصفح كـ">👁️</button>
                            <button class="btn btn-sm btn-ghost" onclick="editUser(${u.id})" title="تعديل">✏️</button>
                            <button class="btn btn-sm btn-danger" onclick="deleteUser(${u.id})" title="حذف">🗑️</button>
                        </div>
                    </td>
                </tr>
            `).join('');
        }

        function filterByRole(role, btn) {
            currentRoleFilter = role;
            document.querySelectorAll('.tab-pill').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            loadUsers();
        }

        const debounceSearch = App.debounce(() => renderUsers(allUsers), 300);

        async function loadClasses() {
            const classes = await fetchClasses();
            const select = document.getElementById('userClass');
            select.innerHTML = '<option value="">-- اختر الصف --</option>' + 
                classes.map(c => `<option value="${c.id}">${c.name}</option>`).join('');
        }

        function openAddModal() {
            document.getElementById('userForm').reset();
            document.getElementById('userId').value = '';
            document.getElementById('modalTitle').textContent = '➕ مستخدم جديد';
            document.getElementById('passwordGroup').style.display = 'block';
            document.getElementById('userPassword').required = true;
            App.Modal.open('userModal');
        }

        async function editUser(id) {
            const user = allUsers.find(u => u.id === id);
            if (!user) return;

            document.getElementById('userId').value = user.id;
            document.getElementById('userName').value = user.name || '';
            document.getElementById('userUsername').value = user.username || '';
            document.getElementById('userEmail').value = user.email || '';
            document.getElementById('userPhone').value = user.phone || '';
            document.getElementById('userRole').value = user.role || 'student';
            document.getElementById('userClass').value = user.class_id || '';
            document.getElementById('modalTitle').textContent = '✏️ تعديل مستخدم';
            document.getElementById('passwordGroup').style.display = 'none';
            document.getElementById('userPassword').required = false;
            App.Modal.open('userModal');
        }

        async function saveUser(e) {
            e.preventDefault();
            App.Loading.show('جاري الحفظ...');

            try {
                const id = document.getElementById('userId').value;
                const data = {
                    name: document.getElementById('userName').value,
                    username: document.getElementById('userUsername').value,
                    email: document.getElementById('userEmail').value,
                    phone: document.getElementById('userPhone').value,
                    role: document.getElementById('userRole').value,
                    class_id: document.getElementById('userClass').value || null,
                    status: 'active'
                };

                const password = document.getElementById('userPassword').value;
                if (password) {
                    data.password_hash = await hashPassword(password);
                }

                if (id) {
                    const { error } = await sb.from(TABLES.users).update(data).eq('id', id);
                    if (error) throw error;
                    App.Toast.success('تم تحديث المستخدم بنجاح');
                } else {
                    const { error } = await sb.from(TABLES.users).insert(data);
                    if (error) throw error;
                    App.Toast.success('تم إضافة المستخدم بنجاح');
                }

                App.Modal.close('userModal');
                loadUsers();
            } catch (error) {
                console.error('Error:', error);
                App.Toast.error('حدث خطأ: ' + error.message);
            }
            App.Loading.hide();
        }

        async function deleteUser(id) {
            if (!await App.confirm('هل أنت متأكد من حذف هذا المستخدم؟')) return;
            App.Loading.show('جاري الحذف...');
            try {
                const { error } = await sb.from(TABLES.users).delete().eq('id', id);
                if (error) throw error;
                App.Toast.success('تم حذف المستخدم');
                loadUsers();
            } catch (error) {
                App.Toast.error('حدث خطأ');
            }
            App.Loading.hide();
        }

        async function viewAsUser(id) {
            const user = allUsers.find(u => u.id === id);
            if (!user) return;

            if (!await App.confirm(`هل تريد الدخول كـ ${user.name} (${user.role === 'teacher' ? 'معلم' : 'طالب'})؟`)) return;

            const result = await impersonateUser(id);
            if (result.success) {
                App.Toast.success(`تم الدخول كـ ${user.name}`);
                setTimeout(() => {
                    if (user.role === 'teacher') window.location.href = '../teacher/dashboard.html';
                    else if (user.role === 'student') window.location.href = '../student/dashboard.html';
                    else window.location.href = 'dashboard.html';
                }, 500);
            } else {
                App.Toast.error(result.error);
            }
        }

        function exportUsers() {
            const data = allUsers.map(u => ({
                الاسم: u.name,
                'اسم المستخدم': u.username,
                البريد: u.email,
                الهاتف: u.phone,
                الدور: u.role === 'admin' ? 'مدير' : u.role === 'teacher' ? 'معلم' : 'طالب',
                الحالة: u.status === 'active' ? 'نشط' : 'غير نشط',
                'تاريخ التسجيل': App.DateTime.dateOnly(u.created_at)
            }));
            App.exportCSV(data, 'users_export');
        }

        // Init
        loadClasses();
        loadUsers();
    </script>
</body>
</html>
