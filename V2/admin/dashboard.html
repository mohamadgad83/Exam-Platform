<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة التحكم - Admin | Exam Platform</title>
    <link rel="stylesheet" href="../shared/styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 1.5rem; margin-bottom: 2rem; }
        .stat-card { background: var(--card-bg); padding: 1.5rem; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); display: flex; align-items: center; gap: 1rem; }
        .stat-icon { width: 50px; height: 50px; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 1.5rem; color: #fff; }
        .stat-icon.blue { background: #3b82f6; }
        .stat-icon.green { background: #10b981; }
        .stat-icon.orange { background: #f59e0b; }
        .stat-icon.red { background: #ef4444; }
        .stat-icon.purple { background: #8b5cf6; }
        .stat-info h3 { font-size: 1.8rem; margin: 0; color: var(--text-primary); }
        .stat-info p { margin: 0; color: var(--text-secondary); font-size: 0.9rem; }
        .charts-row { display: grid; grid-template-columns: 2fr 1fr; gap: 1.5rem; margin-bottom: 2rem; }
        .chart-card { background: var(--card-bg); padding: 1.5rem; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        .chart-card h3 { margin: 0 0 1rem 0; color: var(--text-primary); }
        .recent-activity { background: var(--card-bg); padding: 1.5rem; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        .activity-item { display: flex; align-items: center; gap: 1rem; padding: 0.75rem 0; border-bottom: 1px solid var(--border-color); }
        .activity-item:last-child { border-bottom: none; }
        .activity-icon { width: 36px; height: 36px; border-radius: 50%; background: var(--bg-secondary); display: flex; align-items: center; justify-content: center; }
        .activity-info { flex: 1; }
        .activity-info p { margin: 0; font-size: 0.9rem; }
        .activity-time { font-size: 0.75rem; color: var(--text-secondary); }
        @media (max-width: 768px) { .charts-row { grid-template-columns: 1fr; } }
    </style>
</head>
<body>
    <div class="admin-layout">
        <aside class="sidebar">
            <div class="sidebar-header">
                <h2><i class="fas fa-graduation-cap"></i> Exam Platform</h2>
                <span class="badge">Admin</span>
            </div>
            <nav class="sidebar-nav">
                <a href="dashboard.html" class="active"><i class="fas fa-home"></i> الرئيسية</a>
                <a href="users.html"><i class="fas fa-users"></i> المستخدمين</a>
                <a href="classes.html"><i class="fas fa-school"></i> الفصول والمجموعات</a>
                <a href="exams.html"><i class="fas fa-file-alt"></i> الاختبارات</a>
                <a href="reports.html"><i class="fas fa-chart-bar"></i> التقارير</a>
                <a href="settings.html"><i class="fas fa-cog"></i> الإعدادات</a>
            </nav>
            <div class="sidebar-footer">
                <button onclick="App.toggleDarkMode()"><i class="fas fa-moon"></i> <span>الوضع الليلي</span></button>
                <div class="super-access">
                    <label><i class="fas fa-exchange-alt"></i> الوصول السريع</label>
                    <select onchange="switchDashboard(this.value)">
                        <option value="admin" selected>Admin</option>
                        <option value="../teacher/dashboard.html">Teacher</option>
                        <option value="../student/dashboard.html">Student</option>
                    </select>
                </div>
                <button onclick="examAuth.signOut()"><i class="fas fa-sign-out-alt"></i> <span>تسجيل الخروج</span></button>
            </div>
        </aside>
        
        <main class="main-content">
            <header class="page-header">
                <h1>لوحة تحكم النظام</h1>
                <div class="user-info">
                    <span id="adminName"><i class="fas fa-user-shield"></i> Admin</span>
                </div>
            </header>
            
            <div class="content-wrapper">
                <div class="stats-grid">
                    <div class="stat-card">
                        <div class="stat-icon blue"><i class="fas fa-users"></i></div>
                        <div class="stat-info">
                            <h3 id="totalUsers">0</h3>
                            <p>إجمالي المستخدمين</p>
                        </div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-icon green"><i class="fas fa-user-graduate"></i></div>
                        <div class="stat-info">
                            <h3 id="totalStudents">0</h3>
                            <p>الطلاب</p>
                        </div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-icon orange"><i class="fas fa-chalkboard-teacher"></i></div>
                        <div class="stat-info">
                            <h3 id="totalTeachers">0</h3>
                            <p>المعلمين</p>
                        </div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-icon purple"><i class="fas fa-file-alt"></i></div>
                        <div class="stat-info">
                            <h3 id="totalExams">0</h3>
                            <p>الاختبارات</p>
                        </div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-icon red"><i class="fas fa-clipboard-check"></i></div>
                        <div class="stat-info">
                            <h3 id="totalAttempts">0</h3>
                            <p>المحاولات</p>
                        </div>
                    </div>
                </div>
                
                <div class="charts-row">
                    <div class="chart-card">
                        <h3>إحصائيات الاختبارات الشهرية</h3>
                        <canvas id="examsChart"></canvas>
                    </div>
                    <div class="chart-card">
                        <h3>توزيع المستخدمين</h3>
                        <canvas id="usersChart"></canvas>
                    </div>
                </div>
                
                <div class="recent-activity">
                    <h3><i class="fas fa-clock"></i> النشاط الأخير</h3>
                    <div id="activityList">
                        <div class="activity-item">
                            <div class="activity-icon"><i class="fas fa-spinner fa-spin"></i></div>
                            <div class="activity-info"><p>جاري التحميل...</p></div>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>
    
    <script src="../shared/supabase-client.js"></script>
    <script src="../shared/app.js"></script>
    <script>
        async function initDashboard() {
            App.loading(true);
            
            try {
                const user = await examAuth.getUser();
                if (!user || user.role !== 'admin') {
                    window.location.href = '../login.html';
                    return;
                }
                document.getElementById('adminName').innerHTML = `<i class="fas fa-user-shield"></i> ${user.name || 'Admin'}`;
                
                const [users, students, teachers, exams, attempts] = await Promise.all([
                    examDB.from('exam_users').select('id', { count: 'exact', head: true }),
                    examDB.from('exam_students').select('id', { count: 'exact', head: true }),
                    examDB.from('exam_teachers').select('id', { count: 'exact', head: true }),
                    examDB.from('exam_exams').select('id', { count: 'exact', head: true }),
                    examDB.from('exam_attempts').select('id', { count: 'exact', head: true })
                ]);
                
                document.getElementById('totalUsers').textContent = users.count || 0;
                document.getElementById('totalStudents').textContent = students.count || 0;
                document.getElementById('totalTeachers').textContent = teachers.count || 0;
                document.getElementById('totalExams').textContent = exams.count || 0;
                document.getElementById('totalAttempts').textContent = attempts.count || 0;
                
                const examsCtx = document.getElementById('examsChart').getContext('2d');
                new Chart(examsCtx, {
                    type: 'line',
                    data: {
                        labels: ['يناير', 'فبراير', 'مارس', 'أبريل', 'مايو', 'يونيو'],
                        datasets: [{
                            label: 'الاختبارات',
                            data: [12, 19, 15, 25, 22, 30],
                            borderColor: '#3b82f6',
                            backgroundColor: 'rgba(59, 130, 246, 0.1)',
                            tension: 0.4,
                            fill: true
                        }]
                    },
                    options: { responsive: true, plugins: { legend: { display: false } } }
                });
                
                const usersCtx = document.getElementById('usersChart').getContext('2d');
                new Chart(usersCtx, {
                    type: 'doughnut',
                    data: {
                        labels: ['طلاب', 'معلمين', 'أدمن'],
                        datasets: [{
                            data: [students.count || 0, teachers.count || 0, 1],
                            backgroundColor: ['#10b981', '#f59e0b', '#8b5cf6']
                        }]
                    },
                    options: { responsive: true }
                });
                
                const { data: recentAttempts } = await examDB.from('exam_attempts')
                    .select('*, exam_students(name), exam_exams(title)')
                    .order('created_at', { ascending: false })
                    .limit(5);
                    
                const activityList = document.getElementById('activityList');
                if (recentAttempts && recentAttempts.length > 0) {
                    activityList.innerHTML = recentAttempts.map(attempt => `
                        <div class="activity-item">
                            <div class="activity-icon"><i class="fas fa-clipboard-check"></i></div>
                            <div class="activity-info">
                                <p>${attempt.exam_students?.name || 'طالب'} أكمل اختبار ${attempt.exam_exams?.title || ''}</p>
                                <span class="activity-time">${App.formatDate(attempt.created_at)}</span>
                            </div>
                        </div>
                    `).join('');
                } else {
                    activityList.innerHTML = '<div class="activity-item"><div class="activity-info"><p>لا يوجد نشاط حديث</p></div></div>';
                }
                
            } catch (err) {
                console.error(err);
                App.showToast('خطأ في تحميل البيانات', 'error');
            } finally {
                App.loading(false);
            }
        }
        
        function switchDashboard(url) {
            if (url !== 'admin') window.location.href = url;
        }
        
        document.addEventListener('DOMContentLoaded', initDashboard);
    </script>
</body>
</html>
