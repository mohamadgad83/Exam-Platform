<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مراقبة الاختبارات - Admin | Exam Platform</title>
    <link rel="stylesheet" href="../shared/styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .toolbar { display: flex; gap: 1rem; margin-bottom: 1.5rem; flex-wrap: wrap; }
        .toolbar input, .toolbar select { padding: 0.5rem 1rem; border: 1px solid var(--border-color); border-radius: 8px; background: var(--card-bg); color: var(--text-primary); }
        .btn { padding: 0.5rem 1rem; border: none; border-radius: 8px; cursor: pointer; display: inline-flex; align-items: center; gap: 0.5rem; }
        .btn-primary { background: #3b82f6; color: #fff; }
        .btn-success { background: #10b981; color: #fff; }
        .btn-danger { background: #ef4444; color: #fff; }
        .btn-info { background: #06b6d4; color: #fff; }
        .data-table { width: 100%; border-collapse: collapse; background: var(--card-bg); border-radius: 12px; overflow: hidden; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        .data-table th, .data-table td { padding: 1rem; text-align: right; border-bottom: 1px solid var(--border-color); }
        .data-table th { background: var(--bg-secondary); }
        .status-badge { padding: 0.25rem 0.75rem; border-radius: 20px; font-size: 0.8rem; }
        .status-draft { background: #e5e7eb; color: #374151; }
        .status-published { background: #d1fae5; color: #065f46; }
        .status-active { background: #dbeafe; color: #1e40af; }
        .status-closed { background: #fee2e2; color: #991b1b; }
        .pagination { display: flex; justify-content: center; gap: 0.5rem; margin-top: 1.5rem; }
        .pagination button { padding: 0.5rem 1rem; border: 1px solid var(--border-color); background: var(--card-bg); color: var(--text-primary); border-radius: 8px; cursor: pointer; }
        .pagination button.active { background: #3b82f6; color: #fff; }
    </style>
</head>
<body>
    <div class="admin-layout">
        <aside class="sidebar">
            <div class="sidebar-header">
                <h2><i class="fas fa-graduation-cap"></i> Exam Platform</h2>
                <span class="badge">Admin</span>
            </div>
            <nav class="sidebar-nav">
                <a href="dashboard.html"><i class="fas fa-home"></i> الرئيسية</a>
                <a href="users.html"><i class="fas fa-users"></i> المستخدمين</a>
                <a href="classes.html"><i class="fas fa-school"></i> الفصول والمجموعات</a>
                <a href="exams.html" class="active"><i class="fas fa-file-alt"></i> الاختبارات</a>
                <a href="reports.html"><i class="fas fa-chart-bar"></i> التقارير</a>
                <a href="settings.html"><i class="fas fa-cog"></i> الإعدادات</a>
            </nav>
            <div class="sidebar-footer">
                <button onclick="App.toggleDarkMode()"><i class="fas fa-moon"></i> <span>الوضع الليلي</span></button>
                <div class="super-access">
                    <label><i class="fas fa-exchange-alt"></i> الوصول السريع</label>
                    <select onchange="switchDashboard(this.value)">
                        <option value="admin" selected>Admin</option>
                        <option value="../teacher/dashboard.html">Teacher</option>
                        <option value="../student/dashboard.html">Student</option>
                    </select>
                </div>
                <button onclick="examAuth.signOut()"><i class="fas fa-sign-out-alt"></i> <span>تسجيل الخروج</span></button>
            </div>
        </aside>
        
        <main class="main-content">
            <header class="page-header">
                <h1>مراقبة الاختبارات</h1>
                <div class="user-info">
                    <span id="adminName"><i class="fas fa-user-shield"></i> Admin</span>
                </div>
            </header>
            
            <div class="content-wrapper">
                <div class="toolbar">
                    <input type="text" id="searchInput" placeholder="بحث بعنوان الاختبار..." oninput="debounceLoad()">
                    <select id="statusFilter" onchange="loadExams()">
                        <option value="">كل الحالات</option>
                        <option value="draft">مسودة</option>
                        <option value="published">منشور</option>
                        <option value="active">نشط</option>
                        <option value="closed">مغلق</option>
                    </select>
                    <select id="subjectFilter" onchange="loadExams()">
                        <option value="">كل المواد</option>
                    </select>
                </div>
                
                <table class="data-table">
                    <thead>
                        <tr>
                            <th>العنوان</th>
                            <th>المادة</th>
                            <th>المدة</th>
                            <th>الدرجة الكاملة</th>
                            <th>المحاولات</th>
                            <th>الحالة</th>
                            <th>المنشئ</th>
                            <th>الإجراءات</th>
                        </tr>
                    </thead>
                    <tbody id="examsTableBody">
                        <tr><td colspan="8" style="text-align:center">جاري التحميل...</td></tr>
                    </tbody>
                </table>
                
                <div class="pagination" id="pagination"></div>
            </div>
        </main>
    </div>
    
    <script src="../shared/supabase-client.js"></script>
    <script src="../shared/app.js"></script>
    <script>
        let currentPage = 1;
        const pageSize = 10;
        let debounceTimer;
        
        async function initExams() {
            const user = await examAuth.getUser();
            if (!user || user.role !== 'admin') { window.location.href = '../login.html'; return; }
            document.getElementById('adminName').innerHTML = `<i class="fas fa-user-shield"></i> ${user.name || 'Admin'}`;
            await loadSubjects();
            loadExams();
        }
        
        async function loadSubjects() {
            const { data } = await examDB.from('exam_subjects').select('id, name');
            const sel = document.getElementById('subjectFilter');
            data?.forEach(s => { const o = document.createElement('option'); o.value = s.id; o.textContent = s.name; sel.appendChild(o); });
        }
        
        function debounceLoad() { clearTimeout(debounceTimer); debounceTimer = setTimeout(loadExams, 300); }
        
        async function loadExams() {
            App.loading(true);
            const search = document.getElementById('searchInput').value;
            const status = document.getElementById('statusFilter').value;
            const subject = document.getElementById('subjectFilter').value;
            
            let query = examDB.from('exam_exams').select('*, exam_subjects(name), exam_teachers(name)', { count: 'exact' });
            if (search) query = query.ilike('title', `%${search}%`);
            if (status) query = query.eq('status', status);
            if (subject) query = query.eq('subject_id', subject);
            
            const from = (currentPage - 1) * pageSize;
            const { data, count, error } = await query.range(from, from + pageSize - 1).order('created_at', { ascending: false });
            
            if (error) { App.showToast('خطأ', 'error'); App.loading(false); return; }
            
            const tbody = document.getElementById('examsTableBody');
            if (!data || data.length === 0) { tbody.innerHTML = '<tr><td colspan="8" style="text-align:center">لا يوجد اختبارات</td></tr>'; }
            else {
                tbody.innerHTML = data.map(exam => {
                    const statusClass = `status-${exam.status || 'draft'}`;
                    const statusText = { draft: 'مسودة', published: 'منشور', active: 'نشط', closed: 'مغلق' }[exam.status] || exam.status;
                    return `
                        <tr>
                            <td><strong>${exam.title}</strong></td>
                            <td>${exam.exam_subjects?.name || '-'}</td>
                            <td>${exam.duration || 0} دقيقة</td>
                            <td>${exam.total_marks || 0}</td>
                            <td>-</td>
                            <td><span class="status-badge ${statusClass}">${statusText}</span></td>
                            <td>${exam.exam_teachers?.name || '-'}</td>
                            <td>
                                <button class="btn btn-info" onclick="viewExam('${exam.id}')" title="عرض"><i class="fas fa-eye"></i></button>
                                <button class="btn btn-warning" onclick="editExam('${exam.id}')" title="تعديل"><i class="fas fa-edit"></i></button>
                                <button class="btn btn-danger" onclick="deleteExam('${exam.id}')" title="حذف"><i class="fas fa-trash"></i></button>
                            </td>
                        </tr>
                    `;
                }).join('');
            }
            renderPagination(count || 0);
            App.loading(false);
        }
        
        function renderPagination(total) {
            const pages = Math.ceil(total / pageSize);
            const container = document.getElementById('pagination');
            if (pages <= 1) { container.innerHTML = ''; return; }
            let html = '';
            for (let i = 1; i <= pages; i++) html += `<button class="${i === currentPage ? 'active' : ''}" onclick="goPage(${i})">${i}</button>`;
            container.innerHTML = html;
        }
        function goPage(p) { currentPage = p; loadExams(); }
        
        function viewExam(id) { window.open(`../teacher/exam-preview.html?id=${id}`, '_blank'); }
        function editExam(id) { window.open(`../teacher/exam-editor.html?id=${id}`, '_blank'); }
        async function deleteExam(id) { if(!await App.confirm('هل أنت متأكد من حذف هذا الاختبار؟')) return; const { error } = await examDB.from('exam_exams').delete().eq('id', id); if(!error) { App.showToast('تم الحذف', 'success'); loadExams(); } }
        
        function switchDashboard(url) { if(url !== 'admin') window.location.href = url; }
        document.addEventListener('DOMContentLoaded', initExams);
    </script>
</body>
</html>
