<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إدارة الامتحانات - منصة الاختبارات</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="../shared/styles.css">
    <style>
        .filter-bar { display: flex; gap: 12px; margin-bottom: 20px; flex-wrap: wrap; }
        .search-box { flex: 1; min-width: 250px; position: relative; }
        .search-box input { width: 100%; padding: 10px 16px 10px 40px; }
        .search-box .search-icon { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); }
        .exam-status { padding: 4px 12px; border-radius: 20px; font-size: 0.75rem; font-weight: 700; }
        .status-draft { background: #f3f4f6; color: #6b7280; }
        .status-published { background: #d1fae5; color: #065f46; }
        .status-closed { background: #fee2e2; color: #991b1b; }
        .status-upcoming { background: #dbeafe; color: #1e40af; }
        .exam-row { display: flex; align-items: center; justify-content: space-between; padding: 16px; background: var(--bg-body); border-radius: var(--radius-md); margin-bottom: 10px; transition: var(--transition); }
        .exam-row:hover { background: var(--primary-50); }
        .exam-info h4 { font-size: 1rem; font-weight: 700; color: var(--text-main); margin-bottom: 4px; }
        .exam-info p { font-size: 0.875rem; color: var(--text-muted); }
        .exam-meta { display: flex; gap: 16px; font-size: 0.75rem; color: var(--text-muted); margin-top: 8px; }
        .exam-meta span { display: flex; align-items: center; gap: 4px; }
    </style>
</head>
<body>
    <div class="app-layout">
        <aside class="sidebar">
            <div class="sidebar-header">
                <div class="brand-logo">📚</div>
                <span class="brand-text">منصة الاختبارات</span>
            </div>
            <nav class="sidebar-nav">
                <a href="dashboard.html" class="nav-item"><span class="nav-icon">📊</span><span>لوحة التحكم</span></a>
                <a href="users.html" class="nav-item"><span class="nav-icon">👥</span><span>المستخدمين</span></a>
                <a href="classes.html" class="nav-item"><span class="nav-icon">🏫</span><span>الصفوف</span></a>
                <a href="exams.html" class="nav-item active"><span class="nav-icon">📝</span><span>الامتحانات</span></a>
                <a href="groups.html" class="nav-item"><span class="nav-icon">👥</span><span>المجموعات</span></a>
                <a href="questions.html" class="nav-item"><span class="nav-icon">❓</span><span>الأسئلة</span></a>
                <a href="reports.html" class="nav-item"><span class="nav-icon">📈</span><span>التقارير</span></a>
                <a href="settings.html" class="nav-item"><span class="nav-icon">⚙️</span><span>الإعدادات</span></a>
            </nav>
            <div class="sidebar-footer">
                <button class="nav-item" onclick="logout()" style="color: var(--danger);"><span class="nav-icon">🚪</span><span>تسجيل الخروج</span></button>
            </div>
        </aside>

        <main class="main-content">
            <div class="top-bar">
                <h1 class="page-title">📝 إدارة الامتحانات</h1>
                <div class="user-menu">
                    <button class="btn btn-primary" onclick="location.href='../teacher/create-exam.html'">➕ امتحان جديد</button>
                </div>
            </div>

            <div class="content-wrapper">
                <!-- Filters -->
                <div class="filter-bar">
                    <div class="search-box">
                        <span class="search-icon">🔍</span>
                        <input type="text" class="form-input" id="searchInput" placeholder="ابحث بعنوان الامتحان..." oninput="debounceSearch()">
                    </div>
                    <select class="form-select" id="statusFilter" onchange="loadExams()" style="min-width: 150px;">
                        <option value="all">كل الحالات</option>
                        <option value="draft">📝 مسودة</option>
                        <option value="published">✅ منشور</option>
                        <option value="closed">❌ مغلق</option>
                        <option value="upcoming">📅 قادم</option>
                    </select>
                    <select class="form-select" id="classFilter" onchange="loadExams()" style="min-width: 150px;">
                        <option value="all">كل الصفوف</option>
                    </select>
                    <button class="btn btn-secondary" onclick="exportExams()">📥 تصدير</button>
                </div>

                <!-- Exams List -->
                <div class="card">
                    <div id="examsList">
                        <div class="empty-state">
                            <div class="empty-state-icon">📝</div>
                            <p>جاري تحميل الامتحانات...</p>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script src="../shared/supabase-client.js"></script>
    <script src="../shared/app.js"></script>

    <script>
        const currentUser = getUser();
        if (!currentUser || currentUser.role !== 'admin') {
            window.location.href = '../login.html';
        }

        let allExams = [];

        async function loadExams() {
            App.Loading.show('جاري تحميل الامتحانات...');
            try {
                const filters = {};
                const status = document.getElementById('statusFilter').value;
                const classId = document.getElementById('classFilter').value;

                if (status !== 'all') filters.status = status;
                if (classId !== 'all') filters.classId = classId;

                const exams = await fetchExams(filters);
                allExams = exams;
                renderExams(exams);
            } catch (error) {
                console.error('Error:', error);
                App.Toast.error('حدث خطأ');
            }
            App.Loading.hide();
        }

        function renderExams(exams) {
            const container = document.getElementById('examsList');
            const search = document.getElementById('searchInput').value.toLowerCase();

            const filtered = exams.filter(e => 
                !search || e.title?.toLowerCase().includes(search)
            );

            if (filtered.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-state-icon">📝</div>
                        <p>لا توجد امتحانات</p>
                        <button class="btn btn-primary" onclick="location.href='../teacher/create-exam.html'" style="margin-top: 16px;">➕ إنشاء امتحان</button>
                    </div>
                `;
                return;
            }

            container.innerHTML = filtered.map(e => {
                const statusClass = e.status === 'published' ? 'status-published' : 
                                   e.status === 'draft' ? 'status-draft' : 
                                   e.status === 'closed' ? 'status-closed' : 'status-upcoming';
                const statusText = e.status === 'published' ? 'منشور' : 
                                  e.status === 'draft' ? 'مسودة' : 
                                  e.status === 'closed' ? 'مغلق' : 'قادم';

                return `
                    <div class="exam-row">
                        <div class="exam-info">
                            <h4>${App.sanitizeHtml(e.title)}</h4>
                            <p>${App.sanitizeHtml(e.description || 'لا يوجد وصف')}</p>
                            <div class="exam-meta">
                                <span>⏱️ ${e.duration} دقيقة</span>
                                <span>🎯 ${e.total_points} نقطة</span>
                                <span>📅 ${App.DateTime.dateOnly(e.start_time)}</span>
                                <span>👤 ${e.teacher_name || 'غير معروف'}</span>
                            </div>
                        </div>
                        <div style="display: flex; align-items: center; gap: 12px;">
                            <span class="exam-status ${statusClass}">${statusText}</span>
                            <div style="display: flex; gap: 6px;">
                                <button class="btn btn-sm btn-ghost" onclick="viewExam(${e.id})" title="عرض">👁️</button>
                                <button class="btn btn-sm btn-ghost" onclick="editExam(${e.id})" title="تعديل">✏️</button>
                                <button class="btn btn-sm btn-danger" onclick="deleteExam(${e.id})" title="حذف">🗑️</button>
                            </div>
                        </div>
                    </div>
                `;
            }).join('');
        }

        const debounceSearch = App.debounce(() => renderExams(allExams), 300);

        async function loadClasses() {
            const classes = await fetchClasses();
            const select = document.getElementById('classFilter');
            select.innerHTML = '<option value="all">كل الصفوف</option>' + 
                classes.map(c => `<option value="${c.id}">${c.name}</option>`).join('');
        }

        function viewExam(id) {
            window.open(`../teacher/exam-preview.html?id=${id}`, '_blank');
        }

        function editExam(id) {
            window.location.href = `../teacher/create-exam.html?edit=${id}`;
        }

        async function deleteExam(id) {
            if (!await App.confirm('هل أنت متأكد من حذف هذا الامتحان؟')) return;
            App.Loading.show('جاري الحذف...');
            try {
                await sb.from(TABLES.exams).delete().eq('id', id);
                App.Toast.success('تم الحذف');
                loadExams();
            } catch (error) {
                App.Toast.error('حدث خطأ');
            }
            App.Loading.hide();
        }

        function exportExams() {
            const data = allExams.map(e => ({
                العنوان: e.title,
                الوصف: e.description,
                الحالة: e.status,
                المدة: e.duration,
                النقاط: e.total_points,
                'تاريخ البدء': App.DateTime.dateOnly(e.start_time),
                'تاريخ الانتهاء': App.DateTime.dateOnly(e.end_time)
            }));
            App.exportCSV(data, 'exams_export');
        }

        loadClasses();
        loadExams();
    </script>
</body>
</html>
