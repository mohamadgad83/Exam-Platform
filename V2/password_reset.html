<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تغيير كلمة المرور — منصة الاختبارات</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Tajawal', sans-serif; background: #f0f4f8; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; }

        .reset-card {
            background: white;
            border-radius: 24px;
            padding: 40px;
            width: 100%;
            max-width: 450px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.1);
            text-align: center;
        }

        .reset-icon {
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 25px;
            color: white;
            font-size: 32px;
        }

        .reset-card h1 { color: #333; font-size: 24px; margin-bottom: 10px; }
        .reset-card p { color: #888; margin-bottom: 30px; font-size: 14px; }

        .form-group { margin-bottom: 20px; text-align: right; }
        .form-group label { display: block; margin-bottom: 8px; color: #333; font-weight: 600; font-size: 14px; }
        .input-wrapper { position: relative; }
        .input-wrapper input { width: 100%; padding: 14px 45px 14px 16px; border: 2px solid #e8e8e8; border-radius: 14px; font-size: 15px; font-family: 'Tajawal'; transition: all 0.3s; }
        .input-wrapper input:focus { outline: none; border-color: #667eea; }
        .input-wrapper i { position: absolute; right: 16px; top: 50%; transform: translateY(-50%); color: #aaa; }
        .input-wrapper .toggle-password { position: absolute; left: 16px; top: 50%; transform: translateY(-50%); color: #aaa; cursor: pointer; }

        .password-strength { margin-top: 8px; display: none; }
        .password-strength.visible { display: block; }
        .strength-bar { height: 4px; background: #e8e8e8; border-radius: 2px; overflow: hidden; }
        .strength-fill { height: 100%; width: 0%; border-radius: 2px; transition: all 0.4s; }
        .strength-weak { background: #e74c3c; }
        .strength-medium { background: #f39c12; }
        .strength-strong { background: #16c79a; }
        .strength-text { font-size: 12px; margin-top: 5px; }

        .btn-submit {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border: none;
            border-radius: 14px;
            font-size: 17px;
            font-weight: 700;
            font-family: 'Tajawal';
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 10px;
        }
        .btn-submit:hover { transform: translateY(-2px); box-shadow: 0 10px 30px rgba(102,126,234,0.3); }
        .btn-submit:disabled { opacity: 0.7; cursor: not-allowed; }
        .btn-submit .spinner { display: inline-block; width: 20px; height: 20px; border: 3px solid rgba(255,255,255,0.3); border-top-color: white; border-radius: 50%; animation: spin 0.8s linear infinite; margin-left: 10px; vertical-align: middle; }
        @keyframes spin { to { transform: rotate(360deg); } }

        .message { padding: 14px 18px; border-radius: 12px; margin-bottom: 20px; font-size: 14px; display: none; }
        .message.error { background: #fee; color: #c0392b; }
        .message.success { background: #efe; color: #27ae60; }
        .message.visible { display: block; }
    </style>
</head>
<body>
    <div class="reset-card">
        <div class="reset-icon">
            <i class="fas fa-lock"></i>
        </div>
        <h1>🔐 تغيير كلمة المرور</h1>
        <p>يجب عليك تغيير كلمة المرور قبل المتابعة</p>

        <div id="errorMsg" class="message error"></div>
        <div id="successMsg" class="message success"></div>

        <form id="resetForm" onsubmit="return handleReset(event)">
            <div class="form-group">
                <label>كلمة المرور الجديدة</label>
                <div class="input-wrapper">
                    <input type="password" id="newPassword" required minlength="8" 
                           placeholder="8 أحرف على الأقل" 
                           oninput="checkStrength(this.value)">
                    <i class="fas fa-lock"></i>
                    <i class="fas fa-eye toggle-password" onclick="togglePassword('newPassword')"></i>
                </div>
                <div class="password-strength" id="strengthDiv">
                    <div class="strength-bar"><div class="strength-fill" id="strengthFill"></div></div>
                    <div class="strength-text" id="strengthText"></div>
                </div>
            </div>

            <div class="form-group">
                <label>تأكيد كلمة المرور</label>
                <div class="input-wrapper">
                    <input type="password" id="confirmPassword" required 
                           placeholder="أعد إدخال كلمة المرور">
                    <i class="fas fa-lock"></i>
                    <i class="fas fa-eye toggle-password" onclick="togglePassword('confirmPassword')"></i>
                </div>
            </div>

            <button type="submit" class="btn-submit" id="submitBtn">
                تغيير كلمة المرور
            </button>
        </form>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="shared/supabase-client.js"></script>

    <script>
        const user = getUser?.();
        if (!user) {
            window.location.href = 'login.html';
        }

        function togglePassword(fieldId) {
            const field = document.getElementById(fieldId);
            const icon = event.target;
            if (field.type === 'password') {
                field.type = 'text';
                icon.classList.remove('fa-eye');
                icon.classList.add('fa-eye-slash');
            } else {
                field.type = 'password';
                icon.classList.remove('fa-eye-slash');
                icon.classList.add('fa-eye');
            }
        }

        function checkStrength(password) {
            const div = document.getElementById('strengthDiv');
            const fill = document.getElementById('strengthFill');
            const text = document.getElementById('strengthText');

            if (!password) { div.classList.remove('visible'); return; }
            div.classList.add('visible');

            let score = 0;
            if (password.length >= 8) score++;
            if (/[A-Z]/.test(password)) score++;
            if (/[a-z]/.test(password)) score++;
            if (/[0-9]/.test(password)) score++;
            if (/[^A-Za-z0-9]/.test(password)) score++;

            fill.style.width = (score / 5 * 100) + '%';
            fill.className = 'strength-fill';

            if (score <= 2) {
                fill.classList.add('strength-weak');
                text.textContent = 'ضعيفة - أضف أرقام ورموز';
                text.style.color = '#e74c3c';
            } else if (score <= 3) {
                fill.classList.add('strength-medium');
                text.textContent = 'متوسطة - يمكن تحسينها';
                text.style.color = '#f39c12';
            } else {
                fill.classList.add('strength-strong');
                text.textContent = 'قوية - ممتاز!';
                text.style.color = '#16c79a';
            }
        }

        async function handleReset(event) {
            event.preventDefault();

            const newPass = document.getElementById('newPassword').value;
            const confirmPass = document.getElementById('confirmPassword').value;
            const btn = document.getElementById('submitBtn');

            document.getElementById('errorMsg').classList.remove('visible');
            document.getElementById('successMsg').classList.remove('visible');

            if (newPass !== confirmPass) {
                document.getElementById('errorMsg').textContent = 'كلمتا المرور غير متطابقتين';
                document.getElementById('errorMsg').classList.add('visible');
                return false;
            }

            if (newPass.length < 8) {
                document.getElementById('errorMsg').textContent = 'كلمة المرور يجب أن تكون 8 أحرف على الأقل';
                document.getElementById('errorMsg').classList.add('visible');
                return false;
            }

            btn.disabled = true;
            btn.innerHTML = '<span class="spinner"></span> جاري التغيير...';

            try {
                const client = getSupabaseClient();
                if (!client) throw new Error('No connection');

                const hashedPassword = await hashPassword(newPass);

                const { error } = await client
                    .from('exam_users')
                    .update({
                        password_hash: hashedPassword,
                        force_password_change: false,
                        updated_at: new Date().toISOString()
                    })
                    .eq('id', user.id);

                if (error) throw error;

                document.getElementById('successMsg').textContent = '✅ تم تغيير كلمة المرور بنجاح! جاري التوجيه...';
                document.getElementById('successMsg').classList.add('visible');

                setTimeout(() => {
                    switch(user.role) {
                        case 'admin': window.location.href = 'admin/dashboard.html'; break;
                        case 'teacher': window.location.href = 'teacher/dashboard.html'; break;
                        case 'student': window.location.href = 'student/dashboard.html'; break;
                        default: window.location.href = 'index.html';
                    }
                }, 2000);

            } catch (error) {
                document.getElementById('errorMsg').textContent = '❌ خطأ: ' + error.message;
                document.getElementById('errorMsg').classList.add('visible');
            } finally {
                btn.disabled = false;
                btn.innerHTML = 'تغيير كلمة المرور';
            }

            return false;
        }
    </script>
</body>
</html>
