<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>استعادة كلمة المرور</title>
  <link rel="stylesheet" href="shared/styles.css">
  <style>
    .auth-container { min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 2rem; background: linear-gradient(135deg, #eef2ff, #f5f3ff); }
    .auth-box { background: white; padding: 2.5rem; border-radius: var(--radius-2xl); box-shadow: var(--shadow-xl); width: 100%; max-width: 440px; text-align: center; }
    .auth-box h1 { margin-bottom: 0.5rem; }
    .auth-box p { color: var(--gray-500); margin-bottom: 2rem; }
  </style>
</head>
<body>
  <div class="auth-container">
    <div class="auth-box">
      <div style="font-size: 3rem; margin-bottom: 1rem;">🔐</div>
      <h1>استعادة كلمة المرور</h1>
      <p>أدخل بريدك الإلكتروني وسنرسل لك رابط إعادة التعيين</p>
      <form onsubmit="event.preventDefault(); handleReset();">
        <div class="form-group" style="text-align: right;">
          <label class="form-label required">البريد الإلكتروني</label>
          <input type="email" class="form-input" id="reset-email" placeholder="example@school.com" data-validate="required|email">
        </div>
        <button type="submit" class="btn btn-primary btn-block btn-lg" style="margin-top: 1rem;">إرسال رابط الاستعادة</button>
      </form>
      <p style="margin-top: 1.5rem;"><a href="login.html">← العودة لتسجيل الدخول</a></p>
    </div>
  </div>
  <script src="shared/app.js"></script>
  <script>
    function handleReset() {
      const form = document.querySelector('form');
      if (!validateForm(form)) return;
      showToast('تم إرسال رابط الاستعادة إلى بريدك', 'success');
      setTimeout(() => window.location.href = 'login.html', 2000);
    }
  </script>
</body>
</html>
