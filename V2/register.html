<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إنشاء حساب — منصة الاختبارات</title>
    <link rel="stylesheet" href="shared/styles.css">
    <style>
        /* نفس أنماط login.html مع تعديلات بسيطة */
        .register-container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 20px;
        }
        
        .register-box {
            background: white;
            border-radius: 20px;
            padding: 40px;
            width: 100%;
            max-width: 500px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        
        .register-header {
            text-align: center;
            margin-bottom: 30px;
        }
        
        .register-header h1 {
            color: #333;
            font-size: 28px;
            margin-bottom: 10px;
        }
        
        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }
        
        @media (max-width: 480px) {
            .form-row {
                grid-template-columns: 1fr;
            }
        }
        
        /* ... بقية الأنماط مشابهة لـ login.html ... */
    </style>
</head>
<body>
    <div class="register-container">
        <div class="register-box">
            <div class="register-header">
                <h1>📚 إنشاء حساب جديد</h1>
                <p>انضم إلى منصة الاختبارات الذكية</p>
            </div>
            
            <div id="errorMsg" class="error-message" style="display:none; background:#fee; color:#c33; padding:12px; border-radius:8px; margin-bottom:20px;"></div>
            <div id="successMsg" class="success-message" style="display:none; background:#efe; color:#3c3; padding:12px; border-radius:8px; margin-bottom:20px;"></div>
            
            <form id="registerForm" onsubmit="return handleRegister(event)">
                <div class="form-row">
                    <div class="form-group">
                        <label for="fullName">الاسم الكامل *</label>
                        <input type="text" id="fullName" name="fullName" required 
                               placeholder="محمد أحمد">
                    </div>
                    <div class="form-group">
                        <label for="username">اسم المستخدم *</label>
                        <input type="text" id="username" name="username" required 
                               placeholder="mohamed123">
                    </div>
                </div>
                
                <div class="form-group">
                    <label for="email">البريد الإلكتروني *</label>
                    <input type="email" id="email" name="email" required 
                           placeholder="example@email.com">
                </div>
                
                <div class="form-row">
                    <div class="form-group">
                        <label for="phone">رقم الهاتف</label>
                        <input type="tel" id="phone" name="phone" 
                               placeholder="01012345678">
                    </div>
                    <div class="form-group">
                        <label for="role">نوع الحساب *</label>
                        <select id="role" name="role" required style="width:100%; padding:12px; border:2px solid #e0e0e0; border-radius:10px;">
                            <option value="student">طالب</option>
                            <option value="teacher">معلم</option>
                        </select>
                    </div>
                </div>
                
                <div class="form-row">
                    <div class="form-group">
                        <label for="password">كلمة المرور *</label>
                        <input type="password" id="password" name="password" required 
                               placeholder="8 أحرف على الأقل" minlength="8">
                    </div>
                    <div class="form-group">
                        <label for="confirmPassword">تأكيد كلمة المرور *</label>
                        <input type="password" id="confirmPassword" name="confirmPassword" required 
                               placeholder="أعد إدخال كلمة المرور">
                    </div>
                </div>
                
                <button type="submit" class="btn-login" id="registerBtn" style="background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; width: 100%; padding: 14px; border: none; border-radius: 10px; font-size: 18px; cursor: pointer;">
                    إنشاء الحساب
                </button>
            </form>
            
            <div class="login-footer" style="text-align:center; margin-top:20px;">
                <p>لديك حساب بالفعل؟ <a href="login.html" style="color:#667eea;">سجل الدخول</a></p>
            </div>
        </div>
    </div>

    <!-- ============================================ -->
    <!-- ترتيب تحميل الملفات مهم جداً! -->
    <!-- ============================================ -->
    
    <!-- 1. مكتبة Supabase (يجب أن تُحمّل أولاً) -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <!-- 2. supabase-client.js (يعتمد على مكتبة Supabase) -->
    <script src="shared/supabase-client.js"></script>
    
    <!-- 3. app.js (يعتمد على supabase-client.js) -->
    <script src="shared/app.js"></script>
    
    <!-- 4. كود صفحة التسجيل -->
    <script>
        async function handleRegister(event) {
            event.preventDefault();
            
            const fullName = document.getElementById('fullName').value.trim();
            const username = document.getElementById('username').value.trim();
            const email = document.getElementById('email').value.trim();
            const phone = document.getElementById('phone').value.trim();
            const role = document.getElementById('role').value;
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            
            const errorMsg = document.getElementById('errorMsg');
            const successMsg = document.getElementById('successMsg');
            const registerBtn = document.getElementById('registerBtn');
            
            errorMsg.style.display = 'none';
            successMsg.style.display = 'none';
            
            // التحقق من المدخلات
            if (!fullName || !username || !email || !password) {
                showError('يرجى ملء جميع الحقول المطلوبة');
                return false;
            }
            
            if (password !== confirmPassword) {
                showError('كلمتا المرور غير متطابقتين');
                return false;
            }
            
            if (password.length < 8) {
                showError('كلمة المرور يجب أن تكون 8 أحرف على الأقل');
                return false;
            }
            
            registerBtn.disabled = true;
            registerBtn.textContent = 'جاري إنشاء الحساب...';
            
            try {
                const client = getSupabaseClient();
                if (!client) {
                    throw new Error('Database connection failed');
                }
                
                // التحقق من عدم تكرار اسم المستخدم أو البريد
                const { data: existingUser } = await client
                    .from('exam_users')
                    .select('id')
                    .or(`username.eq.${username},email.eq.${email}`)
                    .single();
                
                if (existingUser) {
                    showError('اسم المستخدم أو البريد الإلكتروني مستخدم بالفعل');
                    return false;
                }
                
                // تشفير كلمة المرور
                const hashedPassword = await hashPassword(password);
                
                // إنشاء المستخدم
                const { data: newUser, error: insertError } = await client
                    .from('exam_users')
                    .insert({
                        name: fullName,
                        username: username,
                        email: email,
                        phone: phone || null,
                        password_hash: hashedPassword,
                        role: role,
                        status: 'active'
                    })
                    .select()
                    .single();
                
                if (insertError) {
                    throw new Error(insertError.message);
                }
                
                showSuccess('✅ تم إنشاء الحساب بنجاح! جاري التوجيه...');
                
                setTimeout(() => {
                    window.location.href = 'login.html';
                }, 2000);
                
            } catch (error) {
                console.error('Registration error:', error);
                showError('❌ خطأ: ' + error.message);
            } finally {
                registerBtn.disabled = false;
                registerBtn.textContent = 'إنشاء الحساب';
            }
            
            return false;
        }
        
        function showError(message) {
            const errorMsg = document.getElementById('errorMsg');
            errorMsg.textContent = message;
            errorMsg.style.display = 'block';
        }
        
        function showSuccess(message) {
            const successMsg = document.getElementById('successMsg');
            successMsg.textContent = message;
            successMsg.style.display = 'block';
        }
    </script>
</body>
</html>
