<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إنشاء حساب جديد — منصة الاختبارات الذكية</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Tajawal', sans-serif;
            background: #f0f4f8;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* ========== Animated Background ========== */
        .bg-animation {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            overflow: hidden;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
        }

        .bg-animation .shape {
            position: absolute;
            filter: blur(60px);
            opacity: 0.4;
            animation: float 20s infinite ease-in-out;
        }

        .shape-1 {
            width: 400px;
            height: 400px;
            background: linear-gradient(45deg, #e94560, #ff6b6b);
            border-radius: 50%;
            top: -100px;
            right: -100px;
            animation-delay: 0s;
        }

        .shape-2 {
            width: 300px;
            height: 300px;
            background: linear-gradient(45deg, #533483, #7b2cbf);
            border-radius: 50%;
            bottom: -50px;
            left: -50px;
            animation-delay: -5s;
        }

        .shape-3 {
            width: 200px;
            height: 200px;
            background: linear-gradient(45deg, #0f3460, #16c79a);
            border-radius: 50%;
            top: 50%;
            left: 50%;
            animation-delay: -10s;
        }

        @keyframes float {
            0%, 100% { transform: translate(0, 0) scale(1); }
            25% { transform: translate(30px, -30px) scale(1.1); }
            50% { transform: translate(-20px, 20px) scale(0.9); }
            75% { transform: translate(20px, 10px) scale(1.05); }
        }

        /* ========== Floating Particles ========== */
        .particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            pointer-events: none;
        }

        .particle {
            position: absolute;
            width: 4px;
            height: 4px;
            background: rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            animation: particle-float 15s infinite linear;
        }

        @keyframes particle-float {
            0% { transform: translateY(100vh) rotate(0deg); opacity: 0; }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% { transform: translateY(-100vh) rotate(720deg); opacity: 0; }
        }

        /* ========== Main Container ========== */
        .main-container {
            position: relative;
            z-index: 2;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
        }

        /* ========== Register Card ========== */
        .register-card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(20px);
            border-radius: 24px;
            box-shadow: 0 25px 80px rgba(0, 0, 0, 0.3), 
                        0 0 0 1px rgba(255, 255, 255, 0.1);
            width: 100%;
            max-width: 520px;
            overflow: hidden;
            position: relative;
            animation: card-appear 0.8s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        @keyframes card-appear {
            0% { opacity: 0; transform: translateY(60px) scale(0.9); }
            100% { opacity: 1; transform: translateY(0) scale(1); }
        }

        /* ========== Header ========== */
        .card-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 50%, #f093fb 100%);
            padding: 40px 30px 60px;
            text-align: center;
            position: relative;
            overflow: hidden;
        }

        .card-header::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(255,255,255,0.1) 1px, transparent 1px);
            background-size: 20px 20px;
            animation: grid-move 20s linear infinite;
        }

        @keyframes grid-move {
            0% { transform: translate(0, 0); }
            100% { transform: translate(20px, 20px); }
        }

        .logo-icon {
            width: 70px;
            height: 70px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px;
            font-size: 32px;
            backdrop-filter: blur(10px);
            border: 2px solid rgba(255, 255, 255, 0.3);
            animation: logo-bounce 2s ease-in-out infinite;
        }

        @keyframes logo-bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        .card-header h1 {
            color: white;
            font-size: 28px;
            font-weight: 800;
            margin-bottom: 8px;
            position: relative;
            z-index: 1;
        }

        .card-header p {
            color: rgba(255, 255, 255, 0.85);
            font-size: 15px;
            position: relative;
            z-index: 1;
        }

        /* ========== Form Body ========== */
        .card-body {
            padding: 30px 35px 35px;
            position: relative;
        }

        .card-body::before {
            content: '';
            position: absolute;
            top: -30px;
            left: 0;
            right: 0;
            height: 60px;
            background: rgba(255, 255, 255, 0.95);
            border-radius: 30px 30px 0 0;
        }

        /* ========== Progress Steps ========== */
        .steps-container {
            display: flex;
            justify-content: center;
            gap: 40px;
            margin-bottom: 30px;
            position: relative;
            z-index: 1;
        }

        .step {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
        }

        .step-circle {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: #e8e8e8;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            color: #999;
            transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
            border: 3px solid transparent;
        }

        .step.active .step-circle {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
            transform: scale(1.1);
        }

        .step.completed .step-circle {
            background: #16c79a;
            color: white;
        }

        .step-label {
            font-size: 12px;
            color: #999;
            font-weight: 500;
        }

        .step.active .step-label {
            color: #667eea;
            font-weight: 700;
        }

        .step-line {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            width: 60%;
            height: 3px;
            background: #e8e8e8;
            z-index: -1;
        }

        /* ========== Form Groups ========== */
        .form-group {
            margin-bottom: 22px;
            position: relative;
            z-index: 1;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 600;
            font-size: 14px;
            transition: color 0.3s;
        }

        .form-group:focus-within label {
            color: #667eea;
        }

        .input-wrapper {
            position: relative;
        }

        .input-wrapper i {
            position: absolute;
            right: 16px;
            top: 50%;
            transform: translateY(-50%);
            color: #aaa;
            font-size: 16px;
            transition: all 0.3s;
        }

        .input-wrapper input:focus + i,
        .input-wrapper input:not(:placeholder-shown) + i {
            color: #667eea;
        }

        .input-wrapper input,
        .input-wrapper select {
            width: 100%;
            padding: 14px 45px 14px 16px;
            border: 2px solid #e8e8e8;
            border-radius: 14px;
            font-size: 15px;
            font-family: 'Tajawal', sans-serif;
            transition: all 0.3s;
            background: #fafafa;
            color: #333;
        }

        .input-wrapper input:focus,
        .input-wrapper select:focus {
            outline: none;
            border-color: #667eea;
            background: white;
            box-shadow: 0 0 0 4px rgba(102, 126, 234, 0.1);
        }

        .input-wrapper input::placeholder {
            color: #bbb;
        }

        .input-wrapper .toggle-password {
            position: absolute;
            left: 16px;
            top: 50%;
            transform: translateY(-50%);
            color: #aaa;
            cursor: pointer;
            font-size: 16px;
            transition: color 0.3s;
        }

        .input-wrapper .toggle-password:hover {
            color: #667eea;
        }

        /* ========== Password Strength ========== */
        .password-strength {
            margin-top: 8px;
            display: none;
        }

        .password-strength.visible {
            display: block;
        }

        .strength-bar {
            height: 4px;
            background: #e8e8e8;
            border-radius: 2px;
            overflow: hidden;
        }

        .strength-fill {
            height: 100%;
            width: 0%;
            border-radius: 2px;
            transition: all 0.4s;
        }

        .strength-text {
            font-size: 12px;
            margin-top: 5px;
            font-weight: 500;
        }

        .strength-weak { background: #e74c3c; }
        .strength-medium { background: #f39c12; }
        .strength-strong { background: #16c79a; }

        /* ========== Role Selection ========== */
        .role-selection {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-bottom: 22px;
        }

        .role-option {
            position: relative;
            cursor: pointer;
        }

        .role-option input {
            position: absolute;
            opacity: 0;
        }

        .role-card {
            padding: 20px 15px;
            border: 2px solid #e8e8e8;
            border-radius: 14px;
            text-align: center;
            transition: all 0.3s;
            background: #fafafa;
        }

        .role-option input:checked + .role-card {
            border-color: #667eea;
            background: linear-gradient(135deg, rgba(102,126,234,0.1), rgba(118,75,162,0.1));
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.15);
        }

        .role-icon {
            font-size: 32px;
            margin-bottom: 8px;
        }

        .role-title {
            font-weight: 700;
            color: #333;
            font-size: 15px;
        }

        .role-desc {
            font-size: 12px;
            color: #888;
            margin-top: 4px;
        }

        /* ========== Terms Checkbox ========== */
        .terms-group {
            display: flex;
            align-items: flex-start;
            gap: 10px;
            margin-bottom: 25px;
            z-index: 1;
            position: relative;
        }

        .terms-group input[type="checkbox"] {
            width: 20px;
            height: 20px;
            margin-top: 2px;
            accent-color: #667eea;
            cursor: pointer;
        }

        .terms-group label {
            font-size: 13px;
            color: #666;
            line-height: 1.6;
            cursor: pointer;
        }

        .terms-group a {
            color: #667eea;
            text-decoration: none;
            font-weight: 600;
        }

        /* ========== Submit Button ========== */
        .btn-submit {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 14px;
            font-size: 17px;
            font-weight: 700;
            font-family: 'Tajawal', sans-serif;
            cursor: pointer;
            transition: all 0.3s;
            position: relative;
            overflow: hidden;
            z-index: 1;
        }

        .btn-submit::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
            transition: left 0.5s;
        }

        .btn-submit:hover::before {
            left: 100%;
        }

        .btn-submit:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(102, 126, 234, 0.4);
        }

        .btn-submit:disabled {
            opacity: 0.7;
            cursor: not-allowed;
            transform: none;
        }

        .btn-submit .spinner {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255,255,255,0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-left: 10px;
            vertical-align: middle;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* ========== Messages ========== */
        .message {
            padding: 14px 18px;
            border-radius: 12px;
            margin-bottom: 20px;
            font-size: 14px;
            font-weight: 500;
            display: none;
            align-items: center;
            gap: 10px;
            animation: message-slide 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        @keyframes message-slide {
            0% { opacity: 0; transform: translateY(-10px); }
            100% { opacity: 1; transform: translateY(0); }
        }

        .message.error {
            background: #fee;
            color: #c0392b;
            border-right: 4px solid #e74c3c;
        }

        .message.success {
            background: #efe;
            color: #27ae60;
            border-right: 4px solid #2ecc71;
        }

        .message.visible {
            display: flex;
        }

        /* ========== Footer ========== */
        .card-footer {
            text-align: center;
            padding: 20px 35px 30px;
            border-top: 1px solid #f0f0f0;
            position: relative;
            z-index: 1;
        }

        .card-footer p {
            color: #888;
            font-size: 14px;
        }

        .card-footer a {
            color: #667eea;
            text-decoration: none;
            font-weight: 700;
            transition: all 0.3s;
        }

        .card-footer a:hover {
            color: #764ba2;
        }

        /* ========== Social Login ========== */
        .social-login {
            margin-top: 20px;
        }

        .social-divider {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 20px;
            color: #aaa;
            font-size: 13px;
        }

        .social-divider::before,
        .social-divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: #e8e8e8;
        }

        .social-buttons {
            display: flex;
            gap: 12px;
            justify-content: center;
        }

        .social-btn {
            width: 50px;
            height: 50px;
            border-radius: 14px;
            border: 2px solid #e8e8e8;
            background: white;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s;
            font-size: 20px;
        }

        .social-btn:hover {
            border-color: #667eea;
            transform: translateY(-3px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }

        /* ========== Responsive ========== */
        @media (max-width: 480px) {
            .register-card {
                border-radius: 0;
                min-height: 100vh;
            }

            .card-header {
                padding: 30px 20px 50px;
            }

            .card-body {
                padding: 25px 20px 30px;
            }

            .role-selection {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <!-- Background Animation -->
    <div class="bg-animation">
        <div class="shape shape-1"></div>
        <div class="shape shape-2"></div>
        <div class="shape shape-3"></div>
    </div>

    <!-- Floating Particles -->
    <div class="particles" id="particles"></div>

    <!-- Main Container -->
    <div class="main-container">
        <div class="register-card">
            <!-- Header -->
            <div class="card-header">
                <div class="logo-icon">🎓</div>
                <h1>إنشاء حساب جديد</h1>
                <p>انضم إلى منصة الاختبارات الذكية وابدأ رحلتك التعليمية</p>
            </div>

            <!-- Body -->
            <div class="card-body">
                <!-- Progress Steps -->
                <div class="steps-container">
                    <div class="step active" id="step1">
                        <div class="step-circle">1</div>
                        <span class="step-label">البيانات</span>
                    </div>
                    <div class="step" id="step2">
                        <div class="step-circle">2</div>
                        <span class="step-label">الدور</span>
                    </div>
                    <div class="step" id="step3">
                        <div class="step-circle">3</div>
                        <span class="step-label">الأمان</span>
                    </div>
                </div>

                <!-- Messages -->
                <div id="errorMsg" class="message error">
                    <i class="fas fa-exclamation-circle"></i>
                    <span></span>
                </div>
                <div id="successMsg" class="message success">
                    <i class="fas fa-check-circle"></i>
                    <span></span>
                </div>

                <!-- Form -->
                <form id="registerForm" onsubmit="return handleRegister(event)">
                    <!-- Personal Info -->
                    <div class="form-group">
                        <label for="fullName">الاسم الكامل <span style="color:#e74c3c">*</span></label>
                        <div class="input-wrapper">
                            <input type="text" id="fullName" name="fullName" required 
                                   placeholder="محمد أحمد علي" autocomplete="name">
                            <i class="fas fa-user"></i>
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="username">اسم المستخدم <span style="color:#e74c3c">*</span></label>
                        <div class="input-wrapper">
                            <input type="text" id="username" name="username" required 
                                   placeholder="mohamed_ahmed" autocomplete="username">
                            <i class="fas fa-at"></i>
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="email">البريد الإلكتروني <span style="color:#e74c3c">*</span></label>
                        <div class="input-wrapper">
                            <input type="email" id="email" name="email" required 
                                   placeholder="mohamed@email.com" autocomplete="email">
                            <i class="fas fa-envelope"></i>
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="phone">رقم الهاتف</label>
                        <div class="input-wrapper">
                            <input type="tel" id="phone" name="phone" 
                                   placeholder="01xxxxxxxxx" autocomplete="tel">
                            <i class="fas fa-phone"></i>
                        </div>
                    </div>

                    <!-- Role Selection -->
                    <label style="display:block; margin-bottom:12px; color:#333; font-weight:600; font-size:14px;">
                        نوع الحساب <span style="color:#e74c3c">*</span>
                    </label>
                    <div class="role-selection">
                        <label class="role-option">
                            <input type="radio" name="role" value="student" checked>
                            <div class="role-card">
                                <div class="role-icon">👨‍🎓</div>
                                <div class="role-title">طالب</div>
                                <div class="role-desc">أدخل الاختبارات</div>
                            </div>
                        </label>
                        <label class="role-option">
                            <input type="radio" name="role" value="teacher">
                            <div class="role-card">
                                <div class="role-icon">👨‍🏫</div>
                                <div class="role-title">معلم</div>
                                <div class="role-desc">أنشئ اختبارات</div>
                            </div>
                        </label>
                    </div>

                    <!-- Password -->
                    <div class="form-group">
                        <label for="password">كلمة المرور <span style="color:#e74c3c">*</span></label>
                        <div class="input-wrapper">
                            <input type="password" id="password" name="password" required 
                                   placeholder="8 أحرف على الأقل" minlength="8" 
                                   oninput="checkPasswordStrength(this.value)">
                            <i class="fas fa-lock"></i>
                            <i class="fas fa-eye toggle-password" onclick="togglePassword('password')"></i>
                        </div>
                        <div class="password-strength" id="passwordStrength">
                            <div class="strength-bar">
                                <div class="strength-fill" id="strengthFill"></div>
                            </div>
                            <div class="strength-text" id="strengthText"></div>
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="confirmPassword">تأكيد كلمة المرور <span style="color:#e74c3c">*</span></label>
                        <div class="input-wrapper">
                            <input type="password" id="confirmPassword" name="confirmPassword" required 
                                   placeholder="أعد إدخال كلمة المرور">
                            <i class="fas fa-lock"></i>
                            <i class="fas fa-eye toggle-password" onclick="togglePassword('confirmPassword')"></i>
                        </div>
                    </div>

                    <!-- Terms -->
                    <div class="terms-group">
                        <input type="checkbox" id="terms" name="terms" required>
                        <label for="terms">
                            أوافق على <a href="#">شروط الاستخدام</a> و <a href="#">سياسة الخصوصية</a>
                        </label>
                    </div>

                    <!-- Submit -->
                    <button type="submit" class="btn-submit" id="registerBtn">
                        إنشاء الحساب
                    </button>
                </form>

                <!-- Social Login -->
                <div class="social-login">
                    <div class="social-divider">أو سجل باستخدام</div>
                    <div class="social-buttons">
                        <button class="social-btn" title="Google">
                            <i class="fab fa-google" style="color:#DB4437;"></i>
                        </button>
                        <button class="social-btn" title="Facebook">
                            <i class="fab fa-facebook-f" style="color:#4267B2;"></i>
                        </button>
                        <button class="social-btn" title="Twitter">
                            <i class="fab fa-twitter" style="color:#1DA1F2;"></i>
                        </button>
                    </div>
                </div>
            </div>

            <!-- Footer -->
            <div class="card-footer">
                <p>لديك حساب بالفعل؟ <a href="login.html">سجل الدخول الآن</a></p>
            </div>
        </div>
    </div>

    <!-- ============================================ -->
    <!-- Scripts -->
    <!-- ============================================ -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="shared/supabase-client.js"></script>
    <script src="shared/app.js"></script>

    <script>
        // ========== Particles ==========
        function createParticles() {
            const container = document.getElementById('particles');
            for (let i = 0; i < 30; i++) {
                const particle = document.createElement('div');
                particle.className = 'particle';
                particle.style.left = Math.random() * 100 + '%';
                particle.style.animationDelay = Math.random() * 15 + 's';
                particle.style.animationDuration = (10 + Math.random() * 10) + 's';
                container.appendChild(particle);
            }
        }
        createParticles();

        // ========== Toggle Password ==========
        function togglePassword(fieldId) {
            const field = document.getElementById(fieldId);
            field.type = field.type === 'password' ? 'text' : 'password';
        }

        // ========== Password Strength ==========
        function checkPasswordStrength(password) {
            const strengthDiv = document.getElementById('passwordStrength');
            const fill = document.getElementById('strengthFill');
            const text = document.getElementById('strengthText');

            if (!password) {
                strengthDiv.classList.remove('visible');
                return;
            }

            strengthDiv.classList.add('visible');

            let score = 0;
            if (password.length >= 8) score++;
            if (/[A-Z]/.test(password)) score++;
            if (/[a-z]/.test(password)) score++;
            if (/[0-9]/.test(password)) score++;
            if (/[^A-Za-z0-9]/.test(password)) score++;

            const percentage = (score / 5) * 100;
            fill.style.width = percentage + '%';

            fill.className = 'strength-fill';
            if (score <= 2) {
                fill.classList.add('strength-weak');
                text.textContent = 'ضعيفة - أضف أرقام ورموز';
                text.style.color = '#e74c3c';
            } else if (score <= 3) {
                fill.classList.add('strength-medium');
                text.textContent = 'متوسطة - يمكن تحسينها';
                text.style.color = '#f39c12';
            } else {
                fill.classList.add('strength-strong');
                text.textContent = 'قوية - ممتاز!';
                text.style.color = '#16c79a';
            }
        }

        // ========== Show Messages ==========
        function showError(message) {
            const msg = document.getElementById('errorMsg');
            msg.querySelector('span').textContent = message;
            msg.classList.add('visible');
            document.getElementById('successMsg').classList.remove('visible');
        }

        function showSuccess(message) {
            const msg = document.getElementById('successMsg');
            msg.querySelector('span').textContent = message;
            msg.classList.add('visible');
            document.getElementById('errorMsg').classList.remove('visible');
        }

        function hideMessages() {
            document.getElementById('errorMsg').classList.remove('visible');
            document.getElementById('successMsg').classList.remove('visible');
        }

        // ========== Hash Password (SHA-256) ==========
        async function hashPassword(password) {
            const encoder = new TextEncoder();
            const data = encoder.encode(password);
            const hashBuffer = await crypto.subtle.digest('SHA-256', data);
            const hashArray = Array.from(new Uint8Array(hashBuffer));
            return hashArray.map(b => b.toString(16).padStart(2, '0')).join('');
        }

        // ========== Handle Register ==========
        async function handleRegister(event) {
            event.preventDefault();
            hideMessages();

            const fullName = document.getElementById('fullName').value.trim();
            const username = document.getElementById('username').value.trim();
            const email = document.getElementById('email').value.trim();
            const phone = document.getElementById('phone').value.trim();
            const role = document.querySelector('input[name="role"]:checked').value;
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            const terms = document.getElementById('terms').checked;

            const btn = document.getElementById('registerBtn');

            // Validation
            if (!fullName || !username || !email || !password) {
                showError('يرجى ملء جميع الحقول المطلوبة');
                return false;
            }

            if (password !== confirmPassword) {
                showError('كلمتا المرور غير متطابقتين');
                return false;
            }

            if (password.length < 8) {
                showError('كلمة المرور يجب أن تكون 8 أحرف على الأقل');
                return false;
            }

            if (!terms) {
                showError('يجب الموافقة على شروط الاستخدام');
                return false;
            }

            // Loading state
            btn.disabled = true;
            btn.innerHTML = '<span class="spinner"></span> جاري إنشاء الحساب...';

            try {
                const client = getSupabaseClient();
                if (!client) {
                    throw new Error('فشل الاتصال بقاعدة البيانات');
                }

                // Check existing user
                const { data: existing, error: checkError } = await client
                    .from('exam_users')
                    .select('id')
                    .or(`username.eq.${username},email.eq.${email}`)
                    .limit(1);

                if (checkError) throw checkError;

                if (existing && existing.length > 0) {
                    showError('اسم المستخدم أو البريد الإلكتروني مستخدم بالفعل');
                    return false;
                }

                // Hash password
                const hashedPassword = await hashPassword(password);

                // Insert user
                const { data: newUser, error: insertError } = await client
                    .from('exam_users')
                    .insert({
                        name: fullName,
                        username: username,
                        email: email,
                        phone: phone || null,
                        password_hash: hashedPassword,
                        role: role,
                        status: 'active',
                        created_at: new Date().toISOString()
                    })
                    .select()
                    .single();

                if (insertError) throw insertError;

                showSuccess('✅ تم إنشاء الحساب بنجاح! جاري التوجيه...');

                setTimeout(() => {
                    window.location.href = 'login.html';
                }, 2000);

            } catch (error) {
                console.error('Registration error:', error);
                showError('❌ خطأ: ' + (error.message || 'حدث خطأ غير متوقع'));
            } finally {
                btn.disabled = false;
                btn.innerHTML = 'إنشاء الحساب';
            }

            return false;
        }
    </script>
</body>
