<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مجموعاتي - منصة الاختبارات</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <style>
        .tabs {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin-bottom: 20px;
            border-bottom: 2px solid #e2e8f0;
            padding-bottom: 5px;
        }
        .tab-btn {
            background: transparent;
            border: none;
            padding: 10px 28px;
            border-radius: 30px;
            cursor: pointer;
            font-weight: 600;
            color: #64748b;
            transition: all 0.2s;
        }
        .tab-btn.active {
            background: linear-gradient(135deg, #6366f1, #8b5cf6);
            color: white;
        }
        
        .filter-row {
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            align-items: flex-end;
            margin-bottom: 20px;
        }
        .filter-group {
            flex: 1;
            min-width: 160px;
        }
        .filter-group label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            color: #64748b;
            margin-bottom: 5px;
        }
        .filter-group select, .filter-group input {
            width: 100%;
            padding: 10px 14px;
            border: 1px solid #e2e8f0;
            border-radius: 12px;
            font-family: inherit;
            font-size: 14px;
            background: white;
        }
        
        .group-card {
            background: #f8fafc;
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 15px;
            border: 1px solid #e2e8f0;
            transition: all 0.2s;
        }
        .group-card:hover {
            transform: translateX(-5px);
            border-right: 4px solid #6366f1;
            background: white;
        }
        
        .requests-table {
            width: 100%;
            border-collapse: collapse;
        }
        .requests-table th, .requests-table td {
            padding: 12px;
            text-align: right;
            border-bottom: 1px solid #e2e8f0;
        }
        .requests-table th {
            background: #f8fafc;
            font-weight: 700;
        }
        .requests-table tr:hover {
            background: #f1f5f9;
        }
        
        .badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 4px 12px;
            border-radius: 40px;
            font-size: 12px;
            font-weight: 600;
        }
        .badge-success { background: #d1fae5; color: #065f46; }
        .badge-warning { background: #fef3c7; color: #d97706; }
        .badge-danger { background: #fee2e2; color: #991b1b; }
        .badge-info { background: #dbeafe; color: #1e40af; }
        
        .pending-count {
            background: #ef4444;
            color: white;
            border-radius: 30px;
            padding: 2px 10px;
            font-size: 12px;
            margin-right: 8px;
        }
        
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(5px);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
        .modal-content {
            background: white;
            border-radius: 32px;
            padding: 32px;
            width: 550px;
            max-width: 90%;
            max-height: 85vh;
            overflow-y: auto;
        }
        .modal-content input, .modal-content select, .modal-content textarea {
            width: 100%;
            padding: 12px 16px;
            margin: 10px 0;
            border: 1px solid #e2e8f0;
            border-radius: 16px;
            font-family: inherit;
        }
        
        .pagination {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-top: 20px;
            flex-wrap: wrap;
        }
        .page-btn {
            padding: 6px 12px;
            border: 1px solid #e2e8f0;
            background: white;
            border-radius: 8px;
            cursor: pointer;
        }
        .page-btn.active {
            background: linear-gradient(135deg, #6366f1, #8b5cf6);
            color: white;
            border-color: transparent;
        }
        .loading-skeleton {
            background: linear-gradient(90deg, #e2e8f0 25%, #f1f5f9 50%, #e2e8f0 75%);
            background-size: 200% 100%;
            animation: loading 1.5s infinite;
            border-radius: 12px;
            height: 80px;
            margin-bottom: 15px;
        }
        @keyframes loading {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }
        
        @media (max-width: 768px) {
            .filter-row { flex-direction: column; align-items: stretch; }
            .tabs { justify-content: center; }
            .tab-btn { padding: 6px 16px; font-size: 12px; }
            .requests-table th, .requests-table td { padding: 8px; font-size: 12px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="top-bar">
            <div class="logo">📚 منصة الاختبارات</div>
            <div class="user-info">
                <span class="user-name">👋 مرحباً <span id="teacherName"></span></span>
                <button class="btn btn-outline btn-sm" onclick="window.location.href='teacher-dashboard.html'">🏠 الرئيسية</button>
                <button class="btn btn-outline btn-sm" onclick="window.location.href='questions-bank.html'">📚 بنك الأسئلة</button>
                <button class="btn btn-danger btn-sm" onclick="logout()">🚪 خروج</button>
            </div>
        </div>

        <div class="card header">
            <h1>👥 مجموعاتي</h1>
            <p>إدارة المجموعات الدراسية الخاصة بك وطلبات الانضمام</p>
        </div>

        <!-- التبويبات -->
        <div class="tabs">
            <button class="tab-btn active" onclick="showTab('groups')">📚 مجموعاتي</button>
            <button class="tab-btn" onclick="showTab('requests')">📋 طلبات الانتظار <span id="pendingBadge" class="pending-count" style="display: none;">0</span></button>
        </div>

        <!-- تبويب مجموعاتي -->
        <div id="groupsTab">
            <div class="card">
                <div class="filter-row">
                    <div class="filter-group">
                        <label>🔍 بحث</label>
                        <input type="text" id="searchInput" placeholder="بحث باسم المجموعة...">
                    </div>
                    <div>
                        <button class="btn btn-primary" onclick="openCreateGroupModal()">➕ إنشاء مجموعة</button>
                        <button class="btn btn-outline" onclick="loadGroups()">🔄 تحديث</button>
                    </div>
                </div>
                <div id="loadingIndicator" class="loading-skeleton" style="display: none;"></div>
                <div id="groupsList"></div>
                <div id="groupsPagination" class="pagination"></div>
            </div>
        </div>

        <!-- تبويب طلبات الانتظار -->
        <div id="requestsTab" style="display: none;">
            <div class="card">
                <div class="filter-row">
                    <div class="filter-group">
                        <label>🔍 بحث</label>
                        <input type="text" id="requestSearch" placeholder="بحث باسم الطالب أو رقم الهاتف...">
                    </div>
                    <div class="filter-group">
                        <label>👥 المجموعة</label>
                        <select id="filterGroup" onchange="loadPendingRequests()">
                            <option value="all">كل المجموعات</option>
                        </select>
                    </div>
                    <div>
                        <button class="btn btn-outline" onclick="loadPendingRequests()">🔄 تحديث</button>
                    </div>
                </div>
                
                <div style="overflow-x: auto;">
                    <table class="requests-table">
                        <thead>
                            <tr>
                                <th>#</th>
                                <th>👨‍🎓 الطالب</th>
                                <th>📞 رقم الهاتف</th>
                                <th>👥 المجموعة</th>
                                <th>📅 تاريخ الطلب</th>
                                <th>⚡ الإجراءات</th>
                            </tr>
                        </thead>
                        <tbody id="pendingRequestsTable"></tbody>
                    寸able
                </div>
                <div id="requestsPagination" class="pagination"></div>
            </div>
        </div>
    </div>

    <!-- مودال إنشاء/تعديل مجموعة -->
    <div id="groupModal" class="modal">
        <div class="modal-content">
            <h3 id="modalTitle">➕ إنشاء مجموعة جديدة</h3>
            <div class="form-group">
                <label>📌 اسم المجموعة *</label>
                <input type="text" id="groupName" placeholder="مثال: مجموعة الرياضيات - المستوى المتقدم">
            </div>
            <div class="form-group">
                <label>📝 وصف المجموعة</label>
                <textarea id="groupDesc" rows="3" placeholder="وصف المجموعة (اختياري)"></textarea>
            </div>
            <div class="form-group">
                <label>🎓 الصف</label>
                <select id="groupClassId">
                    <option value="">-- اختر الصف --</option>
                </select>
            </div>
            <div class="form-group">
                <label>📖 المادة</label>
                <select id="groupSubjectId">
                    <option value="">-- اختر المادة --</option>
                </select>
            </div>
            <div class="form-group">
                <label>👥 الحد الأقصى للطلاب</label>
                <input type="number" id="groupMaxCapacity" placeholder="اختياري - اتركه فارغاً لعدم وجود حد">
            </div>
            <div class="form-group">
                <label style="display: flex; align-items: center; gap: 10px;">
                    <input type="checkbox" id="groupIsOpen" checked> 
                    <span>🔓 مفتوح للانضمام (بدون موافقة المعلم)</span>
                </label>
            </div>
            <div style="display: flex; gap: 12px; margin-top: 20px;">
                <button class="btn btn-primary" onclick="saveGroup()">💾 حفظ</button>
                <button class="btn btn-outline" onclick="closeGroupModal()">إلغاء</button>
            </div>
        </div>
    </div>

    <script src="js/supabase-config.js"></script>
    <script>
        // ==================== التحقق من صلاحية الدخول ====================
        const currentUser = getUser();
        if (!currentUser || (currentUser.role !== 'teacher' && currentUser.role !== 'admin')) {
            window.location.href = 'index.html';
        }
        document.getElementById('teacherName').innerHTML = currentUser.name || currentUser.username || 'معلم';
        
        // ==================== المتغيرات العامة ====================
        let currentGroupId = null;
        let allRequests = [];
        let groupsList = [];
        
        // Pagination variables
        let myGroupsList = [];
        let groupsPage = 1;
        let requestsList = [];
        let requestsPage = 1;
        let itemsPerPage = 10;
        
        // ==================== التبويبات ====================
        function showTab(tabName) {
            document.getElementById('groupsTab').style.display = tabName === 'groups' ? 'block' : 'none';
            document.getElementById('requestsTab').style.display = tabName === 'requests' ? 'block' : 'none';
            
            const tabs = document.querySelectorAll('.tabs .tab-btn');
            tabs.forEach(btn => btn.classList.remove('active'));
            if (tabName === 'groups') tabs[0].classList.add('active');
            else tabs[1].classList.add('active');
            
            if (tabName === 'requests') {
                loadPendingRequests();
            } else {
                loadGroups();
            }
        }
        
        // ==================== تحميل المجموعات ====================
        async function loadGroups() {
            const loadingIndicator = document.getElementById('loadingIndicator');
            loadingIndicator.style.display = 'block';
            
            try {
                const search = document.getElementById('searchInput').value;
                
                let query = sb.from('groups').select('*, classes:class_id(id, name), subjects:subject_id(id, name)').eq('teacher_id', currentUser.id);
                
                const { data: groups, error } = await query.order('created_at', { ascending: false });
                
                if (error) throw error;
                
                let filtered = groups || [];
                
                if (search) {
                    filtered = filtered.filter(g => g.name && g.name.toLowerCase().includes(search.toLowerCase()));
                }
                
                // جلب عدد الأعضاء لكل مجموعة
                for (const g of filtered) {
                    const { count } = await sb
                        .from('group_members')
                        .select('*', { count: 'exact', head: true })
                        .eq('group_id', g.id)
                        .eq('status', 'approved');
                    g.member_count = count || 0;
                }
                
                myGroupsList = filtered;
                
                const totalPages = Math.ceil(myGroupsList.length / itemsPerPage);
                const startIndex = (groupsPage - 1) * itemsPerPage;
                const paginatedGroups = myGroupsList.slice(startIndex, startIndex + itemsPerPage);
                
                renderGroupsList(paginatedGroups);
                renderPagination('groupsPagination', totalPages, groupsPage, (page) => goToGroupsPage(page));
                
            } catch (error) {
                console.error('Error loading groups:', error);
                document.getElementById('groupsList').innerHTML = '<div class="empty-state">حدث خطأ في تحميل المجموعات</div>';
            } finally {
                loadingIndicator.style.display = 'none';
            }
        }
        
        function renderGroupsList(groups) {
            const container = document.getElementById('groupsList');
            
            if (!groups || groups.length === 0) {
                container.innerHTML = '<div class="empty-state">📭 لا توجد مجموعات<br><button class="btn btn-primary" style="margin-top: 15px;" onclick="openCreateGroupModal()">➕ إنشاء أول مجموعة</button></div>';
                return;
            }
            
            container.innerHTML = '';
            for (const g of groups) {
                const className = g.classes ? g.classes.name : '-';
                const subjectName = g.subjects ? g.subjects.name : '-';
                const memberText = (g.member_count || 0) + (g.max_capacity ? '/' + g.max_capacity : '');
                
                const card = document.createElement('div');
                card.className = 'group-card';
                card.innerHTML = `
                    <div style="display: flex; justify-content: space-between; align-items: flex-start; flex-wrap: wrap; gap: 15px;">
                        <div style="flex: 1;">
                            <h3>📌 ${escapeHtml(g.name)}</h3>
                            <p style="color: #64748b; margin: 8px 0;">${escapeHtml(g.description || 'لا يوجد وصف')}</p>
                            <div class="exam-info">
                                <span>🎓 ${escapeHtml(className)}</span>
                                <span>📖 ${escapeHtml(subjectName)}</span>
                                <span>👥 ${memberText} طالب</span>
                                <span class="badge ${g.is_open ? 'badge-success' : 'badge-danger'}">${g.is_open ? 'مفتوح' : 'مغلق'}</span>
                            </div>
                        </div>
                        <div class="action-buttons">
                            <button class="btn btn-warning btn-sm" onclick="editGroup(${g.id})">✏️ تعديل</button>
                            <button class="btn btn-danger btn-sm" onclick="deleteGroupConfirm(${g.id})">🗑️ حذف</button>
                        </div>
                    </div>
                `;
                container.appendChild(card);
            }
        }
        
        function goToGroupsPage(page) {
            groupsPage = page;
            loadGroups();
        }
        
        // ==================== تحميل طلبات الانتظار ====================
        async function loadPendingRequests() {
            try {
                const search = document.getElementById('requestSearch').value;
                const groupId = document.getElementById('filterGroup').value;
                
                // جلب جميع طلبات الانتظار لمجموعات المعلم
                let query = sb
                    .from('group_members')
                    .select('*, users:student_id(id, name, phone), groups:group_id(id, name)')
                    .eq('status', 'pending');
                
                // جلب مجموعات المعلم أولاً
                const { data: teacherGroups } = await sb
                    .from('groups')
                    .select('id')
                    .eq('teacher_id', currentUser.id);
                
                const teacherGroupIds = (teacherGroups || []).map(g => g.id);
                
                if (teacherGroupIds.length === 0) {
                    document.getElementById('pendingRequestsTable').innerHTML = '<tr><td colspan="6" class="empty-state">لا توجد طلبات انتظار</td></tr>';
                    document.getElementById('pendingBadge').style.display = 'none';
                    return;
                }
                
                query = query.in('group_id', teacherGroupIds);
                
                const { data: requests, error } = await query.order('created_at', { ascending: false });
                
                if (error) throw error;
                
                let allReqs = requests || [];
                
                // فلترة حسب المجموعة
                if (groupId !== 'all') {
                    allReqs = allReqs.filter(r => r.group_id == groupId);
                }
                
                // فلترة حسب البحث
                if (search) {
                    allReqs = allReqs.filter(r => 
                        (r.users?.name && r.users.name.toLowerCase().includes(search.toLowerCase())) ||
                        (r.users?.phone && r.users.phone.includes(search))
                    );
                }
                
                requestsList = allReqs;
                
                // تحديث عدد الطلبات في التبويب
                const badge = document.getElementById('pendingBadge');
                if (requestsList.length > 0) {
                    badge.style.display = 'inline-block';
                    badge.innerHTML = requestsList.length;
                } else {
                    badge.style.display = 'none';
                }
                
                // Pagination
                const totalPages = Math.ceil(requestsList.length / itemsPerPage);
                const startIndex = (requestsPage - 1) * itemsPerPage;
                const paginatedRequests = requestsList.slice(startIndex, startIndex + itemsPerPage);
                
                renderPendingRequestsTable(paginatedRequests);
                renderPagination('requestsPagination', totalPages, requestsPage, (page) => goToRequestsPage(page));
                
                // تحميل خيارات فلتر المجموعات
                await loadGroupsFilter();
                
            } catch (error) {
                console.error('Error loading pending requests:', error);
                document.getElementById('pendingRequestsTable').innerHTML = '<tr><td colspan="6" class="empty-state">حدث خطأ</td></tr>';
            }
        }
        
        function renderPendingRequestsTable(requests) {
            const tbody = document.getElementById('pendingRequestsTable');
            
            if (!requests || requests.length === 0) {
                tbody.innerHTML = '<tr><td colspan="6" class="empty-state">✨ لا توجد طلبات انتظار</td></tr>';
                return;
            }
            
            tbody.innerHTML = '';
            for (let i = 0; i < requests.length; i++) {
                const r = requests[i];
                const studentName = r.users?.name || '-';
                const studentPhone = r.users?.phone || '-';
                const groupName = r.groups?.name || '-';
                
                const row = document.createElement('tr');
                row.innerHTML = `
                    <td>${i + 1 + ((requestsPage - 1) * itemsPerPage)}</td>
                    <td><strong>${escapeHtml(studentName)}</strong></td>
                    <td>${escapeHtml(studentPhone)}</td>
                    <td>${escapeHtml(groupName)}</td>
                    <td>${formatDate(r.created_at)}</td>
                    <td>
                        <div class="action-buttons" style="gap: 5px;">
                            <button class="btn btn-success btn-sm" onclick="approveRequest('${r.id}', ${r.group_id}, ${r.student_id})">✅ قبول</button>
                            <button class="btn btn-danger btn-sm" onclick="rejectRequest('${r.id}', ${r.group_id}, ${r.student_id})">❌ رفض</button>
                        </div>
                    </td>
                `;
                tbody.appendChild(row);
            }
        }
        
        function goToRequestsPage(page) {
            requestsPage = page;
            loadPendingRequests();
        }
        
        // ==================== قبول طلب ====================
        async function approveRequest(requestId, groupId, studentId) {
            try {
                const { error } = await sb
                    .from('group_members')
                    .update({ status: 'approved', joined_at: new Date() })
                    .eq('id', requestId);
                
                if (error) throw error;
                
                showToast('✅ تم قبول الطالب', 'success');
                requestsPage = 1;
                loadPendingRequests();
                loadGroups();
                
            } catch (error) {
                console.error('Error approving request:', error);
                showToast('حدث خطأ', 'error');
            }
        }
        
        // ==================== رفض طلب ====================
        async function rejectRequest(requestId, groupId, studentId) {
            try {
                const { error } = await sb
                    .from('group_members')
                    .update({ status: 'rejected' })
                    .eq('id', requestId);
                
                if (error) throw error;
                
                showToast('❌ تم رفض الطلب', 'success');
                requestsPage = 1;
                loadPendingRequests();
                
            } catch (error) {
                console.error('Error rejecting request:', error);
                showToast('حدث خطأ', 'error');
            }
        }
        
        // ==================== تحميل خيارات فلتر المجموعات ====================
        async function loadGroupsFilter() {
            try {
                const { data: groups } = await sb
                    .from('groups')
                    .select('id, name')
                    .eq('teacher_id', currentUser.id)
                    .order('name');
                
                groupsList = groups || [];
                
                const groupFilter = document.getElementById('filterGroup');
                groupFilter.innerHTML = '<option value="all">👥 كل المجموعات</option>';
                for (const g of groupsList) {
                    groupFilter.innerHTML += `<option value="${g.id}">${escapeHtml(g.name)}</option>`;
                }
                
            } catch (error) {
                console.error('Error loading groups filter:', error);
            }
        }
        
        // ==================== تحميل خيارات المودال ====================
        async function loadSelects() {
            try {
                // جلب الصفوف والمواد المسندة للمعلم
                const { data: assignments } = await sb
                    .from('teacher_assignments')
                    .select('*, classes:class_id(id, name), subjects:subject_id(id, name)')
                    .eq('teacher_id', currentUser.id);
                
                const classMap = new Map();
                const subjectMap = new Map();
                
                if (assignments) {
                    for (const a of assignments) {
                        if (a.classes && !classMap.has(a.class_id)) {
                            classMap.set(a.class_id, { id: a.class_id, name: a.classes.name });
                        }
                        if (a.subjects && !subjectMap.has(a.subject_id)) {
                            subjectMap.set(a.subject_id, { id: a.subject_id, name: a.subjects.name });
                        }
                    }
                }
                
                const teacherClasses = Array.from(classMap.values());
                const teacherSubjects = Array.from(subjectMap.values());
                
                const classSelect = document.getElementById('groupClassId');
                classSelect.innerHTML = '<option value="">-- اختر الصف --</option>';
                for (const c of teacherClasses) {
                    classSelect.innerHTML += `<option value="${c.id}">${escapeHtml(c.name)}</option>`;
                }
                
                const subjectSelect = document.getElementById('groupSubjectId');
                subjectSelect.innerHTML = '<option value="">-- اختر المادة --</option>';
                for (const s of teacherSubjects) {
                    subjectSelect.innerHTML += `<option value="${s.id}">${escapeHtml(s.name)}</option>`;
                }
                
            } catch (error) {
                console.error('Error loading selects:', error);
            }
        }
        
        // ==================== فتح مودال إنشاء مجموعة ====================
        async function openCreateGroupModal() {
            currentGroupId = null;
            document.getElementById('modalTitle').innerHTML = '➕ إنشاء مجموعة جديدة';
            document.getElementById('groupName').value = '';
            document.getElementById('groupDesc').value = '';
            document.getElementById('groupMaxCapacity').value = '';
            document.getElementById('groupIsOpen').checked = true;
            await loadSelects();
            document.getElementById('groupClassId').value = '';
            document.getElementById('groupSubjectId').value = '';
            document.getElementById('groupModal').style.display = 'flex';
        }
        
        // ==================== تعديل مجموعة ====================
        async function editGroup(id) {
            const { data: group, error } = await sb
                .from('groups')
                .select('*')
                .eq('id', id)
                .single();
            
            if (error || !group) {
                showToast('حدث خطأ', 'error');
                return;
            }
            
            currentGroupId = id;
            document.getElementById('modalTitle').innerHTML = '✏️ تعديل مجموعة';
            document.getElementById('groupName').value = group.name || '';
            document.getElementById('groupDesc').value = group.description || '';
            document.getElementById('groupMaxCapacity').value = group.max_capacity || '';
            document.getElementById('groupIsOpen').checked = group.is_open || false;
            await loadSelects();
            document.getElementById('groupClassId').value = group.class_id || '';
            document.getElementById('groupSubjectId').value = group.subject_id || '';
            document.getElementById('groupModal').style.display = 'flex';
        }
        
        // ==================== حفظ مجموعة ====================
        async function saveGroup() {
            const name = document.getElementById('groupName').value;
            const description = document.getElementById('groupDesc').value;
            const classId = document.getElementById('groupClassId').value;
            const subjectId = document.getElementById('groupSubjectId').value;
            const maxCapacity = document.getElementById('groupMaxCapacity').value;
            const isOpen = document.getElementById('groupIsOpen').checked;
            
            if (!name) {
                showToast('اسم المجموعة مطلوب', 'error');
                return;
            }
            
            const groupData = {
                name: name,
                description: description || null,
                class_id: classId || null,
                subject_id: subjectId || null,
                teacher_id: currentUser.id,
                max_capacity: maxCapacity || null,
                is_open: isOpen
            };
            
            let result;
            if (currentGroupId) {
                const { error } = await sb
                    .from('groups')
                    .update(groupData)
                    .eq('id', currentGroupId);
                result = !error;
            } else {
                const { error } = await sb
                    .from('groups')
                    .insert(groupData);
                result = !error;
            }
            
            if (result) {
                closeGroupModal();
                groupsPage = 1;
                loadGroups();
                showToast('تم ' + (currentGroupId ? 'تعديل' : 'إنشاء') + ' المجموعة', 'success');
            } else {
                showToast('حدث خطأ', 'error');
            }
        }
        
        // ==================== حذف مجموعة ====================
        function deleteGroupConfirm(id) {
            showConfirm('⚠️ هل أنت متأكد من حذف هذه المجموعة؟ سيتم حذف جميع أعضائها أيضاً.', async () => {
                const { error } = await sb
                    .from('groups')
                    .delete()
                    .eq('id', id);
                
                if (error) {
                    showToast('حدث خطأ', 'error');
                    return;
                }
                
                groupsPage = 1;
                loadGroups();
                showToast('تم حذف المجموعة', 'success');
            });
        }
        
        // ==================== دوال مساعدة ====================
        function renderPagination(containerId, totalPages, currentPage, onPageChange) {
            const container = document.getElementById(containerId);
            if (!container) return;
            
            if (totalPages <= 1) {
                container.innerHTML = '';
                return;
            }
            
            let html = '';
            if (currentPage > 1) {
                html += `<button class="page-btn" onclick="(${onPageChange})(${currentPage - 1})">← السابق</button>`;
            }
            
            const startPage = Math.max(1, currentPage - 2);
            const endPage = Math.min(totalPages, currentPage + 2);
            
            if (startPage > 1) {
                html += `<button class="page-btn" onclick="(${onPageChange})(1)">1</button>`;
                if (startPage > 2) html += `<span class="page-btn" style="cursor: default;">...</span>`;
            }
            
            for (let i = startPage; i <= endPage; i++) {
                html += `<button class="page-btn ${i === currentPage ? 'active' : ''}" onclick="(${onPageChange})(${i})">${i}</button>`;
            }
            
            if (endPage < totalPages) {
                if (endPage < totalPages - 1) html += `<span class="page-btn" style="cursor: default;">...</span>`;
                html += `<button class="page-btn" onclick="(${onPageChange})(${totalPages})">${totalPages}</button>`;
            }
            
            if (currentPage < totalPages) {
                html += `<button class="page-btn" onclick="(${onPageChange})(${currentPage + 1})">التالي →</button>`;
            }
            
            container.innerHTML = html;
        }
        
        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/[&<>]/g, function(m) {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                return m;
            });
        }
        
        function closeGroupModal() {
            document.getElementById('groupModal').style.display = 'none';
        }
        
        // ==================== أحداث ====================
        document.getElementById('searchInput').addEventListener('input', () => {
            groupsPage = 1;
            loadGroups();
        });
        document.getElementById('requestSearch').addEventListener('input', () => {
            requestsPage = 1;
            loadPendingRequests();
        });
        document.getElementById('filterGroup').addEventListener('change', () => {
            requestsPage = 1;
            loadPendingRequests();
        });
        
        window.showTab = showTab;
        window.openCreateGroupModal = openCreateGroupModal;
        window.editGroup = editGroup;
        window.saveGroup = saveGroup;
        window.deleteGroupConfirm = deleteGroupConfirm;
        window.approveRequest = approveRequest;
        window.rejectRequest = rejectRequest;
        window.closeGroupModal = closeGroupModal;
        window.goToGroupsPage = goToGroupsPage;
        window.goToRequestsPage = goToRequestsPage;
        
        // ==================== تحميل أولي ====================
        loadGroups();
        loadGroupsFilter();
    </script>
</body>
</html>
