<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>تسجيل الدخول - منصة الاختبارات Pro</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/supabase-config.js"></script>
<script src="js/utils.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Cairo',sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,#f5f7fa 0%,#e4e8f0 100%)}
.login-container{background:white;border-radius:32px;padding:40px;width:420px;max-width:90%;box-shadow:0 25px 50px rgba(0,0,0,0.15)}
.logo{text-align:center;font-size:48px;margin-bottom:16px}
h1{text-align:center;font-size:24px;font-weight:800;color:#1e293b}
.subtitle{text-align:center;color:#64748b;margin-bottom:30px}
.form-group{margin-bottom:20px}
.form-group label{display:block;font-weight:600;color:#334155;margin-bottom:8px}
.form-group input{width:100%;padding:12px 16px;border:2px solid #e2e8f0;border-radius:16px;font-family:inherit;font-size:14px;transition:all 0.2s}
.form-group input:focus{outline:none;border-color:#6366f1;box-shadow:0 0 0 3px rgba(99,102,241,0.1)}
.btn{width:100%;padding:14px;border:none;border-radius:16px;font-weight:700;font-size:16px;cursor:pointer;transition:all 0.2s;font-family:inherit}
.btn-primary{background:linear-gradient(135deg,#6366f1,#4f46e5);color:white}
.btn-primary:hover{transform:translateY(-2px);box-shadow:0 4px 14px rgba(99,102,241,0.4)}
.btn-primary:disabled{opacity:0.7;cursor:not-allowed}
.demo-section{margin-top:20px;padding-top:20px;border-top:1px solid #e2e8f0}
.demo-title{text-align:center;font-size:14px;color:#64748b;margin-bottom:12px}
.demo-buttons{display:flex;gap:10px}
.demo-btn{flex:1;padding:10px;border:2px solid #e2e8f0;border-radius:12px;background:white;cursor:pointer;font-weight:600;transition:all 0.2s;font-family:inherit;font-size:12px}
.demo-btn:hover{transform:translateY(-2px)}
.demo-btn.admin:hover{border-color:#ef4444;color:#ef4444}
.demo-btn.teacher:hover{border-color:#3b82f6;color:#3b82f6}
.demo-btn.student:hover{border-color:#10b981;color:#10b981}
.error-message{background:#fee2e2;color:#dc2626;padding:12px;border-radius:12px;margin-top:12px;display:none;font-size:14px}
.success-message{background:#d1fae5;color:#065f46;padding:12px;border-radius:12px;margin-top:12px;display:none;font-size:14px}
.loading-spinner{display:inline-block;width:20px;height:20px;border:2px solid white;border-top-color:transparent;border-radius:50%;animation:spin 0.8s linear infinite;vertical-align:middle;margin-right:8px}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<div class="login-container">
    <div class="logo">📚</div>
    <h1>منصة الاختبارات</h1>
    <p class="subtitle">سجل دخولك للوصول إلى لوحة التحكم</p>
    
    <form id="loginForm" onsubmit="handleLogin(event)">
        <div class="form-group">
            <label>👤 اسم المستخدم أو رقم الهاتف</label>
            <input type="text" id="loginIdentifier" placeholder="مثال: admin أو 01000000001" required>
        </div>
        <div class="form-group">
            <label>🔒 كلمة المرور</label>
            <input type="password" id="loginPassword" placeholder="••••••••" required>
        </div>
        <div id="errorMessage" class="error-message"></div>
        <div id="successMessage" class="success-message"></div>
        <button type="submit" class="btn btn-primary" id="loginBtn">🔐 تسجيل الدخول</button>
    </form>
    
    <div class="demo-section">
        <div class="demo-title">🚀 دخول سريع للمعاينة</div>
        <div class="demo-buttons">
            <button class="demo-btn admin" onclick="demoLogin('admin')">👑 مدير</button>
            <button class="demo-btn teacher" onclick="demoLogin('teacher')">👨‍🏫 معلم</button>
            <button class="demo-btn student" onclick="demoLogin('student')">👨‍🎓 طالب</button>
        </div>
    </div>
</div>

<script>
// ==================== دوال العرض ====================

function showError(msg) {
    const el = document.getElementById('errorMessage');
    el.innerHTML = msg;
    el.style.display = 'block';
    document.getElementById('successMessage').style.display = 'none';
    setTimeout(() => { el.style.display = 'none'; }, 5000);
}

function showSuccess(msg) {
    const el = document.getElementById('successMessage');
    el.innerHTML = msg;
    el.style.display = 'block';
    document.getElementById('errorMessage').style.display = 'none';
    setTimeout(() => { el.style.display = 'none'; }, 3000);
}

// ==================== دوال تسجيل الدخول ====================

async function demoLogin(role) {
    const btn = document.getElementById('loginBtn');
    btn.disabled = true;
    btn.innerHTML = '⏳ جاري...';
    
    const credentials = {
        admin: { username: 'admin', password: '123456' },
        teacher: { username: 'teacher', password: '123456' },
        student: { username: 'student', password: '123456' }
    };
    
    const cred = credentials[role];
    if (!cred) return;
    
    document.getElementById('loginIdentifier').value = cred.username;
    document.getElementById('loginPassword').value = cred.password;
    
    await handleLogin(new Event('submit'));
    
    btn.disabled = false;
    btn.innerHTML = '🔐 تسجيل الدخول';
}

async function handleLogin(e) {
    e.preventDefault();
    
    const identifier = document.getElementById('loginIdentifier').value;
    const password = document.getElementById('loginPassword').value;
    const btn = document.getElementById('loginBtn');
    
    if (!identifier || !password) {
        showError('⚠️ الرجاء إدخال اسم المستخدم وكلمة المرور');
        return;
    }
    
    btn.disabled = true;
    btn.innerHTML = '⏳ جاري تسجيل الدخول...';
    
    try {
        console.log('🔐 محاولة تسجيل الدخول:', identifier);
        
        const result = await loginUser(identifier, password);
        
        if (result.success) {
            showSuccess('✅ تم تسجيل الدخول بنجاح! جاري التوجيه...');
            setUser(result.user);
            
            // توجيه حسب الدور
            setTimeout(() => {
                const role = result.user.role;
                if (role === 'admin') window.location.href = 'admin-dashboard.html';
                else if (role === 'teacher') window.location.href = 'teacher-dashboard.html';
                else window.location.href = 'student-dashboard.html';
            }, 1000);
        } else {
            showError('❌ ' + result.error);
            btn.disabled = false;
            btn.innerHTML = '🔐 تسجيل الدخول';
        }
    } catch (error) {
        console.error('❌ خطأ:', error);
        showError('❌ حدث خطأ غير متوقع');
        btn.disabled = false;
        btn.innerHTML = '🔐 تسجيل الدخول';
    }
}

// ==================== تحميل الصفوف (للتسجيل) ====================

async function loadClasses() {
    try {
        const classes = await fetchClasses();
        console.log('📚 تم تحميل الصفوف:', classes);
        return classes;
    } catch (error) {
        console.error('❌ خطأ في تحميل الصفوف:', error);
        return [];
    }
}

// تحميل الصفوف عند بدء الصفحة
document.addEventListener('DOMContentLoaded', async function() {
    await loadClasses();
    console.log('✅ الصفحة جاهزة');
});
</script>
</body>
</html>
