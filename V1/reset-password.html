<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>استعادة كلمة المرور - منصة الاختبارات</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <style>
        /* أنماط إضافية لصفحة الاستعادة */
        .reset-container {
            max-width: 550px;
            margin: 0 auto;
            padding: 40px 20px;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .reset-card {
            background: white;
            border-radius: 32px;
            padding: 40px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.25);
            width: 100%;
        }
        .step-indicator {
            display: flex;
            justify-content: space-between;
            margin-bottom: 35px;
            position: relative;
        }
        .step-indicator::before {
            content: '';
            position: absolute;
            top: 20px;
            left: 10%;
            right: 10%;
            height: 2px;
            background: #e2e8f0;
            z-index: 1;
        }
        .step {
            text-align: center;
            flex: 1;
            position: relative;
            z-index: 2;
        }
        .step-number {
            width: 40px;
            height: 40px;
            background: #e2e8f0;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 8px;
            font-weight: bold;
            color: #64748b;
        }
        .step.active .step-number {
            background: #6366f1;
            color: white;
        }
        .step.completed .step-number {
            background: #10b981;
            color: white;
        }
        .step-label {
            font-size: 12px;
            color: #64748b;
        }
        .step.active .step-label {
            color: #6366f1;
            font-weight: 600;
        }
        .form-step {
            display: none;
            animation: fadeIn 0.3s ease;
        }
        .form-step.active-step {
            display: block;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .question-options {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
            margin: 15px 0;
            max-height: 280px;
            overflow-y: auto;
            padding: 5px;
        }
        .question-option {
            padding: 12px 15px;
            background: #f8fafc;
            border: 1px solid #e2e8f0;
            border-radius: 12px;
            cursor: pointer;
            text-align: right;
            transition: all 0.2s;
            font-size: 13px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .question-option:hover {
            background: #eef2ff;
            border-color: #6366f1;
        }
        .question-option.selected {
            background: #6366f1;
            color: white;
            border-color: #6366f1;
        }
        .q-num {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 26px;
            height: 26px;
            background: #e2e8f0;
            border-radius: 50%;
            font-size: 12px;
            font-weight: bold;
            color: #475569;
        }
        .question-option.selected .q-num {
            background: white;
            color: #6366f1;
        }
        .security-question-box {
            background: #f0fdf4;
            border-right: 4px solid #10b981;
            padding: 15px;
            border-radius: 16px;
            margin-bottom: 20px;
        }
        .info-note {
            background: #e0e7ff;
            padding: 12px;
            border-radius: 16px;
            margin-top: 15px;
            font-size: 13px;
            color: #1e40af;
        }
        .back-link {
            text-align: center;
            margin-top: 20px;
        }
        .back-link a {
            color: #667eea;
            text-decoration: none;
            font-weight: 600;
        }
        .back-link a:hover {
            text-decoration: underline;
        }
        .message {
            padding: 12px;
            border-radius: 12px;
            margin-top: 15px;
            font-size: 14px;
            display: none;
        }
        .message-success {
            background: #d1fae5;
            color: #065f46;
            border-right: 4px solid #10b981;
        }
        .message-error {
            background: #fee2e2;
            color: #dc2626;
            border-right: 4px solid #ef4444;
        }
        .message-info {
            background: #dbeafe;
            color: #1e40af;
            border-right: 4px solid #3b82f6;
        }
        @media (max-width: 600px) {
            .reset-card { padding: 25px 20px; }
            .question-options { grid-template-columns: 1fr; }
            .step-label { font-size: 10px; }
        }
    </style>
</head>
<body>
    <div class="reset-container">
        <div class="reset-card">
            <div class="text-center" style="text-align: center;">
                <div style="font-size: 48px; margin-bottom: 16px;">🔐</div>
                <h1 style="margin-bottom: 8px;">استعادة كلمة المرور</h1>
                <p style="color: #64748b; margin-bottom: 30px;">أجب على سؤال الأمان لإعادة تعيين كلمة المرور</p>
            </div>

            <!-- مؤشر الخطوات -->
            <div class="step-indicator">
                <div class="step" id="step1">
                    <div class="step-number">1</div>
                    <div class="step-label">رقم الهاتف</div>
                </div>
                <div class="step" id="step2">
                    <div class="step-number">2</div>
                    <div class="step-label">سؤال الأمان</div>
                </div>
                <div class="step" id="step3">
                    <div class="step-number">3</div>
                    <div class="step-label">كلمة جديدة</div>
                </div>
            </div>

            <!-- الخطوة 1: إدخال رقم الهاتف -->
            <div class="form-step active-step" id="step1Form">
                <div class="form-group">
                    <label>📞 رقم الهاتف</label>
                    <input type="tel" id="phoneNumber" class="form-control" placeholder="مثال: 01012345678" dir="ltr">
                </div>
                <div class="info-note">
                    💡 أدخل رقم الهاتف المرتبط بحسابك للتحقق من هويتك
                </div>
                <button class="btn btn-primary" style="width: 100%; margin-top: 20px;" onclick="checkUserAndGetQuestion()">
                    🔍 البحث عن الحساب
                </button>
                <div class="back-link">
                    <a href="index.html">← العودة إلى تسجيل الدخول</a>
                </div>
            </div>

            <!-- الخطوة 2: الإجابة على سؤال الأمان -->
            <div class="form-step" id="step2Form">
                <div class="security-question-box" id="securityQuestionDisplay">
                    <p style="font-weight: 600; margin-bottom: 10px;">❓ سؤال الأمان:</p>
                    <strong id="questionText" style="font-size: 16px;">جار التحميل...</strong>
                </div>
                <div class="form-group">
                    <label>✏️ إجابتك</label>
                    <input type="text" id="securityAnswer" class="form-control" placeholder="أدخل إجابة سؤال الأمان">
                </div>
                <button class="btn btn-primary" style="width: 100%; margin-top: 10px;" onclick="verifySecurityAnswer()">
                    ✅ التحقق من الإجابة
                </button>
                <div class="back-link">
                    <a href="#" onclick="goToStep(1)">← العودة</a>
                </div>
            </div>

            <!-- الخطوة 3: إدخال كلمة المرور الجديدة -->
            <div class="form-step" id="step3Form">
                <div class="form-group">
                    <label>🔒 كلمة المرور الجديدة</label>
                    <input type="password" id="newPassword" class="form-control" placeholder="6 أحرف على الأقل">
                </div>
                <div class="form-group">
                    <label>✓ تأكيد كلمة المرور الجديدة</label>
                    <input type="password" id="confirmPassword" class="form-control" placeholder="أعد كتابة كلمة المرور">
                </div>
                <button class="btn btn-primary" style="width: 100%; margin-top: 10px;" onclick="resetPassword()">
                    ✅ تغيير كلمة المرور
                </button>
                <div class="back-link">
                    <a href="#" onclick="goToStep(2)">← العودة</a>
                </div>
            </div>

            <div id="message" class="message"></div>
        </div>
    </div>

    <script src="js/supabase-config.js"></script>
    <script>
        // ==================== المتغيرات ====================
        let verifiedUserId = null;
        let verifiedUserPhone = null;
        let securityQuestion = null;

        // ==================== عرض الرسائل ====================
        function showMessage(msg, type = 'info') {
            const messageDiv = document.getElementById('message');
            messageDiv.innerHTML = msg;
            messageDiv.className = `message message-${type}`;
            messageDiv.style.display = 'block';
            
            setTimeout(() => {
                messageDiv.style.display = 'none';
            }, 5000);
        }

        // ==================== الانتقال بين الخطوات ====================
        function goToStep(step) {
            document.getElementById('step1Form').classList.remove('active-step');
            document.getElementById('step2Form').classList.remove('active-step');
            document.getElementById('step3Form').classList.remove('active-step');
            
            document.getElementById(`step${step}Form`).classList.add('active-step');
            
            for (let i = 1; i <= 3; i++) {
                const stepDiv = document.getElementById(`step${i}`);
                if (i < step) {
                    stepDiv.classList.add('completed');
                    stepDiv.classList.remove('active');
                } else if (i === step) {
                    stepDiv.classList.add('active');
                    stepDiv.classList.remove('completed');
                } else {
                    stepDiv.classList.remove('active', 'completed');
                }
            }
        }

        // ==================== البحث عن المستخدم وجلب سؤال الأمان ====================
        async function checkUserAndGetQuestion() {
            const phone = document.getElementById('phoneNumber').value.trim();
            
            if (!phone) {
                showMessage('الرجاء إدخال رقم الهاتف', 'error');
                return;
            }
            
            const phoneRegex = /^(010|011|012|015)[0-9]{8}$/;
            if (!phoneRegex.test(phone)) {
                showMessage('رقم الهاتف غير صحيح. يجب أن يبدأ بـ 010 أو 011 أو 012 أو 015', 'error');
                return;
            }
            
            try {
                const { data: user, error } = await sb
                    .from('users')
                    .select('id, name, phone, security_question, security_answer')
                    .eq('phone', phone)
                    .single();
                
                if (error || !user) {
                    showMessage('لا يوجد حساب مسجل بهذا الرقم', 'error');
                    return;
                }
                
                if (!user.security_question || !user.security_answer) {
                    showMessage('⚠️ هذا الحساب ليس لديه سؤال أمان محدد. يرجى التواصل مع المدير لإعادة تعيين كلمة المرور.', 'warning');
                    return;
                }
                
                verifiedUserId = user.id;
                verifiedUserPhone = phone;
                securityQuestion = user.security_question;
                
                document.getElementById('questionText').innerHTML = securityQuestion;
                document.getElementById('securityAnswer').value = '';
                
                goToStep(2);
                showMessage('✅ تم العثور على الحساب. الرجاء الإجابة على سؤال الأمان', 'success');
                
            } catch (error) {
                console.error('Error:', error);
                showMessage('حدث خطأ. الرجاء المحاولة مرة أخرى', 'error');
            }
        }

        // ==================== التحقق من إجابة سؤال الأمان ====================
        async function verifySecurityAnswer() {
            const answer = document.getElementById('securityAnswer').value.trim();
            
            if (!answer) {
                showMessage('الرجاء إدخال إجابة سؤال الأمان', 'error');
                return;
            }
            
            try {
                const { data: user, error } = await sb
                    .from('users')
                    .select('security_answer')
                    .eq('id', verifiedUserId)
                    .single();
                
                if (error || !user) {
                    showMessage('حدث خطأ. الرجاء المحاولة مرة أخرى', 'error');
                    return;
                }
                
                const hashedAnswer = await hashPassword(answer.toLowerCase().trim());
                
                if (user.security_answer !== hashedAnswer) {
                    showMessage('❌ الإجابة غير صحيحة. الرجاء المحاولة مرة أخرى', 'error');
                    return;
                }
                
                showMessage('✅ تم التحقق من الإجابة بنجاح', 'success');
                
                document.getElementById('newPassword').value = '';
                document.getElementById('confirmPassword').value = '';
                
                goToStep(3);
                
            } catch (error) {
                console.error('Error:', error);
                showMessage('حدث خطأ. الرجاء المحاولة مرة أخرى', 'error');
            }
        }

        // ==================== تغيير كلمة المرور ====================
        async function resetPassword() {
            const newPassword = document.getElementById('newPassword').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            
            if (!newPassword) {
                showMessage('الرجاء إدخال كلمة المرور الجديدة', 'error');
                return;
            }
            if (newPassword.length < 6) {
                showMessage('كلمة المرور يجب أن تكون 6 أحرف على الأقل', 'error');
                return;
            }
            if (newPassword !== confirmPassword) {
                showMessage('كلمة المرور غير متطابقة', 'error');
                return;
            }
            
            try {
                const hashedPassword = await hashPassword(newPassword);
                
                const { error: updateError } = await sb
                    .from('users')
                    .update({ password_hash: hashedPassword })
                    .eq('id', verifiedUserId);
                
                if (updateError) throw updateError;
                
                showMessage('✅ تم تغيير كلمة المرور بنجاح! جاري تحويلك إلى صفحة تسجيل الدخول...', 'success');
                
                setTimeout(() => {
                    window.location.href = 'index.html';
                }, 2000);
                
            } catch (error) {
                console.error('Error resetting password:', error);
                showMessage('حدث خطأ. الرجاء المحاولة مرة أخرى', 'error');
            }
        }

        // ==================== دالة hashPassword ====================
        async function hashPassword(password) {
            const encoder = new TextEncoder();
            const data = encoder.encode(password);
            const hash = await crypto.subtle.digest('SHA-256', data);
            return Array.from(new Uint8Array(hash)).map(b => b.toString(16).padStart(2, '0')).join('');
        }
    </script>
</body>
</html>
