<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إدارة المجموعات - منصة الاختبارات</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <style>
        .filter-row {
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            align-items: flex-end;
            margin-bottom: 20px;
        }
        .filter-group {
            flex: 1;
            min-width: 160px;
        }
        .filter-group label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            color: #64748b;
            margin-bottom: 5px;
        }
        .filter-group select, .filter-group input {
            width: 100%;
            padding: 10px 14px;
            border: 1px solid #e2e8f0;
            border-radius: 12px;
            font-family: inherit;
            font-size: 14px;
            background: white;
        }
        
        .stats-summary {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            margin-bottom: 20px;
        }
        .stat-card {
            background: linear-gradient(135deg, #f8fafc, #f1f5f9);
            border-radius: 20px;
            padding: 20px;
            text-align: center;
            flex: 1;
            min-width: 140px;
        }
        .stat-number {
            font-size: 32px;
            font-weight: 800;
            color: #6366f1;
        }
        .stat-label {
            font-size: 13px;
            color: #64748b;
            margin-top: 5px;
        }
        
        .group-card {
            background: #f8fafc;
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 15px;
            border: 1px solid #e2e8f0;
            transition: all 0.2s;
        }
        .group-card:hover {
            transform: translateX(-5px);
            border-right: 4px solid #6366f1;
            background: white;
        }
        
        .requests-table {
            width: 100%;
            border-collapse: collapse;
        }
        .requests-table th, .requests-table td {
            padding: 12px;
            text-align: right;
            border-bottom: 1px solid #e2e8f0;
        }
        .requests-table th {
            background: #f8fafc;
            font-weight: 700;
        }
        .requests-table tr:hover {
            background: #f1f5f9;
        }
        
        .badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 4px 12px;
            border-radius: 40px;
            font-size: 12px;
            font-weight: 600;
        }
        .badge-success { background: #d1fae5; color: #065f46; }
        .badge-warning { background: #fef3c7; color: #d97706; }
        .badge-danger { background: #fee2e2; color: #991b1b; }
        .badge-info { background: #dbeafe; color: #1e40af; }
        
        .action-buttons {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }
        .btn {
            padding: 8px 14px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-weight: 600;
            transition: 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            font-family: inherit;
            font-size: 12px;
        }
        .btn-primary { background: linear-gradient(135deg, #6366f1, #4f46e5); color: white; }
        .btn-success { background: #10b981; color: white; }
        .btn-danger { background: #ef4444; color: white; }
        .btn-warning { background: #f59e0b; color: white; }
        .btn-info { background: #3b82f6; color: white; }
        .btn-outline { background: transparent; border: 1px solid #6366f1; color: #6366f1; }
        .btn-sm { padding: 5px 10px; font-size: 11px; }
        
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(5px);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
        .modal-content {
            background: white;
            border-radius: 28px;
            padding: 30px;
            width: 550px;
            max-width: 90%;
            max-height: 85vh;
            overflow-y: auto;
        }
        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 2px solid #e2e8f0;
        }
        .form-group {
            margin-bottom: 18px;
        }
        .form-group label {
            display: block;
            font-weight: 600;
            color: #334155;
            margin-bottom: 6px;
            font-size: 14px;
        }
        .form-group input, .form-group select, .form-group textarea {
            width: 100%;
            padding: 10px 14px;
            border: 1px solid #e2e8f0;
            border-radius: 12px;
            font-family: inherit;
            font-size: 14px;
        }
        .row-2 {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
        }
        
        .pending-count {
            background: #ef4444;
            color: white;
            border-radius: 30px;
            padding: 2px 10px;
            font-size: 12px;
            margin-right: 8px;
        }
        
        .tabs {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin-bottom: 20px;
            border-bottom: 2px solid #e2e8f0;
            padding-bottom: 5px;
        }
        .tab-btn {
            background: transparent;
            border: none;
            padding: 10px 28px;
            border-radius: 30px;
            cursor: pointer;
            font-weight: 600;
            color: #64748b;
            transition: all 0.2s;
        }
        .tab-btn.active {
            background: linear-gradient(135deg, #6366f1, #8b5cf6);
            color: white;
        }
        
        .pagination {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-top: 25px;
            flex-wrap: wrap;
        }
        .page-btn {
            padding: 8px 16px;
            border: 1px solid #e2e8f0;
            background: white;
            border-radius: 10px;
            cursor: pointer;
            transition: 0.2s;
        }
        .page-btn.active {
            background: linear-gradient(135deg, #6366f1, #8b5cf6);
            color: white;
            border-color: transparent;
        }
        .loading-skeleton {
            background: linear-gradient(90deg, #e2e8f0 25%, #f1f5f9 50%, #e2e8f0 75%);
            background-size: 200% 100%;
            animation: loading 1.5s infinite;
            border-radius: 12px;
            height: 80px;
            margin-bottom: 15px;
        }
        @keyframes loading {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }
        
        @media (max-width: 768px) {
            .filter-row { flex-direction: column; }
            .row-2 { grid-template-columns: 1fr; }
            .action-buttons { flex-direction: column; }
            .btn { width: 100%; justify-content: center; }
            .stats-summary { flex-direction: column; }
            .tabs { justify-content: center; }
            .tab-btn { padding: 6px 16px; font-size: 12px; }
            .requests-table th, .requests-table td { padding: 8px; font-size: 12px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="admin-bar">
            <div><span style="font-size:20px;">👑</span> إدارة المجموعات - <span id="adminName"></span></div>
            <div>
                <button class="btn btn-outline btn-sm" onclick="window.location.href='admin-dashboard.html'">🏠 الرئيسية</button>
                <button class="btn btn-outline btn-sm" onclick="window.location.href='questions-bank.html'">📚 بنك الأسئلة</button>
                <button class="btn btn-danger btn-sm" onclick="logout()">🚪 خروج</button>
            </div>
        </div>

        <div class="card header">
            <h1>👥 إدارة المجموعات</h1>
            <p>إنشاء وتعديل المجموعات وإدارة الطلبات والأعضاء</p>
        </div>

        <!-- إحصائيات سريعة -->
        <div class="stats-summary" id="statsSummary">
            <div class="stat-card">
                <div class="stat-number" id="totalGroups">0</div>
                <div class="stat-label">👥 إجمالي المجموعات</div>
            </div>
            <div class="stat-card">
                <div class="stat-number" id="totalMembers">0</div>
                <div class="stat-label">👨‍🎓 إجمالي الأعضاء</div>
            </div>
            <div class="stat-card">
                <div class="stat-number" id="pendingRequestsCount">0</div>
                <div class="stat-label">⏳ طلبات الانتظار</div>
            </div>
        </div>

        <!-- التبويبات -->
        <div class="tabs">
            <button class="tab-btn active" onclick="showTab('groups')">📚 كل المجموعات</button>
            <button class="tab-btn" onclick="showTab('requests')">📋 طلبات الانتظار <span id="pendingBadge" class="pending-count" style="display: none;">0</span></button>
        </div>

        <!-- تبويب كل المجموعات -->
        <div id="groupsTab">
            <div class="card">
                <div class="filter-row">
                    <div class="filter-group">
                        <label>🔍 بحث</label>
                        <input type="text" id="searchInput" placeholder="بحث باسم المجموعة...">
                    </div>
                    <div class="filter-group">
                        <label>👨‍🏫 المعلم</label>
                        <select id="filterTeacher" onchange="loadGroups()">
                            <option value="all">كل المعلمين</option>
                        </select>
                    </div>
                    <div>
                        <button class="btn btn-primary" onclick="openCreateGroupModal()">➕ إنشاء مجموعة</button>
                        <button class="btn btn-outline" onclick="loadGroups()">🔄 تحديث</button>
                    </div>
                </div>
                <div id="groupsLoadingIndicator" class="loading-skeleton" style="display: none;"></div>
                <div id="groupsList"></div>
                <div id="groupsPagination" class="pagination"></div>
            </div>
        </div>

        <!-- تبويب طلبات الانتظار -->
        <div id="requestsTab" style="display: none;">
            <div class="card">
                <div class="filter-row">
                    <div class="filter-group">
                        <label>🔍 بحث</label>
                        <input type="text" id="requestSearch" placeholder="بحث باسم الطالب أو رقم الهاتف...">
                    </div>
                    <div class="filter-group">
                        <label>👥 المجموعة</label>
                        <select id="filterGroup" onchange="loadPendingRequests()">
                            <option value="all">كل المجموعات</option>
                        </select>
                    </div>
                    <div>
                        <button class="btn btn-outline" onclick="loadPendingRequests()">🔄 تحديث</button>
                    </div>
                </div>
                
                <div style="overflow-x: auto;">
                    <table class="requests-table">
                        <thead>
                            <tr>
                                <th>#</th>
                                <th>👨‍🎓 الطالب</th>
                                <th>📞 رقم الهاتف</th>
                                <th>👥 المجموعة</th>
                                <th>👨‍🏫 المعلم</th>
                                <th>📅 تاريخ الطلب</th>
                                <th>⚡ الإجراءات</th>
                            </tr>
                        </thead>
                        <tbody id="pendingRequestsTable"></tbody>
                    寸able
                </div>
                <div id="requestsPagination" class="pagination"></div>
            </div>
        </div>
    </div>

    <!-- مودال إنشاء/تعديل مجموعة -->
    <div id="groupModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3 id="modalTitle">➕ إنشاء مجموعة جديدة</h3>
                <button class="btn btn-outline btn-sm" onclick="closeGroupModal()">✖</button>
            </div>
            <div class="form-group">
                <label>📌 اسم المجموعة *</label>
                <input type="text" id="groupName" placeholder="مثال: مجموعة الرياضيات - المتقدم">
            </div>
            <div class="form-group">
                <label>📝 وصف المجموعة</label>
                <textarea id="groupDesc" rows="3" placeholder="وصف المجموعة (اختياري)"></textarea>
            </div>
            <div class="row-2">
                <div class="form-group">
                    <label>🎓 الصف</label>
                    <select id="groupClassId">
                        <option value="">-- اختر الصف --</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>📖 المادة</label>
                    <select id="groupSubjectId">
                        <option value="">-- اختر المادة --</option>
                    </select>
                </div>
            </div>
            <div class="form-group">
                <label>👨‍🏫 المعلم *</label>
                <select id="groupTeacherId">
                    <option value="">-- اختر المعلم --</option>
                </select>
            </div>
            <div class="form-group">
                <label>👥 الحد الأقصى للطلاب</label>
                <input type="number" id="groupMaxCapacity" placeholder="اختياري - اتركه فارغاً لعدم وجود حد">
            </div>
            <div class="form-group">
                <label style="display: flex; align-items: center; gap: 10px;">
                    <input type="checkbox" id="groupIsOpen" checked> 
                    <span>🔓 مفتوح للانضمام (بدون موافقة المعلم)</span>
                </label>
            </div>
            <div style="display: flex; gap: 12px; margin-top: 20px;">
                <button class="btn btn-primary" onclick="saveGroup()">💾 حفظ</button>
                <button class="btn btn-outline" onclick="closeGroupModal()">إلغاء</button>
            </div>
        </div>
    </div>

    <script src="js/supabase-config.js"></script>
    <script>
        // ==================== التحقق من صلاحية الدخول ====================
        (function() {
            const user = getUser();
            if (!user || user.role !== 'admin') {
                window.location.href = 'index.html';
                return;
            }
            document.getElementById('adminName').innerHTML = user.name;
        })();
        
        // ==================== المتغيرات العامة ====================
        let currentGroupId = null;
        let allRequests = [];
        let groupsList = [];
        let teachersList = [];
        let classesList = [];
        let subjectsList = [];
        
        // Pagination variables
        let allGroupsData = [];
        let groupsPage = 1;
        let itemsPerPage = 10;
        
        let allRequestsData = [];
        let requestsPage = 1;
        
        // ==================== التبويبات ====================
        function showTab(tabName) {
            document.getElementById('groupsTab').style.display = tabName === 'groups' ? 'block' : 'none';
            document.getElementById('requestsTab').style.display = tabName === 'requests' ? 'block' : 'none';
            
            const tabs = document.querySelectorAll('.tabs .tab-btn');
            tabs.forEach(btn => btn.classList.remove('active'));
            if (tabName === 'groups') tabs[0].classList.add('active');
            else tabs[1].classList.add('active');
            
            if (tabName === 'requests') {
                loadPendingRequests();
            } else {
                loadGroups();
            }
        }
        
        // ==================== تحميل الإحصائيات ====================
        async function loadStats() {
            try {
                const groups = await fetchGroups({});
                document.getElementById('totalGroups').innerHTML = groups.length;
                
                // حساب إجمالي الأعضاء
                let totalMembers = 0;
                for (const g of groups) {
                    const { count } = await sb
                        .from('group_members')
                        .select('*', { count: 'exact', head: true })
                        .eq('group_id', g.id)
                        .eq('status', 'approved');
                    totalMembers += count || 0;
                }
                document.getElementById('totalMembers').innerHTML = totalMembers;
                
                // حساب طلبات الانتظار
                const { count: pendingCount } = await sb
                    .from('group_members')
                    .select('*', { count: 'exact', head: true })
                    .eq('status', 'pending');
                document.getElementById('pendingRequestsCount').innerHTML = pendingCount || 0;
                
            } catch (error) {
                console.error('Error loading stats:', error);
            }
        }
        
        // ==================== تحميل خيارات الفلاتر ====================
        async function loadFiltersOptions() {
            try {
                // جلب المعلمين
                const teachers = await fetchUsers({ role: 'teacher' });
                teachersList = teachers;
                const teacherFilter = document.getElementById('filterTeacher');
                teacherFilter.innerHTML = '<option value="all">👨‍🏫 كل المعلمين</option>';
                for (const t of teachers) {
                    teacherFilter.innerHTML += `<option value="${t.id}">${escapeHtml(t.name)}</option>`;
                }
                
                // جلب الصفوف للمودال
                const classes = await fetchClasses();
                classesList = classes;
                const classSelect = document.getElementById('groupClassId');
                classSelect.innerHTML = '<option value="">-- اختر الصف --</option>';
                for (const c of classes) {
                    classSelect.innerHTML += `<option value="${c.id}">${escapeHtml(c.name)}</option>`;
                }
                
                // جلب المواد للمودال
                const subjects = await fetchSubjects();
                subjectsList = subjects;
                const subjectSelect = document.getElementById('groupSubjectId');
                subjectSelect.innerHTML = '<option value="">-- اختر المادة --</option>';
                for (const s of subjects) {
                    subjectSelect.innerHTML += `<option value="${s.id}">${escapeHtml(s.name)}</option>`;
                }
                
                // جلب المعلمين للمودال
                const teacherSelect = document.getElementById('groupTeacherId');
                teacherSelect.innerHTML = '<option value="">-- اختر المعلم --</option>';
                for (const t of teachers) {
                    teacherSelect.innerHTML += `<option value="${t.id}">${escapeHtml(t.name)}</option>`;
                }
                
            } catch (error) {
                console.error('Error loading filters:', error);
            }
        }
        
        // ==================== تحميل المجموعات ====================
        async function loadGroups() {
            const loadingIndicator = document.getElementById('groupsLoadingIndicator');
            loadingIndicator.style.display = 'block';
            
            try {
                const search = document.getElementById('searchInput').value;
                const teacherId = document.getElementById('filterTeacher').value;
                
                let filters = {};
                if (teacherId !== 'all') filters.teacher_id = parseInt(teacherId);
                
                let groups = await fetchGroups(filters);
                
                if (search) {
                    groups = groups.filter(g => g.name && g.name.toLowerCase().includes(search.toLowerCase()));
                }
                
                allGroupsData = groups;
                
                // Pagination
                const totalPages = Math.ceil(allGroupsData.length / itemsPerPage);
                const startIndex = (groupsPage - 1) * itemsPerPage;
                const paginatedGroups = allGroupsData.slice(startIndex, startIndex + itemsPerPage);
                
                renderGroupsList(paginatedGroups);
                renderGroupsPagination(totalPages);
                
            } catch (error) {
                console.error('Error loading groups:', error);
                document.getElementById('groupsList').innerHTML = '<div class="empty-state">حدث خطأ</div>';
            } finally {
                loadingIndicator.style.display = 'none';
            }
        }
        
        function renderGroupsList(groups) {
            const container = document.getElementById('groupsList');
            
            if (!groups || groups.length === 0) {
                container.innerHTML = '<div class="empty-state">📭 لا توجد مجموعات</div>';
                return;
            }
            
            container.innerHTML = '';
            for (let i = 0; i < groups.length; i++) {
                const g = groups[i];
                const className = g.classes ? g.classes.name : '-';
                const subjectName = g.subjects ? g.subjects.name : '-';
                const teacherName = g.users ? g.users.name : '-';
                const memberText = (g.member_count || 0) + (g.max_capacity ? '/' + g.max_capacity : '');
                
                const card = document.createElement('div');
                card.className = 'group-card';
                card.innerHTML = `
                    <div style="display: flex; justify-content: space-between; align-items: flex-start; flex-wrap: wrap; gap: 15px;">
                        <div style="flex: 1;">
                            <h3>📌 ${escapeHtml(g.name)}</h3>
                            <p style="color: #64748b; margin: 8px 0;">${escapeHtml(g.description || 'لا يوجد وصف')}</p>
                            <div class="exam-info">
                                <span>👨‍🏫 ${escapeHtml(teacherName)}</span>
                                <span>🎓 ${escapeHtml(className)}</span>
                                <span>📖 ${escapeHtml(subjectName)}</span>
                                <span>👥 ${memberText} طالب</span>
                                <span class="badge ${g.is_open ? 'badge-success' : 'badge-danger'}">${g.is_open ? 'مفتوح' : 'مغلق'}</span>
                            </div>
                        </div>
                        <div class="action-buttons">
                            <button class="btn btn-warning btn-sm" onclick="editGroup(${g.id})">✏️ تعديل</button>
                            <button class="btn btn-danger btn-sm" onclick="deleteGroupConfirm(${g.id})">🗑️ حذف</button>
                        </div>
                    </div>
                `;
                container.appendChild(card);
            }
        }
        
        function renderGroupsPagination(totalPages) {
            const container = document.getElementById('groupsPagination');
            
            if (totalPages <= 1) {
                container.innerHTML = '';
                return;
            }
            
            let html = '';
            if (groupsPage > 1) html += `<button class="page-btn" onclick="goToGroupsPage(${groupsPage - 1})">← السابق</button>`;
            
            for (let i = 1; i <= Math.min(totalPages, 5); i++) {
                html += `<button class="page-btn ${i === groupsPage ? 'active' : ''}" onclick="goToGroupsPage(${i})">${i}</button>`;
            }
            
            if (groupsPage < totalPages) html += `<button class="page-btn" onclick="goToGroupsPage(${groupsPage + 1})">التالي →</button>`;
            
            container.innerHTML = html;
        }
        
        function goToGroupsPage(page) {
            groupsPage = page;
            loadGroups();
        }
        
        // ==================== طلبات الانتظار ====================
        async function loadPendingRequests() {
            try {
                const search = document.getElementById('requestSearch').value;
                const groupId = document.getElementById('filterGroup').value;
                
                let query = sb
                    .from('group_members')
                    .select('*, users:student_id(id, name, phone), groups:group_id(id, name, users:teacher_id(id, name))')
                    .eq('status', 'pending');
                
                const { data: requests, error } = await query.order('created_at', { ascending: false });
                
                if (error) throw error;
                
                let filtered = requests || [];
                
                if (groupId !== 'all') {
                    filtered = filtered.filter(r => r.group_id == groupId);
                }
                
                if (search) {
                    filtered = filtered.filter(r => 
                        (r.users?.name && r.users.name.toLowerCase().includes(search.toLowerCase())) ||
                        (r.users?.phone && r.users.phone.includes(search))
                    );
                }
                
                allRequestsData = filtered;
                
                // تحديث عدد الطلبات في التبويب
                const badge = document.getElementById('pendingBadge');
                if (allRequestsData.length > 0) {
                    badge.style.display = 'inline-block';
                    badge.innerHTML = allRequestsData.length;
                } else {
                    badge.style.display = 'none';
                }
                
                // Pagination
                const totalPages = Math.ceil(allRequestsData.length / itemsPerPage);
                const startIndex = (requestsPage - 1) * itemsPerPage;
                const paginatedRequests = allRequestsData.slice(startIndex, startIndex + itemsPerPage);
                
                renderPendingRequestsTable(paginatedRequests);
                renderRequestsPagination(totalPages);
                
                await loadGroupsFilter();
                
            } catch (error) {
                console.error('Error loading pending requests:', error);
                document.getElementById('pendingRequestsTable').innerHTML = '<td><td colspan="7" class="empty-state">حدث خطأ</td></tr>';
            }
        }
        
        function renderPendingRequestsTable(requests) {
            const tbody = document.getElementById('pendingRequestsTable');
            
            if (!requests || requests.length === 0) {
                tbody.innerHTML = '<tr><td colspan="7" class="empty-state">✨ لا توجد طلبات انتظار</td></tr>';
                return;
            }
            
            tbody.innerHTML = '';
            for (let i = 0; i < requests.length; i++) {
                const r = requests[i];
                const studentName = r.users?.name || '-';
                const studentPhone = r.users?.phone || '-';
                const groupName = r.groups?.name || '-';
                const teacherName = r.groups?.users?.name || '-';
                
                const row = document.createElement('tr');
                row.innerHTML = `
                    <td>${((requestsPage - 1) * itemsPerPage) + i + 1}</td>
                    <td><strong>${escapeHtml(studentName)}</strong></td>
                    <td>${escapeHtml(studentPhone)}</td>
                    <td>${escapeHtml(groupName)}</td>
                    <td>${escapeHtml(teacherName)}</td>
                    <td>${formatDate(r.created_at)}</td>
                    <td>
                        <div class="action-buttons" style="gap: 5px;">
                            <button class="btn btn-success btn-sm" onclick="approveRequest('${r.id}')">✅ قبول</button>
                            <button class="btn btn-danger btn-sm" onclick="rejectRequest('${r.id}')">❌ رفض</button>
                        </div>
                    </td>
                `;
                tbody.appendChild(row);
            }
        }
        
        function renderRequestsPagination(totalPages) {
            const container = document.getElementById('requestsPagination');
            
            if (totalPages <= 1) {
                container.innerHTML = '';
                return;
            }
            
            let html = '';
            if (requestsPage > 1) html += `<button class="page-btn" onclick="goToRequestsPage(${requestsPage - 1})">← السابق</button>`;
            
            for (let i = 1; i <= Math.min(totalPages, 5); i++) {
                html += `<button class="page-btn ${i === requestsPage ? 'active' : ''}" onclick="goToRequestsPage(${i})">${i}</button>`;
            }
            
            if (requestsPage < totalPages) html += `<button class="page-btn" onclick="goToRequestsPage(${requestsPage + 1})">التالي →</button>`;
            
            container.innerHTML = html;
        }
        
        function goToRequestsPage(page) {
            requestsPage = page;
            loadPendingRequests();
        }
        
        async function loadGroupsFilter() {
            try {
                const { data: groups } = await sb
                    .from('groups')
                    .select('id, name')
                    .order('name');
                
                const groupFilter = document.getElementById('filterGroup');
                groupFilter.innerHTML = '<option value="all">👥 كل المجموعات</option>';
                for (const g of groups || []) {
                    groupFilter.innerHTML += `<option value="${g.id}">${escapeHtml(g.name)}</option>`;
                }
                
            } catch (error) {
                console.error('Error loading groups filter:', error);
            }
        }
        
        // ==================== قبول طلب ====================
        async function approveRequest(requestId) {
            try {
                const { error } = await sb
                    .from('group_members')
                    .update({ status: 'approved', joined_at: new Date() })
                    .eq('id', requestId);
                
                if (error) throw error;
                
                showToast('✅ تم قبول الطالب', 'success');
                requestsPage = 1;
                loadPendingRequests();
                loadGroups();
                loadStats();
                
            } catch (error) {
                console.error('Error approving request:', error);
                showToast('حدث خطأ', 'error');
            }
        }
        
        // ==================== رفض طلب ====================
        async function rejectRequest(requestId) {
            try {
                const { error } = await sb
                    .from('group_members')
                    .update({ status: 'rejected' })
                    .eq('id', requestId);
                
                if (error) throw error;
                
                showToast('❌ تم رفض الطلب', 'success');
                requestsPage = 1;
                loadPendingRequests();
                loadStats();
                
            } catch (error) {
                console.error('Error rejecting request:', error);
                showToast('حدث خطأ', 'error');
            }
        }
        
        // ==================== إنشاء/تعديل مجموعة ====================
        function openCreateGroupModal() {
            currentGroupId = null;
            document.getElementById('modalTitle').innerHTML = '➕ إنشاء مجموعة جديدة';
            document.getElementById('groupName').value = '';
            document.getElementById('groupDesc').value = '';
            document.getElementById('groupMaxCapacity').value = '';
            document.getElementById('groupIsOpen').checked = true;
            document.getElementById('groupClassId').value = '';
            document.getElementById('groupSubjectId').value = '';
            document.getElementById('groupTeacherId').value = '';
            document.getElementById('groupModal').style.display = 'flex';
        }
        
        async function editGroup(id) {
            const { data: group, error } = await sb
                .from('groups')
                .select('*')
                .eq('id', id)
                .single();
            
            if (error || !group) {
                showToast('حدث خطأ', 'error');
                return;
            }
            
            currentGroupId = id;
            document.getElementById('modalTitle').innerHTML = '✏️ تعديل مجموعة';
            document.getElementById('groupName').value = group.name || '';
            document.getElementById('groupDesc').value = group.description || '';
            document.getElementById('groupMaxCapacity').value = group.max_capacity || '';
            document.getElementById('groupIsOpen').checked = group.is_open || false;
            document.getElementById('groupClassId').value = group.class_id || '';
            document.getElementById('groupSubjectId').value = group.subject_id || '';
            document.getElementById('groupTeacherId').value = group.teacher_id || '';
            document.getElementById('groupModal').style.display = 'flex';
        }
        
        async function saveGroup() {
            const name = document.getElementById('groupName').value;
            const description = document.getElementById('groupDesc').value;
            const classId = document.getElementById('groupClassId').value;
            const subjectId = document.getElementById('groupSubjectId').value;
            const teacherId = document.getElementById('groupTeacherId').value;
            const maxCapacity = document.getElementById('groupMaxCapacity').value;
            const isOpen = document.getElementById('groupIsOpen').checked;
            
            if (!name) {
                showToast('اسم المجموعة مطلوب', 'error');
                return;
            }
            if (!teacherId) {
                showToast('اختر المعلم', 'error');
                return;
            }
            
            const groupData = {
                name: name,
                description: description || null,
                class_id: classId || null,
                subject_id: subjectId || null,
                teacher_id: parseInt(teacherId),
                max_capacity: maxCapacity || null,
                is_open: isOpen
            };
            
            let result;
            if (currentGroupId) {
                const { error } = await sb
                    .from('groups')
                    .update(groupData)
                    .eq('id', currentGroupId);
                result = !error;
            } else {
                const { error } = await sb
                    .from('groups')
                    .insert(groupData);
                result = !error;
            }
            
            if (result) {
                closeGroupModal();
                groupsPage = 1;
                loadGroups();
                loadStats();
                showToast('تم ' + (currentGroupId ? 'تعديل' : 'إنشاء') + ' المجموعة', 'success');
            } else {
                showToast('حدث خطأ', 'error');
            }
        }
        
        function deleteGroupConfirm(id) {
            showConfirm('⚠️ هل أنت متأكد من حذف هذه المجموعة؟ سيتم حذف جميع أعضائها أيضاً.', async () => {
                const { error } = await sb
                    .from('groups')
                    .delete()
                    .eq('id', id);
                
                if (error) {
                    showToast('حدث خطأ', 'error');
                    return;
                }
                
                groupsPage = 1;
                loadGroups();
                loadStats();
                showToast('تم حذف المجموعة', 'success');
            });
        }
        
        function closeGroupModal() {
            document.getElementById('groupModal').style.display = 'none';
        }
        
        // ==================== دوال مساعدة ====================
        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/[&<>]/g, function(m) {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                return m;
            });
        }
        
        // ==================== أحداث ====================
        document.getElementById('searchInput').addEventListener('input', () => {
            groupsPage = 1;
            loadGroups();
        });
        document.getElementById('filterTeacher').addEventListener('change', () => {
            groupsPage = 1;
            loadGroups();
        });
        document.getElementById('requestSearch').addEventListener('input', () => {
            requestsPage = 1;
            loadPendingRequests();
        });
        document.getElementById('filterGroup').addEventListener('change', () => {
            requestsPage = 1;
            loadPendingRequests();
        });
        
        window.showTab = showTab;
        window.goToGroupsPage = goToGroupsPage;
        window.goToRequestsPage = goToRequestsPage;
        window.openCreateGroupModal = openCreateGroupModal;
        window.editGroup = editGroup;
        window.saveGroup = saveGroup;
        window.deleteGroupConfirm = deleteGroupConfirm;
        window.approveRequest = approveRequest;
        window.rejectRequest = rejectRequest;
        window.closeGroupModal = closeGroupModal;
        
        // ==================== تحميل أولي ====================
        async function init() {
            await loadFiltersOptions();
            await loadStats();
            await loadGroups();
        }
        
        init();
    </script>
</body>
</html>
