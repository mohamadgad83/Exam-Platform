<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>طلابي - منصة الاختبارات</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.sheetjs.com/xlsx-0.20.2/package/dist/xlsx.full.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <style>
        .student-card {
            background: #f8fafc;
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 15px;
            border: 1px solid #e2e8f0;
            transition: all 0.2s;
        }
        .student-card:hover {
            transform: translateX(-5px);
            border-right: 4px solid #6366f1;
            background: white;
        }
        .student-stats {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
            margin-top: 12px;
        }
        .stat-badge {
            background: #e2e8f0;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            color: #475569;
        }
        .progress-bar {
            width: 100%;
            height: 8px;
            background: #e2e8f0;
            border-radius: 10px;
            overflow: hidden;
            margin-top: 8px;
        }
        .progress-fill {
            height: 100%;
            background: linear-gradient(135deg, #6366f1, #8b5cf6);
            border-radius: 10px;
            transition: width 0.3s ease;
        }
        .loading-skeleton {
            background: linear-gradient(90deg, #e2e8f0 25%, #f1f5f9 50%, #e2e8f0 75%);
            background-size: 200% 100%;
            animation: loading 1.5s infinite;
            border-radius: 8px;
            height: 80px;
            margin-bottom: 15px;
        }
        @keyframes loading {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }
        .stats-summary {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 15px;
            margin-bottom: 25px;
        }
        .stats-card {
            background: linear-gradient(135deg, #f8fafc, #f1f5f9);
            border-radius: 20px;
            padding: 20px;
            text-align: center;
        }
        .stats-number {
            font-size: 32px;
            font-weight: 800;
            color: #6366f1;
        }
        .pagination {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-top: 25px;
            flex-wrap: wrap;
        }
        .page-btn {
            padding: 8px 16px;
            border: 1px solid #e2e8f0;
            background: white;
            border-radius: 10px;
            cursor: pointer;
            transition: 0.2s;
        }
        .page-btn.active {
            background: linear-gradient(135deg, #6366f1, #8b5cf6);
            color: white;
            border-color: transparent;
        }
        .page-btn:hover:not(.active) {
            background: #f1f5f9;
        }
        .empty-state {
            text-align: center;
            padding: 60px;
            color: #64748b;
        }
        .empty-state-icon {
            font-size: 64px;
            margin-bottom: 16px;
            opacity: 0.5;
        }
        .filter-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
            margin-bottom: 20px;
        }
        .search-input {
            padding: 10px 18px;
            border: 1px solid #e2e8f0;
            border-radius: 50px;
            width: 260px;
            font-family: inherit;
        }
        .filter-select {
            padding: 10px 18px;
            border: 1px solid #e2e8f0;
            border-radius: 50px;
            min-width: 150px;
            font-family: inherit;
            background: white;
        }
        .btn-excel {
            background: #10b981;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 14px;
            cursor: pointer;
            font-weight: 600;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            transition: 0.2s;
        }
        .btn-excel:hover {
            background: #059669;
            transform: translateY(-2px);
        }
        @media (max-width: 768px) {
            .stats-summary {
                grid-template-columns: repeat(2, 1fr);
            }
            .student-stats {
                flex-direction: column;
                gap: 8px;
            }
            .filter-bar {
                flex-direction: column;
                align-items: stretch;
            }
            .search-input, .filter-select {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="top-bar">
            <div class="logo">📚 منصة الاختبارات</div>
            <div>
                <span style="margin-left: 15px;">👋 مرحباً <span id="teacherName"></span></span>
                <button class="btn btn-outline btn-sm" onclick="window.location.href='teacher-dashboard.html'">🏠 الرئيسية</button>
                <button class="btn btn-outline btn-sm" onclick="window.location.href='teacher-exams.html'">📝 امتحاناتي</button>
                <button class="btn btn-danger btn-sm" onclick="logout()">🚪 خروج</button>
            </div>
        </div>

        <div class="card header">
            <div style="display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 15px;">
                <div>
                    <h1>👨‍🎓 طلابي</h1>
                    <p>قائمة الطلاب المسجلين في صفوفك وموادك مع إحصائيات الأداء</p>
                </div>
                <button class="btn-excel" onclick="exportToExcel()">
                    📊 تصدير إلى Excel
                </button>
            </div>
        </div>

        <!-- إحصائيات سريعة -->
        <div class="stats-summary" id="statsSummary">
            <div class="stats-card">
                <div class="stats-number" id="totalStudents">0</div>
                <div>📚 إجمالي الطلاب</div>
            </div>
            <div class="stats-card">
                <div class="stats-number" id="avgScore">0%</div>
                <div>⭐ متوسط الدرجات</div>
            </div>
            <div class="stats-card">
                <div class="stats-number" id="completedExams">0</div>
                <div>📝 امتحانات مكتملة</div>
            </div>
            <div class="stats-card">
                <div class="stats-number" id="passRate">0%</div>
                <div>🎉 نسبة النجاح</div>
            </div>
        </div>

        <div class="card">
            <div class="filter-bar">
                <input type="text" id="searchInput" class="search-input" placeholder="🔍 بحث باسم الطالب أو رقم الهاتف...">
                <select id="classFilter" class="filter-select" onchange="loadStudents()">
                    <option value="all">🎓 كل الصفوف</option>
                </select>
                <select id="subjectFilter" class="filter-select" onchange="loadStudents()">
                    <option value="all">📖 كل المواد</option>
                </select>
                <button class="btn btn-outline" onclick="loadStudents()">🔄 تحديث</button>
            </div>
            
            <div id="loadingIndicator" class="loading-skeleton" style="display: none;"></div>
            <div id="studentsList"></div>
            
            <!-- Pagination -->
            <div id="pagination" class="pagination"></div>
        </div>
    </div>

    <script src="js/supabase-config.js"></script>
    <script src="js/notifications.js"></script>
    <script>
        // ==================== التحقق من صلاحية الدخول ====================
        if (!checkAuth(['teacher', 'admin'])) return;
        
        const user = getUser();
        let allStudentsData = [];
        let currentPage = 1;
        let itemsPerPage = 10;
        let classesList = [];
        let subjectsList = [];
        
        document.getElementById('teacherName').innerHTML = user.name || user.username || 'معلم';
        
        // ==================== تحميل خيارات الفلاتر ====================
        async function loadFiltersOptions() {
            try {
                // جلب الصفوف والمواد الخاصة بالمعلم
                const assignments = await fetchTeacherAssignments(user.id);
                
                const classMap = new Map();
                const subjectMap = new Map();
                
                for (const a of assignments) {
                    if (a.classes && !classMap.has(a.class_id)) {
                        classMap.set(a.class_id, { id: a.class_id, name: a.classes.name });
                    }
                    if (a.subjects && !subjectMap.has(a.subject_id)) {
                        subjectMap.set(a.subject_id, { id: a.subject_id, name: a.subjects.name });
                    }
                }
                
                classesList = Array.from(classMap.values());
                subjectsList = Array.from(subjectMap.values());
                
                const classFilter = document.getElementById('classFilter');
                classFilter.innerHTML = '<option value="all">🎓 كل الصفوف</option>';
                for (const c of classesList) {
                    classFilter.innerHTML += `<option value="${c.id}">${escapeHtml(c.name)}</option>`;
                }
                
                const subjectFilter = document.getElementById('subjectFilter');
                subjectFilter.innerHTML = '<option value="all">📖 كل المواد</option>';
                for (const s of subjectsList) {
                    subjectFilter.innerHTML += `<option value="${s.id}">${escapeHtml(s.name)}</option>`;
                }
                
            } catch (error) {
                console.error('Error loading filters:', error);
            }
        }
        
        // ==================== تحميل الطلاب (محسّن بدون N+1 queries) ====================
        async function loadStudents() {
            const loadingIndicator = document.getElementById('loadingIndicator');
            loadingIndicator.style.display = 'block';
            
            try {
                const search = document.getElementById('searchInput').value;
                const classId = document.getElementById('classFilter').value;
                const subjectId = document.getElementById('subjectFilter').value;
                
                // خطوة 1: جلب تعيينات المعلم (الصفوف والمواد)
                const assignments = await fetchTeacherAssignments(user.id);
                const teacherClassIds = [...new Set(assignments.map(a => a.class_id))];
                
                if (teacherClassIds.length === 0) {
                    document.getElementById('studentsList').innerHTML = '<div class="empty-state"><div class="empty-state-icon">📭</div><p>لم يتم تعيين أي صفوف لك. راجع الأدمن.</p></div>';
                    loadingIndicator.style.display = 'none';
                    return;
                }
                
                // جلب جميع الطلاب في الصفوف دفعة واحدة
                let query = sb
                    .from('users')
                    .select('id, name, phone, class_id, created_at')
                    .eq('role', 'student')
                    .in('class_id', teacherClassIds);
                
                const { data: students, error } = await query.order('name');
                
                if (error) throw error;
                
                let filteredStudents = students || [];
                
                // فلترة حسب الصف
                if (classId !== 'all') {
                    filteredStudents = filteredStudents.filter(s => s.class_id == classId);
                }
                
                // فلترة حسب البحث
                if (search) {
                    filteredStudents = filteredStudents.filter(s => 
                        s.name.toLowerCase().includes(search.toLowerCase()) ||
                        (s.phone && s.phone.includes(search))
                    );
                }
                
                // جلب جميع محاولات الامتحانات للطلاب دفعة واحدة
                const studentIds = filteredStudents.map(s => s.id);
                let allAttempts = [];
                
                if (studentIds.length > 0) {
                    // جلب امتحانات المعلم أولاً
                    const { data: teacherExams } = await sb
                        .from('exams')
                        .select('id')
                        .eq('teacher_id', user.id);
                    
                    const teacherExamIds = (teacherExams || []).map(e => e.id);
                    
                    if (teacherExamIds.length > 0) {
                        const { data: attempts } = await sb
                            .from('exam_attempts')
                            .select('*, exam:exam_id(id, title, passing_score)')
                            .in('student_id', studentIds)
                            .in('exam_id', teacherExamIds)
                            .in('status', ['submitted', 'graded']);
                        
                        allAttempts = attempts || [];
                    }
                }
                
                // تجميع البيانات لكل طالب
                const studentsWithStats = [];
                let totalScoreSum = 0;
                let totalScoreCount = 0;
                let totalCompletedExams = 0;
                let totalPassedExams = 0;
                
                for (const student of filteredStudents) {
                    const studentAttempts = allAttempts.filter(a => a.student_id === student.id);
                    
                    let examCount = studentAttempts.length;
                    let avgPercentage = 0;
                    let passedCount = 0;
                    
                    if (examCount > 0) {
                        let totalPercentage = 0;
                        for (const attempt of studentAttempts) {
                            if (attempt.total_points && attempt.total_points > 0) {
                                const percentage = (attempt.score / attempt.total_points) * 100;
                                totalPercentage += percentage;
                                
                                if (percentage >= (attempt.exam?.passing_score || 50)) {
                                    passedCount++;
                                }
                            }
                        }
                        avgPercentage = Math.round(totalPercentage / examCount);
                        
                        totalScoreSum += totalPercentage;
                        totalScoreCount++;
                        totalCompletedExams += examCount;
                        totalPassedExams += passedCount;
                    }
                    
                    studentsWithStats.push({
                        ...student,
                        examCount: examCount,
                        avgPercentage: avgPercentage,
                        passedCount: passedCount
                    });
                }
                
                // فلترة حسب المادة
                let finalStudents = studentsWithStats;
                if (subjectId !== 'all') {
                    const { data: subjectExams } = await sb
                        .from('exams')
                        .select('id')
                        .eq('subject_id', parseInt(subjectId))
                        .eq('teacher_id', user.id);
                    
                    const subjectExamIds = (subjectExams || []).map(e => e.id);
                    
                    finalStudents = studentsWithStats.filter(s => {
                        const studentAttempts = allAttempts.filter(a => 
                            a.student_id === s.id && subjectExamIds.includes(a.exam_id)
                        );
                        return studentAttempts.length > 0;
                    });
                }
                
                // تحديث الإحصائيات
                updateStatsSummary(finalStudents.length, totalScoreSum, totalScoreCount, totalCompletedExams, totalPassedExams);
                
                // Pagination
                const totalPages = Math.ceil(finalStudents.length / itemsPerPage);
                const startIndex = (currentPage - 1) * itemsPerPage;
                const paginatedStudents = finalStudents.slice(startIndex, startIndex + itemsPerPage);
                
                renderStudentsList(paginatedStudents);
                renderPagination(totalPages, currentPage);
                
            } catch (error) {
                console.error('Error loading students:', error);
                document.getElementById('studentsList').innerHTML = '<div class="empty-state">حدث خطأ في تحميل الطلاب</div>';
            } finally {
                loadingIndicator.style.display = 'none';
            }
        }
        
        // ==================== تحديث الإحصائيات ====================
        function updateStatsSummary(totalStudents, totalScoreSum, totalScoreCount, totalCompletedExams, totalPassedExams) {
            document.getElementById('totalStudents').innerHTML = totalStudents;
            
            const avgScore = totalScoreCount > 0 ? Math.round(totalScoreSum / totalScoreCount) : 0;
            document.getElementById('avgScore').innerHTML = avgScore + '%';
            
            document.getElementById('completedExams').innerHTML = totalCompletedExams;
            
            const passRate = totalCompletedExams > 0 ? Math.round((totalPassedExams / totalCompletedExams) * 100) : 0;
            document.getElementById('passRate').innerHTML = passRate + '%';
        }
        
        // ==================== عرض قائمة الطلاب ====================
        function renderStudentsList(students) {
            const container = document.getElementById('studentsList');
            
            if (students.length === 0) {
                container.innerHTML = '<div class="empty-state"><div class="empty-state-icon">📭</div><p>لا توجد نتائج</p></div>';
                return;
            }
            
            container.innerHTML = '';
            
            for (let i = 0; i < students.length; i++) {
                const s = students[i];
                
                let progressColor = '';
                let progressText = '';
                if (s.avgPercentage >= 70) {
                    progressColor = '#10b981';
                    progressText = 'ممتاز';
                } else if (s.avgPercentage >= 50) {
                    progressColor = '#f59e0b';
                    progressText = 'جيد';
                } else {
                    progressColor = '#ef4444';
                    progressText = 'يحتاج تحسين';
                }
                
                const card = document.createElement('div');
                card.className = 'student-card';
                card.innerHTML = `
                    <div style="display: flex; justify-content: space-between; align-items: flex-start; flex-wrap: wrap; gap: 15px;">
                        <div style="flex: 1;">
                            <div style="display: flex; align-items: center; gap: 12px; flex-wrap: wrap;">
                                <h3>👨‍🎓 ${escapeHtml(s.name)}</h3>
                                <span class="badge ${s.avgPercentage >= 70 ? 'badge-success' : (s.avgPercentage >= 50 ? 'badge-warning' : 'badge-danger')}">
                                    ${progressText}
                                </span>
                            </div>
                            <div class="exam-info" style="margin-top: 8px;">
                                <span>📞 ${s.phone || '-'}</span>
                                <span>📝 ${s.examCount} امتحان</span>
                                <span>⭐ متوسط: ${s.avgPercentage}%</span>
                                <span>🎉 نجح في ${s.passedCount} امتحان</span>
                            </div>
                            <div class="progress-bar">
                                <div class="progress-fill" style="width: ${s.avgPercentage}%; background: ${progressColor};"></div>
                            </div>
                        </div>
                        <div>
                            <button class="btn btn-info btn-sm" onclick="viewStudentDetails(${s.id}, '${escapeHtml(s.name).replace(/'/g, "\\'")}')">
                                📊 التفاصيل
                            </button>
                        </div>
                    </div>
                `;
                container.appendChild(card);
            }
        }
        
        // ==================== عرض تفاصيل الطالب ====================
        async function viewStudentDetails(studentId, studentName) {
            try {
                const { data: attempts } = await sb
                    .from('exam_attempts')
                    .select('*, exam:exam_id(id, title, passing_score)')
                    .eq('student_id', studentId)
                    .in('status', ['submitted', 'graded']);
                
                if (!attempts || attempts.length === 0) {
                    showToast(`لا توجد نتائج مسجلة للطالب ${studentName}`, 'warning');
                    return;
                }
                
                let message = `📊 تفاصيل نتائج الطالب ${studentName}:\n\n`;
                message += `━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━\n`;
                
                for (const a of attempts) {
                    const percentage = a.total_points ? Math.round((a.score / a.total_points) * 100) : 0;
                    const passed = percentage >= (a.exam?.passing_score || 50);
                    const statusIcon = passed ? '✅' : '❌';
                    
                    message += `${statusIcon} ${a.exam?.title || 'امتحان'}\n`;
                    message += `   📝 الدرجة: ${a.score}/${a.total_points} (${percentage}%)\n`;
                    message += `   📅 ${formatDateTime(a.submitted_at)}\n`;
                    message += `━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━\n`;
                }
                
                let totalPercentage = 0;
                let passedCount = 0;
                for (const a of attempts) {
                    if (a.total_points && a.total_points > 0) {
                        const p = (a.score / a.total_points) * 100;
                        totalPercentage += p;
                        if (p >= (a.exam?.passing_score || 50)) passedCount++;
                    }
                }
                const avg = Math.round(totalPercentage / attempts.length);
                
                message += `\n📈 إحصائيات عامة:\n`;
                message += `   متوسط الدرجات: ${avg}%\n`;
                message += `   الامتحانات الناجحة: ${passedCount}/${attempts.length}\n`;
                message += `   نسبة النجاح: ${Math.round((passedCount / attempts.length) * 100)}%`;
                
                alert(message);
                
            } catch (error) {
                console.error('Error viewing student details:', error);
                showToast('حدث خطأ', 'error');
            }
        }
        
        // ==================== تصدير إلى Excel ====================
        function exportToExcel() {
            // البحث عن الجدول أو جمع البيانات من البطاقات
            const students = allStudentsData;
            
            if (!students || students.length === 0) {
                showToast('لا توجد بيانات للتصدير', 'error');
                return;
            }
            
            // تجهيز البيانات للتصدير
            const exportData = students.map((s, index) => ({
                '#': index + 1,
                'اسم الطالب': s.name,
                'رقم الهاتف': s.phone || '-',
                'عدد الامتحانات': s.examCount || 0,
                'متوسط الدرجات': s.avgPercentage ? `${s.avgPercentage}%` : '0%',
                'الامتحانات الناجحة': s.passedCount || 0,
                'تاريخ التسجيل': formatDate(s.created_at)
            }));
            
            // إنشاء ورقة عمل
            const ws = XLSX.utils.json_to_sheet(exportData);
            
            // ضبط عرض الأعمدة
            ws['!cols'] = [
                { wch: 5 },   // #
                { wch: 25 },  // اسم الطالب
                { wch: 15 },  // رقم الهاتف
                { wch: 15 },  // عدد الامتحانات
                { wch: 15 },  // متوسط الدرجات
                { wch: 18 },  // الامتحانات الناجحة
                { wch: 20 }   // تاريخ التسجيل
            ];
            
            // إنشاء ملف Excel
            const wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, ws, 'الطلاب');
            
            // تحميل الملف
            const fileName = `students_${new Date().toISOString().slice(0, 19).replace(/:/g, '-')}.xlsx`;
            XLSX.writeFile(wb, fileName);
            
            showToast('✅ تم تصدير البيانات بنجاح', 'success');
        }
        
        // ==================== أزرار التصفح ====================
        function renderPagination(totalPages, currentPage) {
            const container = document.getElementById('pagination');
            
            if (totalPages <= 1) {
                container.innerHTML = '';
                return;
            }
            
            let html = '';
            
            if (currentPage > 1) {
                html += `<button class="page-btn" onclick="goToPage(${currentPage - 1})">← السابق</button>`;
            }
            
            const startPage = Math.max(1, currentPage - 2);
            const endPage = Math.min(totalPages, currentPage + 2);
            
            if (startPage > 1) {
                html += `<button class="page-btn" onclick="goToPage(1)">1</button>`;
                if (startPage > 2) html += `<span class="page-btn" style="cursor: default;">...</span>`;
            }
            
            for (let i = startPage; i <= endPage; i++) {
                html += `<button class="page-btn ${i === currentPage ? 'active' : ''}" onclick="goToPage(${i})">${i}</button>`;
            }
            
            if (endPage < totalPages) {
                if (endPage < totalPages - 1) html += `<span class="page-btn" style="cursor: default;">...</span>`;
                html += `<button class="page-btn" onclick="goToPage(${totalPages})">${totalPages}</button>`;
            }
            
            if (currentPage < totalPages) {
                html += `<button class="page-btn" onclick="goToPage(${currentPage + 1})">التالي →</button>`;
            }
            
            container.innerHTML = html;
        }
        
        function goToPage(page) {
            currentPage = page;
            loadStudents();
        }
        
        // ==================== دوال مساعدة ====================
        function escapeHtml(str) {
            if (!str) return '';
            return String(str).replace(/[&<>]/g, function(m) {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                return m;
            });
        }
        
        function formatDate(date) {
            if (!date) return '-';
            return new Date(date).toLocaleDateString('ar-EG');
        }
        
        function formatDateTime(date) {
            if (!date) return '-';
            return new Date(date).toLocaleString('ar-EG');
        }
        
        function showToast(message, type = 'success') {
            const existing = document.querySelector('.toast-notification');
            if (existing) existing.remove();
            
            const toast = document.createElement('div');
            toast.className = `toast-notification toast-${type}`;
            toast.innerHTML = `
                <div class="toast-icon">${type === 'success' ? '✅' : type === 'error' ? '❌' : '⚠️'}</div>
                <div class="toast-message">${message}</div>
                <div class="toast-progress"></div>
            `;
            document.body.appendChild(toast);
            setTimeout(() => toast.classList.add('show'), 10);
            setTimeout(() => {
                toast.classList.remove('show');
                setTimeout(() => toast.remove(), 300);
            }, 3000);
        }
        
        // ==================== أحداث البحث والفلاتر ====================
        document.getElementById('searchInput').addEventListener('input', () => {
            currentPage = 1;
            loadStudents();
        });
        document.getElementById('classFilter').addEventListener('change', () => {
            currentPage = 1;
            loadStudents();
        });
        document.getElementById('subjectFilter').addEventListener('change', () => {
            currentPage = 1;
            loadStudents();
        });
        
        // تصدير الدوال للنطاق العام
        window.viewStudentDetails = viewStudentDetails;
        window.goToPage = goToPage;
        window.exportToExcel = exportToExcel;
        
        // ==================== تهيئة الإشعارات ====================
        async function initNotifications() {
            if (window.notificationSystem) {
                await window.notificationSystem.init(user);
            }
        }
        
        // ==================== تحميل أولي ====================
        async function init() {
            await loadFiltersOptions();
            await loadStudents();
            await initNotifications();
        }
        
        init();
    </script>
</body>
</html>
