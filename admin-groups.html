<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إدارة المجموعات - منصة الاختبارات</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Cairo', sans-serif; background: #f0f2f5; padding: 20px; }
        .container { max-width: 1400px; margin: 0 auto; }
        .admin-bar {
            background: linear-gradient(135deg, #1e293b, #0f172a);
            color: white;
            padding: 12px 24px;
            border-radius: 20px;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
        }
        .card {
            background: white;
            border-radius: 28px;
            padding: 25px;
            margin-bottom: 20px;
            box-shadow: 0 10px 25px -5px rgba(0,0,0,0.05);
            border: 1px solid #e2e8f0;
        }
        .header h1 {
            background: linear-gradient(135deg, #6366f1, #8b5cf6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-size: 28px;
        }
        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 14px;
            cursor: pointer;
            font-weight: 600;
            transition: 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            font-family: inherit;
        }
        .btn-primary { background: linear-gradient(135deg, #6366f1, #4f46e5); color: white; }
        .btn-success { background: #10b981; color: white; }
        .btn-danger { background: #ef4444; color: white; }
        .btn-warning { background: #f59e0b; color: white; }
        .btn-info { background: #3b82f6; color: white; }
        .btn-outline { background: transparent; border: 2px solid #6366f1; color: #6366f1; }
        .btn-sm { padding: 6px 14px; font-size: 12px; }
        .filter-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
            margin-bottom: 20px;
        }
        .search-input {
            padding: 10px 18px;
            border: 1px solid #e2e8f0;
            border-radius: 50px;
            width: 260px;
            font-family: inherit;
        }
        .exam-info {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            margin: 12px 0;
            color: #64748b;
            font-size: 13px;
        }
        .badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 4px 12px;
            border-radius: 40px;
            font-size: 12px;
            font-weight: 600;
        }
        .badge-success { background: #d1fae5; color: #065f46; }
        .badge-danger { background: #fee2e2; color: #991b1b; }
        .badge-warning { background: #fef3c7; color: #d97706; }
        .action-buttons { display: flex; gap: 8px; flex-wrap: wrap; }
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(5px);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
        .modal-content {
            background: white;
            border-radius: 32px;
            padding: 32px;
            width: 550px;
            max-width: 90%;
            max-height: 85vh;
            overflow-y: auto;
        }
        .modal-content input, .modal-content select, .modal-content textarea {
            width: 100%;
            padding: 12px 16px;
            margin: 10px 0;
            border: 1px solid #e2e8f0;
            border-radius: 16px;
            font-family: inherit;
        }
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; margin-bottom: 5px; font-weight: 600; color: #334155; }
        .empty-state { text-align: center; padding: 40px; color: #64748b; }
        
        .toast-notification {
            position: fixed;
            bottom: 30px;
            left: 30px;
            background: white;
            border-radius: 16px;
            padding: 16px 20px;
            display: flex;
            align-items: center;
            gap: 12px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            transform: translateX(-500px);
            transition: transform 0.3s ease;
            z-index: 10000;
            direction: rtl;
            border-right: 4px solid;
        }
        .toast-notification.show { transform: translateX(0); }
        .toast-success { border-right-color: #10b981; }
        .toast-error { border-right-color: #ef4444; }
        .toast-message { flex: 1; font-size: 14px; color: #333; }
        .toast-progress {
            position: absolute;
            bottom: 0;
            left: 0;
            height: 3px;
            width: 100%;
            animation: progress 3s linear forwards;
        }
        @keyframes progress { from { width: 100%; } to { width: 0%; } }
        
        .confirm-modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(5px);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 10001;
        }
        .confirm-content {
            background: white;
            border-radius: 28px;
            padding: 32px;
            text-align: center;
            width: 320px;
        }
        .confirm-buttons { display: flex; gap: 12px; margin-top: 20px; }
        .confirm-yes { background: #10b981; color: white; padding: 10px; border: none; border-radius: 12px; cursor: pointer; flex: 1; }
        .confirm-no { background: #e2e8f0; color: #333; padding: 10px; border: none; border-radius: 12px; cursor: pointer; flex: 1; }
        
        @media (max-width: 768px) {
            .filter-bar { flex-direction: column; align-items: stretch; }
            .search-input { width: 100%; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="admin-bar">
            <div><span style="font-size:20px;">👑</span> إدارة المجموعات - <span id="adminName"></span></div>
            <div>
                <button class="btn btn-outline btn-sm" onclick="window.location.href='admin-dashboard.html'">🏠 الرئيسية</button>
                <button class="btn btn-danger btn-sm" onclick="logout()">🚪 خروج</button>
            </div>
        </div>

        <div class="card header">
            <h1>👥 إدارة المجموعات</h1>
            <p>إنشاء وتعديل وحذف المجموعات الدراسية</p>
        </div>

        <div class="card">
            <div class="filter-bar">
                <input type="text" id="searchInput" class="search-input" placeholder="🔍 بحث باسم المجموعة...">
                <button class="btn btn-primary" onclick="openCreateGroupModal()">➕ إنشاء مجموعة</button>
            </div>
            <div id="groupsList"></div>
        </div>
    </div>

    <!-- مودال إنشاء/تعديل مجموعة -->
    <div id="groupModal" class="modal">
        <div class="modal-content">
            <h3 id="modalTitle">➕ إنشاء مجموعة جديدة</h3>
            <input type="text" id="groupName" placeholder="اسم المجموعة">
            <textarea id="groupDesc" rows="3" placeholder="وصف المجموعة"></textarea>
            <select id="groupClassId">
                <option value="">-- اختر الصف --</option>
            </select>
            <select id="groupSubjectId">
                <option value="">-- اختر المادة --</option>
            </select>
            <select id="groupTeacherId">
                <option value="">-- اختر المعلم --</option>
            </select>
            <input type="number" id="groupMaxCapacity" placeholder="الحد الأقصى للطلاب">
            <label style="display: flex; align-items: center; gap: 10px; margin-top: 10px;">
                <input type="checkbox" id="groupIsOpen" checked> مفتوح للانضمام
            </label>
            <div style="display: flex; gap: 12px; margin-top: 20px;">
                <button class="btn btn-primary" onclick="saveGroup()">💾 حفظ</button>
                <button class="btn btn-outline" onclick="closeGroupModal()">إلغاء</button>
            </div>
        </div>
    </div>

    <!-- مودال عرض أعضاء المجموعة -->
    <div id="membersModal" class="modal">
        <div class="modal-content">
            <h3 id="membersModalTitle">👥 أعضاء المجموعة</h3>
            <div id="membersList"></div>
            <div style="display: flex; gap: 12px; margin-top: 20px;">
                <button class="btn btn-outline" onclick="closeMembersModal()">إغلاق</button>
            </div>
        </div>
    </div>

    <script src="js/supabase-config.js"></script>
    <script>
        // التحقق من صلاحية الدخول
        (function() {
            const user = getUser();
            if (!user || user.role !== 'admin') {
                window.location.href = 'index.html';
                return;
            }
            document.getElementById('adminName').innerHTML = user.name;
        })();
        
        let currentGroupId = null;
        
        // ==================== تحميل المجموعات ====================
        async function loadGroups() {
            const search = document.getElementById('searchInput').value;
            let groups = await fetchGroups({});
            
            if (search) {
                groups = groups.filter(g => g.name.toLowerCase().includes(search.toLowerCase()));
            }
            
            const container = document.getElementById('groupsList');
            if (!groups || groups.length === 0) {
                container.innerHTML = '<div class="empty-state">📭 لا توجد مجموعات</div>';
                return;
            }
            
            container.innerHTML = '';
            for (let i = 0; i < groups.length; i++) {
                const g = groups[i];
                const card = document.createElement('div');
                card.className = 'card';
                card.innerHTML = `
                    <div style="display: flex; justify-content: space-between; align-items: flex-start; flex-wrap: wrap; gap: 15px;">
                        <div style="flex: 1;">
                            <h3>📌 ${g.name}</h3>
                            <p style="color: #64748b; margin: 8px 0;">${g.description || 'لا يوجد وصف'}</p>
                            <div class="exam-info">
                                <span>🎓 ${g.classes?.name || '-'}</span>
                                <span>📖 ${g.subjects?.name || '-'}</span>
                                <span>👨‍🏫 ${g.users?.name || '-'}</span>
                                <span>👥 ${g.member_count || 0}${g.max_capacity ? `/${g.max_capacity}` : ''} طالب</span>
                                <span class="badge ${g.is_open ? 'badge-success' : 'badge-danger'}">${g.is_open ? 'مفتوح' : 'مغلق'}</span>
                            </div>
                        </div>
                        <div class="action-buttons">
                            <button class="btn btn-info btn-sm" onclick="viewMembers(${g.id}, '${g.name.replace(/'/g, "\\'")}')">👥 الأعضاء</button>
                            <button class="btn btn-warning btn-sm" onclick="editGroup(${g.id})">✏️ تعديل</button>
                            <button class="btn btn-danger btn-sm" onclick="deleteGroupConfirm(${g.id})">🗑️ حذف</button>
                        </div>
                    </div>
                `;
                container.appendChild(card);
            }
        }
        
        // ==================== عرض الأعضاء ====================
        async function viewMembers(groupId, groupName) {
            const members = await fetchGroupMembers(groupId);
            const container = document.getElementById('membersList');
            document.getElementById('membersModalTitle').innerHTML = `👥 أعضاء مجموعة "${groupName}"`;
            
            if (!members || members.length === 0) {
                container.innerHTML = '<div class="empty-state">لا يوجد أعضاء في هذه المجموعة</div>';
            } else {
                let html = '<div class="table-wrapper"><tr><thead><tr><th>الطالب</th><th>رقم الهاتف</th><th>الحالة</th><th>تاريخ الانضمام</th></tr></thead><tbody>';
                for (let i = 0; i < members.length; i++) {
                    const m = members[i];
                    let statusClass = 'badge-warning';
                    let statusText = 'قيد الانتظار';
                    if (m.status === 'approved') {
                        statusClass = 'badge-success';
                        statusText = 'مقبول';
                    }
                    html += `
                        <tr>
                            <td><strong>${m.users?.name || '-'}</strong></td>
                            <td>${m.users?.phone || '-'}</td>
                            <td><span class="badge ${statusClass}">${statusText}</span></td>
                            <td>${formatDate(m.joined_at)}</td>
                        </tr>
                    `;
                }
                html += '</tbody></table></div>';
                container.innerHTML = html;
            }
            document.getElementById('membersModal').style.display = 'flex';
        }
        
        // ==================== تحميل الخيارات ====================
        async function loadSelects() {
            const classes = await fetchClasses();
            const subjects = await fetchSubjects();
            const teachers = await fetchUsers({ role: 'teacher' });
            
            const classSelect = document.getElementById('groupClassId');
            classSelect.innerHTML = '<option value="">-- اختر الصف --</option>';
            for (let i = 0; i < classes.length; i++) {
                const option = document.createElement('option');
                option.value = classes[i].id;
                option.textContent = classes[i].name;
                classSelect.appendChild(option);
            }
            
            const subjectSelect = document.getElementById('groupSubjectId');
            subjectSelect.innerHTML = '<option value="">-- اختر المادة --</option>';
            for (let i = 0; i < subjects.length; i++) {
                const option = document.createElement('option');
                option.value = subjects[i].id;
                option.textContent = subjects[i].name;
                subjectSelect.appendChild(option);
            }
            
            const teacherSelect = document.getElementById('groupTeacherId');
            teacherSelect.innerHTML = '<option value="">-- اختر المعلم --</option>';
            for (let i = 0; i < teachers.length; i++) {
                const option = document.createElement('option');
                option.value = teachers[i].id;
                option.textContent = teachers[i].name;
                teacherSelect.appendChild(option);
            }
        }
        
        // ==================== فتح مودال إنشاء مجموعة ====================
        window.openCreateGroupModal = async function() {
            currentGroupId = null;
            document.getElementById('modalTitle').innerHTML = '➕ إنشاء مجموعة جديدة';
            document.getElementById('groupName').value = '';
            document.getElementById('groupDesc').value = '';
            document.getElementById('groupMaxCapacity').value = '';
            document.getElementById('groupIsOpen').checked = true;
            await loadSelects();
            document.getElementById('groupModal').style.display = 'flex';
        };
        
        // ==================== تعديل مجموعة ====================
        window.editGroup = async function(id) {
            const groups = await fetchGroups({});
            const group = groups.find(g => g.id === id);
            if (!group) return;
            
            currentGroupId = id;
            document.getElementById('modalTitle').innerHTML = '✏️ تعديل مجموعة';
            document.getElementById('groupName').value = group.name;
            document.getElementById('groupDesc').value = group.description || '';
            document.getElementById('groupMaxCapacity').value = group.max_capacity || '';
            document.getElementById('groupIsOpen').checked = group.is_open;
            await loadSelects();
            document.getElementById('groupClassId').value = group.class_id || '';
            document.getElementById('groupSubjectId').value = group.subject_id || '';
            document.getElementById('groupTeacherId').value = group.teacher_id || '';
            document.getElementById('groupModal').style.display = 'flex';
        };
        
        // ==================== حفظ مجموعة ====================
        window.saveGroup = async function() {
            const name = document.getElementById('groupName').value;
            const description = document.getElementById('groupDesc').value;
            const classId = document.getElementById('groupClassId').value;
            const subjectId = document.getElementById('groupSubjectId').value;
            const teacherId = document.getElementById('groupTeacherId').value;
            const maxCapacity = document.getElementById('groupMaxCapacity').value;
            const isOpen = document.getElementById('groupIsOpen').checked;
            
            if (!name) {
                showToast('اسم المجموعة مطلوب', 'error');
                return;
            }
            
            const groupData = {
                name: name,
                description: description || null,
                class_id: classId || null,
                subject_id: subjectId || null,
                teacher_id: teacherId || null,
                max_capacity: maxCapacity || null,
                is_open: isOpen
            };
            
            let result;
            if (currentGroupId) {
                result = await updateGroup(currentGroupId, groupData);
            } else {
                result = await createGroup(groupData);
            }
            
            if (result) {
                closeGroupModal();
                loadGroups();
                showToast('تم ' + (currentGroupId ? 'تعديل' : 'إنشاء') + ' المجموعة', 'success');
            } else {
                showToast('حدث خطأ', 'error');
            }
        };
        
        // ==================== حذف مجموعة ====================
        window.deleteGroupConfirm = function(id) {
            showConfirm('هل أنت متأكد من حذف هذه المجموعة؟', async function() {
                await deleteGroup(id);
                loadGroups();
                showToast('تم حذف المجموعة', 'success');
            });
        };
        
        // ==================== إغلاق المودال ====================
        function closeGroupModal() {
            document.getElementById('groupModal').style.display = 'none';
        }
        
        function closeMembersModal() {
            document.getElementById('membersModal').style.display = 'none';
        }
        
        // ==================== أحداث البحث ====================
        document.getElementById('searchInput').addEventListener('input', function() {
            loadGroups();
        });
        
        // ==================== تحميل أولي ====================
        loadGroups();
    </script>
</body>
</html>
