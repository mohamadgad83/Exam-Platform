<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إدارة المجموعات - منصة الاختبارات</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Cairo', sans-serif; background: #f0f2f5; padding: 20px; }
        .container { max-width: 1400px; margin: 0 auto; }
        .admin-bar {
            background: linear-gradient(135deg, #1e293b, #0f172a);
            color: white;
            padding: 12px 24px;
            border-radius: 20px;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
        }
        .card {
            background: white;
            border-radius: 28px;
            padding: 25px;
            margin-bottom: 20px;
            box-shadow: 0 10px 25px -5px rgba(0,0,0,0.05);
            border: 1px solid #e2e8f0;
        }
        .header h1 {
            background: linear-gradient(135deg, #6366f1, #8b5cf6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-size: 28px;
        }
        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 14px;
            cursor: pointer;
            font-weight: 600;
            transition: 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            font-family: inherit;
        }
        .btn-primary { background: linear-gradient(135deg, #6366f1, #4f46e5); color: white; }
        .btn-success { background: #10b981; color: white; }
        .btn-danger { background: #ef4444; color: white; }
        .btn-warning { background: #f59e0b; color: white; }
        .btn-info { background: #3b82f6; color: white; }
        .btn-outline { background: transparent; border: 2px solid #6366f1; color: #6366f1; }
        .btn-sm { padding: 6px 14px; font-size: 12px; }
        .filter-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
            margin-bottom: 20px;
        }
        .search-input {
            padding: 10px 18px;
            border: 1px solid #e2e8f0;
            border-radius: 50px;
            width: 260px;
            font-family: inherit;
        }
        .exam-info {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            margin: 12px 0;
            color: #64748b;
            font-size: 13px;
        }
        .badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 4px 12px;
            border-radius: 40px;
            font-size: 12px;
            font-weight: 600;
        }
        .badge-success { background: #d1fae5; color: #065f46; }
        .badge-danger { background: #fee2e2; color: #991b1b; }
        .badge-warning { background: #fef3c7; color: #d97706; }
        .badge-info { background: #dbeafe; color: #1e40af; }
        .action-buttons { display: flex; gap: 8px; flex-wrap: wrap; }
        .empty-state { text-align: center; padding: 40px; color: #64748b; }
        
        .group-card {
            background: #f8fafc;
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 15px;
            border: 1px solid #e2e8f0;
        }
        
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(5px);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
        .modal-content {
            background: white;
            border-radius: 32px;
            padding: 32px;
            width: 550px;
            max-width: 90%;
            max-height: 85vh;
            overflow-y: auto;
        }
        .modal-content input, .modal-content select, .modal-content textarea {
            width: 100%;
            padding: 12px 16px;
            margin: 10px 0;
            border: 1px solid #e2e8f0;
            border-radius: 16px;
            font-family: inherit;
        }
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; margin-bottom: 5px; font-weight: 600; color: #334155; }
        
        .tabs {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin-bottom: 20px;
            border-bottom: 2px solid #e2e8f0;
            padding-bottom: 5px;
        }
        .tab-btn {
            background: transparent;
            border: none;
            padding: 10px 28px;
            border-radius: 30px;
            cursor: pointer;
            font-weight: 600;
            color: #64748b;
            transition: all 0.2s;
        }
        .tab-btn.active {
            background: linear-gradient(135deg, #6366f1, #8b5cf6);
            color: white;
        }
        
        .requests-table {
            width: 100%;
            border-collapse: collapse;
        }
        .requests-table th, .requests-table td {
            padding: 12px;
            text-align: right;
            border-bottom: 1px solid #e2e8f0;
        }
        .requests-table th {
            background: #f8fafc;
            font-weight: 700;
        }
        .requests-table tr:hover {
            background: #f1f5f9;
        }
        
        .toast-notification {
            position: fixed;
            bottom: 30px;
            left: 30px;
            background: white;
            border-radius: 16px;
            padding: 16px 20px;
            display: flex;
            align-items: center;
            gap: 12px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            transform: translateX(-500px);
            transition: transform 0.3s ease;
            z-index: 10000;
            direction: rtl;
            border-right: 4px solid;
        }
        .toast-notification.show { transform: translateX(0); }
        .toast-success { border-right-color: #10b981; }
        .toast-error { border-right-color: #ef4444; }
        .toast-message { flex: 1; font-size: 14px; color: #333; }
        
        .confirm-modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(5px);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 10001;
        }
        .confirm-content {
            background: white;
            border-radius: 28px;
            padding: 32px;
            text-align: center;
            width: 320px;
        }
        .confirm-buttons { display: flex; gap: 12px; margin-top: 20px; }
        .confirm-yes { background: #10b981; color: white; padding: 10px; border: none; border-radius: 12px; cursor: pointer; flex: 1; }
        .confirm-no { background: #e2e8f0; color: #333; padding: 10px; border: none; border-radius: 12px; cursor: pointer; flex: 1; }
        
        .filter-select {
            padding: 10px 18px;
            border: 1px solid #e2e8f0;
            border-radius: 50px;
            min-width: 180px;
            font-family: inherit;
            background: white;
        }
        
        .pending-count {
            background: #ef4444;
            color: white;
            border-radius: 30px;
            padding: 2px 10px;
            font-size: 12px;
            margin-right: 8px;
        }
        
        @media (max-width: 768px) {
            .filter-bar { flex-direction: column; align-items: stretch; }
            .search-input, .filter-select { width: 100%; }
            .action-buttons { flex-direction: column; }
            .btn { width: 100%; justify-content: center; }
            .requests-table th, .requests-table td { padding: 8px; font-size: 12px; }
            .tabs { justify-content: center; }
            .tab-btn { padding: 6px 16px; font-size: 12px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="admin-bar">
            <div><span style="font-size:20px;">👑</span> إدارة المجموعات - <span id="adminName"></span></div>
            <div>
                <button class="btn btn-outline btn-sm" onclick="window.location.href='admin-dashboard.html'">🏠 الرئيسية</button>
                <button class="btn btn-outline btn-sm" onclick="window.location.href='questions-bank.html'">📚 بنك الأسئلة</button>
                <button class="btn btn-danger btn-sm" onclick="logout()">🚪 خروج</button>
            </div>
        </div>

        <div class="card header">
            <h1>👥 إدارة المجموعات</h1>
            <p>إنشاء وتعديل المجموعات وإدارة الطلبات والأعضاء</p>
        </div>

        <!-- التبويبات -->
        <div class="tabs">
            <button class="tab-btn active" onclick="showTab('groups')">📚 كل المجموعات</button>
            <button class="tab-btn" onclick="showTab('requests')">📋 طلبات الانتظار <span id="pendingBadge" class="pending-count" style="display: none;">0</span></button>
        </div>

        <!-- تبويب كل المجموعات -->
        <div id="groupsTab">
            <div class="card">
                <div class="filter-bar">
                    <input type="text" id="searchInput" class="search-input" placeholder="🔍 بحث باسم المجموعة...">
                    <button class="btn btn-primary" onclick="openCreateGroupModal()">➕ إنشاء مجموعة</button>
                    <button class="btn btn-outline" onclick="loadGroups()">🔄 تحديث</button>
                </div>
                <div id="groupsList"></div>
            </div>
        </div>

        <!-- تبويب طلبات الانتظار -->
        <div id="requestsTab" style="display: none;">
            <div class="card">
                <div class="filter-bar">
                    <input type="text" id="requestSearch" class="search-input" placeholder="🔍 بحث باسم الطالب أو رقم الهاتف...">
                    <select id="filterTeacher" class="filter-select" onchange="loadPendingRequests(); loadGroupsFilter()">
                        <option value="all">👨‍🏫 كل المعلمين</option>
                    </select>
                    <select id="filterGroup" class="filter-select" onchange="loadPendingRequests()">
                        <option value="all">👥 كل المجموعات</option>
                    </select>
                    <button class="btn btn-outline" onclick="loadPendingRequests()">🔄 تحديث</button>
                </div>
                
                <div style="overflow-x: auto;">
                    <table class="requests-table">
                        <thead>
                            <tr>
                                <th>#</th>
                                <th>👨‍🎓 الطالب</th>
                                <th>📞 رقم الهاتف</th>
                                <th>👥 المجموعة</th>
                                <th>👨‍🏫 المعلم</th>
                                <th>📅 تاريخ الطلب</th>
                                <th>⚡ الإجراءات</th>
                            </tr>
                        </thead>
                        <tbody id="pendingRequestsTable"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <!-- مودال إنشاء/تعديل مجموعة -->
    <div id="groupModal" class="modal">
        <div class="modal-content">
            <h3 id="modalTitle">➕ إنشاء مجموعة جديدة</h3>
            <input type="text" id="groupName" placeholder="اسم المجموعة">
            <textarea id="groupDesc" rows="3" placeholder="وصف المجموعة"></textarea>
            <select id="groupClassId">
                <option value="">-- اختر الصف --</option>
            </select>
            <select id="groupSubjectId">
                <option value="">-- اختر المادة --</option>
            </select>
            <select id="groupTeacherId">
                <option value="">-- اختر المعلم --</option>
            </select>
            <input type="number" id="groupMaxCapacity" placeholder="الحد الأقصى للطلاب">
            <label style="display: flex; align-items: center; gap: 10px; margin-top: 10px;">
                <input type="checkbox" id="groupIsOpen" checked> مفتوح للانضمام
            </label>
            <div style="display: flex; gap: 12px; margin-top: 20px;">
                <button class="btn btn-primary" onclick="saveGroup()">💾 حفظ</button>
                <button class="btn btn-outline" onclick="closeGroupModal()">إلغاء</button>
            </div>
        </div>
    </div>

    <script src="js/supabase-config.js"></script>
    <script>
        // ==================== التحقق من صلاحية الدخول ====================
        const currentUser = getUser();
        if (!currentUser || currentUser.role !== 'admin') {
            window.location.href = 'index.html';
        }
        document.getElementById('adminName').innerHTML = currentUser.name;
        
        let currentGroupId = null;
        let allRequests = [];
        let teachersList = [];
        let groupsList = [];
        
        // ==================== التبويبات ====================
        function showTab(tabName) {
            document.getElementById('groupsTab').style.display = tabName === 'groups' ? 'block' : 'none';
            document.getElementById('requestsTab').style.display = tabName === 'requests' ? 'block' : 'none';
            
            const tabs = document.querySelectorAll('.tabs .tab-btn');
            tabs.forEach(btn => btn.classList.remove('active'));
            if (tabName === 'groups') tabs[0].classList.add('active');
            else tabs[1].classList.add('active');
            
            if (tabName === 'requests') {
                loadPendingRequests();
            } else {
                loadGroups();
            }
        }
        
        // ==================== تحميل المجموعات ====================
        async function loadGroups() {
            try {
                const search = document.getElementById('searchInput').value;
                
                let query = sb.from('groups').select('*, classes:class_id(id, name), subjects:subject_id(id, name), users:teacher_id(id, name)');
                
                const { data: groups, error } = await query.order('created_at', { ascending: false });
                
                if (error) throw error;
                
                let filtered = groups || [];
                
                if (search) {
                    filtered = filtered.filter(g => g.name && g.name.toLowerCase().includes(search.toLowerCase()));
                }
                
                // جلب عدد الأعضاء لكل مجموعة
                for (let i = 0; i < filtered.length; i++) {
                    const { count } = await sb
                        .from('group_members')
                        .select('*', { count: 'exact', head: true })
                        .eq('group_id', filtered[i].id)
                        .eq('status', 'approved');
                    filtered[i].member_count = count || 0;
                }
                
                const container = document.getElementById('groupsList');
                
                if (!filtered || filtered.length === 0) {
                    container.innerHTML = '<div class="empty-state">📭 لا توجد مجموعات</div>';
                    return;
                }
                
                container.innerHTML = '';
                for (let i = 0; i < filtered.length; i++) {
                    const g = filtered[i];
                    const className = g.classes ? g.classes.name : '-';
                    const subjectName = g.subjects ? g.subjects.name : '-';
                    const teacherName = g.users ? g.users.name : '-';
                    const memberText = (g.member_count || 0) + (g.max_capacity ? '/' + g.max_capacity : '');
                    
                    const card = document.createElement('div');
                    card.className = 'group-card';
                    card.innerHTML = `
                        <div style="display: flex; justify-content: space-between; align-items: flex-start; flex-wrap: wrap; gap: 15px;">
                            <div style="flex: 1;">
                                <h3>📌 ${escapeHtml(g.name)}</h3>
                                <p style="color: #64748b; margin: 8px 0;">${escapeHtml(g.description || 'لا يوجد وصف')}</p>
                                <div class="exam-info">
                                    <span>👨‍🏫 ${escapeHtml(teacherName)}</span>
                                    <span>🎓 ${escapeHtml(className)}</span>
                                    <span>📖 ${escapeHtml(subjectName)}</span>
                                    <span>👥 ${memberText} طالب</span>
                                    <span class="badge ${g.is_open ? 'badge-success' : 'badge-danger'}">${g.is_open ? 'مفتوح' : 'مغلق'}</span>
                                </div>
                            </div>
                            <div class="action-buttons">
                                <button class="btn btn-warning btn-sm" onclick="editGroup(${g.id})">✏️ تعديل</button>
                                <button class="btn btn-danger btn-sm" onclick="deleteGroupConfirm(${g.id})">🗑️ حذف</button>
                            </div>
                        </div>
                    `;
                    container.appendChild(card);
                }
                
            } catch (error) {
                console.error('Error loading groups:', error);
                document.getElementById('groupsList').innerHTML = '<div class="empty-state">حدث خطأ</div>';
            }
        }
        
        // ==================== تحميل طلبات الانتظار ====================
        async function loadPendingRequests() {
            try {
                const search = document.getElementById('requestSearch').value;
                const teacherId = document.getElementById('filterTeacher').value;
                const groupId = document.getElementById('filterGroup').value;
                
                // جلب جميع الطلبات مع معلومات الطالب والمجموعة والمعلم
                let query = sb
                    .from('group_members')
                    .select('*, users:student_id(id, name, phone), groups:group_id(id, name, teacher_id, users:teacher_id(id, name))')
                    .eq('status', 'pending');
                
                const { data: requests, error } = await query.order('created_at', { ascending: false });
                
                if (error) throw error;
                
                allRequests = requests || [];
                
                // فلترة حسب المعلم
                let filtered = allRequests;
                if (teacherId !== 'all') {
                    filtered = filtered.filter(r => r.groups?.teacher_id == teacherId);
                }
                
                // فلترة حسب المجموعة
                if (groupId !== 'all') {
                    filtered = filtered.filter(r => r.group_id == groupId);
                }
                
                // فلترة حسب البحث
                if (search) {
                    filtered = filtered.filter(r => 
                        (r.users?.name && r.users.name.toLowerCase().includes(search.toLowerCase())) ||
                        (r.users?.phone && r.users.phone.includes(search))
                    );
                }
                
                // تحديث عدد الطلبات في التبويب
                const badge = document.getElementById('pendingBadge');
                if (allRequests.length > 0) {
                    badge.style.display = 'inline-block';
                    badge.innerHTML = allRequests.length;
                } else {
                    badge.style.display = 'none';
                }
                
                renderPendingRequestsTable(filtered);
                
            } catch (error) {
                console.error('Error loading pending requests:', error);
                document.getElementById('pendingRequestsTable').innerHTML = '<tr><td colspan="7" class="empty-state">حدث خطأ</td></tr>';
            }
        }
        
        function renderPendingRequestsTable(requests) {
            const tbody = document.getElementById('pendingRequestsTable');
            
            if (!requests || requests.length === 0) {
                tbody.innerHTML = '<tr><td colspan="7" class="empty-state">✨ لا توجد طلبات انتظار</td></tr>';
                return;
            }
            
            tbody.innerHTML = '';
            for (let i = 0; i < requests.length; i++) {
                const r = requests[i];
                const studentName = r.users?.name || '-';
                const studentPhone = r.users?.phone || '-';
                const groupName = r.groups?.name || '-';
                const teacherName = r.groups?.users?.name || '-';
                
                const row = document.createElement('tr');
                row.innerHTML = `
                    <td>${i+1}</td>
                    <td><strong>${escapeHtml(studentName)}</strong></td>
                    <td>${escapeHtml(studentPhone)}</td>
                    <td>${escapeHtml(groupName)}</td>
                    <td>${escapeHtml(teacherName)}</td>
                    <td>${formatDate(r.created_at)}</td>
                    <td>
                        <div class="action-buttons" style="gap: 5px;">
                            <button class="btn btn-success btn-sm" onclick="approveRequest('${r.id}', ${r.group_id}, ${r.student_id})">✅ قبول</button>
                            <button class="btn btn-danger btn-sm" onclick="rejectRequest('${r.id}', ${r.group_id}, ${r.student_id})">❌ رفض</button>
                        </div>
                    </td>
                `;
                tbody.appendChild(row);
            }
        }
        
        // ==================== قبول طلب ====================
        async function approveRequest(requestId, groupId, studentId) {
            try {
                const { error } = await sb
                    .from('group_members')
                    .update({ status: 'approved', joined_at: new Date() })
                    .eq('id', requestId);
                
                if (error) throw error;
                
                showToast('✅ تم قبول الطالب', 'success');
                loadPendingRequests();
                
            } catch (error) {
                console.error('Error approving request:', error);
                showToast('حدث خطأ', 'error');
            }
        }
        
        // ==================== رفض طلب ====================
        async function rejectRequest(requestId, groupId, studentId) {
            const reason = prompt('سبب الرفض (اختياري):');
            
            try {
                const { error } = await sb
                    .from('group_members')
                    .update({ status: 'rejected' })
                    .eq('id', requestId);
                
                if (error) throw error;
                
                showToast('❌ تم رفض الطلب', 'success');
                loadPendingRequests();
                
            } catch (error) {
                console.error('Error rejecting request:', error);
                showToast('حدث خطأ', 'error');
            }
        }
        
        // ==================== تحميل خيارات الفلاتر ====================
        async function loadFiltersOptions() {
            try {
                // جلب المعلمين
                const { data: teachers } = await sb
                    .from('users')
                    .select('id, name, username')
                    .eq('role', 'teacher');
                teachersList = teachers || [];
                
                const teacherFilter = document.getElementById('filterTeacher');
                teacherFilter.innerHTML = '<option value="all">👨‍🏫 كل المعلمين</option>';
                for (let i = 0; i < teachersList.length; i++) {
                    teacherFilter.innerHTML += `<option value="${teachersList[i].id}">${escapeHtml(teachersList[i].name)}</option>`;
                }
                
                await loadGroupsFilter();
                
            } catch (error) {
                console.error('Error loading filters:', error);
            }
        }
        
        async function loadGroupsFilter() {
            try {
                const teacherId = document.getElementById('filterTeacher').value;
                
                let query = sb.from('groups').select('id, name');
                if (teacherId !== 'all') {
                    query = query.eq('teacher_id', teacherId);
                }
                
                const { data: groups } = await query.order('name');
                groupsList = groups || [];
                
                const groupFilter = document.getElementById('filterGroup');
                groupFilter.innerHTML = '<option value="all">👥 كل المجموعات</option>';
                for (let i = 0; i < groupsList.length; i++) {
                    groupFilter.innerHTML += `<option value="${groupsList[i].id}">${escapeHtml(groupsList[i].name)}</option>`;
                }
                
            } catch (error) {
                console.error('Error loading groups filter:', error);
            }
        }
        
        // ==================== تحميل الخيارات للمودال ====================
        async function loadSelects() {
            try {
                const [classes, subjects, teachers] = await Promise.all([
                    sb.from('classes').select('*').order('name'),
                    sb.from('subjects').select('*').order('name'),
                    sb.from('users').select('id, name, username').eq('role', 'teacher')
                ]);
                
                const classSelect = document.getElementById('groupClassId');
                classSelect.innerHTML = '<option value="">-- اختر الصف --</option>';
                if (classes.data) {
                    for (let i = 0; i < classes.data.length; i++) {
                        classSelect.innerHTML += `<option value="${classes.data[i].id}">${escapeHtml(classes.data[i].name)}</option>`;
                    }
                }
                
                const subjectSelect = document.getElementById('groupSubjectId');
                subjectSelect.innerHTML = '<option value="">-- اختر المادة --</option>';
                if (subjects.data) {
                    for (let i = 0; i < subjects.data.length; i++) {
                        subjectSelect.innerHTML += `<option value="${subjects.data[i].id}">${escapeHtml(subjects.data[i].name)}</option>`;
                    }
                }
                
                const teacherSelect = document.getElementById('groupTeacherId');
                teacherSelect.innerHTML = '<option value="">-- اختر المعلم --</option>';
                if (teachers.data) {
                    for (let i = 0; i < teachers.data.length; i++) {
                        teacherSelect.innerHTML += `<option value="${teachers.data[i].id}">${escapeHtml(teachers.data[i].name)}</option>`;
                    }
                }
                
            } catch (error) {
                console.error('Error loading selects:', error);
            }
        }
        
        // ==================== فتح مودال إنشاء مجموعة ====================
        async function openCreateGroupModal() {
            currentGroupId = null;
            document.getElementById('modalTitle').innerHTML = '➕ إنشاء مجموعة جديدة';
            document.getElementById('groupName').value = '';
            document.getElementById('groupDesc').value = '';
            document.getElementById('groupMaxCapacity').value = '';
            document.getElementById('groupIsOpen').checked = true;
            await loadSelects();
            document.getElementById('groupClassId').value = '';
            document.getElementById('groupSubjectId').value = '';
            document.getElementById('groupTeacherId').value = '';
            document.getElementById('groupModal').style.display = 'flex';
        }
        
        // ==================== تعديل مجموعة ====================
        async function editGroup(id) {
            const { data: group, error } = await sb
                .from('groups')
                .select('*')
                .eq('id', id)
                .single();
            
            if (error || !group) {
                showToast('حدث خطأ', 'error');
                return;
            }
            
            currentGroupId = id;
            document.getElementById('modalTitle').innerHTML = '✏️ تعديل مجموعة';
            document.getElementById('groupName').value = group.name || '';
            document.getElementById('groupDesc').value = group.description || '';
            document.getElementById('groupMaxCapacity').value = group.max_capacity || '';
            document.getElementById('groupIsOpen').checked = group.is_open || false;
            await loadSelects();
            document.getElementById('groupClassId').value = group.class_id || '';
            document.getElementById('groupSubjectId').value = group.subject_id || '';
            document.getElementById('groupTeacherId').value = group.teacher_id || '';
            document.getElementById('groupModal').style.display = 'flex';
        }
        
        // ==================== حفظ مجموعة ====================
        async function saveGroup() {
            const name = document.getElementById('groupName').value;
            const description = document.getElementById('groupDesc').value;
            const classId = document.getElementById('groupClassId').value;
            const subjectId = document.getElementById('groupSubjectId').value;
            const teacherId = document.getElementById('groupTeacherId').value;
            const maxCapacity = document.getElementById('groupMaxCapacity').value;
            const isOpen = document.getElementById('groupIsOpen').checked;
            
            if (!name) {
                showToast('اسم المجموعة مطلوب', 'error');
                return;
            }
            if (!teacherId) {
                showToast('اختر المعلم', 'error');
                return;
            }
            
            const groupData = {
                name: name,
                description: description || null,
                class_id: classId || null,
                subject_id: subjectId || null,
                teacher_id: parseInt(teacherId),
                max_capacity: maxCapacity || null,
                is_open: isOpen
            };
            
            let result;
            if (currentGroupId) {
                const { error } = await sb
                    .from('groups')
                    .update(groupData)
                    .eq('id', currentGroupId);
                result = !error;
            } else {
                const { error } = await sb
                    .from('groups')
                    .insert(groupData);
                result = !error;
            }
            
            if (result) {
                closeGroupModal();
                loadGroups();
                showToast('تم ' + (currentGroupId ? 'تعديل' : 'إنشاء') + ' المجموعة', 'success');
            } else {
                showToast('حدث خطأ', 'error');
            }
        }
        
        // ==================== حذف مجموعة ====================
        function deleteGroupConfirm(id) {
            showConfirm('⚠️ هل أنت متأكد من حذف هذه المجموعة؟', async () => {
                const { error } = await sb
                    .from('groups')
                    .delete()
                    .eq('id', id);
                
                if (error) {
                    showToast('حدث خطأ', 'error');
                    return;
                }
                
                loadGroups();
                showToast('تم حذف المجموعة', 'success');
            });
        }
        
        // ==================== إغلاق المودال ====================
        function closeGroupModal() {
            document.getElementById('groupModal').style.display = 'none';
        }
        
        // ==================== دوال مساعدة ====================
        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/[&<>]/g, function(m) {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                return m;
            });
        }
        
        // ==================== أحداث ====================
        document.getElementById('searchInput').addEventListener('input', () => loadGroups());
        document.getElementById('requestSearch').addEventListener('input', () => loadPendingRequests());
        document.getElementById('filterTeacher').addEventListener('change', () => loadGroupsFilter());
        document.getElementById('filterGroup').addEventListener('change', () => loadPendingRequests());
        
        // ==================== تحميل أولي ====================
        loadFiltersOptions();
        loadGroups();
    </script>
</body>
</html>
