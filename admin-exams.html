<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إدارة الامتحانات - منصة الاختبارات</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <style>
        .filter-row {
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            align-items: flex-end;
            margin-bottom: 20px;
        }
        .filter-group {
            flex: 1;
            min-width: 160px;
        }
        .filter-group label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            color: #64748b;
            margin-bottom: 5px;
        }
        .filter-group select, .filter-group input {
            width: 100%;
            padding: 10px 14px;
            border: 1px solid #e2e8f0;
            border-radius: 12px;
            font-family: inherit;
            font-size: 14px;
            background: white;
        }
        
        .exam-card {
            background: #f8fafc;
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 15px;
            border: 1px solid #e2e8f0;
            transition: all 0.2s;
        }
        .exam-card:hover {
            transform: translateX(-5px);
            border-right: 4px solid #6366f1;
            background: white;
        }
        
        .badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 4px 12px;
            border-radius: 40px;
            font-size: 12px;
            font-weight: 600;
        }
        .badge-success { background: #d1fae5; color: #065f46; }
        .badge-warning { background: #fef3c7; color: #d97706; }
        .badge-danger { background: #fee2e2; color: #991b1b; }
        .badge-info { background: #dbeafe; color: #1e40af; }
        
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(5px);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
        .modal-content {
            background: white;
            border-radius: 28px;
            padding: 30px;
            width: 600px;
            max-width: 90%;
            max-height: 85vh;
            overflow-y: auto;
        }
        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 2px solid #e2e8f0;
        }
        .form-group { margin-bottom: 18px; }
        .form-group label { display: block; font-weight: 600; color: #334155; margin-bottom: 6px; font-size: 14px; }
        .form-group input, .form-group select, .form-group textarea {
            width: 100%;
            padding: 10px 14px;
            border: 1px solid #e2e8f0;
            border-radius: 12px;
            font-family: inherit;
            font-size: 14px;
        }
        .row-2 {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
        }
        
        .pagination {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-top: 25px;
            flex-wrap: wrap;
        }
        .page-btn {
            padding: 8px 16px;
            border: 1px solid #e2e8f0;
            background: white;
            border-radius: 10px;
            cursor: pointer;
            transition: 0.2s;
        }
        .page-btn.active {
            background: linear-gradient(135deg, #6366f1, #8b5cf6);
            color: white;
            border-color: transparent;
        }
        .loading-skeleton {
            background: linear-gradient(90deg, #e2e8f0 25%, #f1f5f9 50%, #e2e8f0 75%);
            background-size: 200% 100%;
            animation: loading 1.5s infinite;
            border-radius: 12px;
            height: 100px;
            margin-bottom: 15px;
        }
        @keyframes loading {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }
        @media (max-width: 768px) {
            .filter-row { flex-direction: column; }
            .row-2 { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="admin-bar">
            <div><span style="font-size:20px;">👑</span> إدارة الامتحانات - <span id="adminName"></span></div>
            <div>
                <button class="btn btn-outline btn-sm" onclick="window.location.href='admin-dashboard.html'">🏠 الرئيسية</button>
                <button class="btn btn-outline btn-sm" onclick="window.location.href='add-question.html'">❓ إضافة سؤال</button>
                <button class="btn btn-outline btn-sm" onclick="window.location.href='create-exam.html'">📝 إنشاء امتحان</button>
                <button class="btn btn-danger btn-sm" onclick="logout()">🚪 خروج</button>
            </div>
        </div>

        <div class="card header">
            <h1>📝 إدارة الامتحانات</h1>
            <p>مراجعة ونشر وإدارة جميع الامتحانات</p>
        </div>

        <div class="card">
            <div class="filter-row">
                <div class="filter-group">
                    <label>🔍 بحث</label>
                    <input type="text" id="searchInput" placeholder="بحث بالعنوان...">
                </div>
                <div class="filter-group">
                    <label>📋 الحالة</label>
                    <select id="statusFilter">
                        <option value="all">كل الحالات</option>
                        <option value="draft">مسودة</option>
                        <option value="published">منشور</option>
                        <option value="closed">مغلق</option>
                    </select>
                </div>
                <div class="filter-group">
                    <label>🎓 الصف</label>
                    <select id="classFilter">
                        <option value="all">كل الصفوف</option>
                    </select>
                </div>
                <div class="filter-group">
                    <label>📖 المادة</label>
                    <select id="subjectFilter">
                        <option value="all">كل المواد</option>
                    </select>
                </div>
                <div class="filter-group">
                    <label>👨‍🏫 المعلم</label>
                    <select id="teacherFilter">
                        <option value="all">كل المعلمين</option>
                    </select>
                </div>
                <div>
                    <button class="btn btn-primary" onclick="openCreateExamModal()">➕ إنشاء امتحان</button>
                    <button class="btn btn-outline" onclick="loadExams()">🔄 تحديث</button>
                </div>
            </div>

            <div id="loadingIndicator" class="loading-skeleton" style="display: none;"></div>
            <div id="examsList"></div>
            <div id="pagination" class="pagination"></div>
        </div>
    </div>

    <!-- مودال إنشاء/تعديل امتحان -->
    <div id="examModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3 id="examModalTitle">➕ إنشاء امتحان جديد</h3>
                <button class="btn btn-outline btn-sm" onclick="closeExamModal()">✖</button>
            </div>
            <div class="form-group">
                <label>📝 عنوان الامتحان *</label>
                <input type="text" id="examTitle" placeholder="مثال: اختبار الرياضيات">
            </div>
            <div class="form-group">
                <label>📖 وصف الامتحان</label>
                <textarea id="examDesc" rows="3" placeholder="وصف الامتحان"></textarea>
            </div>
            <div class="row-2">
                <div class="form-group">
                    <label>🎓 الصف *</label>
                    <select id="examClass" required></select>
                </div>
                <div class="form-group">
                    <label>📖 المادة *</label>
                    <select id="examSubject" required></select>
                </div>
                <div class="form-group">
                    <label>👨‍🏫 المعلم</label>
                    <select id="examTeacher">
                        <option value="">-- اختر المعلم --</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>⏱️ المدة (دقائق)</label>
                    <input type="number" id="examDuration" value="60">
                </div>
                <div class="form-group">
                    <label>⭐ درجة النجاح (%)</label>
                    <input type="number" id="examPassingScore" value="50">
                </div>
            </div>
            <div class="row-2">
                <div class="form-group">
                    <label>💰 نوع الامتحان</label>
                    <select id="examType" onchange="togglePriceField()">
                        <option value="free">مجاني</option>
                        <option value="paid">مدفوع</option>
                    </select>
                </div>
                <div class="form-group" id="examPriceGroup" style="display: none;">
                    <label>💵 السعر (جنيه)</label>
                    <input type="number" id="examPrice" value="0" step="10">
                </div>
            </div>
            <div class="row-2">
                <div class="form-group">
                    <label>📅 تاريخ البدء</label>
                    <input type="datetime-local" id="examStartDate">
                </div>
                <div class="form-group">
                    <label>📅 تاريخ الانتهاء</label>
                    <input type="datetime-local" id="examEndDate">
                </div>
            </div>
            <div class="form-group">
                <label>📋 حالة الامتحان</label>
                <select id="examStatus">
                    <option value="draft">مسودة</option>
                    <option value="published">منشور</option>
                    <option value="closed">مغلق</option>
                </select>
            </div>
            <div style="display: flex; gap: 12px; margin-top: 20px;">
                <button class="btn btn-primary" onclick="saveExam()">💾 حفظ</button>
                <button class="btn btn-outline" onclick="closeExamModal()">إلغاء</button>
            </div>
        </div>
    </div>

    <script src="js/supabase-config.js"></script>
    <script>
        // ==================== المتغيرات العامة ====================
        let allExams = [];
        let currentExamId = null;
        let currentPage = 1;
        let itemsPerPage = 10;
        let isLoading = false;
        
        // ==================== التحقق من صلاحية الدخول ====================
        const currentUser = getUser();
        if (!currentUser || currentUser.role !== 'admin') {
            window.location.href = 'index.html';
        }
        document.getElementById('adminName').innerHTML = currentUser.name;
        
        // ==================== تحميل خيارات الفلاتر ====================
        async function loadFiltersOptions() {
            try {
                const classes = await fetchClasses();
                const classFilter = document.getElementById('classFilter');
                classFilter.innerHTML = '<option value="all">🎓 كل الصفوف</option>';
                classes.forEach(c => {
                    classFilter.innerHTML += `<option value="${c.id}">${escapeHtml(c.name)}</option>`;
                });
                
                const subjects = await fetchSubjects();
                const subjectFilter = document.getElementById('subjectFilter');
                subjectFilter.innerHTML = '<option value="all">📖 كل المواد</option>';
                subjects.forEach(s => {
                    subjectFilter.innerHTML += `<option value="${s.id}">${escapeHtml(s.name)}</option>`;
                });
                
                const teachers = await fetchUsers({ role: 'teacher' });
                const teacherFilter = document.getElementById('teacherFilter');
                teacherFilter.innerHTML = '<option value="all">👨‍🏫 كل المعلمين</option>';
                teachers.forEach(t => {
                    teacherFilter.innerHTML += `<option value="${t.id}">${escapeHtml(t.name)}</option>`;
                });
                
                const classSelect = document.getElementById('examClass');
                classSelect.innerHTML = '<option value="">-- اختر الصف --</option>';
                classes.forEach(c => {
                    classSelect.innerHTML += `<option value="${c.id}">${escapeHtml(c.name)}</option>`;
                });
                
                const subjectSelect = document.getElementById('examSubject');
                subjectSelect.innerHTML = '<option value="">-- اختر المادة --</option>';
                subjects.forEach(s => {
                    subjectSelect.innerHTML += `<option value="${s.id}">${escapeHtml(s.name)}</option>`;
                });
                
                const teacherSelect = document.getElementById('examTeacher');
                teacherSelect.innerHTML = '<option value="">-- اختر المعلم --</option>';
                teachers.forEach(t => {
                    teacherSelect.innerHTML += `<option value="${t.id}">${escapeHtml(t.name)}</option>`;
                });
                
            } catch (error) {
                console.error('Error loading filters:', error);
            }
        }
        
        // ==================== تحميل الامتحانات ====================
        async function loadExams() {
            // منع التحميل المتكرر
            if (isLoading) {
                console.log('جاري التحميل بالفعل...');
                return;
            }
            isLoading = true;
            
            const loadingIndicator = document.getElementById('loadingIndicator');
            if (loadingIndicator) loadingIndicator.style.display = 'block';
            
            try {
                const search = document.getElementById('searchInput').value;
                const status = document.getElementById('statusFilter').value;
                const classId = document.getElementById('classFilter').value;
                const subjectId = document.getElementById('subjectFilter').value;
                const teacherId = document.getElementById('teacherFilter').value;
                
                let query = sb
                    .from('exams')
                    .select(`
                        id,
                        title,
                        description,
                        class_id,
                        subject_id,
                        teacher_id,
                        duration_minutes,
                        passing_score,
                        exam_type,
                        exam_price,
                        start_date,
                        end_date,
                        status,
                        is_announced,
                        created_at,
                        subjects:subject_id(name),
                        classes:class_id(name),
                        users:teacher_id(name, username)
                    `);
                
                if (status !== 'all') {
                    query = query.eq('status', status);
                }
                if (classId !== 'all') {
                    query = query.eq('class_id', parseInt(classId));
                }
                if (subjectId !== 'all') {
                    query = query.eq('subject_id', parseInt(subjectId));
                }
                if (teacherId !== 'all') {
                    query = query.eq('teacher_id', parseInt(teacherId));
                }
                
                const { data: exams, error } = await query.order('created_at', { ascending: false });
                
                if (error) throw error;
                
                let filtered = exams || [];
                
                if (search) {
                    filtered = filtered.filter(e => e.title && e.title.toLowerCase().includes(search.toLowerCase()));
                }
                
                // إزالة أي تكرار محتمل (للتأكد)
                const uniqueExams = [];
                const examIds = new Set();
                for (const exam of filtered) {
                    if (!examIds.has(exam.id)) {
                        examIds.add(exam.id);
                        uniqueExams.push(exam);
                    }
                }
                
                if (uniqueExams.length !== filtered.length) {
                    console.warn(`⚠️ تمت إزالة ${filtered.length - uniqueExams.length} امتحان مكرر`);
                }
                
                allExams = uniqueExams;
                
                // Pagination
                const totalPages = Math.ceil(allExams.length / itemsPerPage);
                const startIndex = (currentPage - 1) * itemsPerPage;
                const paginatedExams = allExams.slice(startIndex, startIndex + itemsPerPage);
                
                await renderExamsList(paginatedExams);
                renderPagination(totalPages);
                
            } catch (error) {
                console.error('Error loading exams:', error);
                const examsList = document.getElementById('examsList');
                if (examsList) {
                    examsList.innerHTML = '<div class="empty-state">حدث خطأ في تحميل الامتحانات</div>';
                }
            } finally {
                isLoading = false;
                if (loadingIndicator) loadingIndicator.style.display = 'none';
            }
        }
        
        // ==================== عرض قائمة الامتحانات ====================
        async function renderExamsList(exams) {
            const container = document.getElementById('examsList');
            if (!container) return;
            
            // تفريغ الحاوية تماماً قبل إعادة الملء
            container.innerHTML = '';
            
            if (!exams || exams.length === 0) {
                container.innerHTML = '<div class="empty-state"><div class="empty-state-icon">📭</div><p>لا توجد امتحانات</p><button class="btn btn-primary" onclick="openCreateExamModal()" style="margin-top: 15px;">➕ إنشاء أول امتحان</button></div>';
                return;
            }
            
            // عرض عدد الامتحانات في الكونسول للتحقق
            console.log(`📊 عرض ${exams.length} امتحان(ات) فريدة`);
            
            for (const exam of exams) {
                const statusClass = exam.status === 'published' ? 'badge-success' : (exam.status === 'draft' ? 'badge-warning' : 'badge-danger');
                const statusText = exam.status === 'published' ? 'منشور' : (exam.status === 'draft' ? 'مسودة' : 'مغلق');
                const examType = exam.exam_type === 'paid' ? `💰 ${exam.exam_price} جنيه` : '🆓 مجاني';
                
                // جلب إحصائيات سريعة للامتحان
                let stats = { total_requests: 0, approved_count: 0, pending_count: 0, total_attempts: 0 };
                try {
                    stats = await fetchExamStats(exam.id);
                } catch(e) { console.error('Stats error:', e); }
                
                const card = document.createElement('div');
                card.className = 'exam-card';
                card.setAttribute('data-exam-id', exam.id);
                card.innerHTML = `
                    <div style="display: flex; justify-content: space-between; flex-wrap: wrap; gap: 15px;">
                        <div style="flex: 1;">
                            <h3>${escapeHtml(exam.title)}</h3>
                            <p style="color: #64748b; margin: 8px 0;">${escapeHtml(exam.description || 'لا يوجد وصف')}</p>
                            <div style="display: flex; gap: 15px; flex-wrap: wrap; font-size: 13px; color: #64748b;">
                                <span>📖 ${exam.subjects?.name || '-'}</span>
                                <span>🎓 ${exam.classes?.name || '-'}</span>
                                <span>👨‍🏫 ${exam.users?.name || '-'}</span>
                                <span>⏱️ ${exam.duration_minutes} دقيقة</span>
                                <span>⭐ ${exam.passing_score}%</span>
                                <span>${examType}</span>
                                <span class="badge ${statusClass}">${statusText}</span>
                            </div>
                            <div style="margin-top: 10px; font-size: 12px;">
                                <span>📊 الطلبات: ${stats.total_requests || 0} | ✅ المقبولون: ${stats.approved_count || 0} | ⏳ المنتظرون: ${stats.pending_count || 0}</span>
                                <span style="margin-right: 15px;">📝 المحاولات: ${stats.total_attempts || 0}</span>
                            </div>
                        </div>
                        <div class="action-buttons">
                            ${exam.status !== 'published' ? `<button class="btn btn-success btn-sm" onclick="changeExamStatus(${exam.id}, 'published')">✅ نشر</button>` : ''}
                            ${exam.status !== 'closed' && exam.status === 'published' ? `<button class="btn btn-warning btn-sm" onclick="changeExamStatus(${exam.id}, 'closed')">🔒 إغلاق</button>` : ''}
                            ${exam.status !== 'draft' ? `<button class="btn btn-warning btn-sm" onclick="changeExamStatus(${exam.id}, 'draft')">📝 مسودة</button>` : ''}
                            <button class="btn btn-info btn-sm" onclick="editExam(${exam.id})">✏️ تعديل</button>
                            <button class="btn btn-danger btn-sm" onclick="deleteExamConfirm(${exam.id})">🗑️ حذف</button>
                            <button class="btn btn-primary btn-sm" onclick="viewExamSubmissions(${exam.id})">📋 التسليمات</button>
                        </div>
                    </div>
                `;
                container.appendChild(card);
            }
        }
        
        // ==================== أزرار التصفح ====================
        function renderPagination(totalPages) {
            const container = document.getElementById('pagination');
            if (!container) return;
            
            if (totalPages <= 1) {
                container.innerHTML = '';
                return;
            }
            
            let html = '';
            if (currentPage > 1) {
                html += `<button class="page-btn" onclick="goToPage(${currentPage - 1})">← السابق</button>`;
            }
            
            const startPage = Math.max(1, currentPage - 2);
            const endPage = Math.min(totalPages, currentPage + 2);
            
            if (startPage > 1) {
                html += `<button class="page-btn" onclick="goToPage(1)">1</button>`;
                if (startPage > 2) html += `<span class="page-btn" style="cursor: default;">...</span>`;
            }
            
            for (let i = startPage; i <= endPage; i++) {
                html += `<button class="page-btn ${i === currentPage ? 'active' : ''}" onclick="goToPage(${i})">${i}</button>`;
            }
            
            if (endPage < totalPages) {
                if (endPage < totalPages - 1) html += `<span class="page-btn" style="cursor: default;">...</span>`;
                html += `<button class="page-btn" onclick="goToPage(${totalPages})">${totalPages}</button>`;
            }
            
            if (currentPage < totalPages) {
                html += `<button class="page-btn" onclick="goToPage(${currentPage + 1})">التالي →</button>`;
            }
            
            container.innerHTML = html;
        }
        
        function goToPage(page) {
            currentPage = page;
            loadExams();
        }
        
        // ==================== دوال الامتحانات ====================
        async function changeExamStatus(examId, status) {
            try {
                const { error } = await sb
                    .from('exams')
                    .update({ status: status })
                    .eq('id', examId);
                
                if (error) throw error;
                
                let message = status === 'published' ? 'تم نشر الامتحان' : (status === 'closed' ? 'تم إغلاق الامتحان' : 'تم حفظ الامتحان كمسودة');
                showToast(message, 'success');
                loadExams();
            } catch (error) {
                console.error('Error:', error);
                showToast('حدث خطأ', 'error');
            }
        }
        
        function openCreateExamModal() {
            currentExamId = null;
            document.getElementById('examModalTitle').innerHTML = '➕ إنشاء امتحان جديد';
            document.getElementById('examTitle').value = '';
            document.getElementById('examDesc').value = '';
            document.getElementById('examDuration').value = '60';
            document.getElementById('examPassingScore').value = '50';
            document.getElementById('examType').value = 'free';
            document.getElementById('examPrice').value = '0';
            document.getElementById('examStartDate').value = '';
            document.getElementById('examEndDate').value = '';
            document.getElementById('examStatus').value = 'draft';
            document.getElementById('examClass').value = '';
            document.getElementById('examSubject').value = '';
            document.getElementById('examTeacher').value = '';
            document.getElementById('examModal').style.display = 'flex';
        }
        
        async function editExam(id) {
            try {
                const { data: exam, error } = await sb
                    .from('exams')
                    .select('*')
                    .eq('id', id)
                    .single();
                
                if (error) throw error;
                
                currentExamId = id;
                document.getElementById('examModalTitle').innerHTML = '✏️ تعديل امتحان';
                document.getElementById('examTitle').value = exam.title || '';
                document.getElementById('examDesc').value = exam.description || '';
                document.getElementById('examDuration').value = exam.duration_minutes || 60;
                document.getElementById('examPassingScore').value = exam.passing_score || 50;
                document.getElementById('examType').value = exam.exam_type || 'free';
                document.getElementById('examPrice').value = exam.exam_price || 0;
                document.getElementById('examStartDate').value = exam.start_date || '';
                document.getElementById('examEndDate').value = exam.end_date || '';
                document.getElementById('examStatus').value = exam.status || 'draft';
                document.getElementById('examClass').value = exam.class_id || '';
                document.getElementById('examSubject').value = exam.subject_id || '';
                document.getElementById('examTeacher').value = exam.teacher_id || '';
                document.getElementById('examModal').style.display = 'flex';
            } catch (error) {
                console.error('Error:', error);
                showToast('حدث خطأ', 'error');
            }
        }
        
        async function saveExam() {
            const examData = {
                title: document.getElementById('examTitle').value,
                description: document.getElementById('examDesc').value,
                class_id: document.getElementById('examClass').value ? parseInt(document.getElementById('examClass').value) : null,
                subject_id: document.getElementById('examSubject').value ? parseInt(document.getElementById('examSubject').value) : null,
                teacher_id: document.getElementById('examTeacher').value ? parseInt(document.getElementById('examTeacher').value) : null,
                duration_minutes: parseInt(document.getElementById('examDuration').value),
                passing_score: parseInt(document.getElementById('examPassingScore').value),
                exam_type: document.getElementById('examType').value,
                exam_price: parseFloat(document.getElementById('examPrice').value),
                start_date: document.getElementById('examStartDate').value || null,
                end_date: document.getElementById('examEndDate').value || null,
                status: document.getElementById('examStatus').value,
                is_announced: true,
                created_by: currentUser.id
            };
            
            if (!examData.title) {
                showToast('عنوان الامتحان مطلوب', 'error');
                return;
            }
            if (!examData.class_id) {
                showToast('اختر الصف', 'error');
                return;
            }
            if (!examData.subject_id) {
                showToast('اختر المادة', 'error');
                return;
            }
            
            let result;
            if (currentExamId) {
                const { error } = await sb.from('exams').update(examData).eq('id', currentExamId);
                result = !error;
            } else {
                const { error } = await sb.from('exams').insert(examData);
                result = !error;
            }
            
            if (result) {
                showToast('تم ' + (currentExamId ? 'تعديل' : 'إنشاء') + ' الامتحان', 'success');
                closeExamModal();
                currentPage = 1;
                loadExams();
            } else {
                showToast('حدث خطأ', 'error');
            }
        }
        
        function deleteExamConfirm(examId) {
            if (confirm('⚠️ هل أنت متأكد من حذف هذا الامتحان؟')) {
                (async () => {
                    const { error } = await sb.from('exams').delete().eq('id', examId);
                    if (error) {
                        showToast('حدث خطأ', 'error');
                        return;
                    }
                    showToast('تم حذف الامتحان', 'success');
                    currentPage = 1;
                    loadExams();
                })();
            }
        }
        
        function viewExamSubmissions(examId) {
            window.location.href = `teacher-submissions.html?exam_id=${examId}`;
        }
        
        // ==================== دوال مساعدة ====================
        function togglePriceField() {
            const type = document.getElementById('examType').value;
            document.getElementById('examPriceGroup').style.display = type === 'paid' ? 'block' : 'none';
        }
        
        function closeExamModal() {
            document.getElementById('examModal').style.display = 'none';
        }
        
        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/[&<>]/g, function(m) {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                return m;
            });
        }
        
        function showToast(message, type = 'success') {
            const existing = document.querySelector('.toast-notification');
            if (existing) existing.remove();
            
            const toast = document.createElement('div');
            toast.className = `toast-notification toast-${type}`;
            toast.innerHTML = `
                <div class="toast-icon">${type === 'success' ? '✅' : '❌'}</div>
                <div class="toast-message">${message}</div>
                <div class="toast-progress"></div>
            `;
            document.body.appendChild(toast);
            setTimeout(() => toast.classList.add('show'), 10);
            setTimeout(() => {
                toast.classList.remove('show');
                setTimeout(() => toast.remove(), 300);
            }, 3000);
        }
        
        // ==================== أحداث الفلاتر ====================
        document.getElementById('searchInput').addEventListener('input', () => {
            currentPage = 1;
            loadExams();
        });
        document.getElementById('statusFilter').addEventListener('change', () => {
            currentPage = 1;
            loadExams();
        });
        document.getElementById('classFilter').addEventListener('change', () => {
            currentPage = 1;
            loadExams();
        });
        document.getElementById('subjectFilter').addEventListener('change', () => {
            currentPage = 1;
            loadExams();
        });
        document.getElementById('teacherFilter').addEventListener('change', () => {
            currentPage = 1;
            loadExams();
        });
        
        // ==================== ربط الدوال للنطاق العام ====================
        window.openCreateExamModal = openCreateExamModal;
        window.editExam = editExam;
        window.saveExam = saveExam;
        window.deleteExamConfirm = deleteExamConfirm;
        window.viewExamSubmissions = viewExamSubmissions;
        window.changeExamStatus = changeExamStatus;
        window.togglePriceField = togglePriceField;
        window.closeExamModal = closeExamModal;
        window.loadExams = loadExams;
        window.goToPage = goToPage;
        
        // ==================== تحميل أولي ====================
        (async function init() {
            await loadFiltersOptions();
            await loadExams();
        })();
    </script>
</body>
</html>
