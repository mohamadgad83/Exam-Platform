<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إدارة الامتحانات - منصة الاختبارات</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Cairo', sans-serif; background: #f0f2f5; padding: 20px; }
        .container { max-width: 1400px; margin: 0 auto; }
        .admin-bar {
            background: linear-gradient(135deg, #1e293b, #0f172a);
            color: white;
            padding: 12px 24px;
            border-radius: 20px;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
        }
        .card {
            background: white;
            border-radius: 28px;
            padding: 25px;
            margin-bottom: 20px;
            box-shadow: 0 10px 25px -5px rgba(0,0,0,0.05);
            border: 1px solid #e2e8f0;
        }
        .header h1 {
            background: linear-gradient(135deg, #6366f1, #8b5cf6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-size: 28px;
        }
        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 14px;
            cursor: pointer;
            font-weight: 600;
            transition: 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            font-family: inherit;
        }
        .btn-primary { background: linear-gradient(135deg, #6366f1, #4f46e5); color: white; }
        .btn-success { background: #10b981; color: white; }
        .btn-danger { background: #ef4444; color: white; }
        .btn-warning { background: #f59e0b; color: white; }
        .btn-outline { background: transparent; border: 2px solid #6366f1; color: #6366f1; }
        .btn-sm { padding: 6px 14px; font-size: 12px; }
        .filter-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
            margin-bottom: 20px;
        }
        .search-input {
            padding: 10px 18px;
            border: 1px solid #e2e8f0;
            border-radius: 50px;
            width: 260px;
            font-family: inherit;
        }
        .filter-select {
            padding: 10px 18px;
            border: 1px solid #e2e8f0;
            border-radius: 50px;
            min-width: 150px;
            font-family: inherit;
        }
        .table-wrapper { overflow-x: auto; border-radius: 20px; }
        table { width: 100%; border-collapse: collapse; min-width: 600px; }
        th, td { padding: 14px 16px; text-align: right; border-bottom: 1px solid #e2e8f0; color: #1e293b; }
        th { background: #f8fafc; font-weight: 700; }
        .action-buttons { display: flex; gap: 8px; flex-wrap: wrap; }
        .badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 4px 12px;
            border-radius: 40px;
            font-size: 12px;
            font-weight: 600;
        }
        .badge-success { background: #d1fae5; color: #065f46; }
        .badge-warning { background: #fef3c7; color: #d97706; }
        .badge-danger { background: #fee2e2; color: #991b1b; }
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(5px);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
        .modal-content {
            background: white;
            border-radius: 32px;
            padding: 32px;
            width: 550px;
            max-width: 90%;
            max-height: 85vh;
            overflow-y: auto;
        }
        .modal-content input, .modal-content select, .modal-content textarea {
            width: 100%;
            padding: 12px 16px;
            margin: 10px 0;
            border: 1px solid #e2e8f0;
            border-radius: 16px;
            font-family: inherit;
        }
        .empty-state { text-align: center; padding: 40px; color: #64748b; }
        .toast-notification {
            position: fixed;
            bottom: 30px;
            left: 30px;
            background: white;
            border-radius: 16px;
            padding: 16px 20px;
            display: flex;
            align-items: center;
            gap: 12px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            transform: translateX(-500px);
            transition: transform 0.3s ease;
            z-index: 10000;
            direction: rtl;
            border-right: 4px solid;
        }
        .toast-notification.show { transform: translateX(0); }
        .toast-success { border-right-color: #10b981; }
        .toast-error { border-right-color: #ef4444; }
        .toast-message { flex: 1; font-size: 14px; color: #333; }
        .toast-progress {
            position: absolute;
            bottom: 0;
            left: 0;
            height: 3px;
            width: 100%;
            animation: progress 3s linear forwards;
        }
        @keyframes progress { from { width: 100%; } to { width: 0%; } }
        .confirm-modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(5px);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 10001;
        }
        .confirm-content {
            background: white;
            border-radius: 28px;
            padding: 32px;
            text-align: center;
            width: 320px;
        }
        .confirm-buttons { display: flex; gap: 12px; margin-top: 20px; }
        .confirm-yes { background: #10b981; color: white; padding: 10px; border: none; border-radius: 12px; cursor: pointer; flex: 1; }
        .confirm-no { background: #e2e8f0; color: #333; padding: 10px; border: none; border-radius: 12px; cursor: pointer; flex: 1; }
        @media (max-width: 768px) {
            .filter-bar { flex-direction: column; align-items: stretch; }
            .search-input, .filter-select { width: 100%; }
            .action-buttons { flex-direction: column; }
            .btn { width: 100%; justify-content: center; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="admin-bar">
            <div><span style="font-size:20px;">👑</span> إدارة الامتحانات - <span id="adminName"></span></div>
            <div>
                <button class="btn btn-outline btn-sm" onclick="window.location.href='admin-dashboard.html'">🏠 الرئيسية</button>
                <button class="btn btn-danger btn-sm" onclick="logout()">🚪 خروج</button>
            </div>
        </div>

        <div class="card header">
            <h1>📝 إدارة الامتحانات</h1>
            <p>مراجعة ونشر وإدارة جميع الامتحانات</p>
        </div>

        <div class="card">
            <div class="filter-bar">
                <input type="text" id="searchInput" class="search-input" placeholder="🔍 بحث بالعنوان...">
                <select id="statusFilter" class="filter-select">
                    <option value="all">كل الحالات</option>
                    <option value="draft">مسودة</option>
                    <option value="published">منشور</option>
                    <option value="closed">مغلق</option>
                </select>
                <button class="btn btn-primary" onclick="openCreateExamModal()">➕ إنشاء امتحان</button>
            </div>

            <div class="table-wrapper">
                <table>
                    <thead>
                        <tr><th>العنوان</th><th>المادة</th><th>المعلم</th><th>المدة</th><th>الحالة</th><th>تاريخ الإنشاء</th><th>الإجراءات</th></tr>
                    </thead>
                    <tbody id="examsTableBody"></tbody>
                </table>
            </div>
        </div>

        <!-- مودال إنشاء امتحان -->
        <div id="createExamModal" class="modal">
            <div class="modal-content">
                <h3>📝 إنشاء امتحان جديد</h3>
                <input type="text" id="examTitle" placeholder="عنوان الامتحان">
                <textarea id="examDesc" rows="3" placeholder="وصف الامتحان"></textarea>
                <select id="examClass">
                    <option value="">-- اختر الصف --</option>
                </select>
                <select id="examSubject">
                    <option value="">-- اختر المادة --</option>
                </select>
                <select id="examTeacher">
                    <option value="">-- اختر المعلم --</option>
                </select>
                <input type="number" id="examDuration" placeholder="المدة (دقائق)" value="60">
                <input type="number" id="examPassingScore" placeholder="درجة النجاح (%)" value="50">
                <select id="examStatus">
                    <option value="draft">مسودة</option>
                    <option value="published">منشور</option>
                </select>
                <div style="display: flex; gap: 12px; margin-top: 20px;">
                    <button class="btn btn-primary" onclick="createNewExam()">💾 إنشاء</button>
                    <button class="btn btn-outline" onclick="closeModal('createExamModal')">إلغاء</button>
                </div>
            </div>
        </div>
    </div>

    <script src="js/supabase-config.js"></script>
    <script>
        // التحقق من صلاحية الدخول
        (function() {
            const user = getUser();
            if (!user || user.role !== 'admin') {
                window.location.href = 'index.html';
                return;
            }
            document.getElementById('adminName').innerHTML = user.name;
        })();
        
        // تحميل الامتحانات
        async function loadExams() {
            const search = document.getElementById('searchInput').value;
            const status = document.getElementById('statusFilter').value;
            
            let exams = await fetchExams({ status: status !== 'all' ? status : undefined });
            
            if (search) {
                exams = exams.filter(e => e.title.toLowerCase().includes(search.toLowerCase()));
            }
            
            const tbody = document.getElementById('examsTableBody');
            if (!exams || exams.length === 0) {
                tbody.innerHTML = '<tr><td colspan="7" class="empty-state">لا توجد امتحانات</td></tr>';
                return;
            }
            
            tbody.innerHTML = exams.map(e => `
                <tr>
                    <td><strong>${escapeHtml(e.title)}</strong><br><small>${escapeHtml(e.description || '')}</small></td>
                    <td>${e.subjects?.name || '-'}</td>
                    <td>${e.users?.name || '-'}</td>
                    <td>${e.duration_minutes} دقيقة</td>
                    <td><span class="badge ${e.status === 'published' ? 'badge-success' : e.status === 'draft' ? 'badge-warning' : 'badge-danger'}">${e.status === 'published' ? 'منشور' : e.status === 'draft' ? 'مسودة' : 'مغلق'}</span></td>
                    <td>${formatDate(e.created_at)}</td>
                    <td>
                        <div class="action-buttons">
                            ${e.status !== 'published' ? `<button class="btn btn-success btn-sm" onclick="changeExamStatus(${e.id}, 'published')">✅ نشر</button>` : ''}
                            ${e.status !== 'closed' && e.status === 'published' ? `<button class="btn btn-warning btn-sm" onclick="changeExamStatus(${e.id}, 'closed')">🔒 إغلاق</button>` : ''}
                            <button class="btn btn-danger btn-sm" onclick="deleteExamConfirm(${e.id})">🗑️ حذف</button>
                        </div>
                    </td>
                </tr>
            `).join('');
        }
        
        // تغيير حالة الامتحان - الدالة المصححة
        async function changeExamStatus(examId, status) {
            const result = await updateExamStatusInDB(examId, status);
            if (result) {
                loadExams();
            } else {
                showToast('حدث خطأ', 'error');
            }
        }
        
        // حذف امتحان
        function deleteExamConfirm(examId) {
            showConfirm('هل أنت متأكد من حذف هذا الامتحان؟', async () => {
                const result = await deleteExam(examId);
                if (result) loadExams();
            });
        }
        
        // فتح مودال إنشاء امتحان
        async function openCreateExamModal() {
            await loadExamSelects();
            document.getElementById('createExamModal').style.display = 'flex';
        }
        
        // تحميل الخيارات للمودال
        async function loadExamSelects() {
            const [classes, subjects, teachers] = await Promise.all([
                fetchClasses(),
                fetchSubjects(),
                fetchUsers({ role: 'teacher' })
            ]);
            
            const classSelect = document.getElementById('examClass');
            classSelect.innerHTML = '<option value="">-- اختر الصف --</option>';
            classes.forEach(c => classSelect.innerHTML += `<option value="${c.id}">${escapeHtml(c.name)}</option>`);
            
            const subjectSelect = document.getElementById('examSubject');
            subjectSelect.innerHTML = '<option value="">-- اختر المادة --</option>';
            subjects.forEach(s => subjectSelect.innerHTML += `<option value="${s.id}">${escapeHtml(s.name)}</option>`);
            
            const teacherSelect = document.getElementById('examTeacher');
            teacherSelect.innerHTML = '<option value="">-- اختر المعلم --</option>';
            teachers.forEach(t => teacherSelect.innerHTML += `<option value="${t.id}">${escapeHtml(t.name)}</option>`);
        }
        
        // إنشاء امتحان جديد
        async function createNewExam() {
            const title = document.getElementById('examTitle').value;
            const description = document.getElementById('examDesc').value;
            const classId = document.getElementById('examClass').value;
            const subjectId = document.getElementById('examSubject').value;
            const teacherId = document.getElementById('examTeacher').value;
            const duration = document.getElementById('examDuration').value;
            const passingScore = document.getElementById('examPassingScore').value;
            const status = document.getElementById('examStatus').value;
            
            if (!title || !classId || !subjectId) {
                showToast('العنوان والصف والمادة مطلوبة', 'error');
                return;
            }
            
            const examData = {
                title: title,
                description: description || null,
                class_id: parseInt(classId),
                subject_id: parseInt(subjectId),
                teacher_id: teacherId ? parseInt(teacherId) : null,
                duration_minutes: parseInt(duration),
                passing_score: parseInt(passingScore),
                status: status
            };
            
            const result = await createExam(examData);
            if (result) {
                closeModal('createExamModal');
                loadExams();
                document.getElementById('examTitle').value = '';
                document.getElementById('examDesc').value = '';
            }
        }
        
        function closeModal(modalId) {
            document.getElementById(modalId).style.display = 'none';
        }
        
        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/[&<>]/g, function(m) {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                return m;
            });
        }
        
        // أحداث البحث والفلتر
        document.getElementById('searchInput').addEventListener('input', () => loadExams());
        document.getElementById('statusFilter').addEventListener('change', () => loadExams());
        
        // تحميل أولي
        loadExams();
    </script>
</body>
</html>
